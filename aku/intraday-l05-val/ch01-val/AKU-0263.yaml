formalization:
  status: not_formalizable
  applies_when: null
  constraint: null
  formalization_notes: "Правило не поддаётся формализации по следующим причинам:\n\
    \n1. Вероятностная формулировка: \"чаще всего происходит сильный откат\" — \n\
    \   это наблюдение о статистической тенденции, а не детерминированное \n   ограничение.\
    \ Нет порогового значения вероятности или величины отката.\n\n2. Неопределённость\
    \ \"линии Поддержки (Сопротивления)\": в контексте ВАЛа \n   упоминается \"Правило\
    \ 3-х касаний Дуги Сопротивления (Поддержки)\", \n   т.е. линия поддержки/сопротивления\
    \ — это дуга (кривая), а не \n   горизонтальный уровень. Формализация дуги требует\
    \ параметров, \n   которые в правиле не определены.\n\n3. Неопределённость \"\
    сильного отката\": нет количественного критерия \n   того, что считается \"сильным\"\
    \ откатом (процент, соотношение Фибоначчи \n   и т.д.).\n\n4. Правило является\
    \ торговым наблюдением/эвристикой (\"Попробуем применить \n   это наблюдение в\
    \ практической торговле\"), а не структурным \n   ограничением волновой разметки.\n\
    \nРекомендация: рассмотреть переклассификацию strength из conditional \nв heuristic,\
    \ как отмечено в review_notes."

    language: ru
formalization:
  status: not_formalizable
  applies_when: '# pattern == ''VAL'' (Вал — фигура Нелинейного Волнового Анализа)

    '
  constraint: '# Правило утверждает, что в 90% случаев ценовые экстремумы Вала

    # касаются дуги сопротивления (или поддержки) ровно 3 раза.

    #

    # Для формализации необходимо знать:

    # 1. Как именно строится "дуга сопротивления/поддержки" — это криволинейная

    #    (нелинейная) граница, параметры построения которой не описаны в данном AKU

    # 2. Что считается "касанием" дуги (допуск/толеранс)

    # 3. Какие точки Вала участвуют в касаниях

    #

    # Без определения геометрии дуги и критериев касания

    # невозможно записать проверяемое алгоритмическое условие.

    '
  formalization_notes: "Правило не формализуемо по следующим причинам:\n1. \"Дуга\
    \ сопротивления/поддержки\" — это криволинейный (нелинейный) объект,\n   алгоритм\
    \ построения которого не определён в данном AKU и не содержится\n   в verbatim_quote.\
    \ Без знания параметров дуги (центр, радиус, тип кривой)\n   невозможно проверить\
    \ факт касания.\n2. Критерий \"касания\" (touch) не определён — неизвестен допустимый\
    \ допуск\n   между ценой и дугой.\n3. Правило вероятностное (90%), что делает\
    \ его эвристикой, а не детерминированным\n   ограничением.\n4. Связанный AKU-0250\
    \ может содержать определение правила 3-х касаний,\n   но в рамках данного AKU\
    \ информации недостаточно для самостоятельной\n   формализации."

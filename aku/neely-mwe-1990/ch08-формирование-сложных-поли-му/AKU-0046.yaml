statement_ru: 'Волна-1 не может сегментировать в отсутствие сегментированной волны-2
  (если рынок не формирует Терминальную фигуру).

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Подробнее о чередовании — Сложность
  figure_id: Рис. 8-15-1
  verbatim_quote:
    text: 'волна-1 не можeт сегментировать в отсутствие сегментированной волны-2 (если
      рынок не формирует Терминальную фигуру).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к импульсным фигурам, кроме терминальных

    pattern == ''impulse'' AND subtype != ''terminal''

    '
  constraint: "# \"Сегментировать\" означает, что внутренняя структура волны видна\n\
    # (волна разбивается на подволны более низкого порядка)\n#\n# Если волна-1 сегментирована,\
    \ то волна-2 тоже должна быть сегментирована.\n# Контрапозитив: если волна-2 НЕ\
    \ сегментирована, то волна-1 НЕ может быть сегментирована.\n\nif is_subdivided(wave_1):\n\
    \    assert is_subdivided(wave_2)\n\n# Эквивалентно:\n# NOT is_subdivided(wave_1)\
    \ OR is_subdivided(wave_2)\n"
  formalization_notes: 'Термин "сегментировать" (subdivide) означает, что волна визуально

    разбивается на подволны — её внутренняя структура видна на том же

    или близком масштабе графика. Критерий определения "сегментированности"

    требует отдельного определения (например, наличие >= 3 подволн

    видимого масштаба).

    Исключение для терминальных фигур явно указано в правиле —

    в терминалах волна-1 может сегментировать без сегментированной волны-2.'
aliases:

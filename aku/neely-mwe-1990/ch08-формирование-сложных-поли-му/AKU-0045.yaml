statement_ru: 'Ни один из нечетных сегментов импульсной фигуры не должен сегментировать
  раньше одного из сегментов коррективных фигур (если импульсная фигура не терминальная).

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Сложная Коррекция c малой x-волной
  figure_id: Рис. 8-1-1
  verbatim_quote:
    text: 'Ни один из нечетных сегментов импульсной фигуры не должен "делиться" раньше
      одного из сегментов коррективных фигур (если импульсная фигура не терминальная).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к импульсной фигуре, которая НЕ является терминальной
    (leading diagonal / ending diagonal terminal)

    pattern == ''impulse'' AND subtype != ''terminal''

    '
  constraint: "# \"Сегментировать\" / \"делиться\" означает, что волна подразделяется\
    \ на подволны\n# (т.е. является поливолной или выше, а не моноволной)\n#\n# Нечётные\
    \ сегменты импульса: волны 1, 3, 5\n# Коррективные сегменты импульса: волны 2,\
    \ 4\n#\n# Правило: ни одна нечётная волна не должна сегментироваться (подразделяться)\n\
    # РАНЬШЕ, чем хотя бы одна из коррективных волн.\n#\n# \"Раньше\" здесь означает\
    \ порядок сложности (complexity order):\n# если ВСЕ коррективные волны являются\
    \ моноволнами (не подразделяются),\n# то ни одна нечётная волна тоже не должна\
    \ подразделяться.\n#\n# Иначе говоря: если хотя бы одна нечётная волна подразделяется,\n\
    # то хотя бы одна коррективная волна тоже должна подразделяться.\n\nodd_waves\
    \ = [wave_1, wave_3, wave_5]\ncorrective_waves = [wave_2, wave_4]\n\nany_odd_subdivided\
    \ = any(is_subdivided(w) for w in odd_waves)\nany_corrective_subdivided = any(is_subdivided(w)\
    \ for w in corrective_waves)\n\n# Если хотя бы одна нечётная волна подразделяется,\n\
    # то хотя бы одна коррективная тоже должна подразделяться\nIF any_odd_subdivided\
    \ THEN\n  assert any_corrective_subdivided == TRUE\n\n# Эквивалентная формулировка:\n\
    # NOT (any_odd_subdivided AND NOT any_corrective_subdivided)\n"
  formalization_notes: 'Правило сложности (complexity rule) / порядка сегментации.

    "Сегментировать раньше" интерпретируется как: нечётная волна не может быть

    более сложной (подразделённой), если все коррективные волны остаются моноволнами.

    Функция is_subdivided(wave) возвращает TRUE, если волна состоит из подволн

    (поливолна или выше), и FALSE, если волна является моноволной.

    Исключение для терминальных импульсов (terminal impulse / ending diagonal)

    явно указано в правиле.

    Точное определение "раньше" в контексте порядка сложности может требовать

    дополнительной спецификации — здесь принята минимальная интерпретация:

    наличие хотя бы одной подразделённой коррективной волны при наличии

    подразделённых нечётных волн.'

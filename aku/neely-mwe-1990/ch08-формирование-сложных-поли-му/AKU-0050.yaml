id: AKU-0050
type: rule
strength: mandatory
status: verified
topic: compaction
subtopics:
- polywave
- retracement
statement_ru: 'Если длина волны-2 слишком велика по сравнению с длиной волны-1, то
  волна-2 должна сегментировать, чтобы её волна-с не выходила за конечный уровень
  её волны-а; в противном случае большая волна начаться не сможет.

  '
source:
  book_id: neely-mwe-1990
  page: 8-24
  chapter: Глава 8
  section: Формирование сложных поли-, мульти- и макроволн
  figure_id: 8-24a
  verbatim_quote:
    text: 'Это указывает, что волна-2 должна сегментировать, чтобы ее волна-с не выходила
      за конечный уровень ее волны-а; в противном случае большая волна начаться не
      сможет.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при формировании импульса (или аналогичной
    структуры),

    # когда длина волны-2 "слишком велика" по сравнению с длиной волны-1.

    # Точный порог "слишком велика" не определён в данном AKU —

    # предположительно связан с приближением к 100% откату (см. AKU-0001).

    pattern_context in [''impulse'', ''polywave_impulse'']

    AND current_wave == 2

    AND price_length(wave_2) is_large_relative_to price_length(wave_1)

    # "is_large_relative_to" — порог не специфицирован в verbatim_quote;

    # контекст: волна-2 настолько велика, что без сегментации

    # она бы нарушила возможность начала большей волны

    '
  constraint: "# Когда условие выполнено, волна-2 ДОЛЖНА сегментировать (subdivide),\n\
    # и при этом внутренняя волна-c волны-2 не должна выходить\n# за конечный уровень\
    \ внутренней волны-a волны-2.\n#\n# \"Не выходить за конечный уровень\" означает:\n\
    # - если волна-2 направлена вниз (коррекция бычьего импульса):\n#   end_price(wave_2.c)\
    \ >= end_price(wave_2.a)\n#   (волна-c не опускается ниже конца волны-a)\n# -\
    \ если волна-2 направлена вверх (коррекция медвежьего импульса):\n#   end_price(wave_2.c)\
    \ <= end_price(wave_2.a)\n#   (волна-c не поднимается выше конца волны-a)\n\n\
    is_subdivided(wave_2) == true\n\nif direction(wave_2) == DOWN:\n    end_price(wave_2.c)\
    \ >= end_price(wave_2.a)\nelif direction(wave_2) == UP:\n    end_price(wave_2.c)\
    \ <= end_price(wave_2.a)\n\n# Иначе (если wave_2 не сегментирует или wave_2.c\
    \ выходит за wave_2.a):\n# большая волна (импульс) начаться не может — паттерн\
    \ невалиден\n"
  formalization_notes: "1. Точный порог \"слишком велика\" (large_relative_to) НЕ\
    \ определён\n   в verbatim_quote данного AKU. В formalization.formalization_notes\n\
    \   оригинала указано, что это связано с правилом wave_2 < 100% wave_1\n   (AKU-0001),\
    \ но конкретное числовое значение не приведено.\n2. \"Не выходила за конечный\
    \ уровень\" интерпретировано как:\n   конец волны-c не должен превышать (по направлению\
    \ движения волны-2)\n   конец волны-a. Это соответствует ситуации, когда внутренняя\n\
    \   структура волны-2 формирует паттерн, где c не пробивает a\n   (например, running\
    \ flat или аналогичная структура).\n3. \"Большая волна начаться не сможет\" —\
    \ если ограничение нарушено,\n   текущая интерпретация как импульс невалидна.\n\
    4. Контекст из source: figure 8-24a, раздел о compaction polywave."
aliases:
- правило сегментации волны-2

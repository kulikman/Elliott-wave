statement_ru: 'Когда волна-1 Импульса растянута, волна-2 должна быть сложнее волны-4.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Подробнее о растянутых волнах
  figure_id: Рис. 8-20-1
  verbatim_quote:
    text: 'Когда волна-1 растянута, волна-2 должна быть сложнее волны-4.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к завершённому Импульсу, в котором волна-1
    является растянутой

    pattern == ''impulse''

    AND extended_wave == 1

    '
  constraint: '# Волна-2 должна быть сложнее волны-4

    # Сложность (complexity) определяется количеством моноволн (подволн) в структуре
    волны

    # Чем больше подволн — тем сложнее паттерн

    complexity(wave_2) > complexity(wave_4)

    '
  formalization_notes: "Понятие \"сложнее\" (complexity) у Нили означает большее количество\
    \ \nсоставных сегментов (моноволн/подволн) в структуре коррекции.\nНапример, зигзаг\
    \ (3 сегмента) проще, чем двойная комбинация (7 сегментов).\nТочная метрика сложности\
    \ должна быть определена в соответствии с \nиерархией паттернов Нили. Правило\
    \ является обязательным (mandatory) — \n\"должна быть сложнее\" — это жёсткое\
    \ требование, а не рекомендация."

id: AKU-0049
type: rule
strength: mandatory
status: verified
topic: impulse-extension
subtopics:
- rule-of-alternation
- complexity-rule
statement_ru: 'Когда волна-5 Импульса растянута, волна-4 должна быть сложнее и длительнее
  волны-2.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Подробнее о растянутых волнах
  figure_id: Рис. 8-20-5
  verbatim_quote:
    text: 'Когда волна-5 Растянутая, волна-4 должна быть сложнее и длительнее волны-2

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — импульс с растянутой волной 5

    pattern == ''impulse''

    AND extended_wave == 5

    '
  constraint: '# Волна-4 должна быть сложнее волны-2

    complexity(wave_4) > complexity(wave_2)

    # Волна-4 должна быть длительнее волны-2

    AND duration(wave_4) > duration(wave_2)

    '
  formalization_notes: 'Метрика complexity (сложность) требует определения. Возможные
    подходы:

    - количество подволн (моноволн) внутри структуры

    - глубина вложенности подволн

    - тип коррекционного паттерна (например, зигзаг проще флэта, флэт проще треугольника)

    Нили не даёт здесь точного определения "сложнее", но в контексте книги

    сложность обычно означает большее количество подволн и/или более сложный

    тип коррекционной структуры.

    duration — количество баров (или единиц времени) от начала до конца волны.

    Оба условия (сложность И длительность) должны выполняться одновременно —

    это следует из союза "и" в verbatim_quote.'

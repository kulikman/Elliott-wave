id: AKU-0043
type: rule
strength: mandatory
status: verified
topic: multiwave
subtopics:
- impulse
- wave-degree
statement_ru: 'При формировании импульсной мультиволны как минимум одна из коррективных
  фаз Импульса (волна 2 или 4) должна быть поливолной. Другая может быть как моно-,
  так и поливолной.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Формирование мультиволн — Импульсы
  figure_id: null
  verbatim_quote:
    text: 'Как минимум одна из коррективных фаз Импульса (волна 2 или 4) должна быть
      поливолной. Другая может быть как моно -, так и поливолной.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при формировании импульсной мультиволны

    pattern == ''impulse'' AND degree == ''multiwave''

    '
  constraint: '# Как минимум одна из коррективных фаз (волна 2 или 4) должна быть
    поливолной

    is_polywave(wave_2) OR is_polywave(wave_4)


    # Другая может быть как моноволной, так и поливолной (нет ограничения сверху)

    # т.е. допустимые комбинации:

    #   wave_2 = polywave, wave_4 = monowave

    #   wave_2 = polywave, wave_4 = polywave

    #   wave_2 = monowave, wave_4 = polywave

    #

    # Недопустимая комбинация:

    #   wave_2 = monowave AND wave_4 = monowave  => НАРУШЕНИЕ

    '
  formalization_notes: 'Правило устанавливает минимальное требование к сложности коррективных
    фаз

    в импульсной мультиволне. Обе волны 2 и 4 не могут одновременно быть моноволнами.

    Верхнего ограничения нет — обе могут быть поливолнами.

    Связано с AKU-0042 (требование к нечётным волнам) и AKU-0044 (длительность коррекций).'

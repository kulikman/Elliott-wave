id: AKU-0042
type: rule
strength: mandatory
status: verified
topic: multiwave
subtopics:
- impulse
- wave-degree
statement_ru: 'При формировании импульсной мультиволны одна и только одна из трех
  нечетных волн (волна 1, 3 или 5) должна быть поливолной. Две остальные должны быть
  моноволнами.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch8
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Формирование мультиволн — Импульсы
  figure_id: null
  verbatim_quote:
    text: 'Одна и только одна из трех нечетных волн в Импульсной фигуре (волна 1,
      3 или 5) должна быть поливолной. Две остальные должны быть моноволнами.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при валидации импульсной фигуры на уровне мультиволны

    pattern == ''impulse'' AND degree == ''multiwave''

    '
  constraint: '# Определяем степень каждой нечётной волны

    odd_waves = [wave_1, wave_3, wave_5]


    # Подсчитываем количество поливолн среди нечётных волн

    polywave_count = count(w for w in odd_waves if w.degree == ''polywave'')


    # Подсчитываем количество моноволн среди нечётных волн

    monowave_count = count(w for w in odd_waves if w.degree == ''monowave'')


    # Одна и только одна нечётная волна должна быть поливолной

    # Две остальные должны быть моноволнами

    polywave_count == 1 AND monowave_count == 2

    '
  formalization_notes: 'Правило строго определено: ровно одна поливолна и ровно две
    моноволны

    среди нечётных волн (1, 3, 5). Никаких других степеней (например,

    мультиволна внутри нечётных волн) не допускается — это следует из

    формулировки "одна и только одна ... поливолной. Две остальные должны

    быть моноволнами". Правило является одним из условий формирования

    мультиволны импульсного типа (работает совместно с AKU-0043 и AKU-0044).'

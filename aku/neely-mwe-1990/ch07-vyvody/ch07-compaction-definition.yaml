statement_ru: >
  Процедура сжатия (уплотнения) волн используется для сведения завершённых моно-, поли-,
  мульти- или макроволн к единой (single) импульсной или коррективной структуре (":5" или ":3").
  Любую завершённую фигуру Эллиота, независимо от её размеров, можно трактовать и обозначать
  как единую Коррекцию (":3") или Импульс (":5"). Процедуру нельзя проводить, пока не учтены все
  критерии глав 1–6.
source:
  book_id: neely-mwe-1990
  page: 7-1
  chapter: "Глава 7: Выводы"
  section: "Процедура сжатия (уплотнения) волн"
  verbatim_quote:
    text: >
      Процесс сжатия (уплотнения) волн – неотъемлемая часть теории Эллиота – используется
      для сведения завершённых моно-, поли-, мульти- или макроволн к единой (single) импульсной
      или коррективной структуре (":3" или ":5"). Благодаря динамичности этой концепции, любую
      завершённую фигуру Эллиота, независимо от её размеров, можно трактовать и обозначать как
      единую Коррекцию (":3") или Импульс (":5").
    language: ru
formalization:
  status: draft
  applies_when: |
    # Применяется после полного завершения фигуры Эллиота всех уровней
    figure.is_completed == true
    AND all_chapter_1_6_criteria_satisfied == true
  result: |
    figure.compact_structure = ":3" OR ":5"

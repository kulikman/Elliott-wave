strength: mandatory
status: verified
topic: wave-degree
subtopics:
  - wave-degree
  - wave-degree
statement_ru: >
  Порядок волн (Degree) — понятие, которое используется, когда объединяются несколько
  (или больше) моно-, поли-, мульти- или макроволн, чтобы получить более крупную
  Импульсную или Корректирующую фигуру. Очевидные сегменты в фигуре всегда будут на
  один Порядок меньше, чем фигура в целом. Концепция Порядка применима только после
  присвоения Наименования характерному движению на графике с минимальным временным
  диапазоном — волне Субмельчайшего Порядка (Sub-Minuette Degree).
source:
  book_id: neely-mwe-1990
  page: 7-11
  chapter: "Глава 7: Выводы"
  section: "О Порядке волн — Наименование Порядка"
  verbatim_quote:
    text: >
      Порядок – это понятие, которое должно рассматриваться, когда вы объединяете несколько
      (или больше) моно-, поли-, мульти- или макроволн, чтобы получить более крупную Импульсную
      или Корректирующую фигуру. Реализация этого процесса создаёт более высокий Порядок
      Наименования для объединённой группы волн как особого объекта. Другими словами, когда три
      или пять сегментов объединяются в одну более крупную [конфигурацию] – правильную фигуру
      Эллиота, то создаётся фигура более высокого Порядка, (очевидные) сегменты в фигуре всегда
      будут на один порядок меньше, чем фигура в целом.
    language: ru
formalization:
  status: draft
  applies_when: |
    wave.is_labeled == true
    AND wave.degree IS NOT NULL
  result: |
    wave.internal_segments.degree = wave.degree - 1

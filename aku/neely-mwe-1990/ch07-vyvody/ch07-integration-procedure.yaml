id: AKU-0364
type: rule
strength: mandatory
status: verified
topic: compaction
subtopics:
  - analysis-workflow
  - wave-degree
statement_ru: >
  Интеграция — процесс перевода более краткосрочных, компактных волновых структур в более
  долгосрочные графики, позволяющий постепенно "собирать по кусочкам" более крупные
  конфигурации. Каждый раз, когда завершённую поливолновую фигуру на краткосрочном графике
  переносят в сжатом виде со Структурной меткой на более долгосрочный график, на нём
  оказывается множество поливолн, каждая с собственной идентифицированной базовой Структурой.
  Интеграция даёт возможность сопоставления ценовых и временных целей долго- и краткосрочного
  графиков с целью получения максимально точной оценки будущего движения рынка.
source:
  book_id: neely-mwe-1990
  page: 7-8
  chapter: "Глава 7: Выводы"
  section: "Интеграция"
  verbatim_quote:
    text: >
      Интеграция – это процесс перевода более краткосрочных, компактных волновых структур в
      более долгосрочные графики, позволяющий постепенно "собирать по кусочкам" более крупные
      конфигурации. Интеграция даёт возможность взаимообмена информации между графиками
      (т.е. сопоставления ценовых и временных целей долго- и краткосрочного графиков с целью
      получения максимально точной оценки будущего развития рынка).
    language: ru

id: AKU-0191
type: rule
strength: mandatory
status: verified
topic: x-wave
subtopics:
- compaction
- structural-series
statement_ru: Все нестандартные фигуры с x-волнами после уплотнения (сжатия) сводятся
  к базовой структуре ':3'. Уровень сложности x-волны обычно на один уровень ниже
  самой сложной Стандартной фигуры в завершённой конфигурации.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 7-1
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Процедура сжатия (уплотнения) волн
  figure_id: null
  verbatim_quote:
    text: F. Все фигуры с х-волнами (немедленно после проведения процедуры их уплотнения)
      могут быть сведены к тройке (":3").
    language: ru
formalization:
  status: draft
  applies_when: '# Фигура является нестандартной (non-standard) и содержит x-волну

    is_non_standard_figure(pattern) == true

    AND has_x_wave(pattern) == true

    AND compaction_procedure_applied == true

    '
  constraint: '# После уплотнения (compaction) нестандартная фигура с x-волной

    # сводится к базовой структуре '':3''

    compacted_structure = compact(pattern)

    compacted_structure.monowave_label == '':3''


    # Уровень сложности x-волны обычно на один уровень ниже

    # самой сложной стандартной фигуры в завершённой конфигурации

    # (это рекомендация, не строгое mandatory ограничение)

    # standard_figures = get_all_standard_figures_in(pattern)

    # max_complexity = max(complexity_level(fig) for fig in standard_figures)

    # complexity_level(x_wave) == max_complexity - 1  # "обычно", не всегда

    '
  formalization_notes: "1. Mandatory часть: compact(non_standard_with_x_wave) → ':3'\
    \ — \n   это прямо следует из verbatim_quote (пункт F).\n2. Часть про \"уровень\
    \ сложности x-волны обычно на один уровень ниже\" \n   присутствует в statement_ru,\
    \ но слово \"обычно\" указывает на \n   рекомендательный характер, а не строгое\
    \ mandatory правило.\n   В verbatim_quote эта часть отсутствует, поэтому она \n\
    \   закомментирована и не включена как mandatory constraint.\n3. Процедура compaction\
    \ (уплотнения/сжатия) — это отдельная \n   процедура из Гл.7, которая заменяет\
    \ группу подволн \n   одной моноволной с соответствующей структурной меткой."

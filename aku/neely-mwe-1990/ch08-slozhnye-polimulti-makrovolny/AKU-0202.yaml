statement_ru: 'Большинство фигур Эллиота НЕ завершается в точке абсолютного максимума
  или минимума. 4 формы завершения без нового экстремума: A — Неудавшаяся пятая; B
  — Плоская с Неудавшейся c-волной; C — Сужающийся Неограничивающий Треугольник на
  вершине; D — Терминальная фигура. Начинать счёт следует от конца предыдущей фигуры,
  не от точки глобального экстремума.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-27
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Как выбирать начальную точку счёта
  figure_id: null
  verbatim_quote:
    text: Верите вы в это или нет, но большинство фигур Эллиота не завершается в точке
      абсолютного максимума или минимума... Если начать анализ группы волн не с конечной
      точки фигуры Эллиота, прогнозы поведения рынка могут очень долго оставаться
      неверными.
    language: ru
formalization:

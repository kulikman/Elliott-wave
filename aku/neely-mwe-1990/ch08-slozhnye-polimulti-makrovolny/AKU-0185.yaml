id: AKU-0185
type: rule
strength: mandatory
status: verified
topic: x-wave
subtopics:
- combination
- complexity-rule
statement_ru: 'Условие 1 (малая x-волна): x-волна развивается когда две компактные
  Коррекции разделяются промежуточной волной МЕНЬШЕ 61.8% длины первой Коррекции.
  Уровень сложности x-волны обычно на один ниже окружающих Коррекций.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-2
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Условие 1
  figure_id: null
  verbatim_quote:
    text: Развитие самого сильного сигнала х-волны на рынке имеет место, когда две
      компактные Коррекции (поливолна или выше) разделяются промежуточной Коррективной
      волной (моноволной или волной более высокого Порядка Стандартного или Нестандартного
      типа), которая меньше 61,8% длины первой Коррективной фазы.
    language: ru
formalization:
  status: draft
  applies_when: '# Кандидат на x-волну между двумя коррективными структурами в комбинации

    pattern == ''combination''

    AND x_wave_candidate is identified between correction_1 and correction_2

    # Обе коррекции должны быть "компактными" (поливолна или выше)

    AND complexity(correction_1) >= polywaves

    AND complexity(correction_2) >= polywaves

    # x-волна — коррективная волна (моноволна или выше, стандартного или нестандартного
    типа)

    AND is_corrective(x_wave_candidate)

    '
  constraint: '# Условие 1 (малая x-волна): промежуточная волна МЕНЬШЕ 61.8% длины
    первой Коррекции

    length(x_wave_candidate) < 0.618 * length(correction_1)


    # Уровень сложности x-волны обычно на один ниже окружающих Коррекций

    # ("обычно" — не абсолютное требование, но сильный ориентир)

    complexity(x_wave_candidate) == complexity(correction_1) - 1

    '
  formalization_notes: "1. \"length\" — ценовая длина (расстояние от начала до конца\
    \ волны в пунктах/процентах).\n2. \"компактные Коррекции\" — в verbatim_quote\
    \ уточняется как \"поливолна или выше\",\n   т.е. минимальный уровень сложности\
    \ — polywaves.\n3. x-волна может быть моноволной или волной более высокого порядка\
    \ (стандартного\n   или нестандартного типа) — это из verbatim_quote.\n4. Условие\
    \ complexity == complexity(correction_1) - 1 описано в statement_ru\n   словом\
    \ \"обычно\", что делает его скорее guideline, чем strict mandatory.\n   Однако\
    \ оно включено, так как является частью определения \"малой x-волны\".\n5. Данное\
    \ правило определяет \"малую x-волну\" — самый сильный сигнал x-волны,\n   соответствующий\
    \ Серии a (Таблица А) по Нили.\n6. Правило не уточняет, должна ли complexity(correction_2)\
    \ совпадать\n   с complexity(correction_1); из текста следует что обе \"компактные\"\
    ,\n   но точное соотношение их сложностей здесь не задано."

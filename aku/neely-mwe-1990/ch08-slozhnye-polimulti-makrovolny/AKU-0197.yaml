statement_ru: 'Мультиволновая Коррекция: одна или две пятёрки ('':5'') в более крупной
  фигуре должны быть явно сегментированы в поливолне. Если сегментирована только одна
  пятёрка — она должна быть c-волной Зигзага или Плоской. Очень высока вероятность,
  что b-волна мультиволны будет Коррективной поливолной.'
statement_en: null

statement_ru: 'Чередование по строению (Construction): если смежные волны в Импульсной
  или Коррективной фигуре сегментируют, другие формы Чередования должны сохраняться
  для точности подсчёта. Зигзаг → следующая фигура того же Порядка будет Плоской или
  иной (не Зигзаг). Импульс (:5) → следующая всегда Коррекция (:3).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-20
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Подробнее о Чередовании / Строение
  figure_id: null
  verbatim_quote:
    text: Если смежные волны в Импульсной или Коррективной фигуре сегментируют, другие
      формы Чередования должны сохраняться, чтобы сохранить точность подсчёта. Одна
      из форм, в которой возможно Чередование [Сложности], является Конструкция волны.
      Если одна фигура Зигзаг, ожидается, что следующая фигура будет Зигзагом (см.
      Рисунок 8-16а). Если рынок формирует Импульсную фигуру, ожидаемое следующее
      движение того же Порядка всегда будет Коррективной фигурой.
    language: ru
formalization:
  status: draft
  applies_when: "# Правило применяется при проверке чередования между смежными волнами\n\
    # одного Порядка (Degree) в Импульсной или Коррективной фигуре,\n# когда обе смежные\
    \ волны сегментируют (т.е. имеют внутреннюю структуру).\n#\n# Контекст 1: Смежные\
    \ коррективные волны в импульсе (например, волны 2 и 4)\n# Контекст 2: Смежные\
    \ фигуры одного Порядка в коррективной серии\n# Контекст 3: Любая импульсная фигура\
    \ и следующее движение того же Порядка\n\nadjacent_waves_both_segment = True\n\
    # т.е. обе волны имеют внутреннюю подструктуру (не моноволны)\nAND (parent_pattern.type\
    \ IN ['impulse', 'corrective_combination']\n     OR comparing_same_degree_figures\
    \ == True)\n"
  constraint: "# Правило 1: Чередование по строению (Construction) для коррективных\
    \ фигур\n# Если одна фигура — Зигзаг, следующая смежная фигура того же Порядка\n\
    # НЕ должна быть Зигзагом (должна быть Плоской или иной коррекцией)\n\nif fig_A.construction\
    \ == 'zigzag':\n    assert fig_B.construction != 'zigzag'\n    # Ожидается: flat,\
    \ triangle, или иная не-зигзагообразная коррекция\n\nif fig_A.construction ==\
    \ 'flat':\n    assert fig_B.construction != 'flat'\n    # Ожидается: zigzag или\
    \ иная не-плоская коррекция\n\n# Правило 2: После Импульсной фигуры (:5) следующее\
    \ движение того же Порядка\n# всегда является Коррективной фигурой (:3)\n\nif\
    \ fig_A.construction == 'impulse' AND fig_A.structure == ':5':\n    assert next_same_degree_fig.type\
    \ == 'corrective'\n    # т.е. next_same_degree_fig.structure == ':3'\n\n# ВАЖНО:\
    \ Эти правила чередования обязательны (mandatory) только когда\n# обе смежные\
    \ волны сегментируют. Если одна из них не сегментирует,\n# другие формы чередования\
    \ (по сложности, длительности и т.д.)\n# берут на себя роль подтверждения точности\
    \ подсчёта.\n"
  formalization_notes: "1. Verbatim quote содержит противоречие/опечатку: \"Если одна\
    \ фигура Зигзаг,\n   ожидается, что следующая фигура будет Зигзагом\" — но из\
    \ контекста, рисунка 8-16a\n   (Зигзаг ++ Плоская) и самого принципа чередования\
    \ следует, что следующая\n   фигура НЕ должна быть Зигзагом. Формализация следует\
    \ логике чередования\n   и рисунку 8-16a, а не буквальной цитате в этом месте.\n\
    2. Условие \"обе смежные волны сегментируют\" — ключевое: правило чередования\n\
    \   по строению активируется именно тогда, когда сегментация присутствует у обеих.\n\
    3. Рис.8-16a: Зигзаг → Плоская (чередование construction в коррективных волнах).\n\
    \   Рис.8-16b: Импульс(:5) → Коррекция(:3) (чередование типа движения)."

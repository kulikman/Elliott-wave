statement_ru: 'Чередование по строению (Construction): если смежные волны в Импульсной
  или Коррективной фигуре сегментируют, другие формы Чередования должны сохраняться
  для точности подсчёта. Зигзаг → следующая фигура того же Порядка будет Плоской или
  иной (не Зигзаг). Импульс (:5) → следующая всегда Коррекция (:3).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-20
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Подробнее о Чередовании / Строение
  figure_id: null
  verbatim_quote:
    text: Если смежные волны в Импульсной или Коррективной фигуре сегментируют, другие
      формы Чередования должны сохраняться, чтобы сохранить точность подсчёта. Одна
      из форм, в которой возможно Чередование [Сложности], является Конструкция волны.
      Если одна фигура Зигзаг, ожидается, что следующая фигура будет Зигзагом (см.
      Рисунок 8-16а). Если рынок формирует Импульсную фигуру, ожидаемое следующее
      движение того же Порядка всегда будет Коррективной фигурой.
    language: ru

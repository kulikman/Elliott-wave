  page: 8-26
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Важно знать, какая из волн Импульса Растянутая / Волна-5 Растянутая
  figure_id: null
  verbatim_quote:
    text: Длина волны-5, отсчитанная от конечной точки волны-3 ("n" на рисунке), обычно
      составляет 161,8% расстояния от начала волны-1 до конца волны-3 ("m" на рисунке)...
      длина волны-4 составляет 40-61,8% длины волны-3... После Растянутой пятой следует
      быстрый откат на 61,8–95% длины всей волны-5.
    language: ru
formalization:
  status: draft
  applies_when: wave_5 is extended (longest of 1,3,5)
  constraint: target_w5 = end(wave_3) + 1.618 * (end(wave_3) - start(wave_1)) ; retracement
    = 0.618..0.95 * length(wave_5)
  formalization_notes: 'Рис.8-20 (продолжение): ''ложное пробитие'' верхней линии
    тренда.'

statement_ru: 'Волна-5 Растянутая: длина волны-5, отсчитанная от конечной точки волны-3
  (точка ''n''), обычно составляет 161.8% расстояния от начала волны-1 до конца волны-3
  (точка ''m''). Волна-4 составляет 40-61.8% длины волны-3 и завершается Неудавшейся-с
  или Треугольником. После Растянутой пятой — откат 61.8-95% всей волны-5.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-26
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Важно знать, какая из волн Импульса Растянутая / Волна-5 Растянутая
  figure_id: null
  verbatim_quote:
    text: Длина волны-5, отсчитанная от конечной точки волны-3 ("n" на рисунке), обычно
      составляет 161,8% расстояния от начала волны-1 до конца волны-3 ("m" на рисунке)...
      длина волны-4 составляет 40-61,8% длины волны-3... После Растянутой пятой следует
      быстрый откат на 61,8–95% длины всей волны-5.
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс, в котором волна-5 является Растянутой (самой длинной из
    1, 3, 5)

    pattern == ''impulse''

    AND length(wave_5) > length(wave_1)

    AND length(wave_5) > length(wave_3)

    '
  constraint: '# === 1. Проекция длины волны-5 ===

    # Расстояние от начала волны-1 до конца волны-3

    m = abs(end(wave_3) - start(wave_1))

    # Ожидаемая длина волны-5, отсчитанная от конца волны-3 (точка "n")

    # "обычно составляет 161.8% расстояния m"

    target_wave_5_end = end(wave_3) + direction * 1.618 * m

    # где direction = +1 для бычьего импульса, -1 для медвежьего

    # Фактический конец волны-5 должен быть приблизительно равен target

    # (это guideline/"обычно", не жёсткое правило)


    # === 2. Волна-4: длина относительно волны-3 ===

    # Волна-4 составляет 40–61.8% длины волны-3

    ratio_w4_to_w3 = length(wave_4) / length(wave_3)

    ratio_w4_to_w3 >= 0.40

    AND ratio_w4_to_w3 <= 0.618


    # === 3. Волна-4: структура ===

    # Волна-4 завершается Неудавшейся-с (failure-c) или Треугольником

    structure(wave_4) IN [''failure_c'', ''triangle'']


    # === 4. Откат после Растянутой пятой ===

    # После завершения всего импульса следует быстрый откат

    # на 61.8–95% длины всей волны-5

    retracement_after = abs(post_impulse_move)

    retracement_ratio = retracement_after / length(wave_5)

    retracement_ratio >= 0.618

    AND retracement_ratio <= 0.95

    '
  formalization_notes: "- Слово \"обычно\" в проекции 161.8% указывает на guideline,\
    \ а не strict rule.\n  Тем не менее это единственный ориентир для целевой длины\
    \ волны-5.\n- \"Неудавшаяся-с\" (failure_c) — паттерн коррекции, где волна-с не\
    \ достигает\n  конца волны-а; нужна отдельная логика идентификации.\n- Откат 61.8–95%\
    \ относится к движению ПОСЛЕ завершения импульса (следующая\n  коррекция старшего\
    \ порядка), а не к внутренней структуре импульса.\n- direction определяется направлением\
    \ импульса: +1 (бычий) или -1 (медвежий).\n- Рис. 8-20: упоминается \"ложное пробитие\"\
    \ верхней линии тренда — \n  не формализовано, т.к. нет достаточного описания\
    \ в verbatim_quote."

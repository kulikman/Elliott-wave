id: AKU-0203
type: rule
strength: mandatory
status: draft
topic: wave-identification
subtopics:
- impulse
- analysis-workflow
statement_ru: 'Признаки неправильной начальной точки импульса: 1) длины волн 1, 3,
  5 практически равны; 2) волны 2 и 4 не чередуются; 3) волна-2 нисходящего тренда
  длиннее предыдущей волны; 4) волна-2 пересекает линию тренда 0-2. Любой из этих
  признаков указывает на ошибку в выборе старта.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-29
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Как выбирать начальную точку счёта / Рис.8-25
  figure_id: null
  verbatim_quote:
    text: В варианте А волнового счета обнаружены значительные логические ошибки...
      1. Длины всех волн 1, 3 и 5 практически равны. 2. Волны 2 и 4 практически не
      чередуются. 3. Волна-2 нисходящего тренда больше волны (ii)... 4. Волна-2 пересекает
      линию тренда (0)-(ii).
    language: ru
formalization:
  status: draft
  applies_when: validating impulse start point
  constraint: NOT(length(w1)≈length(w3)≈length(w5)) AND alternation(w2,w4) AND w2_not_cross_trendline_02
  formalization_notes: 'Рис.8-25: Счёт A — ошибочный, Счёт B — правильный (Неограничивающий
    Треугольник + нисходящий импульс).'

statement_ru: 'Двойная Комбинация: любые две Стандартные Коррекции (Зигзаг/Плоская/Треугольник),
  разделённые x-волной. Возможные варианты: Зигзаг+x+Плоская, Зигзаг+x+Треугольник,
  Плоская+x+Треугольник. Все сжимаются в '':3''.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 8-3
  chapter: 'Глава 8: Формирование сложных поли-, мульти- и макроволн'
  section: Таблица А / Двойная Комбинация
  figure_id: null
  verbatim_quote:
    text: '(5-3-5) + (x-волна) + (3-3-3-3-3, с.т.) = Двойная Комбинация = ":3"

      (5-3-5) + (x-волна) + (3-3-5) = Двойная Комбинация = ":3"'
    language: ru

formalization:
  status: draft
  applies_when: 'pattern == ''zigzag''

    '
  constraint: "# Волна-с должна двигаться дальше конечной точки волны-а\n# \"Дальше\"\
    \ означает: в направлении основного тренда зигзага\n# Для бычьего зигзага (движение\
    \ вверх): конец волны-с выше конца волны-а\n# Для медвежьего зигзага (движение\
    \ вниз): конец волны-с ниже конца волны-а\n\nif direction == 'up':\n    end(wave_c)\
    \ > end(wave_a)\nelif direction == 'down':\n    end(wave_c) < end(wave_a)\n"
  formalization_notes: 'Правило явно допускает минимальное превышение ("пусть даже
    ненамного"),

    поэтому используется строгое неравенство (>) без минимального порога.

    Направление зигзага определяет знак сравнения.

    end() возвращает ценовое значение конечной точки волны.'

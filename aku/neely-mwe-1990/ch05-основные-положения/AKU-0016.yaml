formalization:
  status: draft
  applies_when: 'pattern == ''zigzag''

    '
  constraint: "# Волна-с должна двигаться дальше конечной точки волны-а\n# Для бычьего\
    \ зигзага (направление вверх): конец волны-с выше конца волны-а\n# Для медвежьего\
    \ зигзага (направление вниз): конец волны-с ниже конца волны-а\n\nif direction\
    \ == 'up':\n    end(wave_c) > end(wave_a)\nelif direction == 'down':\n    end(wave_c)\
    \ < end(wave_a)\n"
  formalization_notes: 'original_status: formalized. Правило допускает минимальное
    превышение ("пусть даже ненамного"),

    то есть строгое неравенство без минимального порога.

    Направление зигзага определяет знак сравнения.'

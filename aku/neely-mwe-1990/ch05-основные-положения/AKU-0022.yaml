statement_ru: 'Волна-с Усечённого Зигзага не может быть короче 38.2% волны-а, но должна
  быть короче 61.8% волны-а.

  '
source:
  book_id: neely-mwe-1990
  page: 5-26
  chapter: Chapter 5
  section: Усечённый Зигзаг
  figure_id: null
  verbatim_quote:
    text: 'Волна-с не может быть короче 38.2% волны-а, но должна быть короче 61.8%
      волны-а.

      '
    language: ru
formalization:
  status: formalized
  applies_when: '# Паттерн — усечённый зигзаг, проверяем соотношение волны-c к волне-a

    pattern == ''zigzag'' AND subtype == ''truncated''

    '
  constraint: '# Длина волны-c должна быть >= 38.2% длины волны-a

    # И строго меньше 61.8% длины волны-a

    length_c = price_length(wave_c)  # абсолютное ценовое расстояние от начала до
    конца волны

    length_a = price_length(wave_a)


    length_c >= 0.382 * length_a AND length_c < 0.618 * length_a

    '
  formalization_notes: 'Правило определяет допустимый диапазон длины волны-c относительно
    волны-a

    для квалификации паттерна как усечённого зигзага.


    "не может быть короче 38.2%" — означает length_c >= 0.382 * length_a (нижняя граница
    включительна).

    "должна быть короче 61.8%" — означает length_c < 0.618 * length_a (верхняя граница
    исключительна).


    price_length() — ценовая длина (абсолютное расстояние от начала до конца волны
    в ценовых единицах).


    Это правило является одним из критериев идентификации усечённого зигзага;

    другие критерии (например, откат 81%+) описаны в отдельных AKU.'

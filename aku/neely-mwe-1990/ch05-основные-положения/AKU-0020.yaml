id: AKU-0020
type: rule
strength: mandatory
status: verified
topic: triangle
subtopics:
- channeling
statement_ru: 'Линия канала, пересекающая волны b и d Треугольника, является Базовой
  линией. В качестве общего правила, трендовая линия b-d не должна пробиваться ни
  одной из частей волн с или е данного Треугольника.

  '
source:
  book_id: neely-mwe-1990
  page: 5-33
  chapter: Chapter 5
  section: Треугольники (3-3-3-3-3)
  figure_id: 5-33-2
  verbatim_quote:
    text: 'B качестве общего правила, трендовая линия b-d не должна пробиваться ни
      одной из частей волн с или е данного Треугольника

      '
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'triangle'
  constraint: not breaks(wave_c, trendline(end(b), end(d))) AND not breaks(wave_e,
    trendline(end(b), end(d)))
  formalization_notes: Линия b-d — Базовая линия Треугольника. 'Общее правило' — редкие
    исключения возможны.

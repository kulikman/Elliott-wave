id: AKU-0020
type: rule
strength: mandatory
status: verified
topic: triangle
subtopics:
- channeling
statement_ru: 'Линия канала, пересекающая волны b и d Треугольника, является Базовой
  линией. В качестве общего правила, трендовая линия b-d не должна пробиваться ни
  одной из частей волн с или е данного Треугольника.

  '
source:
  book_id: neely-mwe-1990
  page: 5-33
  chapter: Chapter 5
  section: Треугольники (3-3-3-3-3)
  figure_id: 5-33-2
  verbatim_quote:
    text: 'B качестве общего правила, трендовая линия b-d не должна пробиваться ни
      одной из частей волн с или е данного Треугольника

      '
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''triangle''

    '
  constraint: '# Базовая линия Треугольника — трендлиния через концы волн b и d

    baseline = trendline(end(wave_b), end(wave_d))


    # Определяем, с какой стороны от baseline находится волна a (вершина треугольника)

    # Это определяет, в какую сторону "пробитие" запрещено

    apex_side = side_of(end(wave_a), baseline)


    # Функция breaks: волна пробивает линию, если любая её ценовая точка

    # оказывается на стороне apex_side (т.е. пересекает baseline в сторону вершины)

    #

    # Если apex_side == ABOVE (end(wave_a) выше baseline):

    #   breaks(wave, baseline) = any bar in wave where high(bar) > baseline_value_at(time(bar))

    # Если apex_side == BELOW (end(wave_a) ниже baseline):

    #   breaks(wave, baseline) = any bar in wave where low(bar) < baseline_value_at(time(bar))


    # Ни одна часть волны c не должна пробивать линию b-d

    not breaks(wave_c, baseline)


    # Ни одна часть волны e не должна пробивать линию b-d

    not breaks(wave_e, baseline)

    '
  formalization_notes: "1. Линия b-d называется \"Базовой линией\" (Base line) Треугольника\
    \ — \n   это прямо указано в statement_ru.\n2. Формулировка \"в качестве общего\
    \ правила\" присутствует в verbatim_quote.\n   Несмотря на это, AKU имеет strength:\
    \ mandatory, поэтому формализуем \n   как строгое ограничение.\n3. \"Пробитие\"\
    \ означает, что цена проходит сквозь линию b-d — \n   проверяются все ценовые\
    \ данные (все бары) внутри волн c и e, \n   включая все подволны, а не только\
    \ конечные точки.\n4. Сторона пробития определяется положением вершины треугольника\
    \ (wave_a) \n   относительно baseline: запрещено пересечение в сторону wave_a.\n\
    5. Правило не накладывает ограничений на волны a, b и d — \n   волны b и d формируют\
    \ саму линию, а волна a находится по другую сторону."

id: AKU-0024
type: rule
strength: mandatory
status: verified
topic: channeling
subtopics:
- zigzag
statement_ru: 'В Зигзаге с-волна не должна касаться параллельной трендовой линии (проведённой
  параллельно линии 0-В через завершение волны-а). Если наблюдается касание, это свидетельствует,
  что данный зигзаг является частью более сложной Коррекции.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Дополнительные правила раскрытия коррекций — Каналы
  figure_id: null
  verbatim_quote:
    text: 'Если фигура, с которой вы работаете, Зигзаг, то с-волна может пробивать
      параллельную трендовую линию или оставаться далеко от нее, но она не должна
      ее касаться. Если же наблюдается касание, это свидетельствует, что данный зигзаг
      часть более сложной Коррекции

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к завершённому зигзагу (a-b-c)

    pattern == ''zigzag''

    is_complete(pattern)

    '
  constraint: "# Построение канала зигзага:\n# 1. Базовая трендовая линия: от начала\
    \ паттерна (точка 0) до конца волны-b (точка B)\nbase_line = trendline(start(pattern),\
    \ end(wave_b))\n\n# 2. Параллельная трендовая линия: параллельна base_line, проведена\
    \ через конец волны-a\nparallel_line = line_parallel_to(base_line, through=end(wave_a))\n\
    \n# 3. Проверяем весь ценовой путь волны-c на касание параллельной линии\nc_wave_price_path\
    \ = price_path(start(wave_c), end(wave_c))\n\n# Касание = цена достигает линии,\
    \ но не пробивает её значимо\n# Пробитие = цена проходит сквозь линию (допустимо)\n\
    # Недолёт = цена остаётся далеко от линии (допустимо)\n# Касание = цена достигает\
    \ линии без значимого пробития (НЕдопустимо для самостоятельного зигзага)\n\n\
    touches_parallel = false\nbreaks_parallel = false\n\nFOR EACH point P IN c_wave_price_path:\n\
    \  distance = price(P) - value_of(parallel_line, at=time(P))\n  # Для бычьего\
    \ зигзага parallel_line ниже, distance отрицательный при пробитии вниз\n  # Для\
    \ медвежьего зигзага parallel_line выше, distance отрицательный при пробитии вверх\n\
    \  abs_distance = abs(distance)\n\n  IF abs_distance <= touch_threshold:\n   \
    \ touches_parallel = true\n\n  # Пробитие: цена прошла сквозь линию на значимую\
    \ величину\n  IF point_crosses_line(P, parallel_line, significantly=true):\n \
    \   breaks_parallel = true\n\n# Если есть пробитие — касание не считается (пробитие\
    \ допустимо)\neffective_touch = touches_parallel AND NOT breaks_parallel\n\nIF\
    \ effective_touch:\n  # Зигзаг не является самостоятельным паттерном,\n  # а является\
    \ частью более сложной коррекции\n  reclassify(pattern, as='part_of_complex_correction')\n\
    \  valid_as_standalone_zigzag = false\nELSE:\n  valid_as_standalone_zigzag = true\n"
  formalization_notes: "1. Verbatim quote чётко различает три состояния волны-c относительно\
    \ параллельной линии:\n   - «пробивать» (допустимо)\n   - «оставаться далеко от\
    \ неё» (допустимо)\n   - «касаться» (недопустимо для самостоятельного зигзага)\n\
    2. Определение «касания» vs «пробития» требует параметра touch_threshold,\n  \
    \ который в исходном тексте не специфицирован — это параметр реализации.\n3. Правило\
    \ не запрещает сам волновой счёт a-b-c как зигзаг, а требует\n   переклассификации:\
    \ при касании зигзаг должен рассматриваться как часть\n   более сложной коррекции\
    \ (двойной/тройной зигзаг, комбинация и т.п.).\n4. Проверяется весь ценовой путь\
    \ волны-c (не только конечная точка),\n   поскольку касание может произойти в\
    \ любой момент движения.\n5. Если волна-c"

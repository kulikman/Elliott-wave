statement_ru: 'Если в Треугольнике волна-b составляет 61.8% волны-а, то фигура, вероятно,
  не является Треугольником.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Соотношения Фибоначчи — Треугольники
  figure_id: null
  verbatim_quote:
    text: 'Важное замечание: если волна-b составляет 61.8% волны-а, ваша фигура, вероятно,
      не является Треугольником.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при оценке гипотезы Треугольника

    pattern_hypothesis == ''triangle''

    '
  constraint: "# Вычисляем отношение длины волны-b к длине волны-a\nratio_b_to_a =\
    \ price_length(wave_b) / price_length(wave_a)\n\n# Допуск для сравнения с уровнем\
    \ Фибоначчи 0.618\ntolerance = 0.02  # ~2% допуск\n\nif abs(ratio_b_to_a - 0.618)\
    \ <= tolerance:\n    # Если волна-b составляет ~61.8% волны-a,\n    # фигура вероятно\
    \ НЕ является Треугольником\n    triangle_confidence = DECREASE_SIGNIFICANTLY\n\
    \    # Не абсолютный запрет, но сильное предупреждение\n    # (\"вероятно не является\
    \ Треугольником\")\n    flag_pattern_as_unlikely('triangle', reason='wave_b ≈\
    \ 61.8% of wave_a')\n"
  formalization_notes: "1. Правило помечено как \"Важное замечание\" в оригинале,\
    \ но содержит слово\n   \"вероятно\" — это не абсолютный запрет, а сильная эвристика\
    \ для снижения\n   вероятности гипотезы Треугольника.\n2. price_length — ценовая\
    \ длина (абсолютное значение разницы цен\n   начала и конца волны).\n3. Точное\
    \ значение tolerance может варьироваться; 2% — разумное приближение\n   для сопоставления\
    \ с уровнем Фибоначчи.\n4. В review_notes отмечено, что strength может быть conditional,\
    \ а не mandatory.\n   Формализация отражает вероятностный характер: не reject,\
    \ а decrease confidence."
aliases:

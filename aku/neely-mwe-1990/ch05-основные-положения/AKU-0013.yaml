id: AKU-0013
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics:
- rule-of-alternation
statement_ru: 'Для продолжения исследования группы волн в качестве возможного импульса
  между волнами 2 и 4 должно наблюдаться чередование значений как минимум одного из
  параметров: цена, время, сила отката, сложность или строение.

  '
source:
  book_id: neely-mwe-1990
  page: 5-3
  chapter: 'Глава 5: Основные положения'
  section: Правило Чередования
  figure_id: null
  verbatim_quote:
    text: Для продолжения исследования группы волн в качестве возможного импульса
      между волнами 2 и 4 должно наблюдаться чередование значений как минимум одного
      из описанных выше параметров.
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при проверке группы из 5 волн как кандидата на импульс

    pattern_candidate == ''impulse''

    AND wave_1 IS defined

    AND wave_2 IS defined

    AND wave_3 IS defined

    AND wave_4 IS defined

    '
  constraint: "# Параметры чередования между волнами 2 и 4:\n\n# A. Цена (длина волны\
    \ в пунктах / абсолютная амплитуда)\nprice_alternation = (price_length(wave_2)\
    \ != price_length(wave_4))\n# \"!=\" означает \"существенно отличаются\" — порог\
    \ не определён в данном правиле\n\n# B. Время (длительность волны в барах/периодах)\n\
    time_alternation = (duration(wave_2) != duration(wave_4))\n\n# C. Сила отката\
    \ (процент коррекции предшествующей импульсной волны)\n# Примечание: \"процент\
    \ превышения длины предшествующей волны касается только волн 2 и 4\"\nretracement_w2\
    \ = price_length(wave_2) / price_length(wave_1)\nretracement_w4 = price_length(wave_4)\
    \ / price_length(wave_3)\nseverity_alternation = (retracement_w2 != retracement_w4)\n\
    \n# D. Сложность (количество составляющих подволн в ценовой фигуре)\ncomplexity_alternation\
    \ = (subwave_count(wave_2) != subwave_count(wave_4))\n\n# E. Строение (тип коррекционной\
    \ фигуры: Плоская, Зигзаг, Треугольник и т.п.)\nconstruction_alternation = (pattern_type(wave_2)\
    \ != pattern_type(wave_4))\n# Пример: wave_2 == 'flat' AND wave_4 == 'zigzag'\n\
    \n# Обязательное условие: хотя бы один из пяти параметров должен чередоваться\n\
    alternation_exists = (\n  price_alternation\n  OR time_alternation\n  OR severity_alternation\n\
    \  OR complexity_alternation\n  OR construction_alternation\n)\n\n# Если ни один\
    \ параметр не чередуется — группа волн НЕ может\n# рассматриваться как возможный\
    \ импульс\nREQUIRE alternation_exists == true\n"
  formalization_notes: "1. Правило использует слово \"чередование значений\", но не\
    \ задаёт количественный\n   порог существенности для параметров цена, время и\
    \ сила отката. Операторы \"!=\"\n   в псевдокоде означают \"существенно отличаются\"\
    , но конкретные пороги\n   (например, разница > 10% или > 20%) в данном правиле\
    \ не указаны и должны\n   быть определены из других AKU.\n2. Для параметра \"\
    сложность\" (subwave_count) результат зависит от глубины\n   разметки, что вносит\
    \ субъективность.\n3. Для параметра \"строение\" (pattern_type) необходима предварительная\n\
    \   классификация типа коррекционной фигуры каждой волны.\n4. Verbatim quote:\
    \ \"Для продолжения исследования группы волн в качестве\n   возможного импульса\"\
    \ — нарушение правила не означает абсолютную\n   невозможность счёта; группа волн\
    \ может быть переинтерпретирована\n   как иная фигура (например, сложная коррекция),\
    \ но как импульс\n   рассматриваться не может.\n5. Из контекста: параметры A-E\
    \ перечислены в книге"

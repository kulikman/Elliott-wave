statement_ru: 'В Плоской коррекции, когда волна-b превышает 138.2% волны-а, нет ни
  малейшего шанса, что волна-с превысит начальный уровень волны-b (это возможно в
  случае с-волны Треугольника, но не в случае с-волны Плоской).

  '
source:
  book_id: neely-mwe-1990
  page: 5-21
  chapter: Chapter 5
  section: Сильная b-волна
  figure_id: null
  verbatim_quote:
    text: 'Когда волна-Ь превышает 138.2% волны-а, нет ни малейшего шанса, что волна-с
      превысит начальный уровень волны-Ь (это возможно в случае с-волны Треугольника,
      но не в случае с-волны Плоской).

      '
    language: ru
formalization:
  status: formalized
  applies_when: 'pattern == ''flat''

    AND price_length(wave_b) > 1.382 * price_length(wave_a)

    '
  constraint: "# Волна-c НЕ должна превышать начальный уровень волны-b (= start(wave_b)\
    \ = end(wave_a))\n# \"Превысить\" означает пробить этот уровень в направлении\
    \ движения wave_c\n#\n# Для бычьей плоской (wave_a направлена вниз):\n#   wave_c\
    \ идёт вниз, \"превысить start(wave_b)\" = уйти ниже start(wave_b)\n#   => end(wave_c)\
    \ >= start(wave_b)\n#\n# Для медвежьей плоской (wave_a направлена вверх):\n# \
    \  wave_c идёт вверх, \"превысить start(wave_b)\" = уйти выше start(wave_b)\n\
    #   => end(wave_c) <= start(wave_b)\n#\n# Также wave_c не должна пробивать start(wave_b)\
    \ в любой точке своего хода:\nif direction(wave_a) == 'down':  # бычья плоская\n\
    \  min_price(wave_c) >= start(wave_b)\nelif direction(wave_a) == 'up':  # медвежья\
    \ плоская\n  max_price(wave_c) <= start(wave_b)\n"
  formalization_notes: "- start(wave_b) == end(wave_a) — начальный уровень волны-b\n\
    - \"Превысить начальный уровень wave_b\" означает, что wave_c не может пройти\n\
    \  дальше (в своём направлении) точки начала wave_b\n- Используется min_price/max_price\
    \ вместо end(), поскольку wave_c не должна\n  пробивать уровень start(wave_b)\
    \ ни в какой своей точке, а не только в конце\n- price_length() — абсолютное значение\
    \ разницы цен между началом и концом волны\n- Правило явно указано только для\
    \ Плоской коррекции (Flat);\n  для Треугольника такое поведение допускается, но\
    \ данное правило к нему НЕ применяется\n- Mandatory правило: \"нет ни малейшего\
    \ шанса\""

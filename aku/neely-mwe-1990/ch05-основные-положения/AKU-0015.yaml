id: AKU-0015
type: rule
strength: mandatory
status: verified
topic: zigzag
subtopics:
- length-ratio-rules
- retracement
statement_ru: 'Волна-b Зигзага должна откатиться от волны-а хотя бы на 1%.

  '
source:
  book_id: neely-mwe-1990
  page: 5-22
  chapter: Chapter 5
  section: Зигзаги (5-3-5)
  figure_id: 5-22b
  verbatim_quote:
    text: 'Волна-Ь должна откатиться от волны-а хотя бы на 1%

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к волне-b внутри паттерна Зигзаг (Zigzag)

    pattern == ''zigzag'' AND current_wave == ''b''

    '
  constraint: '# Волна-b должна откатиться от волны-a минимум на 1%

    # Волна-b движется в направлении, противоположном волне-a

    # Ретрейсмент измеряется как отношение длины волны-b к длине волны-a


    wave_a_length = abs(end_price(wave_a) - start_price(wave_a))

    wave_b_length = abs(end_price(wave_b) - start_price(wave_b))


    # Проверка: волна-b откатывает волну-a (движется в противоположном направлении)

    # Если wave_a бычья (вверх), то wave_b должна быть медвежьей (вниз), и наоборот

    retrace_ratio = wave_b_length / wave_a_length


    retrace_ratio >= 0.01  # минимум 1%

    '
  formalization_notes: 'Правило устанавливает минимальный порог ретрейсмента волны-b
    относительно волны-a в Зигзаге.

    1% — это крайне малый порог, по сути исключающий только нулевой или околонулевой
    откат.

    Цитата в источнике помечена как требующая верификации по оригиналу (стр. 5-22).

    Направление ретрейсмента подразумевается: волна-b всегда движется противоположно
    волне-a.'

id: AKU-0014
type: rule
strength: mandatory
status: verified
topic: zigzag
subtopics:
- length-ratio-rules
- retracement
statement_ru: 'Волна-а Зигзага не должна откатиться от предыдущей Импульсной волны
  более высокого Порядка (если такая волна имеется) больше, чем на 61.8%.

  '
source:
  book_id: neely-mwe-1990
  page: 5-22
  chapter: Chapter 5
  section: Зигзаги (5-3-5)
  figure_id: 5-22а
  verbatim_quote:
    text: 'Волна-а не должна откатиться от предыдущей Импульсной волны более высокого
      Порядке (если такая волна имеется) больше, чем на 61.8%

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Текущий паттерн — Зигзаг (Zigzag)

    # Рассматривается волна-a этого Зигзага

    # Существует предыдущая Импульсная волна более высокого Порядка (degree),

    # частью коррекции которой является данный Зигзаг

    pattern == ''zigzag'' AND current_wave == ''a''

    AND exists(previous_higher_degree_impulse_wave)

    '
  constraint: '# Волна-а Зигзага не должна откатить более 61.8% от предыдущей

    # Импульсной волны более высокого Порядка.

    #

    # previous_higher_degree_impulse_wave — импульсная волна на один Порядок выше,

    # непосредственно предшествующая текущему Зигзагу (Зигзаг корректирует этот импульс).

    #

    # Начало волны-a совпадает с концом предыдущего импульса более высокого Порядка,

    # поэтому retracement волны-a — это отношение длины волны-a к длине этого импульса.


    prev_impulse = previous_higher_degree_impulse_wave

    prev_impulse_length = abs(end_price(prev_impulse) - start_price(prev_impulse))


    wave_a_length = abs(end_price(wave_a) - start_price(wave_a))


    wave_a_length <= 0.618 * prev_impulse_length

    '
  formalization_notes: "- Правило условное: применяется только при наличии предыдущей\
    \ Импульсной волны\n  более высокого Порядка (\"если такая волна имеется\"). Если\
    \ такой волны нет,\n  правило не проверяется.\n- \"Предыдущая Импульсная волна\
    \ более высокого Порядка\" — это импульсная волна\n  на один degree выше, которая\
    \ непосредственно предшествует текущему Зигзагу\n  (т.е. Зигзаг является коррекцией\
    \ после этого импульса).\n- start_price(wave_a) == end_price(prev_impulse), поскольку\
    \ Зигзаг начинается\n  от конца предыдущей импульсной волны более высокого Порядка.\n\
    - Используется нестрогое неравенство (<=), что соответствует формулировке\n  \"\
    не более чем на 61.8%\".\n- Определение previous_higher_degree_impulse_wave требует\
    \ доступа к\n  мультиградусной (multi-degree) структуре волнового дерева."

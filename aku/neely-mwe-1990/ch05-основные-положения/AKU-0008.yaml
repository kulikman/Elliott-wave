id: AKU-0008
type: rule
strength: mandatory
status: verified
topic: impulse
statement_ru: 'Если хотя бы одно из семи основных правил импульса не выполняется,
  анализируемая рыночная активность должна считаться Коррективной, а не Импульсной.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Если хотя бы одно из перечисленных выше правил не выполняется, анализируемая
      рыночная активность по своему характеру должна считаться Коррективной, а не
      Импульсной
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при валидации любой кандидатной импульсной структуры

    # (группа из 5 сегментов, претендующая на статус Impulse)

    candidate_pattern == ''impulse''

    '
  constraint: "# Все семь основных правил импульса должны выполняться одновременно.\n\
    # Если хотя бы одно нарушено — паттерн НЕ является импульсом.\n#\n# Семь правил\
    \ импульса (по книге Нили, глава 5):\n# Правило 1: wave_1 не может быть полностью\
    \ перекрыта wave_4 (no overlap)\n# Правило 2: wave_3 должна двигаться дальше конца\
    \ wave_1\n# Правило 3: wave_2 не может откатиться за начало wave_1\n# Правило\
    \ 4: wave_4 не может откатиться за начало wave_2 (в некоторых контекстах)\n# Правило\
    \ 5: wave_5 должна двигаться дальше конца wave_3 (или быть \"неудавшейся\")\n\
    # Правило 6: (связано с \"неудавшейся\" волной — wave_5 короче wave_4)\n# Правило\
    \ 7: wave_3 не может быть самой короткой из wave_1, wave_3, wave_5\n#\n# Связанные\
    \ AKU: AKU-0004, AKU-0005, AKU-0006, AKU-0007 и ещё 3 (пока не формализованы)\n\
    \nrule_results = [\n  check_rule_1(waves),  # (правило 1 из 7)\n  check_rule_2(waves),\
    \  # (правило 2 из 7)\n  check_rule_3(waves),  # (правило 3 из 7)\n  check_rule_4(waves),\
    \  # (правило 4 из 7)\n  check_rule_5(waves),  # (правило 5 из 7)\n  check_rule_6(waves),\
    \  # (правило 6 из 7)\n  check_rule_7(waves),  # (правило 7 из 7) — AKU-0007:\
    \ wave_3 не самая короткая\n]\n\nall_rules_passed = ALL(rule_results)\n\nIF NOT\
    \ all_rules_passed:\n  pattern_classification = 'corrective'\n  is_valid_impulse\
    \ = false\nELSE:\n  is_valid_impulse = true\n"
  formalization_notes: 'Это мета-правило (логический агрегатор): AND по всем семи
    основным правилам импульса.

    Само по себе оно не содержит конкретного числового ограничения.


    Из verbatim_quote: "анализируемая рыночная активность по своему характеру

    должна считаться Коррективной, а не Импульсной". В контексте книги

    далее следует "ИЛИ ваша волновая [разметка неверна]" — цитата обрезана,

    но из окружающего контекста видно, что нарушение правил может также

    означать ошибку в разметке, а не только коррективный характер паттерна.


    На данный момент из 7 правил формализованы только AKU-0004..AKU-0007.

    Остальные 3 правила (правила 1-3) должны быть добавлены в related_aku

    по мере их формализации. Конкретное содержание каждого из 7 правил

    определяется в соответствующих AKU, а не в данном мета-правиле.'

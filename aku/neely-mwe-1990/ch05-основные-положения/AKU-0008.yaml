id: AKU-0008
type: rule
strength: mandatory
status: verified
topic: impulse
statement_ru: 'Если хотя бы одно из семи основных правил импульса не выполняется,
  анализируемая рыночная активность должна считаться Коррективной, а не Импульсной.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Если хотя бы одно из перечисленных выше правил не выполняется, анализируемая
      рыночная активность по своему характеру должна считаться Коррективной, а не
      Импульсной
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при валидации любой кандидатной импульсной структуры

    # (группа из 5 сегментов, претендующая на статус Impulse)

    candidate_pattern == ''impulse''

    '
  constraint: "# Мета-правило: все семь основных правил импульса должны выполняться\
    \ одновременно.\n# Если хотя бы одно нарушено — паттерн НЕ является импульсом.\n\
    #\n# Семь правил импульса (по книге Нили, глава 5, правила 1-7):\n# Каждое правило\
    \ формализовано в отдельном AKU.\n# Известные на данный момент:\n#   AKU-0004\
    \ (правило 4): wave_4 не перекрывает ценовую территорию wave_1\n#   AKU-0005 (правило\
    \ 5): wave_3 движется дальше конца wave_1\n#   AKU-0006 (правило 6): wave_2 не\
    \ откатывается за начало wave_1\n#   AKU-0007 (правило 7): wave_3 не самая короткая\
    \ из wave_1, wave_3, wave_5\n#   Правила 1-3: ещё не формализованы в отдельных\
    \ AKU\n\nrule_results = [\n  check_rule_1(waves),  # правило 1 из 7 — AKU пока\
    \ не назначен\n  check_rule_2(waves),  # правило 2 из 7 — AKU пока не назначен\n\
    \  check_rule_3(waves),  # правило 3 из 7 — AKU пока не назначен\n  check_rule_4(waves),\
    \  # правило 4 из 7 — AKU-0004\n  check_rule_5(waves),  # правило 5 из 7 — AKU-0005\n\
    \  check_rule_6(waves),  # правило 6 из 7 — AKU-0006\n  check_rule_7(waves), \
    \ # правило 7 из 7 — AKU-0007\n]\n\nall_rules_passed = ALL(rule_results)\n\nIF\
    \ NOT all_rules_passed:\n  # Из verbatim_quote: \"должна считаться Коррективной,\
    \ а не Импульсной\"\n  pattern_classification = 'corrective'\n  is_valid_impulse\
    \ = false\nELSE:\n  is_valid_impulse = true\n"
  formalization_notes: 'Это мета-правило (логический агрегатор): AND по всем семи
    основным правилам импульса.

    Само по себе оно не содержит конкретного числового ограничения —

    конкретное содержание каждого из 7 правил определяется в соответствующих AKU.


    Из окружающего контекста книги (за пределами verbatim_quote) следует,

    что нарушение правил может также означать ошибку в разметке

    ("ИЛИ ваша волновая [разметка неверна]" — цитата обрезана).

    Таким образом, при нарушении правил алгоритм должен:

    1) либо переклассифицировать паттерн как коррективный,

    2) либо пересмотреть разметку.


    На данный момент из 7 правил формализованы только AKU-0004..AKU-0007.

    Остальные 3 правила (правила 1-3) должны быть добавлены по мере их формализации.'

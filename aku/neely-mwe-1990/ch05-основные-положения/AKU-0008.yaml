id: AKU-0008
type: rule
strength: mandatory
status: verified
topic: impulse
statement_ru: 'Если хотя бы одно из семи основных правил импульса не выполняется,
  анализируемая рыночная активность должна считаться Коррективной, а не Импульсной.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Если хотя бы одно из перечисленных выше правил не выполняется, анализируемая
      рыночная активность по своему характеру должна считаться Коррективной, а не
      Импульсной
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при валидации любой кандидатной импульсной структуры

    # (группа из 5 сегментов, претендующая на статус Impulse)

    candidate_pattern == ''impulse''

    '
  constraint: "# Все семь основных правил импульса должны выполняться одновременно.\n\
    # Если хотя бы одно нарушено — паттерн НЕ является импульсом.\n\n# Ссылки на связанные\
    \ AKU с основными правилами импульса:\n# AKU-0004, AKU-0005, AKU-0006, AKU-0007\
    \ и остальные из семи правил\n\nrule_results = [\n  check_rule_1(waves),  # (правило\
    \ 1 из 7)\n  check_rule_2(waves),  # (правило 2 из 7)\n  check_rule_3(waves),\
    \  # (правило 3 из 7)\n  check_rule_4(waves),  # (правило 4 из 7) — например AKU-0004\n\
    \  check_rule_5(waves),  # (правило 5 из 7) — например AKU-0005\n  check_rule_6(waves),\
    \  # (правило 6 из 7) — например AKU-0006\n  check_rule_7(waves),  # (правило\
    \ 7 из 7) — например AKU-0007: wave3 не самая короткая\n]\n\nall_rules_passed\
    \ = ALL(rule_results)\n\nIF NOT all_rules_passed:\n  pattern_classification =\
    \ 'corrective'   # НЕ импульс\n  is_valid_impulse = false\nELSE:\n  # Все правила\
    \ выполнены — паттерн может быть импульсом\n  is_valid_impulse = true\n"
  formalization_notes: 'Это мета-правило, объединяющее все 7 основных правил импульса.

    Само по себе оно не содержит конкретного числового ограничения,

    а является логическим агрегатором: AND по всем семи правилам.


    В контексте книги упоминаются 7 правил, но в данном AKU перечислены

    только 4 связанных (AKU-0004..AKU-0007). Остальные 3 правила

    (AKU для правил 1-3) должны быть добавлены в related_aku,

    когда будут формализованы.


    Альтернативный исход ("ваша волновая разметка неверна") из verbatim_quote

    обрезан в цитате, но подразумевает, что нарушение правил может также

    означать ошибку в разметке, а не только коррективный характер.'

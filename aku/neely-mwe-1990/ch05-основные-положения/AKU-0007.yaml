id: AKU-0007
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics:
- rule-of-extension
statement_ru: 'Третий сегмент импульса никогда не может быть самым коротким из трёх
  трендовых сегментов (1, 3 и 5) при измерении вертикальных ценовых расстояний. Нарушение
  этого правила означает, что фигура не является импульсом.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: третий не обязательно должен быть самым длинным, но он никогда не может
      быть самым коротким из трех этих сегментов.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при проверке любой фигуры на импульсность

    pattern == ''impulse''

    '
  constraint: '# Измеряем вертикальные ценовые расстояния трёх трендовых сегментов
    (1, 3, 5)

    len_w1 = abs(price_end(wave_1) - price_start(wave_1))

    len_w3 = abs(price_end(wave_3) - price_start(wave_3))

    len_w5 = abs(price_end(wave_5) - price_start(wave_5))


    # Третий сегмент никогда не может быть самым коротким из трёх

    # Он должен быть строго больше минимального из двух других

    len_w3 > min(len_w1, len_w5)


    # Если условие нарушено — фигура не является импульсом

    # if NOT (len_w3 > min(len_w1, len_w5)):

    #     invalidate(''impulse'')

    '
  formalization_notes: 'original_status: formalized. Verbatim: "третий не обязательно
    должен быть самым длинным, но он никогда не может

    быть самым коротким из трех этих сегментов."


    Используются вертикальные ценовые расстояния (абсолютные значения разницы цен

    начала и конца каждого сегмента), как явно указано в источнике:

    "Когда вертикальные ценовые расстояния, покрываемые первым, третьим и пятым

    сегментами, измеряются и сравниваются".


    Граничный случай: если len_w3 равен len_w1 или len_w5, и этот равный сегмент

    является минимальным — w3 разделяет статус "самого короткого", что нарушает

    правило. Поэтому используется строгое неравенство: len_w3 > min(len_w1, len_w5).


    Нарушение правила дисквалифицирует фигуру как импульс (явно сказано в контексте:

    "должна считаться Коррективной, а не Импульсной").'

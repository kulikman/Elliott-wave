id: AKU-0018
type: rule
strength: mandatory
status: verified
topic: triangle
subtopics:
- structural-labels
statement_ru: 'В Треугольнике ровно пять сегментов — ни больше, ни меньше. Каждому
  сегменту присваивается буквенное обозначение в порядке появления: a, b, c, d, e.

  '
source:
  book_id: neely-mwe-1990
  page: 5-29
  chapter: Chapter 5
  section: Треугольники (3-3-3-3-3)
  figure_id: 5-29
  verbatim_quote:
    text: 'Эллиотт говорил, что в Треугольнике пять сегментов - ни больше, ни меньше.
      B соответствии c порядком появления, каждому сегменту Треугольника присваивается
      буквенное обозначение: (а, b, c, d, e).

      '
    language: ru
formalization:
  status: formalized
  applies_when: '# Правило применяется при идентификации любого Треугольника

    pattern.type == ''triangle''

    '
  constraint: '# Треугольник должен содержать ровно 5 сегментов

    segment_count(pattern) == 5


    # Каждому сегменту присваивается буквенное обозначение в порядке появления

    pattern.segments[0].label == ''a''

    pattern.segments[1].label == ''b''

    pattern.segments[2].label == ''c''

    pattern.segments[3].label == ''d''

    pattern.segments[4].label == ''e''


    # Эквивалентная компактная запись:

    # labels(pattern.segments) == [''a'', ''b'', ''c'', ''d'', ''e'']

    '
  formalization_notes: 'Правило устанавливает два аспекта:

    1. Структурное ограничение: ровно 5 сегментов (ни больше, ни меньше)

    2. Соглашение о маркировке: последовательное присвоение букв a-e

    Применимо ко всем разновидностям треугольников (сужающийся, расширяющийся и т.д.),

    так как statement говорит о "Треугольнике" в общем виде.'

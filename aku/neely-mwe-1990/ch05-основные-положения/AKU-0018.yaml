statement_ru: 'В Треугольнике ровно пять сегментов — ни больше, ни меньше. Каждому
  сегменту присваивается буквенное обозначение в порядке появления: a, b, c, d, e.

  '
source:
  book_id: neely-mwe-1990
  page: 5-29
  chapter: Chapter 5
  section: Треугольники (3-3-3-3-3)
  figure_id: 5-29
  verbatim_quote:
    text: 'Эллиотт говорил, что в Треугольнике пять сегментов - ни больше, ни меньше.
      B соответствии c порядком появления, каждому сегменту Треугольника присваивается
      буквенное обозначение: (а, b, c, d, e).

      '
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'triangle'
  constraint: segment_count == 5 AND labels(segments) == ['a','b','c','d','e']

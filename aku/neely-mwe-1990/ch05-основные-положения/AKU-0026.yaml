id: AKU-0026
type: rule
strength: mandatory
status: verified
topic: flat
subtopics:
- fibonacci-ratios
statement_ru: 'В Плоской коррекции с сильной b-волной (превышающей начальный уровень
  волны-а), b-волна обычно ограничена соотношением 138.2% или 161.8% волны-а, но не
  может достигать ни одного из них.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Соотношения Фибоначчи — Плоские — Сильная b-волна
  figure_id: null
  verbatim_quote:
    text: 'Когда b-волна превышает начальный уровень волны-а, обычно она будет ограничена
      соотношением 138.2% (это ненастоящее соотношение Фибоначчи, но представляет
      комбинацию двух - 1.00 и 0.382) или 161.8%, но не может достигать ни одного
      из них.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Плоская коррекция, где b-волна превышает начальный уровень волны-а

    # ("сильная b-волна")

    pattern == ''flat''

    AND end_price(wave_b) is_beyond start_price(wave_a)

    # Бычья плоская: end(b) < start(a) (b идёт вниз дальше начала a)

    # Медвежья плоская: end(b) > start(a) (b идёт вверх дальше начала a)

    # "beyond" = в направлении движения b-волны, за пределы start(a)

    '
  constraint: '# Длина волн — абсолютная разница цен между началом и концом волны

    b_length = abs(end_price(wave_b) - start_price(wave_b))

    a_length = abs(end_price(wave_a) - start_price(wave_a))


    b_ratio = b_length / a_length


    # Mandatory часть: "не может достигать ни одного из них"

    # b-волна НЕ МОЖЕТ точно равняться 138.2% волны-а

    b_ratio != 1.382  # с учётом tolerance на уровне реализации


    # b-волна НЕ МОЖЕТ точно равняться 161.8% волны-а

    AND b_ratio != 1.618  # с учётом tolerance на уровне реализации


    # Mandatory часть: "ограничена ... 161.8%"

    # Поскольку b "ограничена" этими уровнями и "не может достигать" их,

    # верхняя граница — строго меньше 161.8%

    AND b_ratio < 1.618

    '
  formalization_notes: "1. Правило содержит две части разной силы:\n   - \"обычно\
    \ ограничена 138.2% или 161.8%\" — слово \"обычно\" (usually) делает\n     выбор\
    \ конкретного уровня-ограничителя (1.382 или 1.618) guideline-аспектом.\n    \
    \ Формализовать как mandatory невозможно — неясно, какой из двух уровней\n   \
    \  применяется в конкретном случае.\n   - \"не может достигать ни одного из них\"\
    \ — \"не может\" = mandatory запрет\n     точного попадания в оба уровня.\n2.\
    \ Формализованы только mandatory аспекты:\n   - b_ratio строго < 1.618 (верхняя\
    \ граница)\n   - b_ratio != 1.382 и b_ratio != 1.618 (запрет точного совпадения)\n\
    3. Guideline-аспект (какой именно уровень — 1.382 или 1.618 — ограничивает\n \
    \  конкретную b-волну) не формализован как mandatory, поскольку в тексте\n   сказано\
    \ \"обычно\".\n4. Неясность: \"ограничена 138.2% или 161.8%\" может означать два\
    \ сценария\n   (b стремится к одному из двух уровней в зависимости от контекста)\
    \ или\n   единый диапазон. Без дополнительного контекста принято как верхняя\n\
    \   граница 161.8% (строго).\n5. Сравнение \"!=\" подразумевает tolerance (например\
    \ ±0.5-1% от цены),\n   определяемый на уровне реализации.\n6. length(wave_x)\
    \ = abs(end_price(wave_x) - start_price(wave_x))."

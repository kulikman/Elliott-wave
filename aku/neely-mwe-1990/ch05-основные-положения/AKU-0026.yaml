id: AKU-0026
type: rule
strength: mandatory
status: verified
topic: flat
subtopics:
- fibonacci-ratios
statement_ru: 'В Плоской коррекции с сильной b-волной (превышающей начальный уровень
  волны-а), b-волна обычно ограничена соотношением 138.2% или 161.8% волны-а, но не
  может достигать ни одного из них.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Соотношения Фибоначчи — Плоские — Сильная b-волна
  figure_id: null
  verbatim_quote:
    text: 'Когда b-волна превышает начальный уровень волны-а, обычно она будет ограничена
      соотношением 138.2% (это ненастоящее соотношение Фибоначчи, но представляет
      комбинацию двух - 1.00 и 0.382) или 161.8%, но не может достигать ни одного
      из них.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Плоская коррекция, где b-волна превышает начальный уровень волны-а

    # (т.е. b-волна откатывается дальше начала a-волны — "сильная b-волна")

    pattern == ''flat''

    AND price_move_end(wave_b) is_beyond start_level(wave_a)

    # "beyond" означает: в бычьей плоской b идёт выше start(a), в медвежьей — ниже
    start(a)

    '
  constraint: '# Длина b-волны в процентах от длины a-волны

    b_ratio = length(wave_b) / length(wave_a)


    # "Обычно ограничена 138.2% или 161.8%" — мягкое ожидание (usually)

    # Это guideline-часть: b_ratio приближается к 1.382 или 1.618, но не достигает

    # SOFT: b_ratio < 1.618 OR b_ratio < 1.382


    # "Не может достигать ни одного из них" — mandatory запрет

    # b-волна НЕ МОЖЕТ точно равняться 138.2% и НЕ МОЖЕТ точно равняться 161.8%

    b_ratio != 1.382

    AND b_ratio != 1.618


    # Объединённое жёсткое ограничение верхней границы:

    # Поскольку b "ограничена" 161.8% и "не может достигать" его,

    # это означает строгое неравенство сверху:

    AND b_ratio < 1.618

    '
  formalization_notes: "1. Правило содержит две части разной силы:\n   - \"обычно\
    \ ограничена 138.2% или 161.8%\" — слово \"обычно\" делает это guideline/soft.\n\
    \   - \"не может достигать ни одного из них\" — \"не может\" звучит как mandatory\
    \ запрет.\n2. Формализован mandatory аспект: b_ratio строго меньше 1.618 и не\
    \ равна ни 1.382, ни 1.618.\n3. Неясность: \"ограничена 138.2% или 161.8%\" —\
    \ неясно, означает ли это два разных\n   сценария (b стремится к одному из двух\
    \ уровней) или единый диапазон.\n   Принято как верхняя граница 161.8% (строго),\
    \ с запретом точного попадания в оба уровня.\n4. Сравнение \"!=\" подразумевает\
    \ допуск (tolerance), например ±0.5-1% от цены,\n   что должно быть определено\
    \ на уровне реализации.\n5. length(wave_x) = абсолютная разница цен между началом\
    \ и концом волны x."

id: AKU-0026
type: rule
strength: mandatory
status: verified
topic: flat
subtopics:
- fibonacci-ratios
statement_ru: 'В Плоской коррекции с сильной b-волной (превышающей начальный уровень
  волны-а), b-волна обычно ограничена соотношением 138.2% или 161.8% волны-а, но не
  может достигать ни одного из них.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Соотношения Фибоначчи — Плоские — Сильная b-волна
  figure_id: null
  verbatim_quote:
    text: 'Когда b-волна превышает начальный уровень волны-а, обычно она будет ограничена
      соотношением 138.2% (это ненастоящее соотношение Фибоначчи, но представляет
      комбинацию двух - 1.00 и 0.382) или 161.8%, но не может достигать ни одного
      из них.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Плоская коррекция, где b-волна превышает начальный уровень волны-а

    # ("сильная b-волна")

    pattern == ''flat''

    AND end_price(wave_b) is_beyond start_price(wave_a)

    # Бычья плоская: end(b) < start(a) (b идёт вниз дальше начала a)

    # Медвежья плоская: end(b) > start(a) (b идёт вверх дальше начала a)

    # "превышает начальный уровень" = длина b > длина a, т.е. b откатывает больше
    100% от a

    '
  constraint: 'b_ratio = price_length(wave_b) / price_length(wave_a)


    # Mandatory часть: "не может достигать ни одного из них"

    # b-волна НЕ МОЖЕТ точно равняться 138.2% и НЕ МОЖЕТ точно равняться 161.8%

    b_ratio != 1.382

    AND b_ratio != 1.618


    # Mandatory часть: "ограничена ... 161.8%, но не может достигать"

    # Верхняя граница — строго меньше 161.8%

    AND b_ratio < 1.618


    # Контекстное условие: b-волна сильная, т.е. превышает 100%

    AND b_ratio > 1.0

    '
  formalization_notes: "1. Правило содержит две части разной силы:\n   - \"обычно\
    \ ограничена 138.2% или 161.8%\" — слово \"обычно\" делает это soft/guideline.\n\
    \     Формализовано только как верхняя граница (< 1.618), без принуждения к конкретному\
    \ уровню.\n   - \"не может достигать ни одного из них\" — \"не может\" = mandatory\
    \ запрет.\n2. Формализованы только mandatory аспекты:\n   - b_ratio строго < 1.618\
    \ (верхний предел)\n   - b_ratio != 1.382 и b_ratio != 1.618 (запрет точного попадания)\n\
    3. \"Ограничена 138.2% или 161.8%\" — интерпретировано как два возможных уровня-аттрактора,\n\
    \   к которым b-волна стремится, но не достигает. Какой именно из двух уровней\n\
    \   является целевым — определяется контекстом (не формализуемо из данного правила).\n\
    4. Сравнение \"!=\" подразумевает tolerance (например ±0.01 от ratio),\n   определяемую\
    \ на уровне реализации.\n5. price_length(wave_x) = abs(end_price(wave_x) - start_price(wave_x)).\n\
    6. Условие b_ratio > 1.0 следует из applies_when (b превышает начальный уровень\
    \ a),\n   добавлено для явности."

id: AKU-0009
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics:
- rule-of-overlap
statement_ru: 'Ценовые проекции волн 2 и 4 Трендовых импульсных поливолн (или более
  сложных трендовых импульсных формаций) не могут перекрываться (накладываться) даже
  частично.

  '
source:
  book_id: neely-mwe-1990
  page: 5-5
  chapter: 'Глава 5: Основные положения'
  section: Правило Перекрытия
  figure_id: 5-5a
  verbatim_quote:
    text: Ценовые проекции волн 2 и 4 Трендовых импульсных поливолн (или более сложных
      трендовых импульсных формаций) не могут перекрываться (накладываться) даже частично
    language: ru
formalization:
  status: formalized
  applies_when: '# Правило применяется к трендовым импульсным формациям (5-3-5-3-5)

    pattern_type == ''trending_impulse''

    waves_count == 5

    '
  constraint: '# "Ценовые проекции" волн 2 и 4 — это вертикальные ценовые диапазоны,

    # которые эти волны занимают на графике (от начальной до конечной цены волны).


    # Определяем ценовой диапазон волны 2:

    wave2_price_min = min(start_price(wave_2), end_price(wave_2))

    wave2_price_max = max(start_price(wave_2), end_price(wave_2))


    # Определяем ценовой диапазон волны 4:

    wave4_price_min = min(start_price(wave_4), end_price(wave_4))

    wave4_price_max = max(start_price(wave_4), end_price(wave_4))


    # Перекрытие существует, если диапазоны пересекаются:

    overlap_exists = max(wave2_price_min, wave4_price_min) < min(wave2_price_max,
    wave4_price_max)


    # Mandatory: перекрытия быть НЕ должно

    REQUIRE overlap_exists == false


    # Эквивалентная запись без привязки к направлению тренда:

    # wave4_price_min >= wave2_price_max  OR  wave4_price_max <= wave2_price_min

    '
  formalization_notes: "- \"Ценовые проекции\" интерпретируются как вертикальные ценовые\
    \ диапазоны волн\n  (от начальной до конечной цены волны), спроецированные на\
    \ ось цен.\n- Правило mandatory: нарушение означает, что формация НЕ является\
    \ трендовым импульсом.\n- Правило применяется к поливолнам и более сложным трендовым\
    \ импульсным формациям.\n- Касание границ (wave4_price_min == wave2_price_max)\
    \ формально не является\n  перекрытием: формулировка \"даже частично\" подразумевает\
    \ любое вхождение внутрь\n  диапазона, но не точечное касание. Поэтому используется\
    \ строгое неравенство (<)\n  для определения overlap."
aliases:

id: AKU-0025
type: rule
strength: mandatory
status: verified
topic: flat
subtopics:
- fibonacci-ratios
statement_ru: 'В Плоской коррекции с нормальной b-волной, волна-с не может составлять
  менее 38.2% волны-а — это минимальное требование, ниже которого она опуститься не
  может.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Соотношения Фибоначчи — Плоские
  figure_id: null
  verbatim_quote:
    text: 'Очень редко волна-с может соотноситься с волной-а с коэффициентом 38.2%,
      но это минимальное требование (ниже которого она опуститься не может).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Плоская коррекция (Flat)

    # b-волна классифицирована как "нормальная" (normal)

    # Нормальная b-волна в Плоской: откат b-волны составляет от 81% до 100% волны-a

    pattern == ''flat'' AND b_wave_type == ''normal''

    '
  constraint: '# Длина волны-c в ценовом выражении должна быть не менее 38.2% длины
    волны-a

    # Это абсолютный минимум — ниже него волна-c опуститься не может

    price_length(wave_c) >= 0.382 * price_length(wave_a)

    '
  formalization_notes: "Verbatim: «Очень редко волна-с может соотноситься с волной-а\
    \ с коэффициентом 38.2%, \nно это минимальное требование (ниже которого она опуститься\
    \ не может).»\nМаркер «не может» подтверждает mandatory статус.\nКонтекст книги\
    \ явно указывает «в ценовом отношении», поэтому используется \nprice_length —\
    \ абсолютная разница между началом и концом волны.\nНормальная b-волна в Плоской\
    \ определяется из других AKU по классификации Плоских \n(откат b-волны от 81%\
    \ до 100% волны-a)."
aliases:

statement_ru: 'Четвёртый сегмент импульса (волна 4) никогда не должен достигать начального
  уровня третьего сегмента (волны 3).

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Четвертый сегмент никогда не должен достигать начального уровня третьего
      сегмента.
    language: ru
formalization:
  status: formalized
  applies_when: 'pattern == ''impulse'' AND wave_4_completed

    '
  constraint: "# Четвёртый сегмент никогда не должен достигать начального уровня третьего\
    \ сегмента.\n# Начальный уровень волны 3 = start_price(wave_3) = end_price(wave_2)\n\
    # \"Никогда не должен достигать\" — строгое неравенство: даже касание запрещено.\n\
    \nif direction == 'up':\n  # Восходящий импульс: волна 4 корректирует вниз\n \
    \ # Минимум волны 4 не должен опуститься до или ниже начала волны 3\n  low(wave_4)\
    \ > start_price(wave_3)\nelif direction == 'down':\n  # Нисходящий импульс: волна\
    \ 4 корректирует вверх\n  # Максимум волны 4 не должен подняться до или выше начала\
    \ волны 3\n  high(wave_4) < start_price(wave_3)\n"
  formalization_notes: 'Verbatim: "Четвертый сегмент никогда не должен достигать начального
    уровня третьего сегмента."

    "Никогда не должен достигать" трактуется как строгое неравенство (strict inequality):

    цена волны 4 не может даже коснуться уровня start(wave_3).

    start_price(wave_3) == end_price(wave_2) по определению смежных сегментов.

    Правило mandatory — нарушение означает, что разметка не является допустимым импульсом.'

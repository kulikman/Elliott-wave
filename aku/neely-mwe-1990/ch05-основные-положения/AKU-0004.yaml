id: AKU-0004
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics:
- rule-of-overlap
- retracement
statement_ru: 'Второй сегмент импульса (волна 2) никогда не может достигать начального
  уровня первого сегмента (волны 1). Если это происходит, импульсный счёт невозможен.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Этот второй сегмент никогда не может достигать начального уровня первого
      сегмента.
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''impulse'' AND current_wave == 2

    '
  constraint: "# Второй сегмент никогда не может достигать начального уровня первого\
    \ сегмента\n# Начальный уровень первого сегмента = start(wave_1)\n# Конец второго\
    \ сегмента (и любая точка волны 2) не должен достигать этого уровня\n\nif direction\
    \ == 'up':\n  # Импульс вверх: волна 1 идёт вверх, волна 2 корректирует вниз\n\
    \  # Начальный уровень волны 1 = low точка старта волны 1\n  # Волна 2 не должна\
    \ достигать (или пробивать) этот уровень\n  low(wave_2) > price(start(wave_1))\n\
    elif direction == 'down':\n  # Импульс вниз: волна 1 идёт вниз, волна 2 корректирует\
    \ вверх\n  # Начальный уровень волны 1 = high точка старта волны 1\n  # Волна\
    \ 2 не должна достигать (или пробивать) этот уровень\n  high(wave_2) < price(start(wave_1))\n\
    \n# \"никогда не может достигать\" означает строгое неравенство:\n# касание уровня\
    \ start(wave_1) также является нарушением\n"
  formalization_notes: 'Правило является абсолютным (mandatory): если нарушено, импульсный
    счёт невозможен.

    Слово "достигать" в оригинале означает, что даже касание уровня начала волны 1

    является нарушением — используется строгое неравенство (>  или <, но не >= или
    <=).

    Это классическое правило overlap для волны 2 импульса.

    price(start(wave_1)) — это цена в точке начала волны 1 (т.е. начало всего импульса).'
aliases:

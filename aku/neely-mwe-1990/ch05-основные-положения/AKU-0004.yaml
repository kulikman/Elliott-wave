statement_ru: 'Второй сегмент импульса (волна 2) никогда не может достигать начального
  уровня первого сегмента (волны 1). Если это происходит, импульсный счёт невозможен.

  '
source:
  book_id: neely-mwe-1990
  page: 5-1
  chapter: 'Глава 5: Основные положения'
  section: Импульсы
  figure_id: null
  verbatim_quote:
    text: Этот второй сегмент никогда не может достигать начального уровня первого
      сегмента.
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''impulse'' AND wave_2_completed == true

    '
  constraint: "# Второй сегмент (волна 2) никогда не может достигать начального уровня\
    \ первого сегмента (волны 1)\n# Verbatim: \"Этот второй сегмент никогда не может\
    \ достигать начального уровня первого сегмента.\"\n# \"никогда не может достигать\"\
    \ = строгое неравенство, касание тоже является нарушением\n\nif direction == 'up':\n\
    \  # Импульс вверх: волна 1 растёт вверх, волна 2 корректирует вниз\n  # Волна\
    \ 2 не должна опуститься до или ниже начала волны 1\n  low(wave_2) > price(start(wave_1))\n\
    elif direction == 'down':\n  # Импульс вниз: волна 1 падает вниз, волна 2 корректирует\
    \ вверх\n  # Волна 2 не должна подняться до или выше начала волны 1\n  high(wave_2)\
    \ < price(start(wave_1))\n\n# При нарушении — импульсный счёт невозможен (mandatory\
    \ rule)\n"
  formalization_notes: 'Правило является абсолютным (mandatory): при нарушении импульсный
    счёт невозможен.

    Verbatim: "Этот второй сегмент никогда не может достигать начального уровня первого
    сегмента."

    Слово "достигать" означает, что даже касание уровня start(wave_1) является нарушением
    —

    используется строгое неравенство (>, <), а не нестрогое (>=, <=).

    price(start(wave_1)) — цена в точке начала волны 1, т.е. начало всего импульса.

    start(wave_1) == start(impulse) по определению.'

id: AKU-0030
type: rule
strength: conditional
status: verified
topic: triangle
subtopics:
- informal-logic-rules
statement_ru: '"Выброс" из Расширяющегося Треугольника не подчиняется требованиям,
  выполнение которых необходимо для Сужающихся Треугольников. "Выброс" не может начать
  крупное новое повышение или снижение, поскольку он не должен быть таким большим,
  как ширина Расширяющегося Треугольника (волна-e).

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Специфика Неограничивающих Треугольников
  figure_id: null
  verbatim_quote:
    text: 'Поскольку "прорыв" не должен быть таким большим, как ширина Расширяющегося
      Треугольника (волна-e), очевидно, что "выброс" не может начать крупное новое
      повышение или снижение.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к выбросу (thrust) после завершения Расширяющегося
    Треугольника

    # (неограничивающего типа)

    pattern == ''expanding_triangle''

    AND triangle_type == ''non_limiting''

    AND phase == ''post_pattern_thrust''

    AND thrust_exists == true

    '
  constraint: '# Длина (ценовой размах) выброса должна быть строго меньше

    # длины (ценового размаха) волны-e Расширяющегося Треугольника

    # Волна-e — самая широкая волна, определяющая ширину расширяющегося треугольника

    price_range(thrust) < price_range(wave_e)


    # Следствие: выброс не может начать крупное новое повышение или снижение,

    # поскольку он ограничен размером волны-e

    '
  formalization_notes: "1. \"Ширина Расширяющегося Треугольника\" явно приравнена\
    \ к волне-e в тексте правила.\n2. Сравнение идёт по ценовому размаху (price_range),\
    \ т.е. абсолютной разнице\n   между началом и концом движения.\n3. Правило conditional\
    \ — контекст специфичен для неограничивающих расширяющихся\n   треугольников.\
    \ В тексте явно противопоставляется сужающимся треугольникам:\n   \"не подчиняется\
    \ требованиям, выполнение которых необходимо для Сужающихся Треугольников\".\n\
    4. Формулировка \"не должен быть таким большим\" интерпретирована как строгое\n\
    \   неравенство (<), а не нестрогое (<=)."
aliases:

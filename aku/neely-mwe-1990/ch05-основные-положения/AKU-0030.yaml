statement_ru: '"Выброс" из Расширяющегося Треугольника не подчиняется требованиям,
  выполнение которых необходимо для Сужающихся Треугольников. "Выброс" не может начать
  крупное новое повышение или снижение, поскольку он не должен быть таким большим,
  как ширина Расширяющегося Треугольника (волна-e).

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Специфика Неограничивающих Треугольников
  figure_id: null
  verbatim_quote:
    text: 'Поскольку "прорыв" не должен быть таким большим, как ширина Расширяющегося
      Треугольника (волна-e), очевидно, что "выброс" не может начать крупное новое
      повышение или снижение.

      '
    language: ru

statement_ru: 'Волна-а и волна-b Зигзага должны отличаться по цене. Волна-b составит
  61.8% или менее волны-а.

  '
source:
  book_id: neely-mwe-1990
  page: 5-42
  chapter: Chapter 5
  section: Условные правила построения поливолн коррекции — Чередование — Цена
  figure_id: null
  verbatim_quote:
    text: 'Волна-а и волна-b Зигзага должны отличаться по цене. Волна-b составит 61.8%
      или менее волны-а.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к любому зигзагу (Zigzag)

    pattern == ''zigzag''

    '
  constraint: '# Волна-b должна отличаться по цене от волны-a

    # и составлять 61.8% или менее от волны-a

    length(wave_b) != length(wave_a)

    AND length(wave_b) <= 0.618 * length(wave_a)

    '
  formalization_notes: "Правило содержит два требования:\n1. Волна-a и волна-b должны\
    \ отличаться по цене (length(wave_b) != length(wave_a)).\n   Это требование фактически\
    \ всегда выполняется при соблюдении второго условия,\n   за исключением теоретического\
    \ случая когда обе волны равны нулю.\n   Тем не менее оно явно указано в тексте\
    \ и сохранено.\n2. Волна-b составит 61.8% или менее волны-a (length(wave_b) <=\
    \ 0.618 * length(wave_a)).\n\nСтатус strength: mandatory основан на маркере \"\
    должны\" в тексте,\nхотя раздел книги называется \"Условные правила\". Оставлено\
    \ как mandatory\nсогласно формулировке statement_ru.\n\nlength() — ценовая длина\
    \ волны (абсолютное значение разницы цен\nмежду началом и концом волны)."

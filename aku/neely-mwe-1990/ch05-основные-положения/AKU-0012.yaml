statement_ru: 'Для квалификации самой длинной волны импульсной группы в качестве Растянутой,
  её ценовая длина должна быть не меньше 161,8% второй по длине волны этой группы.
  Несоблюдение этого правила практически гарантирует коррективный характер анализируемой
  группы.

  '
source:
  book_id: neely-mwe-1990
  page: 5-2
  chapter: 'Глава 5: Основные положения'
  section: Правило Растянутой волны (тест на Импульсность)
  figure_id: null
  verbatim_quote:
    text: Чтобы квалифицировать самую длинную волну в качестве Растянутой, ее ценовая
      длина должна быть не меньше 161,8% второй по длине волны этой группы. Несоблюдение
      любого из представленных до настоящего момента Правил практически гарантирует
      коррективный характер анализируемой группы.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при проверке группы из 5 волн на импульсный
    характер

    # Группа: wave_1, wave_2, wave_3, wave_4, wave_5

    pattern_candidate == ''impulse''

    '
  constraint: "# Ценовая длина волны — абсолютная разница цены между началом и концом\
    \ волны\n# price_length(wave) = abs(wave.end_price - wave.start_price)\n\n# Вычисляем\
    \ ценовые длины действующих (импульсных) волн группы\nlen_1 = price_length(wave_1)\n\
    len_3 = price_length(wave_3)\nlen_5 = price_length(wave_5)\n\naction_wave_lengths\
    \ = [len_1, len_3, len_5]\n\n# Находим самую длинную и вторую по длине среди действующих\
    \ волн\nsorted_lengths = sort_descending(action_wave_lengths)\nlongest = sorted_lengths[0]\n\
    second_longest = sorted_lengths[1]\n\n# Для квалификации самой длинной волны как\
    \ Растянутой:\n# её ценовая длина должна быть не меньше 161.8% второй по длине\n\
    is_extension_valid = (longest >= second_longest * 1.618)\n\n# Если условие НЕ\
    \ выполнено — группа практически гарантированно\n# является коррективной, а не\
    \ импульсной\nIF NOT is_extension_valid:\n    impulse_qualification = FAIL\n \
    \   # Группа не может быть квалифицирована как импульс\n"
  formalization_notes: "1. \"Ценовая длина\" (price length) = abs(end_price - start_price).\n\
    2. Сравниваются только действующие волны импульса (1, 3, 5),\n   так как именно\
    \ среди них определяется Растянутая волна.\n3. Verbatim quote говорит \"практически\
    \ гарантирует\" коррективный характер\n   при несоблюдении — это не абсолютный\
    \ запрет, но правило имеет статус\n   mandatory, поэтому формализуем как FAIL.\n\
    \   Возможные исключения должны быть описаны в отдельных AKU.\n4. Правило является\
    \ тестом на импульсность: если ни одна действующая\n   волна не достигает 161.8%\
    \ второй по длине, группа не квалифицируется\n   как импульс.\n5. Исходный текст\
    \ говорит о \"самой длинной волне импульсной группы\" —\n   в контексте раздела\
    \ речь идёт именно о действующих волнах (1, 3, 5),\n   среди которых определяется\
    \ растяжение."

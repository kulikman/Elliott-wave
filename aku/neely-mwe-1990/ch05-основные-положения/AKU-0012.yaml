statement_ru: 'Для квалификации самой длинной волны импульсной группы в качестве Растянутой,
  её ценовая длина должна быть не меньше 161,8% второй по длине волны этой группы.
  Несоблюдение этого правила практически гарантирует коррективный характер анализируемой
  группы.

  '
source:
  book_id: neely-mwe-1990
  page: 5-2
  chapter: 'Глава 5: Основные положения'
  section: Правило Растянутой волны (тест на Импульсность)
  figure_id: null
  verbatim_quote:
    text: Чтобы квалифицировать самую длинную волну в качестве Растянутой, ее ценовая
      длина должна быть не меньше 161,8% второй по длине волны этой группы. Несоблюдение
      любого из представленных до настоящего момента Правил практически гарантирует
      коррективный характер анализируемой группы.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при проверке группы волн на импульсный характер

    # Группа состоит из 5 волн (wave_1, wave_2, wave_3, wave_4, wave_5)

    pattern_candidate == ''impulse''

    '
  constraint: "# Вычисляем ценовые длины действующих (импульсных) волн группы\nprice_lengths\
    \ = [\n  price_length(wave_1),\n  price_length(wave_3),\n  price_length(wave_5)\n\
    ]\n\n# Сортируем по убыванию\nsorted_lengths = sort_descending(price_lengths)\n\
    \nlongest = sorted_lengths[0]   # самая длинная волна\nsecond_longest = sorted_lengths[1]\
    \  # вторая по длине волна\n\n# Самая длинная волна должна быть не меньше 161.8%\
    \ второй по длине\nlongest >= second_longest * 1.618\n\n# Если условие НЕ выполнено\
    \ — группа практически гарантированно\n# является коррективной, а не импульсной\n\
    # IF NOT (longest >= second_longest * 1.618):\n#     pattern_candidate is likely\
    \ corrective (fails impulse qualification)\n"
  formalization_notes: "1. \"Ценовая длина\" (price length) — абсолютная разница в\
    \ цене между\n   началом и концом волны: abs(end_price - start_price).\n2. Сравниваются\
    \ только действующие волны импульса (1, 3, 5),\n   так как именно они составляют\
    \ \"импульсную группу\" и одна из них\n   должна быть Растянутой (Extended).\n\
    3. Источник говорит \"практически гарантирует\" коррективный характер,\n   а не\
    \ абсолютно — возможны исключения, описанные далее в книге.\n4. В review_notes\
    \ указано наличие двух исключений, которые здесь\n   не формализованы (они должны\
    \ быть в отдельных AKU)."

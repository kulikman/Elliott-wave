formalization:
  status: formalized
  applies_when: '# Правило применяется при идентификации любого Треугольника

    pattern == ''triangle''

    '
  constraint: "# Каждый из пяти сегментов Треугольника (a, b, c, d, e)\n# должен быть\
    \ Полной Коррективной фазой (тройкой, \":3\")\nfor seg in [a, b, c, d, e]:\n \
    \   assert structure(seg) == ':3'\n    # seg является завершённой коррективной\
    \ структурой\n    # (зигзаг, плоская, треугольник, двойная/тройная комбинация\
    \ и т.д.)\n    # seg НЕ может быть импульсом (:5) или любой движущей структурой\n"
  formalization_notes: '":3" означает любую полную коррективную структуру по классификации
    Нили —

    зигзаг, плоская коррекция, треугольник, двойная/тройная комбинация и др.

    Правило является обязательным (mandatory) для всех разновидностей треугольников

    (сужающийся, расширяющийся и т.д.).

    Источник явно указывает: «Каждый сегмент Треугольника - Полная Коррективная фаза
    (тройка, ":3")».'

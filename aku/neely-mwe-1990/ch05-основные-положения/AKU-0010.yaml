id: AKU-0010
type: rule
strength: mandatory
status: verified
topic: ending-diagonal
subtopics:
- rule-of-overlap
statement_ru: 'Ценовые проекции длин волн 2 и 4 Терминальных Импульсов должны частично
  перекрываться. Это обязательное условие для Терминального Импульса.

  '
source:
  book_id: neely-mwe-1990
  page: 5-5
  chapter: 'Глава 5: Основные положения'
  section: Правило Перекрытия
  figure_id: 5-5b
  verbatim_quote:
    text: ценовые проекции длин волн 2 и 4 Терминальных Импульсов должны частично
      перекрываться
    language: ru
formalization:
  status: formalized
  applies_when: '# Правило применяется к Терминальным Импульсам (Ending Diagonals,
    структура 3-3-3-3-3)

    pattern == ''terminal_impulse''

    '
  constraint: '# "Ценовые проекции длин волн 2 и 4" — вертикальные ценовые диапазоны
    волн 2 и 4.

    # Эти диапазоны ДОЛЖНЫ частично перекрываться.


    # Определяем ценовой диапазон волны 2

    wave2_high = max(price_at_start(wave_2), price_at_end(wave_2))

    wave2_low  = min(price_at_start(wave_2), price_at_end(wave_2))


    # Определяем ценовой диапазон волны 4

    wave4_high = max(price_at_start(wave_4), price_at_end(wave_4))

    wave4_low  = min(price_at_start(wave_4), price_at_end(wave_4))


    # Вычисляем величину перекрытия

    overlap = min(wave2_high, wave4_high) - max(wave2_low, wave4_low)


    # MANDATORY: перекрытие должно быть строго положительным (частичное наложение)

    overlap > 0

    '
  formalization_notes: 'Зеркальное правило к AKU-0009 (запрет перекрытия в трендовых
    импульсах).

    Verbatim: «ценовые проекции длин волн 2 и 4 Терминальных Импульсов должны

    частично перекрываться».

    «Ценовые проекции длин» интерпретируются как вертикальные ценовые диапазоны

    от начала до конца волны (по оси цены).

    «Частично перекрываться» означает ненулевое пересечение диапазонов (overlap >
    0),

    но не обязательно полное вложение одного в другой.

    Правило mandatory — если overlap <= 0, паттерн не может быть терминальным импульсом.'

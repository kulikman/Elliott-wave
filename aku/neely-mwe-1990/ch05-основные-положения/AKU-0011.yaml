id: AKU-0011
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics:
- channeling
statement_ru: 'Ни одна часть волн 1 или 3 не должна пересекать действительную линию
  тренда 0-2.

  '
source:
  book_id: neely-mwe-1990
  page: 5-6
  chapter: 'Глава 5: Основные положения'
  section: Каналы
  figure_id: null
  verbatim_quote:
    text: ни одна часть волн 1 или 3 не должна пересекать действительную линию тренда
      0-2.
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется к импульсной фигуре, когда определены точки 0, 1, 2,
    3

    # и можно построить линию тренда через точки 0 и 2

    pattern == ''impulse''

    AND point_0 IS defined   # начало волны 1

    AND point_1 IS defined   # конец волны 1 / начало волны 2

    AND point_2 IS defined   # конец волны 2 / начало волны 3

    AND point_3 IS defined   # конец волны 3

    '
  constraint: "# Построить действительную линию тренда через точку 0 (начало волны\
    \ 1) и точку 2 (конец волны 2)\ntrendline_0_2 = line_through(point_0, point_2)\n\
    \n# Определить направление импульса\n# Бычий: point_0.price < point_1.price\n\
    # Медвежий: point_0.price > point_1.price\ndirection = 'up' IF point_0.price <\
    \ point_1.price ELSE 'down'\n\n# Проверка волны 1: ни один бар не должен пересекать\
    \ линию тренда 0-2\nFOR each bar IN wave_1.all_bars:\n  tl_value = trendline_0_2.value_at(bar.time)\n\
    \  IF direction == 'up':\n    # В бычьем импульсе линия 0-2 проходит по низам\
    \ (снизу),\n    # ни один low волны 1 не должен быть ниже линии\n    REQUIRE bar.low\
    \ >= tl_value\n  ELIF direction == 'down':\n    # В медвежьем импульсе линия 0-2\
    \ проходит по верхам (сверху),\n    # ни один high волны 1 не должен быть выше\
    \ линии\n    REQUIRE bar.high <= tl_value\n\n# Проверка волны 3: ни один бар не\
    \ должен пересекать линию тренда 0-2\nFOR each bar IN wave_3.all_bars:\n  tl_value\
    \ = trendline_0_2.value_at(bar.time)\n  IF direction == 'up':\n    REQUIRE bar.low\
    \ >= tl_value\n  ELIF direction == 'down':\n    REQUIRE bar.high <= tl_value\n\
    \n# Нарушение любого REQUIRE означает, что импульсная разметка некорректна\n"
  formalization_notes: "1. \"Действительная линия тренда 0-2\" — линия, проведённая\
    \ через начало волны 1 (точка 0)\n   и конец волны 2 (точка 2). Это базовая линия\
    \ канала (base channel line) в терминологии Нили.\n2. \"Пересекать\" означает,\
    \ что ценовое действие волны проходит сквозь линию тренда —\n   любой бар волны\
    \ оказывается по другую сторону линии.\n3. В бычьем импульсе линия 0-2 проходит\
    \ снизу (по минимумам), проверяем low баров.\n   В медвежьем — сверху (по максимумам),\
    \ проверяем high баров.\n4. Правило mandatory — нарушение означает, что разметка\
    \ импульса некорректна.\n5. Контекст указывает на диаграмму B (волна 3 растянута),\
    \ но само правило\n   сформулировано как общее (\"Важное замечание\"), применимое\
    \ ко всем импульсам с каналом 0-2.\n6. Линия тренда строится как прямая через\
    \ две точки на ценовом графике.\n   При реализации в Pine Script нужно интер"

id: AKU-0317
type: rule
strength: mandatory
status: verified
topic: structural-series
subtopics:
- grouping-procedure
- compaction
statement_ru: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
  из Стандартных Структурных Серий (A–E) или одной из Нестандартных Серий. Если фигура
  не соответствует ни одной из этих серий, волновой счёт невозможен.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
      из четырёх уникальных Стандартных Серий (A–E) ИЛИ одной из Нестандартных Серий.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при группировке/компактировке моноволн

    # в ценовую фигуру более высокого порядка (любой паттерн выше моноволны)

    pattern.degree > MONOWAVE

    # Т.е. паттерн состоит из двух или более моноволн

    '
  constraint: "# Определяем множества допустимых структурных серий\n# Стандартные\
    \ серии (A–E) из таблицы Рисунок 4-3:\nSTANDARD_SERIES = {\"A\", \"B\", \"C\"\
    , \"D\", \"E\"}\n\n# Нестандартные серии — отдельное множество, также определённое\
    \ в таблице Рисунок 4-3\nNON_STANDARD_SERIES = {все_определённые_нестандартные_серии}\
    \  # задаётся как справочные данные\n\nALL_VALID_SERIES = STANDARD_SERIES ∪ NON_STANDARD_SERIES\n\
    \n# Извлекаем структурную серию текущей фигуры —\n# последовательность структурных\
    \ меток составляющих волн\n# (например: \":F3:c3:F3:c3:L5\")\nactual_series =\
    \ get_structural_series(pattern)\n\n# Ограничение: серия ДОЛЖНА совпадать с одной\
    \ из допустимых\nREQUIRE actual_series ∈ ALL_VALID_SERIES\n\n# Если не совпадает\
    \ — волновой счёт для данной группировки невозможен\nIF actual_series ∉ ALL_VALID_SERIES\
    \ THEN\n    pattern.valid = FALSE\n    REJECT_GROUPING(pattern)  # данная группировка\
    \ отвергается\n"
  formalization_notes: "1. Конкретный перечень Стандартных Серий (A–E) и Нестандартных\
    \ Серий\n   определяется в таблице на Рисунке 4-3 (Neely, стр. 4-2) и должен быть\n\
    \   задан как справочные данные (отдельные AKU или справочная таблица).\n   Без\
    \ этой таблицы правило не может быть полностью реализовано.\n2. Правило является\
    \ фильтром валидности: любая попытка группировки\n   моноволн в фигуру более высокого\
    \ порядка проходит проверку\n   на соответствие одной из допустимых серий.\n3.\
    \ \"Структурная серия\" — последовательность структурных меток\n   (например :F3,\
    \ :c3, :L5) составляющих волн паттерна.\n4. Правило не уточняет действий при несоответствии,\
    \ кроме того что\n   \"волновой счёт невозможен\" — т.е. данная группировка отвергается.\n\
    5. Функция get_structural_series(pattern) должна возвращать\n   упорядоченную\
    \ последовательность структурных меток всех\n   составляющих волн паттерна для\
    \ сопоставления с таблицей серий."

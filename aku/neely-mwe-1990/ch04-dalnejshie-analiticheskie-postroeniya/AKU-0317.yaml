statement_ru: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
  из Стандартных Структурных Серий (A–E) или одной из Нестандартных Серий. Если фигура
  не соответствует ни одной из этих серий, волновой счёт невозможен.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
      из четырёх уникальных Стандартных Серий (A–E) ИЛИ одной из Нестандартных Серий.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к любой ценовой фигуре (паттерну),

    # состоящей из более чем одной моноволны (т.е. уровень выше моноволны)

    pattern.degree > monowave

    # Иными словами: при группировке/компактировке моноволн в фигуры более высокого
    порядка

    '
  constraint: "# Определяем множества допустимых структурных серий\nSTANDARD_SERIES\
    \ = {\"A\", \"B\", \"C\", \"D\", \"E\"}  # Стандартные серии (A–E)\n# Нестандартные\
    \ серии — отдельное множество, определённое в таблице Рисунок 4-3\nNON_STANDARD_SERIES\
    \ = {все_определённые_нестандартные_серии}\n\nALL_VALID_SERIES = STANDARD_SERIES\
    \ ∪ NON_STANDARD_SERIES\n\n# Извлекаем структурную серию текущей фигуры\n# (последовательность\
    \ структурных меток составляющих волн, например \":F3:c3:F3:c3:L5\")\nactual_series\
    \ = get_structural_series(pattern)\n\n# Ограничение: серия должна совпадать с\
    \ одной из допустимых\nREQUIRE actual_series ∈ ALL_VALID_SERIES\n\n# Если не совпадает\
    \ ни с одной — волновой счёт невозможен (паттерн невалиден)\nIF actual_series\
    \ ∉ ALL_VALID_SERIES THEN\n    pattern.valid = FALSE\n    # Волновой счёт для\
    \ данной группировки невозможен\n"
  formalization_notes: "1. Конкретный перечень Стандартных Серий (A–E) и Нестандартных\
    \ Серий\n   определяется в таблице на Рисунке 4-3 (Neely, стр. 4-2) и должен быть\n\
    \   задан как справочные данные в системе (отдельные AKU или таблица).\n2. Данное\
    \ правило является фильтром валидности: любая попытка группировки\n   моноволн\
    \ в фигуру более высокого порядка должна проходить проверку\n   на соответствие\
    \ одной из допустимых серий.\n3. \"Структурная серия\" — это последовательность\
    \ структурных меток\n   (например, :F3, :c3, :L5 и т.д.) составляющих волн паттерна.\n\
    4. Правило не уточняет, что делать при несоответствии, кроме того что\n   \"волновой\
    \ счёт невозможен\" — т.е. данная группировка отвергается."
aliases:

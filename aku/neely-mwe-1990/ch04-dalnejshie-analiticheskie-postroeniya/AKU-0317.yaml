id: AKU-0317
type: rule
strength: mandatory
status: verified
topic: structural-series
subtopics:
- grouping-procedure
- compaction
statement_ru: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
  из Стандартных Структурных Серий (A–E) или одной из Нестандартных Серий. Если фигура
  не соответствует ни одной из этих серий, волновой счёт невозможен.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'Любая ценовая фигура уровня выше моноволны должна соответствовать одной
      из четырёх уникальных Стандартных Серий (A–E) ИЛИ одной из Нестандартных Серий.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при группировке/компактировке моноволн

    # в фигуру (паттерн) более высокого порядка.

    # Т.е. к любой ценовой фигуре, состоящей из более чем одной моноволны.

    pattern.degree > MONOWAVE

    # Это означает: pattern состоит из 2+ моноволн, сгруппированных вместе

    '
  constraint: "# Определяем множества допустимых структурных серий\n# Стандартные\
    \ серии (A–E) — 4 уникальных серии, обозначенные буквами A через E\n# (конкретные\
    \ последовательности структурных меток определены в таблице Рисунок 4-3)\nSTANDARD_SERIES\
    \ = load_from_table(\"Figure_4-3\", type=\"standard\")  # серии A, B, C, D, E\n\
    \n# Нестандартные серии — дополнительное множество из той же таблицы\nNON_STANDARD_SERIES\
    \ = load_from_table(\"Figure_4-3\", type=\"non_standard\")\n\nALL_VALID_SERIES\
    \ = STANDARD_SERIES + NON_STANDARD_SERIES\n\n# Извлекаем структурную серию текущей\
    \ фигуры —\n# это последовательность структурных меток составляющих волн паттерна\n\
    # (например: [\":F3\", \":c3\", \":F3\", \":c3\", \":L5\"])\nactual_series = get_structural_series(pattern)\n\
    \n# Проверка: серия должна совпадать с одной из допустимых\nIF actual_series NOT\
    \ IN ALL_VALID_SERIES THEN\n    pattern.valid = FALSE\n    # \"Волновой счёт невозможен\"\
    \ — данная группировка отвергается\nEND IF\n"
  formalization_notes: "1. Конкретный перечень Стандартных Серий (A–E) и Нестандартных\
    \ Серий\n   определяется в таблице на Рисунке 4-3 (Neely, стр. 4-2) и должен быть\n\
    \   задан как справочные данные (отдельные AKU или lookup-таблица).\n   Данное\
    \ правило лишь требует принадлежности к этому перечню.\n2. В statement_ru сказано\
    \ \"четырёх уникальных Стандартных Серий (A–E)\" —\n   буквы A через E дают 5\
    \ букв, но в verbatim_quote явно указано \"четырёх\".\n   Возможно одна из букв\
    \ не является отдельной серией, либо это особенность\n   нумерации Neely. Точный\
    \ состав берётся из Figure 4-3.\n3. Функция get_structural_series(pattern) возвращает\
    \ упорядоченную\n   последовательность структурных меток (structure labels) всех\n\
    \   составляющих волн паттерна.\n4. Правило является фильтром валидности: при\
    \ несоответствии ни одной\n   допустимой серии группировка отвергается целиком.\
    \ Никаких иных\n   действий (коррекция, альтернативный счёт) правило не предписывает."

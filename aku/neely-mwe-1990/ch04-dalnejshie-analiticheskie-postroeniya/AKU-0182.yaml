statement_ru: 'Цикл 3: если в результате Циклов 1-2 не появилось структурное обозначение
  с Индикатором положения '':L'' (:L3 или :L5), дальнейший прогресс в волновой конструкции
  невозможен до поступления новых данных. Текущий граф остаётся незавершённым.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-7
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Цикл 3
  figure_id: null
  verbatim_quote:
    text: В течение Цикла 3 структурных обозначений с Индикатором Положения ":L" не
      обнаружено, следовательно, дальнейшего прогресса в волновой конструкции не предвидится,
      пока не поступят новые данные, ведущие к появлению на графике ":L3" или ":L5".
    language: ru
formalization:
  status: draft
  applies_when: '# После завершения Циклов 1 и 2 процедуры группировки (compaction)

    grouping_phase == ''cycle_3''

    AND cycles_1_and_2_completed == true

    '
  constraint: "# Собираем все структурные обозначения, полученные в результате Циклов\
    \ 1-2\nstructural_labels = get_all_structural_labels_after_cycles_1_2(current_graph)\n\
    \n# Проверяем наличие хотя бы одного обозначения с индикатором положения :L3 или\
    \ :L5\nhas_L_indicator = any(\n  label.position_indicator == ':L3' OR label.position_indicator\
    \ == ':L5'\n  for label in structural_labels\n)\n\nif not has_L_indicator:\n \
    \   # Дальнейший прогресс в волновой конструкции невозможен\n    # Граф остаётся\
    \ незавершённым, группировка приостанавливается\n    current_graph.status = 'incomplete'\n\
    \    halt_grouping()\n    wait_for_new_price_data()\n    # При поступлении новых\
    \ данных — повторить Циклы 1-2,\n    # пока среди результатов не появится :L3\
    \ или :L5\nelse:\n    # Продолжить процедуру группировки (переход к следующему\
    \ этапу)\n    proceed_with_grouping()\n"
  formalization_notes: "- :L3 и :L5 — индикаторы положения, означающие что моноволна\n\
    \  находится в позиции \"Last\" (завершающая) волны 3 или волны 5\n  соответственно\
    \ в рамках поливолновой конструкции.\n- Из verbatim_quote явно следует именно\
    \ пара :L3 / :L5 как целевые метки,\n  а не произвольный :L-индикатор.\n- Правило\
    \ является условием остановки (halt condition): без :L3 или :L5\n  текущая конструкция\
    \ не может быть завершена и сгруппирована далее.\n- \"Новые данные\" означают\
    \ появление новых ценовых баров,\n  которые после повторного прохождения Циклов\
    \ 1-2 могут породить :L3 или :L5.\n- Формализация процедурная (управление потоком\
    \ группировки),\n  а не чисто декларативное ограничение на геометрию волн,\n \
    \ что может потребовать адаптации при реализации в Pine Script\n  (например, через\
    \ флаг состояния и проверку на каждом новом баре)."

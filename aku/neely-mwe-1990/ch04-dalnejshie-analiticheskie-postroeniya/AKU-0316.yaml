formalization:
  status: draft
  applies_when: '# Правило применяется при формировании поливолны из моноволн

    structure_level == ''polywave''

    '
  constraint: "# Подсчёт моноволн в составе поливолны\nmonowave_count = count_monowaves(polywave)\n\
    \nif polywave.type == 'corrective':\n    assert monowave_count >= 3\nelif polywave.type\
    \ == 'impulsive':\n    assert monowave_count >= 5\n"
  formalization_notes: 'Правило устанавливает минимальные требования к количеству
    моноволн в поливолне.

    Коррективная поливолна — минимум 3 моноволны, импульсная — минимум 5.

    Максимальное количество моноволн правилом не ограничено.

    Классификация поливолны на "коррективную" или "импульсную" предполагается

    определённой на основании других правил (структурных меток и т.д.).

    Правило может использоваться как фильтр: если группа моноволн содержит

    менее 3 элементов — она не может быть поливолной никакого типа;

    если содержит 3 или 4 — может быть только коррективной;

    если 5 и более — может быть как коррективной, так и импульсной.'

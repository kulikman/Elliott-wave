statement_ru: 'Коррективная поливолна требует как минимум три моноволны. Импульсная
  поливолна требует как минимум пять моноволн.

  '
source:
  book_id: neely-mwe-1990
  page: 4-1
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Группы моноволн
  figure_id: null
  verbatim_quote:
    text: 'Коррективная поливолна требует как минимум три моноволны. Импульсная поливолна
      требует как минимум пять моноволн.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Когда группа моноволн формирует поливолну

    structure_level == ''polywave''

    '
  constraint: "# Подсчёт моноволн в составе поливолны\nmonowave_count = count_monowaves(polywave)\n\
    \nif polywave.type == 'corrective':\n    monowave_count >= 3\nelif polywave.type\
    \ == 'impulsive':\n    monowave_count >= 5\n"
  formalization_notes: 'Правило устанавливает минимальные требования к количеству
    моноволн.

    Коррективная поливолна — минимум 3 моноволны, импульсная — минимум 5.

    Максимальное количество моноволн правилом не ограничено.

    Классификация поливолны на "коррективную" или "импульсную" предполагается

    определённой на основании других правил (структурных меток и т.д.).'

id: AKU-0322
type: rule
strength: conditional
status: verified
topic: rule-of-similarity
subtopics:
- wave-degree
- compaction
statement_ru: 'Если ни ценовое, ни временное условие подобия не выполнено (длина меньшей
  волны < 1/3 длины большей И длительность меньшей волны < 1/3 длительности большей),
  то волны принадлежат разному Порядку и требуется сжатие.

  '
source:
  book_id: neely-mwe-1990
  page: 4-3
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Правило подобия и баланса
  figure_id: null
  verbatim_quote:
    text: 'Если ни одно правило не выполнено — волны разного Порядка, требуется сжатие.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при сравнении двух смежных волн (wave_A и wave_B)

    # для определения, принадлежат ли они одному Порядку (degree)

    # wave_A и wave_B — две соседние волны, предположительно одного порядка

    # smaller_wave — волна с меньшей ценовой длиной

    # larger_wave — волна с большей ценовой длиной

    smaller_wave = min_by_price_length(wave_A, wave_B)

    larger_wave = max_by_price_length(wave_A, wave_B)

    '
  constraint: "# Условие ценового несоответствия\nprice_dissimilar = price_length(smaller_wave)\
    \ < (1/3) * price_length(larger_wave)\n\n# Условие временного несоответствия\n\
    time_dissimilar = duration(smaller_wave) < (1/3) * duration(larger_wave)\n\n#\
    \ Если ОБА условия несоответствия выполнены (ни ценовое, ни временное\n# подобие\
    \ не достигнуто), то волны принадлежат разному Порядку\nIF price_dissimilar AND\
    \ time_dissimilar THEN\n  waves_same_degree(wave_A, wave_B) = FALSE\n  compaction_required\
    \ = TRUE\n  # Меньшая волна должна быть сжата (compacted) в состав\n  # более\
    \ крупной структуры — она не является волной того же порядка\n"
  formalization_notes: "- Правило является conditional (рекомендательным).\n- \"Сжатие\"\
    \ (compaction) означает, что меньшая волна не может рассматриваться\n  как самостоятельная\
    \ волна того же порядка и должна быть включена\n  в структуру более крупной волны.\n\
    - Порог 1/3 применяется одновременно к цене И времени: только если\n  ОБА параметра\
    \ меньше 1/3, волны считаются разнопорядковыми.\n- Конкретный алгоритм сжатия\
    \ (какая волна куда включается)\n  не описан в данном правиле."

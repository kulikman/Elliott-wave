statement_ru: 'Зигзаг или Импульс? Каждый раз, обнаружив волну '':L5'', завершающую
  предполагаемый Зигзаг, проверяй: три последних сегмента (:5-:F3-:L5) могут быть
  хвостом Импульса. ВСЕГДА проверяй импульсную гипотезу (правила Гл.5-12) ПРЕЖДЕ чем
  идентифицировать как Зигзаг. Если Импульс подтверждён — остановиться; если нет —
  вернуться к Зигзагу.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Зигзаг или Импульс?
  figure_id: null
  verbatim_quote:
    text: Каждый раз, когда вы обнаруживаете волну с обозначением ":L5", завершающую
      предполагаемый Зигзаг, вспоминайте, что Зигзаг может представлять собой три
      последних сегмента Импульса... всегда проверяйте импульсную гипотезу (применяя
      для этого правила, перечисленные в Главах 5-12), прежде чем идентифицировать
      группу волн в качестве Зигзага.
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружена последовательность из трёх сегментов, где последний
    имеет метку :L5,

    # и эта группа предварительно идентифицирована как Зигзаг

    segment_sequence = get_last_three_segments()

    segment_sequence[0].label == '':5''

    AND segment_sequence[1].label == '':F3''

    AND segment_sequence[2].label == '':L5''

    AND preliminary_pattern == ''zigzag''

    '
  constraint: "# ОБЯЗАТЕЛЬНО: прежде чем подтвердить идентификацию как Зигзаг,\n#\
    \ проверить, могут ли эти три сегмента быть хвостом (волны 3-4-5) Импульса\n\n\
    # Шаг 1: Сформировать импульсную гипотезу\n# Три сегмента (:5, :F3, :L5) рассматриваются\
    \ как кандидаты на волны 3, 4, 5\n# Импульса (ищем также предшествующие волны\
    \ 1 и 2)\nimpulse_hypothesis = build_impulse_hypothesis(\n  wave_3_candidate =\
    \ segment_sequence[0],  # :5\n  wave_4_candidate = segment_sequence[1],  # :F3\n\
    \  wave_5_candidate = segment_sequence[2]   # :L5\n)\n\n# Шаг 2: Проверить импульсную\
    \ гипотезу по правилам Глав 5-12\nimpulse_confirmed = test_impulse_rules(impulse_hypothesis)\n\
    \n# Шаг 3: Принять решение\nif impulse_confirmed:\n  final_label = 'impulse'\n\
    \  # Остановиться — паттерн идентифицирован как Импульс\n  STOP\nelse:\n  final_label\
    \ = 'zigzag'\n  # Вернуться к идентификации как Зигзаг\n\n# ПОРЯДОК ОБЯЗАТЕЛЕН:\
    \ импульсная проверка ВСЕГДА выполняется ДО\n# окончательной идентификации как\
    \ Зигзаг\n"
  formalization_notes: "1. Правило задаёт обязательный порядок проверки гипотез: импульс\
    \ проверяется ПРЕЖДЕ зигзага.\n2. Конкретные правила проверки импульса (Главы\
    \ 5-12) не детализированы в данном AKU —\n   они описаны в соответствующих AKU\
    \ по импульсным паттернам.\n3. Построение полной импульсной гипотезы требует поиска\
    \ предшествующих волн 1 и 2,\n   что в данном правиле не конкретизировано — указано\
    \ лишь что три сегмента\n   (:5-:F3-:L5) \"могут быть тремя последними сегментами\
    \ Импульса\".\n4. Связано с AKU-0166 (если существует), данное AKU детализирует\
    \ алгоритм проверки."

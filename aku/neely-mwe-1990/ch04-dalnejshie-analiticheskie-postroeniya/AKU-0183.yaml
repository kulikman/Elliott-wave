  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Зигзаг или Импульс?
  figure_id: null
  verbatim_quote:
    text: Каждый раз, когда вы обнаруживаете волну с обозначением ":L5", завершающую
      предполагаемый Зигзаг, вспоминайте, что Зигзаг может представлять собой три
      последних сегмента Импульса... всегда проверяйте импульсную гипотезу (применяя
      для этого правила, перечисленные в Главах 5-12), прежде чем идентифицировать
      группу волн в качестве Зигзага.
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружена группа из трёх последних сегментов, предварительно

    # идентифицированная как Зигзаг, где последний сегмент имеет метку :L5

    segment_sequence = get_last_three_segments()

    segment_sequence[0].label == '':5''

    AND segment_sequence[1].label == '':F3''

    AND segment_sequence[2].label == '':L5''

    AND preliminary_pattern == ''zigzag''

    '
  constraint: "# ОБЯЗАТЕЛЬНО: перед окончательной идентификацией как Зигзаг\n# проверить,\
    \ могут ли эти три сегмента быть хвостом (волны 3-4-5) Импульса\n\n# Шаг 1: Сформировать\
    \ импульсную гипотезу\n# Три сегмента (:5, :F3, :L5) рассматриваются как кандидаты\
    \ на волны 3, 4, 5\n# Для полной гипотезы необходимо найти предшествующие волны\
    \ 1 и 2\nimpulse_hypothesis = build_impulse_hypothesis(\n  wave_3_candidate =\
    \ segment_sequence[0],  # :5\n  wave_4_candidate = segment_sequence[1],  # :F3\n\
    \  wave_5_candidate = segment_sequence[2]   # :L5\n)\n\n# Шаг 2: Проверить импульсную\
    \ гипотезу по правилам Глав 5-12\nimpulse_confirmed = test_impulse_rules(impulse_hypothesis)\n\
    \n# Шаг 3: Принять решение\nif impulse_confirmed:\n  final_pattern = 'impulse'\n\
    \  STOP  # паттерн идентифицирован как Импульс, дальше не проверять\nelse:\n \
    \ final_pattern = 'zigzag'\n  # вернуться к идентификации как Зигзаг\n\n# ПОРЯДОК\
    \ ОБЯЗАТЕЛЕН: импульсная проверка ВСЕГДА выполняется ДО\n# окончательной идентификации\
    \ как Зигзаг\n"
  formalization_notes: "1. Правило задаёт обязательный порядок проверки гипотез: импульс\
    \ ПРЕЖДЕ зигзага.\n   Это процедурное (workflow) правило, а не числовое ограничение.\n\
    2. Конкретные правила проверки импульса (Главы 5-12) не детализированы в данном\
    \ AKU —\n   они описаны в соответствующих AKU по импульсным паттернам.\n3. Построение\
    \ полной импульсной гипотезы требует поиска предшествующих волн 1 и 2.\n   В исходном\
    \ правиле указано лишь что три сегмента (:5-:F3-:L5)\n   \"могут быть тремя последними\
    \ сегментами Импульса\", без конкретизации\n   алгоритма поиска волн 1 и 2.\n\
    4. Функция build_impulse_hypothesis() — абстракция; её реализация зависит\n  \
    \ от контекста предшествующих сегментов и выходит за рамки данного AKU."

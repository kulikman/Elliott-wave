statement_ru: 'Зигзаг или Импульс? Каждый раз, обнаружив волну '':L5'', завершающую
  предполагаемый Зигзаг, проверяй: три последних сегмента (:5-:F3-:L5) могут быть
  хвостом Импульса. ВСЕГДА проверяй импульсную гипотезу (правила Гл.5-12) ПРЕЖДЕ чем
  идентифицировать как Зигзаг. Если Импульс подтверждён — остановиться; если нет —
  вернуться к Зигзагу.'
statement_en: null
source:

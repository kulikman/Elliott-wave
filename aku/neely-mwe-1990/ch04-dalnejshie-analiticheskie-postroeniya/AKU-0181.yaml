statement_ru: 'Цикл 2: подтверждённые фигуры Цикла 1 сжимаются (compaction) до базовой
  структуры :3 или :5. Все внутренние метки между границами сжатой фигуры удаляются.
  Проводится переоценка (reassessment) — проверяется, не изменилась ли структура соседних
  волн после сжатия.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-6
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Цикл 2
  figure_id: null
  verbatim_quote:
    text: Все группы волн (Плоская, Зигзаг и Импульс), идентифицированные в Цикле
      1, тщательно проверены... Затем они были "сжаты"... и сведены к своей базовой
      Структуре — ":3" или ":5"... все обозначения и пометки между границами Компактных
      ценовых фигур удалены.
    language: ru
formalization:
  status: draft
  applies_when: '# После завершения Цикла 1: все фигуры на текущем уровне подтверждены

    cycle == 1 AND all_figures_confirmed == true

    # Переход к Циклу 2

    '
  constraint: "# Для каждой подтверждённой фигуры из Цикла 1:\nfor each confirmed_figure\
    \ in cycle_1_confirmed_figures:\n\n    # 1. Определить тип базовой структуры\n\
    \    if confirmed_figure.type in ['flat', 'zigzag', 'triangle', 'double_three',\
    \ 'triple_three']:\n        base_structure = ':3'\n    elif confirmed_figure.type\
    \ in ['impulse', 'ending_diagonal', 'leading_diagonal']:\n        base_structure\
    \ = ':5'\n\n    # 2. Сжатие (compaction): заменить фигуру одной волной с базовой\
    \ меткой\n    compacted_wave = new Wave(\n        start = confirmed_figure.start_point,\n\
    \        end   = confirmed_figure.end_point,\n        label = base_structure\n\
    \    )\n\n    # 3. Удалить все внутренние метки и обозначения между границами\
    \ сжатой фигуры\n    remove_all_internal_labels(\n        from_point = confirmed_figure.start_point,\n\
    \        to_point   = confirmed_figure.end_point\n    )\n\n    # 4. Заменить исходную\
    \ фигуру сжатой волной в рабочей последовательности\n    replace_in_sequence(confirmed_figure,\
    \ compacted_wave)\n\n# 5. Переоценка (reassessment): после всех сжатий проверить\
    \ соседние волны\nfor each compacted_wave in all_compacted_waves:\n    left_neighbor\
    \  = get_adjacent_wave(compacted_wave, direction='left')\n    right_neighbor =\
    \ get_adjacent_wave(compacted_wave, direction='right')\n\n    # Проверить, не\
    \ изменилась ли структура соседних волн\n    # (сжатие может изменить контекст:\
    \ соотношения длин, временные пропорции)\n    if left_neighbor is not None:\n\
    \        reassess_structure(left_neighbor)\n    if right_neighbor is not None:\n\
    \        reassess_structure(right_neighbor)\n\n# 6. После сжатия и переоценки\
    \ — повторить процедуру Цикла 1\n#    на новом (более высоком) уровне иерархии\n\
    cycle = 1  # перезапуск Цикла 1 на сжатых данных\n"
  formalization_notes: "1. Правило описывает процедурный шаг (Цикл 2), а не числовое\
    \ ограничение.\n2. Verbatim quote подтверждает: сжатие к \":3\" или \":5\", удаление\
    \ внутренних меток.\n3. Reassessment (переоценка) упомянут в statement_ru, но\
    \ конкретные критерии\n   переоценки не детализированы в источнике — реализация\
    \ reassess_structure()\n   зависит от правил Цикла 1 (группировка, проверка фигур).\n\
    4. После Цикла 2 процесс возвращается к Циклу 1 на новом уровне —\n   это создаёт\
    \ рекурсивную иерархию волн."

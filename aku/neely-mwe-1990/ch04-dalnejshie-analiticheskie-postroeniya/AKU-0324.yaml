id: AKU-0324
type: rule
strength: conditional
status: verified
topic: grouping-procedure
subtopics:
- compaction
statement_ru: 'Если после очередного цикла группировки не появилось обозначений с
  Индикатором положения «L» (:L3 или :L5), это означает отсутствие прогресса в конструкции;
  в этом случае необходимо ожидать поступления новых данных.

  '
source:
  book_id: neely-mwe-1990
  page: 4-7
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Циклы группировки
  figure_id: null
  verbatim_quote:
    text: 'Цикл 3: если не появилось обозначений с Индикатором «L» (:L3/:L5) — прогресса
      в конструкции нет, ждать новых данных.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# После завершения очередного цикла группировки (grouping cycle)

    grouping_cycle_just_completed == true

    '
  constraint: "# Проверяем, появились ли новые обозначения с Индикатором положения\
    \ \"L\" \n# (т.е. :L3 или :L5) в результате последнего цикла группировки\n\nnew_L_designations\
    \ = [d for d in designations_after_cycle \n                      if (d.position_indicator\
    \ == \"L3\" OR d.position_indicator == \"L5\")\n                      AND d not\
    \ in designations_before_cycle]\n\nif len(new_L_designations) == 0:\n    # Прогресса\
    \ в конструкции нет — прекратить группировку,\n    # ожидать поступления новых\
    \ ценовых данных\n    grouping_progress = false\n    action = WAIT_FOR_NEW_DATA\n\
    \    # Не продолжать дальнейшие циклы группировки на текущих данных\nelse:\n \
    \   # Прогресс есть — можно продолжать следующий цикл группировки\n    grouping_progress\
    \ = true\n"
  formalization_notes: "- Индикатор положения \"L\" с суффиксами 3 или 5 (:L3, :L5)\
    \ означает, что \n  моноволна находится в позиции, соответствующей завершению\
    \ более крупной \n  структуры (3-я или 5-я волна), что свидетельствует о прогрессе\
    \ компактификации.\n- Правило определяет условие остановки итеративного процесса\
    \ группировки:\n  если цикл не порождает новых L-обозначений, дальнейшая группировка\
    \ \n  на имеющихся данных бесполезна.\n- Точная механика \"цикла группировки\"\
    \ и формат обозначений (designations) \n  зависят от более широкого контекста\
    \ процедуры группировки (Chapter 4), \n  который здесь не детализирован."
aliases:
- правило отсутствия прогресса группировки

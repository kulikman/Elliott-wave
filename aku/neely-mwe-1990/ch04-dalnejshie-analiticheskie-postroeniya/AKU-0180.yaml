statement_ru: 'Цикл 1: присвоить структурные обозначения всем моноволнам графика.
  Выделить обособленные группы из 3 или 5 моноволн, идентифицировать соответствующую
  Структурную Серию (A-E). Проверить правила Гл.5-12.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-5
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Цикл 1
  figure_id: null
  verbatim_quote:
    text: Используя Правила и методы, описанные в Главе 3, присваиваем Структурные
      обозначения всем моноволнам Рисунка 4-6. На отрезке... можно изолировать группу
      волн, образующих Серию "F3-c3-L5".
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется в начале процедуры группировки (Compaction), Цикл 1

    # Все моноволны уже имеют структурные обозначения (по правилам Главы 3)

    grouping_cycle == 1

    AND all_monowaves_have_structural_labels == true

    '
  constraint: "# Цикл 1 процедуры группировки (Compaction):\n\n# Шаг 1: Убедиться\
    \ что все моноволны имеют структурные обозначения\nfor each monowave in chart:\n\
    \    assert monowave.structural_label != null  # присвоено по правилам Главы 3\n\
    \n# Шаг 2: Сканировать график, выделяя обособленные группы из 3 или 5 смежных\
    \ моноволн\n# \"Обособленная группа\" = группа, которую можно изолировать от соседних\
    \ волн\n# (критерий изоляции определяется контекстом структурных обозначений)\n\
    for i in range(0, len(monowaves)):\n    for group_size in [3, 5]:\n        if\
    \ i + group_size <= len(monowaves):\n            group = monowaves[i : i + group_size]\n\
    \n            # Шаг 3: Извлечь Структурную Серию из группы\n            # Пример:\
    \ группа из 3 моноволн -> серия \"F3-c3-L5\"\n            series = extract_structural_series(group)\n\
    \            # series = join(\"-\", [mw.structural_label for mw in group])\n\n\
    \            # Шаг 4: Сопоставить серию с допустимыми сериями (A, B, C, D, E)\n\
    \            # из таблиц Глав 5-12\n            matched_pattern = lookup_structural_series(series,\
    \ tables_chapters_5_to_12)\n\n            if matched_pattern != null:\n      \
    \          # Шаг 5: Проверить правила соответствующей главы (5-12)\n         \
    \       validation_passed = validate_rules(group, matched_pattern)\n\n       \
    \         if validation_passed:\n                    # Группа идентифицирована\
    \ — может быть сжата (compacted)\n                    # в одну волну следующего\
    \ порядка\n                    compact_group(group, matched_pattern)\n"
  formalization_notes: "1. Правило описывает процедурный алгоритм (workflow), а не\
    \ числовое ограничение,\n   поэтому формализация представлена как последовательность\
    \ шагов.\n2. Критерий \"обособленности\" (isolate) группы не определён формально\
    \ в данном AKU —\n   он зависит от контекста структурных обозначений и смежных\
    \ волн.\n   Verbatim quote говорит лишь: \"можно изолировать группу волн, образующих\
    \ Серию\".\n3. Конкретные допустимые Структурные Серии (A-E) и правила проверки\n\
    \   содержатся в Главах 5-12 и должны быть формализованы в отдельных AKU.\n4.\
    \ Функция extract_structural_series() формирует строку вида \"F3-c3-L5\"\n   из\
    \ последовательности структурных меток моноволн в группе —\n   подтверждено verbatim\
    \ quote: серия \"F3-c3-L5\" выделена из группы волн.\n5. Размеры групп (3 или\
    \ 5) явно указаны в statement_ru."

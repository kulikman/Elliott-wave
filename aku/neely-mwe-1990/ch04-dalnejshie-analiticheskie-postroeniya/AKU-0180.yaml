statement_ru: 'Цикл 1: присвоить структурные обозначения всем моноволнам графика.
  Выделить обособленные группы из 3 или 5 моноволн, идентифицировать соответствующую
  Структурную Серию (A-E). Проверить правила Гл.5-12.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-5
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Цикл 1
  figure_id: null
  verbatim_quote:
    text: Используя Правила и методы, описанные в Главе 3, присваиваем Структурные
      обозначения всем моноволнам Рисунка 4-6. На отрезке... можно изолировать группу
      волн, образующих Серию "F3-c3-L5".
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется в начале процедуры группировки (Compaction), Цикл 1

    grouping_cycle == 1

    AND all_monowaves_have_structural_labels == true

    # т.е. каждая моноволна уже получила структурное обозначение по правилам Главы
    3

    '
  constraint: "# Цикл 1 процедуры группировки (Compaction):\n\n# Шаг 1: Все моноволны\
    \ уже имеют структурные обозначения (присвоены по Главе 3)\nfor each monowave\
    \ in chart:\n    assert monowave.structural_label != null  # например :F3, :c3,\
    \ :L5 и т.д.\n\n# Шаг 2: Выделить обособленные (isolatable) группы из 3 или 5\
    \ смежных моноволн\nisolated_groups = []\nfor i in range(0, len(monowaves)):\n\
    \    # Попытка группы из 3 моноволн\n    if i + 3 <= len(monowaves):\n       \
    \ group_3 = monowaves[i : i + 3]\n        if is_isolatable(group_3):\n       \
    \     isolated_groups.append(group_3)\n\n    # Попытка группы из 5 моноволн\n\
    \    if i + 5 <= len(monowaves):\n        group_5 = monowaves[i : i + 5]\n   \
    \     if is_isolatable(group_5):\n            isolated_groups.append(group_5)\n\
    \n# Шаг 3: Для каждой обособленной группы — извлечь Структурную Серию\n# и сопоставить\
    \ с допустимыми сериями (A, B, C, D, E) из таблиц Глав 5-12\nfor each group in\
    \ isolated_groups:\n    series_string = join(group[k].structural_label for k in\
    \ range(len(group)), separator=\"-\")\n    # Пример: \"F3-c3-L5\"\n\n    matched_pattern\
    \ = lookup_structural_series(series_string, tables_chapters_5_to_12)\n\n    if\
    \ matched_pattern != null:\n        # Проверить правила соответствующей главы\
    \ (5-12)\n        validation_passed = validate_rules(group, matched_pattern)\n\
    \n        if validation_passed:\n            # Группа идентифицирована — сжать\
    \ (compact) в одну волну следующего порядка\n            compact_group(group,\
    \ matched_pattern)\n"
  formalization_notes: "original_status: partially_formalizable. 1. Правило описывает\
    \ процедурный алгоритм (workflow Цикла 1), а не числовое ограничение,\n   поэтому\
    \ формализация представлена как последовательность шагов, а не как constraint.\n\
    2. Критерий \"обособленности\" (is_isolatable) группы НЕ определён формально в\
    \ данном AKU.\n   Verbatim quote говорит лишь \"можно изолировать группу волн\"\
    , без точного определения.\n   Это ключевой неформализованный элемент.\n3. Конкретные\
    \ допустимые Структурные Серии (A-E) и правила их проверки\n   содержатся в Главах\
    \ 5-12 и должны быть формализованы в отдельных AKU.\n4. Функция extract_structural_series\
    \ формирует строку вида \"F3-c3-L5\"\n   из последовательности структурных меток\
    \ моноволн — это подтверждено verbatim quote.\n5. Группы рассматриваются только\
    \ из 3 или 5 моноволн — это явно указано в statement_ru.\n6. Шаг compact_group\
    \ подразумевает замену группы моноволн одной волной более высок"

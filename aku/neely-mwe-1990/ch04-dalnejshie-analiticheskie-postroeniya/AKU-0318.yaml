statement_ru: 'Если последнее Структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
  и рассматривать как часть одной из Нестандартных фигур.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'если последнее Структурное обозначение Стандартной Коррективной Серии не
      содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
      и рассматривать как часть одной из Нестандартных фигур.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Имеем завершённую Стандартную Коррективную Серию (Standard Corrective
    Series)

    # из таблицы Рисунка 4-3 (Neely)

    series_type == ''standard_corrective_series''

    AND series_is_complete == true

    '
  constraint: "# Получаем последнее Структурное обозначение серии\nlast_label = series.structural_labels[LAST]\n\
    \n# Проверяем наличие Индикатора положения \"L\" в последнем обозначении\nIF last_label.position_indicator\
    \ != 'L':\n    # Последнее обозначение НЕ содержит \"L\"\n    # => Серия не является\
    \ валидной стандартной коррективной серией\n    # => Необходимо сжать всю серию\
    \ в одну \"тройку\" (:3)\n    compact_series_to(':3')\n    # Результат сжатия\
    \ рассматривается как часть одной из Нестандартных фигур\n    series.classification\
    \ = 'non_standard_pattern_component'\n"
  formalization_notes: "1. \"Стандартная Коррективная Серия\" — конкретный набор серий\
    \ из таблицы\n   Рисунка 4-3 (Neely), например :F3/:c3/:L5, :F3/:c3/:L3, :F3/:s5/:L3\
    \ и т.д.\n   Точный перечень определяется этой таблицей.\n2. \"Индикатор положения\
    \ L\" (Last) — маркер в структурном обозначении последней\n   моноволны серии,\
    \ указывающий на финальную позицию в паттерне.\n3. \"Сжать в тройку (:3)\" — вся\
    \ серия из нескольких моноволн заменяется одним\n   элементом со структурным значением\
    \ :3.\n4. Правило не уточняет, какие именно Нестандартные фигуры имеются в виду;\n\
    \   оно лишь указывает, что сжатый результат должен рассматриваться\n   как компонент\
    \ одной из них.\n5. Правило является обязательным (mandatory): если условие выполнено,\n\
    \   сжатие должно быть произведено безусловно."

statement_ru: 'Если последнее Структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
  и рассматривать как часть одной из Нестандартных фигур.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'если последнее Структурное обозначение Стандартной Коррективной Серии не
      содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
      и рассматривать как часть одной из Нестандартных фигур.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Имеем завершённую Стандартную Коррективную Серию (Standard Corrective
    Series)

    # Стандартные коррективные серии: например, :F3/:c3/:L5, :F3/:c3/:L3, :F3/:s5/:L3
    и т.д.

    series_type == ''standard_corrective_series''

    AND series_is_complete == true

    '
  constraint: "# Получаем последнее структурное обозначение серии\nlast_structure\
    \ = series.structural_labels[last_index]\n\n# Проверяем, содержит ли последнее\
    \ обозначение индикатор положения \"L\"\nIF last_structure.position_indicator\
    \ != 'L':\n    # Серия НЕ завершается на \"L\" — значит это не валидная стандартная\
    \ коррективная серия\n    # Необходимо сжать всю серию в одну \"тройку\" (:3)\n\
    \    compact_series_to_single_structure(series, compacted_value = ':3')\n    #\
    \ Результат сжатия рассматривается как часть одной из Нестандартных фигур\n  \
    \  series.classification = 'non_standard_pattern_component'\n    series.compacted\
    \ = true\n"
  formalization_notes: "1. \"Стандартная Коррективная Серия\" — конкретный набор серий\
    \ из таблицы Рисунка 4-3 (Neely).\n   Точный перечень стандартных коррективных\
    \ серий определяется этой таблицей.\n2. \"Индикатор положения L\" означает, что\
    \ структурное обозначение последней\n   моноволны серии содержит маркер \"L\"\
    \ (Last — последняя позиция в паттерне).\n3. \"Сжать в тройку (:3)\" — вся серия\
    \ из нескольких моноволн заменяется одним\n   элементом со структурным значением\
    \ :3.\n4. \"Нестандартные фигуры\" — конкретный перечень нестандартных паттернов\
    \ Эллиотта\n   (non-standard patterns) не уточняется в данном правиле; правило\
    \ лишь указывает,\n   что сжатый результат должен рассматриваться как их компонент."
aliases:

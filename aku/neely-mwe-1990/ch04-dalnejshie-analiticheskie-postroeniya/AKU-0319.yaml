statement_ru: 'Все фигуры Эллиота можно составлять только из подобных волн. Две последовательные
  волны подобны, если длина меньшей ≥ 1/3 длины большей (по цене) ИЛИ длительность
  меньшей ≥ 1/3 длительности большей (по времени). Достаточно одного из условий. Если
  ни одно условие не выполнено — волны разного Порядка и не могут быть частью одной
  фигуры без сжатия.

  '
source:
  book_id: neely-mwe-1990
  page: 4-3
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Правило подобия и баланса
  figure_id: null
  verbatim_quote:
    text: 'Все фигуры Эллиота можно составлять только из подобных волн. Цена: две
      последовательные волны подобны в ценовом отношении, если длина меньшей ≥ 1/3
      длины большей. Время: две смежные волны подобны во временном отношении, если
      длительность меньшей ≥ 1/3 длительности большей. Достаточно одного из условий.
      Если ни одно правило не выполнено — волны разного Порядка, требуется сжатие.

      '
    language: ru
formalization:
  status: draft
  applies_when: "# Применяется при группировке любых двух последовательных (смежных)\
    \ волн\n# в одну фигуру Эллиотта (импульс, коррекция и т.д.)\n# Проверяется для\
    \ КАЖДОЙ пары смежных волн внутри фигуры\nfor each pair (wave_a, wave_b) in pattern\n\
    \  where wave_a and wave_b are consecutive segments\n  AND they are candidates\
    \ for the same Elliott pattern\n"
  constraint: '# Длины по цене (абсолютная разница цен начала и конца волны)

    price_a = abs(price_end(wave_a) - price_start(wave_a))

    price_b = abs(price_end(wave_b) - price_start(wave_b))


    price_smaller = min(price_a, price_b)

    price_larger  = max(price_a, price_b)


    # Длительности по времени (количество баров или единиц времени)

    time_a = duration(wave_a)

    time_b = duration(wave_b)


    time_smaller = min(time_a, time_b)

    time_larger  = max(time_a, time_b)


    # Условие подобия по цене

    similar_by_price = (price_larger > 0) AND (price_smaller >= price_larger / 3)


    # Условие подобия по времени

    similar_by_time = (time_larger > 0) AND (time_smaller >= time_larger / 3)


    # Достаточно одного из двух условий

    are_similar = similar_by_price OR similar_by_time


    # Правило (mandatory): волны ДОЛЖНЫ быть подобны для включения в одну фигуру

    # Если are_similar == FALSE — волны разного Порядка (degree)

    # и НЕ могут быть частью одной фигуры без процедуры сжатия

    assert are_similar == TRUE

    '
  formalization_notes: "1. Правило проверяется для КАЖДОЙ пары последовательных волн\
    \ внутри фигуры,\n   например в импульсе: (1,2), (2,3), (3,4), (4,5).\n2. Если\
    \ условие не выполнено, исходный текст указывает на необходимость\n   процедуры\
    \ \"сжатия\" (compression) — волны разного Порядка (degree).\n   Сама процедура\
    \ сжатия здесь не формализована.\n3. \"Длина\" волны по цене — абсолютная разница\
    \ цен начала и конца волны,\n   что следует из verbatim_quote (\"длина меньшей\
    \ ≥ 1/3 длины большей\").\n4. Порог 1/3 взят буквально из правила: smaller >=\
    \ larger / 3.\n5. Правило является необходимым условием (mandatory) для группировки\
    \ —\n   нарушение запрещает объединение волн в одну фигуру без сжатия."

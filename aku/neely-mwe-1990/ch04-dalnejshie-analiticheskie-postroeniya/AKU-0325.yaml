statement_ru: 'Если обнаружена серия :5-:F3-:L5, образующая предполагаемый Зигзаг,
  и при этом объединение двух предшествующих волн с этим Зигзагом может образовать
  Импульс, то необходимо сначала проверить импульсную гипотезу (по Правилам Гл. 5-12).
  Если Импульс удовлетворяет всем правилам построения — принять его; если хотя бы
  одно правило нарушается — вернуться к сценарию Зигзага.

  '
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Зигзаг или Импульс?
  figure_id: 4-9
  verbatim_quote:
    text: 'Если объединение двух предшествующих волн с Зигзагом может образовать Импульс
      — проверь импульсную гипотезу (Правила Гл.5-12) ПЕРЕД тем как принять Зигзаг.
      Если Импульс удовлетворяет всем Правилам построения — остановись на нём; если
      нарушается — вернись к сценарию Зигзага.

      '
    language: ru

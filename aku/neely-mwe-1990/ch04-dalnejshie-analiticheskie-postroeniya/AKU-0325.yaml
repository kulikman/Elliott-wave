statement_ru: 'Если обнаружена серия :5-:F3-:L5, образующая предполагаемый Зигзаг,
  и при этом объединение двух предшествующих волн с этим Зигзагом может образовать
  Импульс, то необходимо сначала проверить импульсную гипотезу (по Правилам Гл. 5-12).
  Если Импульс удовлетворяет всем правилам построения — принять его; если хотя бы
  одно правило нарушается — вернуться к сценарию Зигзага.

  '
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Зигзаг или Импульс?
  figure_id: 4-9
  verbatim_quote:
    text: 'Если объединение двух предшествующих волн с Зигзагом может образовать Импульс
      — проверь импульсную гипотезу (Правила Гл.5-12) ПЕРЕД тем как принять Зигзаг.
      Если Импульс удовлетворяет всем Правилам построения — остановись на нём; если
      нарушается — вернись к сценарию Зигзага.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружена серия из трёх последовательных волн (моно- или поливолн)

    # с структурными метками :5, :F3, :L5

    series = [wave_A, wave_B, wave_C]

    wave_A.structure_label == '':5''

    AND wave_B.structure_label == '':F3''

    AND wave_C.structure_label == '':L5''


    # Эта серия образует предполагаемый Зигзаг (5-3-5)

    AND is_candidate_zigzag(series)


    # Существуют две предшествующие волны перед этой серией

    AND exists(prev_wave_2) AND exists(prev_wave_1)

    # prev_wave_2 идёт раньше, prev_wave_1 — непосредственно перед wave_A


    # Объединение [prev_wave_2, prev_wave_1, group_as_one(series)]

    # потенциально может образовать Импульс (три волны импульса, например 3-4-5 или
    1-2-3)

    AND can_form_impulse_candidate(prev_wave_2, prev_wave_1, group_as_one(series))

    '
  constraint: "# Шаг 1: Сгруппировать серию :5-:F3-:L5 в единую волну (предполагаемый\
    \ Зигзаг)\nzigzag_grouped = group_as_one(series)\n\n# Шаг 2: Сформировать импульсную\
    \ гипотезу из двух предшествующих волн + сгруппированный Зигзаг\nimpulse_candidate\
    \ = build_impulse_hypothesis(prev_wave_2, prev_wave_1, zigzag_grouped)\n\n# Шаг\
    \ 3: Проверить импульсную гипотезу по ВСЕМ правилам построения (Главы 5-12)\n\
    # Это должно быть сделано ПЕРЕД принятием Зигзага\nimpulse_valid = validate_impulse_rules_ch5_to_ch12(impulse_candidate)\n\
    \n# Шаг 4: Принять решение на основе результата проверки\nIF impulse_valid:\n\
    \    # Все правила импульса выполнены — принять Импульс\n    accept_pattern(impulse_candidate,\
    \ type='impulse')\n    reject_pattern(series, type='zigzag')\nELSE:\n    # Хотя\
    \ бы одно правило импульса нарушено — вернуться к сценарию Зигзага\n    reject_pattern(impulse_candidate,\
    \ type='impulse')\n    accept_pattern(series, type='zigzag')\n"
  formalization_notes: "1. Правило является процедурным: оно задаёт ПОРЯДОК проверки\
    \ гипотез —\n   импульсная гипотеза должна быть проверена ПЕРЕД принятием зигзага.\n\
    2. \"Две предшествующие волны\" — их точная природа (моноволны, поливолны,\n \
    \  конкретные структурные метки) НЕ уточнена в исходном правиле.\n   Предполагается,\
    \ что они уже присутствуют в текущей структурной серии.\n3. Конкретный способ\
    \ объединения (какие именно позиции импульса занимают\n   prev_wave_2, prev_wave_1\
    \ и сгруппированный зигзаг — например, волны 1-2-3\n   или 3-4-5) зависит от контекста\
    \ и НЕ детализирован в данном AKU.\n4. \"Правила Гл. 5-12\" — полный набор правил\
    \ построения импульсных паттернов"

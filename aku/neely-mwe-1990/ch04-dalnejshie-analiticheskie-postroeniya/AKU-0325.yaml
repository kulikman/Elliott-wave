statement_ru: 'Если обнаружена серия :5-:F3-:L5, образующая предполагаемый Зигзаг,
  и при этом объединение двух предшествующих волн с этим Зигзагом может образовать
  Импульс, то необходимо сначала проверить импульсную гипотезу (по Правилам Гл. 5-12).
  Если Импульс удовлетворяет всем правилам построения — принять его; если хотя бы
  одно правило нарушается — вернуться к сценарию Зигзага.

  '
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Зигзаг или Импульс?
  figure_id: 4-9
  verbatim_quote:
    text: 'Если объединение двух предшествующих волн с Зигзагом может образовать Импульс
      — проверь импульсную гипотезу (Правила Гл.5-12) ПЕРЕД тем как принять Зигзаг.
      Если Импульс удовлетворяет всем Правилам построения — остановись на нём; если
      нарушается — вернись к сценарию Зигзага.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружена серия из трёх последовательных моноволн/поливолн

    # с структурными метками :5, :F3, :L5

    series = [wave_A, wave_B, wave_C]

    wave_A.structure_label == '':5''

    AND wave_B.structure_label == '':F3''

    AND wave_C.structure_label == '':L5''

    # Эта серия образует предполагаемый Зигзаг (5-3-5)

    AND is_candidate_zigzag(series)

    # Существуют две предшествующие волны перед этой серией

    AND exists(prev_wave_1) AND exists(prev_wave_2)

    # где prev_wave_2 — более ранняя, prev_wave_1 — непосредственно перед wave_A

    # Объединение [prev_wave_1, prev_wave_2, zigzag_as_single_wave]

    # потенциально может образовать 3-волновую структуру Импульса (волны 3-4-5 или
    1-2-3)

    AND can_form_impulse_candidate(prev_wave_2, prev_wave_1, group_as_one(series))

    '
  constraint: "# Шаг 1: Сформировать импульсную гипотезу\nimpulse_candidate = build_impulse_hypothesis(prev_wave_2,\
    \ prev_wave_1, group_as_one(series))\n\n# Шаг 2: Проверить импульсную гипотезу\
    \ по всем правилам построения (Главы 5-12)\nimpulse_valid = validate_impulse_rules_ch5_to_ch12(impulse_candidate)\n\
    \n# Шаг 3: Принять решение\nIF impulse_valid:\n    # Принять Импульс, отклонить\
    \ Зигзаг\n    accept_pattern(impulse_candidate, type='impulse')\n    reject_pattern(series,\
    \ type='zigzag')\nELSE:\n    # Хотя бы одно правило импульса нарушено — вернуться\
    \ к сценарию Зигзага\n    reject_pattern(impulse_candidate, type='impulse')\n\
    \    accept_pattern(series, type='zigzag')\n"
  formalization_notes: "1. Правило описывает приоритет проверки: импульсная гипотеза\
    \ должна быть\n   проверена ПЕРЕД принятием зигзага, т.е. это процедурное правило\
    \ порядка\n   группировки.\n2. \"Две предшествующие волны\" — точная природа этих\
    \ волн (моноволны, поливолны,\n   их структурные метки) не уточнена в исходном\
    \ правиле. Предполагается, что\n   они уже присутствуют в текущей структурной\
    \ серии.\n3. Конкретный способ объединения (какие именно волны импульса формируются\
    \ из\n   prev_wave_2, prev_wave_1 и сгруппированного зигзага) зависит от контекста\n\
    \   и не детализирован в данном AKU.\n4. \"Правила Гл. 5-12\" — это полный набор\
    \ правил построения импульсных паттернов\n   по Нили, их конкретный перечень здесь\
    \ не раскрывается, но подразумевается\n   вызов полной валидации."

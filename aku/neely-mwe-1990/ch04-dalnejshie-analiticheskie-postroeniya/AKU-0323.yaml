id: AKU-0323
type: rule
strength: conditional
status: verified
topic: rule-of-similarity
subtopics:
- wave-degree
statement_ru: 'Если длина меньшей из двух последовательных волн составляет не менее
  1/3 длины большей (ценовое подобие) ИЛИ длительность меньшей составляет не менее
  1/3 длительности большей (временное подобие), то волны подобны и МОГУТ быть одного
  Порядка. Достаточно выполнения одного из двух условий. Однако это условие необходимое,
  но не достаточное.

  '
source:
  book_id: neely-mwe-1990
  page: 4-3
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Правило подобия и баланса
  figure_id: null
  verbatim_quote:
    text: 'Цена: две последовательные волны подобны в ценовом отношении, если длина
      меньшей ≥ 1/3 длины большей. Время: две смежные волны подобны во временном отношении,
      если длительность меньшей ≥ 1/3 длительности большей. Достаточно одного из условий.
      Соответствие НЕОБХОДИМО, но НЕдостаточно для одного Порядка (волны лишь МОГУТ
      быть одного Порядка).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Для любых двух последовательных (смежных) волн wave_A и wave_B,

    # когда нужно определить, могут ли они быть одного Порядка (degree)

    is_consecutive(wave_A, wave_B)

    '
  constraint: "# Вычисляем ценовые длины и временные длительности\nprice_A = abs(end_price(wave_A)\
    \ - start_price(wave_A))\nprice_B = abs(end_price(wave_B) - start_price(wave_B))\n\
    duration_A = end_time(wave_A) - start_time(wave_A)\nduration_B = end_time(wave_B)\
    \ - start_time(wave_B)\n\nsmaller_price = min(price_A, price_B)\nlarger_price\
    \ = max(price_A, price_B)\nsmaller_duration = min(duration_A, duration_B)\nlarger_duration\
    \ = max(duration_A, duration_B)\n\n# Условие ценового подобия: меньшая >= 1/3\
    \ большей\nprice_similar = (larger_price > 0) AND (smaller_price >= larger_price\
    \ / 3)\n\n# Условие временного подобия: меньшая >= 1/3 большей\ntime_similar =\
    \ (larger_duration > 0) AND (smaller_duration >= larger_duration / 3)\n\n# Достаточно\
    \ выполнения одного из двух условий\nwaves_are_similar = price_similar OR time_similar\n\
    \n# Необходимое, но НЕ достаточное условие для одного Порядка:\n# Если НЕ подобны\
    \ — волны точно НЕ могут быть одного Порядка\nIF NOT waves_are_similar THEN\n\
    \  same_degree_possible(wave_A, wave_B) = FALSE  # жёсткий запрет\n\n# Если подобны\
    \ — волны лишь МОГУТ быть одного Порядка (нужны доп. проверки)\nIF waves_are_similar\
    \ THEN\n  same_degree_possible(wave_A, wave_B) = UNDETERMINED  # необходимое условие\
    \ выполнено, но не достаточное\n"
  formalization_notes: "Правило conditional — рекомендация Нили, а не абсолютный закон.\n\
    Логика «необходимое, но не достаточное»:\n- Нарушение (NOT similar) → жёсткий\
    \ запрет на одинаковый Порядок.\n- Выполнение (similar) → волны лишь МОГУТ быть\
    \ одного Порядка,\n  требуются дополнительные проверки для окончательного подтверждения.\n\
    Формализация строго следует statement_ru и verbatim_quote."

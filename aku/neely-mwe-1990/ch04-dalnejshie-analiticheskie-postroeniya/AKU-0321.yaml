id: AKU-0321
type: rule
strength: conditional
status: verified
topic: structural-series
subtopics:
- compaction
- grouping-procedure
statement_ru: 'Если последнее Структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
  и рассматривать как часть одной из Нестандартных фигур.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'если последнее Структурное обозначение Стандартной Коррективной Серии не
      содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
      и рассматривать как часть одной из Нестандартных фигур.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Имеем завершённую Стандартную Коррективную Серию (из таблицы Рисунок
    4-3)

    series_type == ''standard_corrective''

    AND series_is_complete == true


    # Извлекаем последнее структурное обозначение серии

    last_label = series.structure_labels[LAST]


    # Последнее структурное обозначение НЕ содержит индикатор положения "L"

    AND NOT contains(last_label.position_indicator, ''L'')

    '
  constraint: '# 1. Сжать (compact) всю Стандартную Коррективную Серию в единый сегмент

    #    с присвоением структурного обозначения :3 ("тройка")

    compacted_segment = compact(series)

    compacted_segment.structure_label = '':3''


    # 2. Пометить сжатый сегмент как часть Нестандартной фигуры

    compacted_segment.parent_pattern_type = ''non_standard''


    # 3. Сжатый сегмент заменяет исходную серию и далее участвует

    #    в процедуре группировки Нестандартных фигур

    replace_series_with(series, compacted_segment)

    '
  formalization_notes: "1. \"Стандартная Коррективная Серия\" — конкретный набор серий\
    \ из таблицы\n   Рисунок 4-3 (например :F3/:c3/:F3, :F3/:s5/:L3 и т.д.).\n   Алгоритм\
    \ должен иметь полный перечень таких серий для проверки series_type.\n2. Индикатор\
    \ положения \"L\" (Last) означает, что волна находится в последней\n   позиции\
    \ коррективной фигуры. Его отсутствие сигнализирует, что серия\n   не завершает\
    \ стандартную коррекцию и требует сжатия.\n3. Правило conditional: применяется\
    \ ТОЛЬКО когда последнее обозначение\n   не содержит \"L\". Если \"L\" присутствует\
    \ — серия интерпретируется стандартно,\n   сжатие не выполняется.\n4. Конкретный\
    \ перечень Нестандартных фигур, частью которых может стать\n   сжатая :3, в данном\
    \ правиле не уточняется — определяется дальнейшими\n   правилами группировки (связанные\
    \ AKU не указаны в источнике).\n5. Операция compact() объединяет все моноволны/поливолны\
    \ серии в один\n   сегмент, охватывающий ценовой диапазон и временной интервал\
    \ всей серии."
aliases:
- правило сжатия коррективной серии без L

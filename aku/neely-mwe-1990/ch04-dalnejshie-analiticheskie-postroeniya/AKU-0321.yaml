id: AKU-0321
type: rule
strength: conditional
status: verified
topic: structural-series
subtopics:
- compaction
- grouping-procedure
statement_ru: 'Если последнее Структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
  и рассматривать как часть одной из Нестандартных фигур.

  '
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Chapter 4: Further Analytical Constructions'
  section: Структурные Серии — Таблица (Рисунок 4-3)
  figure_id: null
  verbatim_quote:
    text: 'если последнее Структурное обозначение Стандартной Коррективной Серии не
      содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
      и рассматривать как часть одной из Нестандартных фигур.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Имеем завершённую Стандартную Коррективную Серию (Standard Corrective
    Series)

    series_type == ''standard_corrective''

    AND series_is_complete == true

    # Последнее структурное обозначение в серии НЕ содержит индикатор положения "L"

    last_structure_label = series.labels[last]

    AND NOT contains(last_structure_label.position_indicator, ''L'')

    '
  constraint: '# Сжать всю серию в одну "тройку" (:3)

    compact(series) -> single_segment with structure_label = '':3''


    # Рассматривать результат сжатия как часть одной из Нестандартных фигур

    parent_pattern_type = ''non_standard''


    # Сжатый сегмент :3 становится одной моноволной/поливолной

    # и используется далее в контексте группировки Нестандартных фигур

    '
  formalization_notes: "1. \"Стандартная Коррективная Серия\" — конкретный набор серий\
    \ из таблицы Рисунок 4-3\n   (например, :F3/:c3/:F3, :F3/:s5/:L3 и т.д.). Алгоритм\
    \ должен знать полный\n   перечень таких серий для проверки series_type.\n2. Индикатор\
    \ положения \"L\" (Last) означает, что волна находится в последней\n   позиции\
    \ коррективной фигуры. Его отсутствие сигнализирует, что серия\n   не завершает\
    \ стандартную коррекцию.\n3. Правило conditional — применяется только когда последнее\
    \ обозначение\n   не содержит \"L\"; если \"L\" присутствует, серия интерпретируется\
    \ стандартно.\n4. Конкретный перечень \"Нестандартных фигур\", частью которых\
    \ может стать\n   сжатая :3, в данном правиле не уточняется — это определяется\n\
    \   дальнейшими правилами группировки."
aliases:
- правило сжатия коррективной серии без L

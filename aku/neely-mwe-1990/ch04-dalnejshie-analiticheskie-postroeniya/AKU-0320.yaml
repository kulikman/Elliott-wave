statement_ru: 'При обнаружении серии :5-:F3-:L5, которая может быть как Зигзагом,
  так и тремя последними сегментами Импульса, всегда необходимо сначала проверить
  гипотезу Импульса. Если Импульс удовлетворяет всем Правилам построения — принимается
  импульсный счёт; если нарушается хотя бы одно правило — возвращаемся к сценарию
  Зигзага.

  '
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Зигзаг или Импульс?
  figure_id: null
  verbatim_quote:
    text: 'Правило: всегда сначала проверяй гипотезу Импульса. Обращай внимание на
      два предшествующих Зигзагу структурных обозначения. Если объединение двух предшествующих
      волн с Зигзагом может образовать Импульс — проверь импульсную гипотезу ПЕРЕД
      тем как принять Зигзаг. Если Импульс удовлетворяет всем Правилам построения
      — остановись на нём; если нарушается — вернись к сценарию Зигзага.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружена серия из трёх последовательных сегментов со структурными
    обозначениями :5, :F3, :L5

    # которая может интерпретироваться как Зигзаг (a-b-c)

    # И перед ней существуют два предшествующих сегмента, которые вместе с серией

    # могут образовать 5-волновой Импульс (волны 1-2-3-4-5)


    series_labels = [segment[i].structure_label, segment[i+1].structure_label, segment[i+2].structure_label]

    is_zigzag_candidate = (series_labels == [:5, :F3, :L5])


    preceding_segments_exist = segment[i-2] EXISTS AND segment[i-1] EXISTS


    candidate_impulse_segments = [segment[i-2], segment[i-1], segment[i], segment[i+1],
    segment[i+2]]

    can_form_impulse = preceding_segments_exist AND could_form_impulse(candidate_impulse_segments)


    APPLIES WHEN is_zigzag_candidate AND can_form_impulse

    '
  constraint: "# Процедурное правило приоритета: всегда сначала проверять гипотезу\
    \ Импульса\n\n# Шаг 1: Сформировать гипотезу Импульса из 5 сегментов\nimpulse_hypothesis\
    \ = build_impulse(\n  wave_1 = segment[i-2],\n  wave_2 = segment[i-1],\n  wave_3\
    \ = segment[i],      # :5\n  wave_4 = segment[i+1],    # :F3\n  wave_5 = segment[i+2]\
    \     # :L5\n)\n\n# Шаг 2: Проверить ВСЕ обязательные правила построения Импульса\n\
    impulse_valid = validate_all_mandatory_rules(impulse_hypothesis, pattern='impulse')\n\
    \n# Шаг 3: Принять решение на основе результата проверки\nIF impulse_valid:\n\
    \  # Импульс удовлетворяет всем правилам — принять импульсный счёт\n  accepted_pattern\
    \ = impulse_hypothesis\n  # Серия :5-:F3-:L5 НЕ группируется как отдельный Зигзаг,\n\
    \  # а входит в состав Импульса как волны 3-4-5\nELSE:\n  # Хотя бы одно обязательное\
    \ правило Импульса нарушено — вернуться к Зигзагу\n  zigzag_hypothesis = build_zigzag(\n\
    \    wave_a = segment[i],      # :5\n    wave_b = segment[i+1],    # :F3\n   \
    \ wave_c = segment[i+2]     # :L5\n  )\n  accepted_pattern = zigzag_hypothesis\n"
  formalization_notes: "1. Это процедурное правило приоритета проверки гипотез, а\
    \ не структурное\n   ограничение на пропорции или позиции волн. Оно определяет\
    \ ПОРЯДОК\n   рассмотрения альтернативных интерпретаций.\n2. Правило предполагает,\
    \ что перед серией :5-:F3-:L5 существуют ровно два\n   предшествующих сегмента,\
    \ которые могут быть волнами 1 и 2 Импульса.\n   Конкретные структурные обозначения\
    \ этих двух предшествующих сегментов\n   в исходном правиле не уточняются — сказано\
    \ лишь «два предшествующих\n   Зигзагу структурных обозначения».\n3. Функция could_form_impulse()\
    \ —"

statement_ru: >
  Ограничивающие vs Неограничивающие Треугольники: Ограничивающие — e-волна
  завершается задолго до вершины (apex); выброс ограничен самой широкой стороной
  (±25%). Неограничивающие — рынок сужается прямо к точке пересечения (apex)
  линий тренда; выброс неограничен. Вершина Ограничивающего: во временной зоне
  20–40% длины Треугольника, прибавленной к концу e (тенденция к 38.2% = 0.618²).
  Общие правила: d НИКОГДА не крупнейшая волна; 3 стороны не могут быть равны (±5%).
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-19
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Треугольники / Сужающиеся / Ограничивающие
  figure_id: '11-23,11-24,11-25'
  verbatim_quote:
    text: >
      Все Ограничивающие Треугольники имеют очень похожее строение. Одна из наиболее
      важных их характеристик — волна-е, представляющая конец Треугольника,
      завершается задолго до достижения вершины данного Треугольника... Вершина
      Треугольника должна сформироваться во временной зоне, равной 20-40% временной
      длины всего Треугольника, прибавленной к концу волны-е... В Ограничивающих
      Треугольниках выброс обычно ограничен величиной самой широкой стороны
      Треугольника (плюс/минус 25%).
    language: ru
formalization:
  status: draft
  applies_when: triangle classification as Limiting vs Non-Limiting
  constraint: >
    limiting: e_wave ends well before apex ;
    limiting: thrust <= widest_segment * 1.25 ;
    limiting: apex_time = end_e + (0.20..0.40) * triangle_temporal_length ;
    non_limiting: market converges to apex ;
    non_limiting: thrust > widest_segment (unlimited) ;
    general: Wd never largest ; no 3 sides equal (±5%)
  formalization_notes: 'Рис.11-23..11-25, 11-27. Вершина тяготеет к 0.618² = 38.2%.'

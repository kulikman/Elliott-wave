id: AKU-0242
type: rule
strength: mandatory
status: draft
topic: impulse
subtopics:
- impulse-extension
- motion-labels
statement_ru: >
  Неудавшаяся 5-я волна возможна ТОЛЬКО при одном из условий: (A) Импульсная фигура
  сама является 5-й волной более крупного Импульса; (B) Импульсная фигура является
  c-волной на один Порядок выше; (C) Крайне редко — более крупная 3-я волна
  испытывает Неудачу (рынок формирует значительную вершину/дно). Как правило,
  Неудачи W5 возможны только когда W3 представляет собой Растянутое движение.
  W4 должна быть более сложной из двух корректирующих фаз. W1 и W5 почти всегда
  будут практически идентичны по цене и времени.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-4
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Трендовые Импульсы / Неудавшаяся пятая волна
  figure_id: '11-1,11-2'
  verbatim_quote:
    text: >
      Как правило, Неудачи 5-й волны возможны только тогда, когда 3-я волна
      представляет собой Растянутое движение. 4-я волна должна быть более сложной
      из двух корректирующих фаз... В Импульсной фигуре 5-я волна может оказаться
      Неудавшейся только при одном из следующих обстоятельств: A. Если данная
      Импульсная фигура сама является 5-й волной более крупной Импульсной фигуры.
      B. Если данная Импульсная фигура является с-волной на один Порядок выше.
    language: ru
formalization:
  status: draft
  applies_when: impulse with potential wave-5 failure
  constraint: >
    W5_failure REQUIRES one_of(
      impulse_is_W5_of_larger_impulse,
      impulse_is_c_wave_one_degree_higher,
      rare_W3_failure_at_major_top_bottom
    ) ;
    W3_must_be_extended ;
    W4_more_complex_than_W2 ;
    W1 ≈ W5 (price and time)
  formalization_notes: 'Рис.11-1/11-2. Условие C — крайне редко.'

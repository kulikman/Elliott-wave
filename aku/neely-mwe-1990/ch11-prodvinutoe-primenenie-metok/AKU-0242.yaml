statement_ru: 'Неудавшаяся 5-я волна возможна ТОЛЬКО при одном из условий: (A) Импульсная
  фигура сама является 5-й волной более крупного Импульса; (B) Импульсная фигура является
  c-волной на один Порядок выше; (C) Крайне редко — более крупная 3-я волна испытывает
  Неудачу (рынок формирует значительную вершину/дно). Как правило, Неудачи W5 возможны
  только когда W3 представляет собой Растянутое движение. W4 должна быть более сложной
  из двух корректирующих фаз. W1 и W5 почти всегда будут практически идентичны по
  цене и времени.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-4
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Трендовые Импульсы / Неудавшаяся пятая волна
  figure_id: 11-1,11-2
  verbatim_quote:
    text: 'Как правило, Неудачи 5-й волны возможны только тогда, когда 3-я волна представляет
      собой Растянутое движение. 4-я волна должна быть более сложной из двух корректирующих
      фаз... В Импульсной фигуре 5-я волна может оказаться Неудавшейся только при
      одном из следующих обстоятельств: A. Если данная Импульсная фигура сама является
      5-й волной более крупной Импульсной фигуры. B. Если данная Импульсная фигура
      является с-волной на один Порядок выше.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется когда в импульсной фигуре волна 5 является
    "неудавшейся"

    # (т.е. не превышает экстремум волны 3)

    pattern == ''impulse''

    AND W5_is_failure == true

    # Неудавшаяся W5: в бычьем импульсе high(W5) < high(W3),

    #                  в медвежьем импульсе low(W5) > low(W3)

    '
  constraint: "# === УСЛОВИЕ A: Необходимое условие контекста (mandatory) ===\n# Неудавшаяся\
    \ W5 возможна ТОЛЬКО при выполнении хотя бы одного из:\ncontext_valid = (\n  #\
    \ A. Импульсная фигура сама является 5-й волной более крупного Импульса\n  (parent_wave_label\
    \ == 'W5' AND parent_pattern == 'impulse')\n  OR\n  # B. Импульсная фигура является\
    \ c-волной на один Порядок выше\n  (parent_wave_label == 'c' AND parent_degree\
    \ == current_degree + 1)\n  OR\n  # C. Крайне редко — более крупная 3-я волна\
    \ испытывает Неудачу\n  #    (рынок формирует значительную вершину/дно)\n  (parent_wave_label\
    \ == 'W3' AND parent_W3_is_failure == true\n   AND is_major_top_or_bottom == true)\n\
    )\nREQUIRE context_valid == true\n\n# === УСЛОВИЕ B: W3 должна быть растянутой\
    \ (как правило / mandatory) ===\n# Неудачи W5 возможны только когда W3 — Растянутое\
    \ движение\nREQUIRE W3_is_extended == true\n\n# === УСЛОВИЕ C: W4 более сложная\
    \ чем W2 (mandatory) ===\n# W4 должна быть более сложной из двух корректирующих\
    \ фаз\nREQUIRE complexity(W4) > complexity(W2)\n\n# === УСЛОВИЕ D: W1 ≈ W5 по\
    \ цене и времени (conditional) ===\n# W1 и W5 почти всегда будут практически идентичны\
    \ по цене и времени\nprice_ratio = price_distance(W5) / price_distance(W1)\ntime_ratio\
    \ = duration(W5) / duration(W1)\nEXPECT price_ratio >= 0.85 AND price_ratio <=\
    \ 1.15\nEXPECT time_ratio >= 0.85 AND time_ratio <= 1.15\n"
  formalization_notes: "1. Условие C (parent_W3_failure at major top/bottom) описано\
    \ как \"крайне редко\" —\n   оно присутствует в statement_ru, но НЕ подтверждено\
    \ в verbatim_quote.\n   В verbatim_quote явно указаны только условия A и B.\n\
    2. \"Как правило\" перед условием о растянутой W3 может означать сильную тенденцию,\n\
    \   а не абсолютное правило, но в statement_ru это подано как обязательное условие.\n\
    3. \"Почти всегда\" для W1 ≈ W5 — используем EXPECT (conditional), а не REQUIRE.\n\
    \   Пороги 0.85–1.15 условные, в источнике точные допуски не указаны.\n4. complexity()\
    \ — функция оценки сложности паттерна (количество подволн,\n   тип коррекции и\
    \ т.д.), требует отдельного определения.\n5. Рис. 11-1 и 11-2 иллюстрируют бычий\
    \ и медвежий варианты неудавшейся"

id: AKU-0244
type: rule
strength: mandatory
status: verified
topic: flat
subtopics:
- retracement
- wave-identification
statement_ru: 'Неправильная Плоская: минимальные требования — b ≥ 101% a и c ≥ 101%
  b. Максимальный предел b: ≤ 138.2% a. Если b > 138.2% a → это Неправильная Неудавшаяся
  (c скорее всего не откатится до начального уровня b; c будет Корректирующой :3,
  а не Импульсной :5). b в Неправильной Коррекции ДОЛЖНА сегментировать сильнее, чем
  a. Пока b ≤ 123.6% a → сохраняется возможность выхода c за конечный уровень a.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-15
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Коррекции / Плоские / Неправильная / Неправильная Неудавшаяся
  figure_id: 11-17,11-18,11-19,11-20,11-21
  verbatim_quote:
    text: 'Минимальные Требования: 1. Волна-b должна быть не меньше 101% волны-а.
      2. Волна-с должна быть не меньше 101% волны-b... Волна-b не должна превышать
      138.2% длины волны-а. Если она превышает эту величину, данная волна, вероятно,
      не будет Неправильной, а будет Неправильной Неудавшейся... Если b-волна превышает
      138.2% волны-а, волна-с скорее всего не откатится до начального уровня волны-b.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Идентификация Неправильной Плоской коррекции (Irregular Flat)

    pattern == ''flat'' AND

    subtype_candidate == ''irregular'' AND

    waves_identified == [''a'', ''b'', ''c'']

    '
  constraint: "Wa = price_length(wave_a)\nWb = price_length(wave_b)\nWc = price_length(wave_c)\n\
    \n# === Минимальные требования для Неправильной Плоской ===\n# 1. Волна-b должна\
    \ быть не меньше 101% волны-a\nREQUIRE Wb >= 1.01 * Wa\n\n# 2. Волна-c должна\
    \ быть не меньше 101% волны-b\nREQUIRE Wc >= 1.01 * Wb\n\n# === Максимальный предел\
    \ b для классической Неправильной ===\n# Волна-b не должна превышать 138.2% волны-a\n\
    # Если превышает — переклассификация в Неправильную Неудавшуюся\nIF Wb > 1.382\
    \ * Wa THEN\n    reclassify subtype -> 'irregular_failure'\n    # Волна-c скорее\
    \ всего НЕ откатится до начального уровня волны-b\n    SET expectation: end_of_c\
    \ NOT_BEYOND start_of_b\n    # Волна-c будет Корректирующей (:3), а не Импульсной\
    \ (:5)\n    SET wave_c.structure = 'corrective_3'  # НЕ 'impulsive_5'\nEND IF\n\
    \n# === Сегментация b относительно a ===\n# b в Неправильной Коррекции ДОЛЖНА\
    \ сегментировать сильнее, чем a\nREQUIRE segment_count(wave_b) > segment_count(wave_a)\n\
    \n# === Порог 123.6% для оценки поведения c ===\nIF Wb <= 1.236 * Wa THEN\n  \
    \  # Сохраняется возможность, что c выйдет за конечный уровень a\n    SET flag:\
    \ c_may_exceed_end_of_a = TRUE\nEND IF\n"
  formalization_notes: "1. Рис. 11-17..11-21. Ключевой порог 138.2% для b-волны разделяет\n\
    \   классическую Неправильную и Неправильную Неудавшуюся.\n2. \"Сегментировать\
    \ сильнее\" (segment_count) — означает, что wave_b\n   должна иметь больше подволн/сегментов,\
    \ чем wave_a. Точный метод\n   подсчёта сегментации зависит от реализации (monowave\
    \ count или\n   subwave count).\n3. Правило о c_may_exceed_end_of_a при Wb <=\
    \ 1.236*Wa — это\n   вероятностная оценка, а не жёсткое ограничение.\n4. Переклассификация\
    \ в irregular_failure при Wb > 1.382*Wa и\n   ожидание corrective :3 для wave_c\
    \ — вероятностные характеристики\n   (\"скорее всего\", \"вероятно\"), но указаны\
    \ в источнике достаточно\n   определённо для использования как ориентир."

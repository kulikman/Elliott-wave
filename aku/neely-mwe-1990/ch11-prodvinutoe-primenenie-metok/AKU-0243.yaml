id: AKU-0243
type: rule
strength: mandatory
status: draft
topic: flat
subtopics:
- motion-labels
- wave-identification
statement_ru: >
  Позиции Меток Движения для вариаций Плоских: Обыкновенная — любая 2, 4, a, b,
  c/d/e Горизонтального Треугольника. Неправильная — аналогично. Удлинённая —
  практически только как часть Треугольника (1/3/5 Терминала; a/b/c/d Гориз.Треуг.;
  e Расширяющегося). Неправильная Неудавшаяся — 2, 4 (до Растянутой); b (до
  Удлинённой c или Зигзага с c ≥ 161.8% a). Подвижная — только W2 (перед Растянутой
  3-й), W4 (перед Растянутой 5-й — редко), b (перед Удлинённой c-волной).
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-11
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Коррекции / Плоские
  figure_id: null
  verbatim_quote:
    text: >
      Обыкновенная может возникать практически в любое время в последовательности,
      где эта фигура должна быть корректирующой... Самая мощная Стандартная
      Коррекция, Подвижная, налагает очень специфические требования на последующую
      рыночную активность. Принципиально важно, что движение после Подвижной
      коррекции растет (снижается) быстрее, чем волна (того же Порядка),
      непосредственно предшествующая этой Подвижной Коррекции.
    language: ru
formalization:
  status: draft
  applies_when: identifying flat correction type by position in wave structure
  constraint: >
    regular_flat: positions = {W2, W4, Wa, Wb, Wc_d_e_horizontal_triangle} ;
    elongated_flat: positions = {W1_3_5_terminal, Wa_b_c_d_horiz_triangle, We_expanding} ;
    irregular_failure: positions = {W2_W4_before_extension, Wb_before_elongated_c} ;
    running_flat: positions = {W2_before_ext3, W4_before_ext5_rare, Wb_before_elongated_c} ;
    running_flat POST: next_segment_must_be_longest_of_completed_figure
  formalization_notes: 'стр.11-11..11-17. Удлинённая — важный сигнал раннего оповещения о Треугольнике.'

statement_ru: 'Расширяющиеся Треугольники: 8 ключевых параметров. (1) Либо a, либо
  b — наименьший сегмент. (2) e-волна «разряжается» — намного длиннее других. (3)
  Как Сужающийся может быть e-волной более крупного Сужающегося, так и Расширяющийся
  может быть e-волной более крупного Расширяющегося. (4) Каждая волна от простого
  к сложному. (5) Фигура после Треугольника (c или W5) ≤ начального уровня e. (6)
  ОТСУТСТВИЕ Фибоначчи-соотношений = тест на подлинность. (7) НЕ МОГУТ предшествовать
  мощным фигурам (Растянутая 1/2/3, Удлинённая c). (8) Линии тренда: b-d и a-c.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-29
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Расширяющиеся Треугольники
  figure_id: null
  verbatim_quote:
    text: 'Одним из самых странных аспектов Расширяющихся Треугольников выглядит отсутствие
      у них многочисленных соотношений Фибоначчи, типичных для Сужающихся Треугольников.
      Хотите верьте, хотите нет, отсутствие соотношений Фибоначчи может быть ценным
      тестом на аутентичность Расширяющегося Треугольника... Расширяющиеся Треугольники
      не могут иметь место непосредственно перед любой мощной фигурой, такой как Растянутая
      1-я, 2-я и 3-я волна либо Удлиненная с-волна.

      '
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''expanding_triangle''

    '
  constraint: "# Параметр (1): Либо a, либо b — наименьший сегмент\nmin_segment =\
    \ min(length(Wa), length(Wb))\nassert min_segment == min(length(Wa), length(Wb),\
    \ length(Wc), length(Wd), length(We))\n# т.е. наименьший из всех сегментов — это\
    \ либо a, либо b\n\n# Параметр (2): e-волна — намного длиннее других (\"blow-off\"\
    )\nassert length(We) == max(length(Wa), length(Wb), length(Wc), length(Wd), length(We))\n\
    assert length(We) > length(Wd)  # значительно длиннее\n\n# Параметр (3): Расширяющийся\
    \ может быть e-волной более крупного Расширяющегося\nif parent_pattern == 'expanding_triangle':\n\
    \  assert current_wave_label_in_parent == 'e'  # допустимая позиция\n\n# Параметр\
    \ (4): Каждая волна от простого к сложному\nassert complexity(Wa) <= complexity(Wb)\n\
    assert complexity(Wb) <= complexity(Wc)\nassert complexity(Wc) <= complexity(Wd)\n\
    assert complexity(Wd) <= complexity(We)\n\n# Параметр (5): Фигура после Треугольника\
    \ (c-волна или W5) ≤ начального уровня e\n# post_triangle_move — это движение\
    \ после завершения треугольника\n# (thrust / c-wave / wave-5 в более крупной структуре)\n\
    post_triangle_extent = length(post_triangle_move)\ne_start_to_triangle_start =\
    \ abs(price(start(We)) - price(start(Wa)))\nassert post_triangle_extent <= e_start_to_triangle_start\n\
    # Иначе: конечная точка post-triangle move не выходит за начальный уровень We\n\
    \n# Параметр (6): ОТСУТСТВИЕ Фибоначчи-соотношений = тест на подлинность\n# (из\
    \ verbatim_quote: отсутствие многочисленных соотношений Фибоначчи —\n#  ценный\
    \ тест на аутентичность)\nfib_ratios_found = count_fibonacci_relationships_between_waves(Wa,\
    \ Wb, Wc, Wd, We)\n# Для подлинного расширяющегося треугольника:\nassert fib_ratios_found\
    \ <= LOW_THRESHOLD\n# Если обнаружено много Фибоначчи-соотношений — сомнение в\
    \ подлинности паттерна\n\n# Параметр (7): НЕ МОГУТ предшествовать мощным фигурам\n\
    # (из verbatim_quote: не могут иметь место непосредственно перед\n#  Растянутой\
    \ 1/2/3 или Удлинённой c)\nif next_pattern is not null:\n  assert next_pattern\
    \ not in ['extended_wave_1', 'extended_wave_2', 'extended_wave_3', 'elongated_c']\n\
    \n# Параметр (8): Линии тренда: b-d (базовая) и a-c (противоположная)\nbase_trendline\
    \ = trendline(end(Wb), end(Wd))\nopposite_trendline = trendline(end(Wa), end(Wc))\n\
    # Для расширяющегося треугольника линии расходятся:\nassert lines_are_diverging(base_trendline,\
    \ opposite_trendline)\n"
  formalization_notes: Параметр (4) "от простого к слож

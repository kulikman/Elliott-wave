formalization:
  status: draft
  applies_when: expanding triangle identification and validation
  constraint: >
    min(Wa, Wb) = smallest_segment ;
    We = longest_and_most_complex ("blow off") ;
    fibonacci_absence = authenticity_test ;
    cannot_precede = {ext_1, ext_2, ext_3, elongated_c} ;
    post_triangle_retracement <= start_level_of_We ;
    trendlines: b_d (base) and a_c (opposite)
  formalization_notes: 'стр.11-29..11-31. 8 общих параметров формирования.'

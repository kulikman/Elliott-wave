statement_ru: 'Терминальный Импульс с Растянутой 1-й (самый распространённый): W2
  ≤ 61.8% W1; W3 между 38.2% и 61.8% W1; W5 между 38.2% и 61.8% W1. W4 ≈ 61.8% W2
  по цене и времени. Линия тренда 2-4 должна быть чёткой. Единственное исключение
  для «фальшивого прорыва» 2-4: W5 = Удлинённая Плоская (Неудавшейся-С или Горизонтальный
  Треугольник) или c-волна Терминала в составе W5.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 11-6
  chapter: 'Глава 11: Продвинутое применение Меток Движения'
  section: Терминальные Импульсы / Растянутая первая
  figure_id: null
  verbatim_quote:
    text: 'Растянутая 1-я волна в Терминальной фигуре вне всякой конкуренции — самый
      распространённый сценарий. Измеряемая от точки её завершения волна-2 не должна
      откатываться более чем на 61.8% волны-1. Волна-3 не должна быть намного больше
      61.8%, но и не менее 38.2% волны-1. Волна-5 не может быть более 99% волны-3,
      но с большой вероятностью будет между 61.8% и 38.2%.

      '
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''terminal_impulse'' AND extended_wave == 1

    '
  constraint: "# Длины волн (в ценовом выражении)\nlen_W1 = abs(end(W1) - start(W1))\n\
    len_W2 = abs(end(W2) - start(W2))\nlen_W3 = abs(end(W3) - start(W3))\nlen_W5 =\
    \ abs(end(W5) - start(W5))\n\n# --- Из verbatim_quote (формализуемые правила)\
    \ ---\n\n# W2 не должна откатываться более чем на 61.8% W1\nlen_W2 <= 0.618 *\
    \ len_W1\n\n# W3 между 38.2% и 61.8% W1\n# verbatim: \"не более 61.8%, но и не\
    \ менее 38.2% волны-1\"\nlen_W3 >= 0.382 * len_W1 AND len_W3 <= 0.618 * len_W1\n\
    \n# W5 не может быть более 99% W3\n# verbatim: \"Волна-5 не может быть более 99%\
    \ волны-3\"\nlen_W5 <= 0.99 * len_W3\n\n# W5 с большой вероятностью между 38.2%\
    \ и 61.8% (W1)\n# verbatim: \"с большой вероятностью будет между 61.8% и 38.2%\"\
    \n# Это вероятностное утверждение, но в statement_ru указано как диапазон W5\n\
    len_W5 >= 0.382 * len_W1 AND len_W5 <= 0.618 * len_W1\n\n# --- Из statement_ru\
    \ (дополнительные, но НЕ в verbatim) ---\n\n# W4 ≈ 61.8% W2 по цене и времени\n\
    # НЕ формализовано: отсутствует в verbatim_quote, \n# а также \"≈\" не имеет точного\
    \ определения допуска\n\n# Линия тренда 2-4 должна быть чёткой\n# НЕ формализовано:\
    \ отсутствует в verbatim_quote,\n# и \"чёткость\" линии тренда не поддаётся простой\
    \ формализации\n\n# Исключение для фальшивого прорыва 2-4:\n# W5 = Удлинённая\
    \ Плоская (Неудавшейся-С или Горизонтальный Треугольник)\n# или c-волна Терминала\
    \ в составе W5\n# НЕ формализовано: отсутствует в verbatim_quote\n"
  formalization_notes: "1. Verbatim_quote содержит четыре чётких ограничения: W2 <=\
    \ 61.8% W1,\n   W3 в диапазоне [38.2%, 61.8%] W1, W5 <= 99% W3, W5 вероятно в\
    \ [38.2%, 61.8%] W1.\n2. Ограничение W5 <= 0.99 * W3 присутствует в verbatim,\
    \ но отсутствует в statement_ru — \n   включено, т.к. это явная цитата из источника.\n\
    3. Диапазон W5 [38.2%, 61.8%] в verbatim описан как вероятностный (\"с большой\
    \ вероятностью\"),\n   но в statement_ru указан как правило — формализован как\
    \ constraint.\n4. W4 ≈ 61.8% W2 (по цене и времени), чёткость линии тренда 2-4,"

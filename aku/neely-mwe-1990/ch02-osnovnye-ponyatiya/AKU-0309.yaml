  verbatim_quote:
    text: 'Как правило, моноволны абсолютно прямые, но бывают и исключения. ...даже
      если скорость движения цен временно замедляется, а затем снова увеличивается,
      общее повышение или снижение цены следует считать одной "волной" (моноволной),
      пока цена действительно не сменит своё направление.

      '

statement_ru: Восходящая волна (up-wave) образуется, когда отношение спроса к предложению
  увеличивается и цена растёт; нисходящая волна (down-wave) — когда число приказов
  на продажу превышает число приказов на покупку и цена падает.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 2-3
  chapter: 'Глава 2: Основные понятия'
  section: Почему образуются волны?
  figure_id: null
  verbatim_quote:
    text: Когда отношение спроса к предложению на какой-либо продукт увеличивается
      ... цена растёт. Такую ситуацию можно назвать восходящей волной (up-wave). Когда
      ... общее количество приказов на продажу превышает общее число приказов на покупку),
      цена падает, создавая нисходящую волну (down-wave).
    language: ru

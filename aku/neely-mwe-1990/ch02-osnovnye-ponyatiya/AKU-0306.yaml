statement_ru: 'Абсолютно вертикальное ценовое движение невозможно, так как любое изменение
  котировок требует прохождения как минимум одной единицы времени. Волна не может
  быть вертикальной — она всегда должна иметь временну́ю протяжённость.

  '
source:
  book_id: neely-mwe-1990
  page: 2-1
  chapter: 'Глава 2: Основные понятия'
  section: Что такое волна?
  figure_id: Рисунок 2-1
  verbatim_quote:
    text: 'изменение цен изображается на двумерной плоскости графика отрезком прямой
      линии некоторой длины, "движущейся" в некотором направлении, за исключением
      вертикального (см. рисунок 2-1). [...] Невозможно! — вертикальное движение цены:
      абсолютно вертикальное ценовое движение невозможно, так как любое изменение
      котировок требует прохождения "единицы" времени.

      '
    language: ru

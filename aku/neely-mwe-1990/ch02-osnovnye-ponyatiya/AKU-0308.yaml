id: AKU-0308
type: rule
strength: mandatory
status: verified
topic: structural-labels
subtopics:
- foundations
statement_ru: 'Структурные метки (:5 для импульсов, :3 для коррекций) должны применяться
  к волнам всех размеров, форм и уровней сложности. Это обязательное требование на
  всех уровнях Теории Волн Эллиота.

  '
source:
  book_id: neely-mwe-1990
  page: 2-5
  chapter: 'Глава 2: Основные понятия'
  section: Как вы должны метить волны? / Структурные метки
  figure_id: null
  verbatim_quote:
    text: 'Структурные метки важны на всех уровнях Теории Волн Эллиота и должны применяться
      к волнам всех размеров, форм и уровней сложности.

      '
    language: ru
formalization:
  status: not_formalizable
  applies_when: '# Применяется ко всем волнам на всех уровнях анализа

    always

    '
  constraint: '# Каждая идентифицированная волна (wave) должна иметь структурную метку:

    #   - structural_label == ":5" если волна является импульсом

    #   - structural_label == ":3" если волна является коррекцией

    #

    # for each wave in all_identified_waves:

    #   assert wave.structural_label is not None

    #   assert wave.structural_label in [":5", ":3"]

    '
  formalization_notes: 'Это правило является методологическим требованием к процессу
    разметки,

    а не проверяемым ограничением на соотношения цен/времени между волнами.

    Оно утверждает, что аналитик (или алгоритм) ОБЯЗАН присваивать каждой

    волне структурную метку :5 или :3. В контексте алгоритма это означает,

    что структура данных каждой волны должна содержать поле structural_label,

    и оно не может быть пустым. Это скорее инвариант системы (design constraint),

    чем правило валидации волнового счёта, которое можно нарушить рыночными данными.

    Формализация как проверяемого constraint тривиальна (проверка наличия метки),

    но не несёт аналитической ценности — это требование к архитектуре, а не к паттернам.'
aliases:
- обязательность структурных меток
- правило структурной разметки

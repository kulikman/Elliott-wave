statement_ru: 'Порядки (степени) волн никогда нельзя описывать и применять в абсолютных
  величинах. Порядок характеризует иерархическую стратификацию волн на основе их ценовых
  и временных взаимозависимостей, но не привязан к фиксированным числовым значениям
  цены или времени.

  '

  section: Применение Индикаторов положения
  figure_id: null
  verbatim_quote:
    text: Индикаторы положения – это буквенные символы ("c", "F", "L", "s" или "sL"),
      предшествующие большинству Структурных обозначений (":3" – "тройкам", и ":5"
      – "пятеркам"). ... функция Индикаторов положения заключается в описании ...
      положения Структурных обозначений волн в контексте ... анализируемого рынка.

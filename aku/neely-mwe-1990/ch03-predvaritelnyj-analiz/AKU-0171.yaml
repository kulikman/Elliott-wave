statement_ru: Индикаторы положения (c, F, L, s, sL) — буквенные префиксы Структурных
  обозначений (:3/:5), описывающие положение волны среди соседних. Базовое обозначение
  — без индикатора (:3/:5); позиционированное — с индикатором (:F3, :c3, :L3, :L5,
  :s5, :sL3).

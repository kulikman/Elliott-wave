id: AKU-0331
type: rule
strength: conditional
status: verified
topic: informal-logic-rules
subtopics:
- structural-labels
statement_ru: 'Если откат m1 волной m2 составляет примерно 61.8–161.8% (Правила 3-5),
  то m1 чаще является коррективной волной (наиболее вероятное Структурное обозначение
  :F3).

  '
source:
  book_id: neely-mwe-1990
  page: 3-44
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Синтез
  figure_id: null
  verbatim_quote:
    text: 'откат ~61.8-161.8% (Правила 3-5) → m1 чаще коррективна (:F3)

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Вычисляем коэффициент отката m1 волной m2

    retracement_ratio = abs(m2) / abs(m1)

    # Правило применяется когда откат попадает в диапазон ~61.8–161.8%

    # Это соответствует Правилам 3, 4 или 5 предварительного анализа

    retracement_ratio >= 0.618 AND retracement_ratio <= 1.618

    '
  constraint: '# m1 чаще является коррективной волной

    # Наиболее вероятное структурное обозначение — :F3

    m1.structure_preference = ":F3"

    m1.wave_type_preference = "corrective"

    # Это вероятностное предпочтение, а не абсолютное ограничение

    # :F3 добавляется в список кандидатов с повышенным приоритетом

    m1.add_candidate(label=":F3", priority="most_likely")

    '
  formalization_notes: 'Правило является вероятностным ("чаще"), а не абсолютным —
    это conditional rule.

    :F3 означает, что m1 завершает коррективный паттерн из 3 моноволн

    (Flat, Zigzag и т.п.).

    Слово "примерно" перед 61.8–161.8% предполагает некоторый допуск на границах,

    но точная величина допуска не указана в правиле.

    Правило задаёт предпочтение (most_likely), а не жёсткое ограничение —

    другие структурные обозначения не исключаются, но :F3 наиболее вероятно.'
aliases:
- средний откат — коррекция :F3

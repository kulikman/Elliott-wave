id: AKU-0331
type: rule
strength: conditional
status: verified
topic: informal-logic-rules
subtopics:
- structural-labels
statement_ru: 'Если откат m1 волной m2 составляет примерно 61.8–161.8% (Правила 3-5),
  то m1 чаще является коррективной волной (наиболее вероятное Структурное обозначение
  :F3).

  '
source:
  book_id: neely-mwe-1990
  page: 3-44
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Синтез
  figure_id: null
  verbatim_quote:
    text: 'откат ~61.8-161.8% (Правила 3-5) → m1 чаще коррективна (:F3)

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правила 3-5 применяются когда откат m2 относительно m1 составляет
    ~61.8–161.8%

    retracement_ratio = abs(m2.length) / abs(m1.length)

    retracement_ratio >= 0.618 AND retracement_ratio <= 1.618

    '
  constraint: '# m1 чаще является коррективной волной

    # Наиболее вероятное структурное обозначение — :F3

    m1.most_likely_structure_label = ":F3"

    m1.wave_type = "corrective"  # предпочтение, не абсолютное требование

    '
  formalization_notes: "- Правило условное (conditional) и использует слово \"чаще\"\
    , что означает\n  статистическое предпочтение, а не жёсткое ограничение.\n- :F3\
    \ — структурное обозначение, указывающее на плоскую (Flat) коррекцию\n  из 3 моноволн.\n\
    - \"Примерно 61.8–161.8%\" подразумевает допуск на границах диапазона,\n  точный\
    \ допуск не указан в правиле.\n- Ссылка на \"Правила 3-5\" означает, что данное\
    \ условие отката\n  соответствует диапазону, покрываемому правилами 3, 4 и 5\n\
    \  предварительного анализа."
aliases:
- средний откат — коррекция :F3

statement_ru: 'Условие Правила (буква a–f) определяется соотношением длины предшествующей
  моноволны m0 к m1. Пороги Фибоначчи (38.2/61.8/100/161.8/261.8%) делят диапазон
  m0/m1 на условия; набор букв зависит от номера Правила (Пр.1: a–d, Пр.2: a–e, Пр.3:
  a–f, Пр.4: a–e, Пр.5–7: a–d).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-22
  chapter: 'Глава 3: Предварительный анализ'
  section: Правила соотношений длин волн / Условия
  figure_id: null
  verbatim_quote:
    text: Соотношение m0/m1 определяет применение обозначенного буквой Условия этого
      Правила. ... В подзаголовке "Условия" каждого конкретного Правила ищите нужное
      вам соотношение m0/m1 (арабские цифры).
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при определении буквы Условия (a–f) для Правила соотношений
    длин (Rule 1–7),

    # когда для моноволны m1 уже определён номер Правила и известны длины m0 и m1.

    rule_number is defined for m1   # rule_number ∈ {1, 2, 3, 4, 5, 6, 7}

    AND length(m0) is known

    AND length(m1) is known

    '
  constraint: "# Вычисляем отношение длины предшествующей моноволны m0 к длине m1\n\
    ratio = length(m0) / length(m1)\n\n# Пороги Фибоначчи, делящие диапазон ratio\
    \ на интервалы\nfib_thresholds = [0.382, 0.618, 1.000, 1.618, 2.618]\n\n# Набор\
    \ букв условий зависит от номера Правила\nmax_conditions = {\n  1: ['a', 'b',\
    \ 'c', 'd'],\n  2: ['a', 'b', 'c', 'd', 'e'],\n  3: ['a', 'b', 'c', 'd', 'e',\
    \ 'f'],\n  4: ['a', 'b', 'c', 'd', 'e'],\n  5: ['a', 'b', 'c', 'd'],\n  6: ['a',\
    \ 'b', 'c', 'd'],\n  7: ['a', 'b', 'c', 'd']\n}\n\nletters = max_conditions[rule_number]\n\
    \n# Определяем зону по порогам Фибоначчи\n#   ratio < 0.382          → zone 0\n\
    #   0.382 <= ratio < 0.618 → zone 1\n#   0.618 <= ratio < 1.000 → zone 2\n#  \
    \ 1.000 <= ratio < 1.618 → zone 3\n#   1.618 <= ratio < 2.618 → zone 4\n#   ratio\
    \ >= 2.618         → zone 5\n\nif ratio < 0.382:\n    zone = 0\nelif ratio < 0.618:\n\
    \    zone = 1\nelif ratio < 1.000:\n    zone = 2\nelif ratio < 1.618:\n    zone\
    \ = 3\nelif ratio < 2.618:\n    zone = 4\nelse:\n    zone = 5\n\n# Каждое Правило\
    \ имеет собственную таблицу соответствия «zone → буква».\n# Конкретный маппинг\
    \ определяется из отдельных AKU для каждого Rule 1–7.\ncondition_letter = lookup_condition_table(rule_number,\
    \ zone)\n\nASSERT condition_letter IN letters\n"
  formalization_notes: 'Данный AKU описывает только общий механизм определения буквы
    условия:

    ratio(m0/m1) + пороги Фибоначчи → буква условия (a–f).


    Точное соответствие «zone → конкретная буква» различается для каждого

    из 7 Правил. Функция lookup_condition_table не может быть полностью

    реализована на основании только данного AKU — требуются отдельные AKU

    с таблицами маппинга для каждого Правила (Rule 1–7).


    Из verbatim_quote: «В подзаголовке "Условия" каждого конкретного Правила

    ищите нужное вам соотношение m0/m1» — это подтверждает, что маппинг

    специфичен для каждого Правила и не задан в данном общем правиле.



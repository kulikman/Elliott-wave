id: AKU-0176
type: rule
strength: mandatory
status: verified
topic: position-indicators
subtopics:
- structural-labels
- ending-diagonal
- triangle
statement_ru: ':sL3 (предпоследняя тройка, second-to-Last 3) — обусловленное обозначение,
  никогда не первый/последний сегмент, не существует без пары: за :sL3 ВСЕГДА следует
  :L3. Указывает на формирование Терминала или Треугольника. Единственная допустимая
  серия: c3-sL3-3-?.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-63
  chapter: 'Глава 3: Предварительный анализ'
  section: Определения Индикаторов положения / :sL3
  figure_id: null
  verbatim_quote:
    text: Это Структурное обозначение – аббревиатура выражения "предпоследняя тройка"
      (second to Last three (3)). Волна с таким обозначением никогда не может быть
      ни первым, ни последним сегментом ... За волной с обозначением ":sL3" всегда
      следует волна с обозначением ":L3".
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется когда сегменту назначено структурное обозначение
    :sL3

    segment.position_indicator == '':sL3''

    '
  constraint: '# 1. :sL3 никогда не может быть первым сегментом паттерна

    segment.index != first_segment_index(pattern)


    # 2. :sL3 никогда не может быть последним сегментом паттерна

    segment.index != last_segment_index(pattern)


    # 3. За :sL3 ВСЕГДА должна следовать волна с обозначением :L3

    next_segment = get_segment(pattern, segment.index + 1)

    REQUIRE next_segment.position_indicator == '':L3''


    # 4. Единственная допустимая серия, содержащая :sL3: c3 - sL3 - 3 - ?

    #    Перед :sL3 должен стоять сегмент с обозначением :c3

    prev_segment = get_segment(pattern, segment.index - 1)

    REQUIRE prev_segment.position_indicator == '':c3''


    #    После :sL3 идёт :L3 (уже проверено в п.3)

    #    После :L3 может следовать любой допустимый сегмент ("?" — без ограничений
    данным правилом)


    # 5. Наличие :sL3 указывает на формирование Терминала (Ending Diagonal) или Треугольника

    REQUIRE pattern.type IN {''ending_diagonal'', ''triangle''}

    '
  formalization_notes: "- Серия \"c3-sL3-3-?\" из statement_ru интерпретируется как\
    \ последовательность\n  position indicators: :c3, затем :sL3, затем :L3 (обозначение\
    \ \"3\" в последней\n  позиции = :L3), затем произвольный допустимый сегмент (\"\
    ?\").\n- Правило \"за :sL3 ВСЕГДА следует :L3\" подтверждено verbatim_quote напрямую:\n\
    \  «За волной с обозначением \":sL3\" всегда следует волна с обозначением \":L3\"\
    ».\n- Ограничение \"никогда не первый/не последний\" подтверждено verbatim_quote:\n\
    \  «Волна с таким обозначением никогда не может быть ни первым, ни последним сегментом».\n\
    - Ограничение pattern.type IN {ending_diagonal, triangle} следует из statement_ru\n\
    \  (\"Указывает на формирование Терминала или Треугольника\"), но verbatim_quote\n\
    \  не содержит этого явно — следует рассматривать как информационное/выводимое\
    \ ограничение.\n- Символ \"?\" в серии означает, что после :L3 может следовать\
    \ любой сегмент;\n  конкретное ограничение на него не задано данным правилом.\n\
    - Правило о паре (:sL3 не существует без :L3) полностью покрывается\n  constraint\
    \ #3 (REQUIRE next_segment == ':L3')."

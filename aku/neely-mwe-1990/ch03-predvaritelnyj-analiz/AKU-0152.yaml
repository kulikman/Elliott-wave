statement_ru: 'При переоценке (reassessment) подтверждённой компактной фигуры: если
  её базовая Структура не соответствует ни одному из условий перечисленных Правил,
  в фигуре может быть «пропавшая» (missing) волна; несогласующиеся обозначения помещаются
  в квадратные скобки. Если фигура «не вписывается» в окружение — она часть Сложной
  конфигурации.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики
  figure_id: null
  verbatim_quote:
    text: Если базовая Структура переоцениваемой компактной ценовой фигуры не соответствует
      ни одному из перечисленных в соответствующем разделе условий, в ценовой фигуре
      может быть так называемая «пропавшая» волна ... Если ... компактная ценовая
      фигура «не вписывается» в окружающие моноволны ... данная ценовая фигура – часть
      Сложной конфигурации.
    language: ru

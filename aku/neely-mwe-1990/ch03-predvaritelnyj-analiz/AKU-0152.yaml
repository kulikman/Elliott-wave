statement_ru: 'При переоценке (reassessment) подтверждённой компактной фигуры: если
  её базовая Структура не соответствует ни одному из условий перечисленных Правил,
  в фигуре может быть «пропавшая» (missing) волна; несогласующиеся обозначения помещаются
  в квадратные скобки. Если фигура «не вписывается» в окружение — она часть Сложной
  конфигурации.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики
  figure_id: null
  verbatim_quote:
    text: Если базовая Структура переоцениваемой компактной ценовой фигуры не соответствует
      ни одному из перечисленных в соответствующем разделе условий, в ценовой фигуре
      может быть так называемая «пропавшая» волна ... Если ... компактная ценовая
      фигура «не вписывается» в окружающие моноволны ... данная ценовая фигура – часть
      Сложной конфигурации.
    language: ru
formalization:
  status: draft
  applies_when: '# Контекст: переоценка (reassessment) ранее подтверждённой компактной
    фигуры

    figure.is_compact == true

    AND figure.is_confirmed == true

    AND phase == "reassessment"

    # Базовая Структура фигуры не соответствует ни одному условию

    # из правил соответствующего раздела

    AND match_base_structure(figure.base_structure, get_applicable_rules(figure))
    == NO_MATCH

    '
  constraint: "# Правило описывает два альтернативных диагностических исхода.\n# Выбор\
    \ между ними зависит от анализа окружения фигуры.\n\n# Исход 1: «Пропавшая» (missing)\
    \ волна\n# Условие: фигура сама по себе допускает наличие пропущенной волны\n\
    # (детали — Гл.12, missing waves)\nif figure_may_contain_missing_wave(figure):\n\
    \    figure.has_missing_wave = true\n    # Несогласующиеся обозначения помещаются\
    \ в квадратные скобки\n    for label in figure.labels:\n        if not label_consistent_with_structure(label,\
    \ figure.base_structure):\n            label.display = \"[\" + label.value + \"\
    ]\"\n\n# Исход 2: Фигура «не вписывается» в окружающие моноволны\n# — значит она\
    \ является частью Сложной конфигурации\nif not figure_fits_surrounding_context(figure,\
    \ figure.surrounding_monowaves):\n    figure.part_of_complex_configuration = true\n"
  formalization_notes: "original_status: partially_formalizable. Частично формализуемо.\
    \ Причины неполной формализации:\n1. «Соответствующий раздел условий» — конкретный\
    \ набор правил для\n   match_base_structure зависит от типа базовой Структуры\
    \ (Гл.3–5),\n   в данном statement не перечислен.\n2. Критерий «не вписывается\
    \ в окружающие моноволны» не определён\n   точно в данном правиле — подразумевается\
    \ контекстный анализ\n   из последующих глав.\n3. Логика определения «пропавшей\
    \ волны» раскрывается в Гл.12\n   (missing waves), здесь лишь упоминается возможность.\n\
    4. Выбор между исходом 1 и исходом 2 требует дополнительного\n   контекста, не\
    \ описанного в данном правиле. Из verbatim_quote\n   следует, что это два разных\
    \ сценария, но критерий выбора\n   между ними не эксплицирован.\n5. Функции figure_may_contain_missing_wave()\
    \ и\n   figure_fits_surrounding_context() — заглушки, требующие\n   реализации\
    \ на основе правил из других глав."

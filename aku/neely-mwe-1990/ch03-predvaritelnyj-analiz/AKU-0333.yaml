statement_ru: 'При применении Неформальных Правил логики к компактным ценовым фигурам,
  пересекающим свой собственный начальный уровень, не следует применять эти Правила
  напрямую — необходимо работать только с базовой Структурой таких фигур.

  '
source:
  book_id: neely-mwe-1990
  page: 3-33
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Правило преобразования обозначений
  figure_id: null
  verbatim_quote:
    text: 'не применять эти Правила к компактным ценовым фигурам, пересекающим свой
      собственный начальный уровень — работать только с базовой Структурой таких фигур.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Когда применяются Неформальные Правила логики (Informal Logic Rules)

    # И текущая ценовая фигура является компактной (compacted)

    # И эта фигура пересекает свой собственный начальный уровень

    applying_informal_logic_rules == true

    AND is_compacted(pattern) == true

    AND crosses_own_start_level(pattern) == true

    '
  constraint: "# НЕ применять Неформальные Правила логики напрямую к такой компактной\
    \ фигуре\n# Вместо этого — работать только с базовой (underlying) Структурой этой\
    \ фигуры\n\n# Определяем: фигура пересекает свой начальный уровень\n# crosses_own_start_level(pattern):\n\
    #   start_price = price_at(pattern.start)\n#   Фигура в какой-то момент возвращается\
    \ и пересекает start_price\n\nIF is_compacted(pattern) AND crosses_own_start_level(pattern):\n\
    \    # Запрет прямого применения Informal Logic Rules к компактной фигуре\n  \
    \  do_not_apply_informal_logic_rules_directly(pattern)\n    \n    # Извлечь базовую\
    \ (деcompактированную) структуру\n    base_structure = get_underlying_structure(pattern)\n\
    \    \n    # Применять Informal Logic Rules только к базовой структуре\n    apply_informal_logic_rules(base_structure)\n"
  formalization_notes: "1. \"Компактная ценовая фигура\" (compacted price pattern)\
    \ — это фигура, \n   полученная в результате процедуры компактирования (compaction),\
    \ \n   где несколько моноволн объединены в одну структурную единицу.\n2. \"Пересекает\
    \ свой собственный начальный уровень\" — фигура, ценовое \n   движение которой\
    \ в какой-то момент возвращается через уровень цены \n   в точке начала этой фигуры.\n\
    3. \"Базовая Структура\" (underlying Structure) — структура до компактирования,\
    \ \n   т.е. исходные составляющие моноволны/поливолны.\n4. Точное определение\
    \ функций is_compacted() и get_underlying_structure() \n   зависит от реализации\
    \ процедуры компактирования в алгоритме.\n5. Правило conditional — применяется\
    \ только при наличии описанных условий."
aliases:

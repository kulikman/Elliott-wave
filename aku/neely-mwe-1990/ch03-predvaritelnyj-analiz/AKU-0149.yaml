statement_ru: 'Правило 2 (38.2% ≤ m2/m1 < 61.8%): структурный список m1 = {:5, (:sL3),
  [:c3], [:s5]}.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-37
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило 2
  figure_id: null
  verbatim_quote:
    text: Правило 2 {:5/(:sL3)/[:c3]/[:s5]}
    language: ru
formalization:
  status: draft
  applies_when: '# Контекст: анализ пары смежных моноволн m1 и m2

    # m1 — текущая моноволна, m2 — следующая за ней моноволна

    # length — ценовая длина моноволны (абсолютное значение разницы цен концов)


    m1_length = abs(m1.end_price - m1.start_price)

    m2_length = abs(m2.end_price - m2.start_price)


    ratio_m2_m1 = m2_length / m1_length


    # Правило 2 применяется когда отношение m2/m1 в диапазоне [38.2%, 61.8%)

    applies = ratio_m2_m1 >= 0.382 AND ratio_m2_m1 < 0.618

    '
  constraint: '# Когда условие applies_when выполнено,

    # структурный список m1 ограничивается следующими допустимыми метками:

    #

    # :5     — пятёрка (импульс или терминал, направление тренда)

    # (:sL3) — тройка в круглых скобках, specific label sL3 (часть коррекции)

    # [:c3]  — компактная тройка в квадратных скобках (часть треугольника/сложной
    коррекции)

    # [:s5]  — пятёрка в квадратных скобках (часть треугольника/сложной коррекции)


    allowed_labels_m1 = {":5", "(:sL3)", "[:c3]", "[:s5]"}

    structure(m1) in allowed_labels_m1

    '
  formalization_notes: 'Источник: verbatim_quote "Правило 2 {:5/(:sL3)/[:c3]/[:s5]}"
    (стр. 3-37).

    Правило определяет допустимые структурные метки для моноволны m1,

    когда соотношение длины m2 к длине m1 попадает в диапазон [38.2%, 61.8%).

    Границы диапазона: 38.2% включительно, 61.8% исключительно

    (следует из нумерации правил: Правило 1 покрывает < 38.2%, Правило 2 начинается
    с 38.2%).

    Conditional правило — структурный список сужает возможные метки, но не гарантирует
    конкретную.'

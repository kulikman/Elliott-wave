statement_ru: 'Правило 2 (38.2% ≤ m2/m1 < 61.8%): структурный список m1 = {:5, (:sL3),
  [:c3], [:s5]}.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-37
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило 2
  figure_id: null
  verbatim_quote:
    text: Правило 2 {:5/(:sL3)/[:c3]/[:s5]}
    language: ru
formalization:
  status: draft
  applies_when: '# Определяем отношение длины m2 к m1

    ratio_m2_m1 = abs(m2.length) / abs(m1.length)

    # Правило 2 применяется когда отношение в диапазоне [38.2%, 61.8%)

    ratio_m2_m1 >= 0.382 AND ratio_m2_m1 < 0.618

    '
  constraint: '# Структурный список m1 ограничен следующими допустимыми метками:

    # :5     — пятёрка (импульс или терминал, направление тренда)

    # (:sL3) — тройка в скобках, specific label sL3 (часть коррекции)

    # [:c3]  — компактная тройка в квадратных скобках (часть треугольника/сложной
    коррекции)

    # [:s5]  — пятёрка в квадратных скобках (часть треугольника/сложной коррекции)

    structure(m1) in {'':5'', ''(:sL3)'', ''[:c3]'', ''[:s5]''}

    '
  formalization_notes: 'Правило определяет допустимые структурные метки для моноволны
    m1,

    когда соотношение m2/m1 попадает в диапазон [38.2%, 61.8%).

    Источник: verbatim_quote "Правило 2 {:5/(:sL3)/[:c3]/[:s5]}" (стр. 3-37).

    Границы диапазона: 38.2% включительно, 61.8% исключительно

    (следует из нумерации правил: Правило 1 покрывает < 38.2%, Правило 2 начинается
    с 38.2%).

    Conditional правило — структурный список сужает возможные метки, но не гарантирует
    конкретную.'

statement_ru: 'Правило 4 (61.8% < m2/m1 < 100%): структурные списки m1 по Условиям
  — a:{:F3,:c3,:s5,[:sL3]}, b:{:F3,:c3,:s5,(:sL3),(x:c3),[:L5]}, c:{:c3,(:F3),(x:c3)},
  d:{:F3,(:c3),(x:c3)}, e:{:F3,(x:c3),[:c3]}. Вероятная метка :F3 (или :c3 при Условии
  c).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-44
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / структурные списки
  figure_id: null
  verbatim_quote:
    text: Условие "a" {:F3/:c3/:s5/[:sL3]} ... Условие "b" {:F3/:c3/:s5/(:sL3)/(x:c3)/[:L5]}
      ... Условие "c" {:c3/(:F3)/(x:c3)} ... Условие "d" {:F3/(:c3)/(x:c3)} ... Условие
      "e" {:F3/(x:c3)[:c3]}
    language: ru
formalization:
  status: draft
  applies_when: '# Правило 4 применяется когда отношение m2/m1 попадает в диапазон
    (61.8%, 100%)

    ratio_m2_m1 = abs(m2) / abs(m1)

    applies = ratio_m2_m1 > 0.618 AND ratio_m2_m1 < 1.0

    '
  constraint: "# Определить Условие (a-e) на основе внешней логики (контекст соседних\
    \ моноволн).\n# Критерии выбора Условия не описаны в данном AKU — они определяются\n\
    # отдельной процедурой из ch03-informal-logic.md.\n#\n# После определения Условия\
    \ — назначить структурный список для m1:\n#\n# Обозначения уровней уверенности:\n\
    #   {} — standard (high confidence)\n#   () — possible (medium confidence, при\
    \ определённых обстоятельствах)\n#   [] — less_likely (low confidence)\n\nif condition\
    \ == 'a':\n    # {:F3, :c3, :s5, [:sL3]}\n    m1.standard     = [':F3', ':c3',\
    \ ':s5']\n    m1.possible     = []\n    m1.less_likely  = [':sL3']\n    m1.primary_label\
    \ = ':F3'\n\nelif condition == 'b':\n    # {:F3, :c3, :s5, (:sL3), (x:c3), [:L5]}\n\
    \    m1.standard     = [':F3', ':c3', ':s5']\n    m1.possible     = [':sL3', 'x:c3']\n\
    \    m1.less_likely  = [':L5']\n    m1.primary_label = ':F3'\n\nelif condition\
    \ == 'c':\n    # {:c3, (:F3), (x:c3)}\n    m1.standard     = [':c3']\n    m1.possible\
    \     = [':F3', 'x:c3']\n    m1.less_likely  = []\n    m1.primary_label = ':c3'\n\
    \nelif condition == 'd':\n    # {:F3, (:c3), (x:c3)}\n    m1.standard     = [':F3']\n\
    \    m1.possible     = [':c3', 'x:c3']\n    m1.less_likely  = []\n    m1.primary_label\
    \ = ':F3'\n\nelif condition == 'e':\n    # {:F3, (x:c3), [:c3]}\n    m1.standard\
    \     = [':F3']\n    m1.possible     = ['x:c3']\n    m1.less_likely  = [':c3']\n\
    \    m1.primary_label = ':F3'\n\n# Итоговое назначение:\nm1.candidate_labels =\
    \ m1.standard + m1.possible + m1.less_likely\n\n# Уровни уверенности для каждой\
    \ метки:\nfor label in m1.standard:\n    m1.label_confidence[label] = 'high'\n\
    for label in m1.possible:\n    m1.label_confidence[label] = 'medium'\nfor label\
    \ in m1.less_likely:\n    m1.label_confidence[label] = 'low'\n"
  formalization_notes: "1. Условия a-e определяются внешней логикой (ch03-informal-logic.md),\n\
    \   основанной на соотношениях длин и структуре соседних моноволн.\n   Конкретные\
    \ критерии выбора Условия НЕ описаны в данном AKU.\n2. Обозначения из verbatim_quote:\n\
    \   {} — стандартные (обязательные) метки,\n   () — возможные при определённых\
    \ обстоятельствах,\n   [] — менее вероятные"

id: AKU-0155
type: rule
strength: mandatory
status: verified
topic: wave-identification
subtopics:
- structural-labels
statement_ru: Ценовая фигура Эллиота всегда завершается волной с обозначением :L5
  или :L3. Для выделения фигур график просматривается слева направо в поиске первой
  волны :L5/:L3 — высока вероятность, что в этой точке завершается фигура Эллиота.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-64
  chapter: 'Глава 3: Предварительный анализ'
  section: Процедуры выделения ценовых фигур
  figure_id: null
  verbatim_quote:
    text: Начиная с левого края графика, слева направо ищите первую волну с обозначением
      «:L5» и/или «:L3» ... поскольку высока вероятность, что в этой точке завершается
      ценовая фигура Эллиота. ... В любом случае ценовая фигура Эллиота должна завершаться
      волной «:L5» или «:L3», вне зависимости от наблюдаемого типа группировки.
    language: ru
formalization:
  status: draft
  applies_when: '# При выделении границ ценовых фигур Эллиотта на графике

    # (процедура сканирования графика слева направо для нахождения завершений фигур)

    mode == ''figure_boundary_detection''

    '
  constraint: "# ПРАВИЛО 1: Любая ценовая фигура Эллиотта должна завершаться волной\
    \ с меткой :L5 или :L3\n# Это обязательное условие вне зависимости от типа группировки\n\
    last_wave = get_last_wave(elliott_figure)\nassert last_wave.label in [':L5', ':L3']\n\
    \n# ПРАВИЛО 2 (процедура поиска): Для выделения фигур график сканируется слева\
    \ направо,\n# и первая встреченная волна :L5 или :L3 с высокой вероятностью является\
    \ точкой\n# завершения фигуры Эллиотта\nfunction find_figure_boundaries(waves_on_chart):\n\
    \    figures = []\n    scan_start = 0\n    for i in range(scan_start, len(waves_on_chart)):\n\
    \        wave = waves_on_chart[i]\n        if wave.label in [':L5', ':L3']:\n\
    \            # Высока вероятность, что здесь завершается фигура Эллиотта\n   \
    \         candidate_end = i\n            figure = extract_figure_ending_at(waves_on_chart,\
    \ candidate_end)\n            figures.append(figure)\n            scan_start =\
    \ candidate_end + 1  # продолжить поиск следующей фигуры\n    return figures\n"
  formalization_notes: "1. Правило содержит два аспекта: (a) жёсткое ограничение —\
    \ фигура ДОЛЖНА завершаться\n   волной :L5 или :L3; (b) эвристика поиска — первая\
    \ найденная :L5/:L3 слева направо\n   «с высокой вероятностью» является завершением\
    \ фигуры.\n2. Аспект (a) формализован как mandatory assert.\n3. Аспект (b) — это\
    \ процедура/эвристика поиска, а не строгое правило. Формулировка\n   «высока вероятность»\
    \ означает, что это не гарантия, а стартовая гипотеза,\n   которая может быть\
    \ пересмотрена при дальнейшем анализе.\n4. Метки :L5 и :L3 — это структурные обозначения\
    \ волн из предварительного анализа\n   (Глава 3 Нили), присваиваемые на основе\
    \ соотношений длин соседних волн.\n5. Правило не уточняет, как именно определяются\
    \ границы начала фигуры —\n   только точка завершения."

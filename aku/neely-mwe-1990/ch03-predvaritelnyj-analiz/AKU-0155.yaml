id: AKU-0155
type: rule
strength: mandatory
status: verified
topic: wave-identification
subtopics:
- structural-labels
statement_ru: Ценовая фигура Эллиота всегда завершается волной с обозначением :L5
  или :L3. Для выделения фигур график просматривается слева направо в поиске первой
  волны :L5/:L3 — высока вероятность, что в этой точке завершается фигура Эллиота.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-64
  chapter: 'Глава 3: Предварительный анализ'
  section: Процедуры выделения ценовых фигур
  figure_id: null
  verbatim_quote:
    text: Начиная с левого края графика, слева направо ищите первую волну с обозначением
      «:L5» и/или «:L3» ... поскольку высока вероятность, что в этой точке завершается
      ценовая фигура Эллиота. ... В любом случае ценовая фигура Эллиота должна завершаться
      волной «:L5» или «:L3», вне зависимости от наблюдаемого типа группировки.
    language: ru
formalization:
  status: draft
  applies_when: '# При выделении границ ценовых фигур Эллиотта на графике

    # после того как всем моноволнам присвоены структурные метки

    # (:L0, :L1, :L3, :L5, :c3, :s5, :F3 и т.д.)

    mode == ''figure_boundary_detection''

    all_waves_have_structural_labels == true

    '
  constraint: "# ===== ЧАСТЬ 1: ОБЯЗАТЕЛЬНОЕ ОГРАНИЧЕНИЕ (mandatory) =====\n# Любая\
    \ ценовая фигура Эллиотта ДОЛЖНА завершаться волной с меткой :L5 или :L3.\n# Verbatim:\
    \ \"В любом случае ценовая фигура Эллиота должна завершаться\n# волной «:L5» или\
    \ «:L3», вне зависимости от наблюдаемого типа группировки.\"\n\nlast_wave = get_last_wave(elliott_figure)\n\
    assert last_wave.label in [':L5', ':L3']\n\n# ===== ЧАСТЬ 2: ПРОЦЕДУРА ПОИСКА\
    \ (эвристика — \"высока вероятность\") =====\n# График сканируется слева направо.\n\
    # Первая встреченная волна :L5 или :L3 является кандидатом на точку завершения\
    \ фигуры.\n# Verbatim: \"Начиная с левого края графика, слева направо ищите первую\
    \ волну\n# с обозначением «:L5» и/или «:L3» ... поскольку высока вероятность,\n\
    # что в этой точке завершается ценовая фигура Эллиота.\"\n\nfunction find_first_figure_end(waves,\
    \ scan_start):\n    for i from scan_start to len(waves) - 1:\n        if waves[i].label\
    \ in [':L5', ':L3']:\n            return i  # кандидат на завершение фигуры (высокая\
    \ вероятность)\n    return null  # не найдено\n\nfunction segment_into_figures(waves):\n\
    \    figures = []\n    scan_start = 0\n    while scan_start < len(waves):\n  \
    \      end_idx = find_first_figure_end(waves, scan_start)\n        if end_idx\
    \ is null:\n            break\n        figure = waves[scan_start .. end_idx]\n\
    \        # Обязательная проверка из Части 1\n        assert figure.last().label\
    \ in [':L5', ':L3']\n        figures.append(figure)\n        scan_start = end_idx\
    \ + 1\n    return figures\n"
  formalization_notes: "1. Правило содержит два аспекта:\n   (a) Жёсткое ограничение\
    \ (mandatory) — фигура ДОЛЖНА завершаться волной :L5 или :L3.\n       Формализовано\
    \ как assert. Нарушение означает невалидную разбивку на фигуры.\n   (b) Эвристика\
    \ поиска — первая найденная :L5/:L3 при сканировании слева направо\n       «с\
    \ высокой вероятностью» является завершением фигуры. Это стартовая гипотеза,\n\
    \       которая может быть пересмотрена при дальнейшем анализе (источник говорит\n\
    \       \"высока вероятность\", а не \"гарантия\").\n2. Метки :L5 и :L3 — структурные\
    \ обозначения из предварительного анализа (Глава 3 Нили),\n   присваиваемые на\
    \ основе соотношений длин соседних моноволн.\n3. Правило не уточняет, как определяются\
    \ границы начала фигуры — только точка завершения.\n4. Прав"

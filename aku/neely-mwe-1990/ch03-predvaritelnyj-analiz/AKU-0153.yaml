statement_ru: Уровни Сложности смежных (последовательно расположенных) ценовых фигур
  отличаются не более чем на единицу. Если уровни сложности соседних волн различаются
  более чем на 1 — группировка по методу Нили невозможна.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-68
  chapter: 'Глава 3: Предварительный анализ'
  section: Особые условия
  figure_id: null
  verbatim_quote:
    text: Убедитесь, что Уровни Сложности смежных (последовательно расположенных)
      ценовых фигур ... отличаются не более чем на единицу. ... по методу Нили это
      было бы невозможно, если бы уровни сложности данных волн отличались более чем
      на единицу.
    language: ru
formalization:
  status: draft
  applies_when: '# При попытке группировки смежных (последовательно расположенных)

    # ценовых фигур в более крупную фигуру по методу Нили (процедура группировки)

    # Проверяется для каждой пары соседних фигур в рассматриваемой последовательности

    context == ''grouping_procedure''

    figures = [fig_0, fig_1, fig_2, ..., fig_n]  # последовательность смежных ценовых
    фигур

    '
  constraint: "# Для каждой пары смежных (последовательно расположенных) фигур:\n\
    for i in range(0, len(figures) - 1):\n  fig_current = figures[i]\n  fig_next =\
    \ figures[i + 1]\n\n  complexity_diff = abs(complexity_level(fig_current) - complexity_level(fig_next))\n\
    \n  # Уровни сложности смежных фигур должны отличаться не более чем на единицу\n\
    \  if complexity_diff > 1:\n    grouping_allowed = false  # группировка по методу\
    \ Нили невозможна\n    break\n  # else: условие для данной пары выполнено, проверяем\
    \ следующую пару\n\n# Если все пары прошли проверку:\n# grouping_allowed = true\
    \ (необходимое условие выполнено)\n"
  formalization_notes: "Уровни сложности (complexity_level) — иерархическая характеристика\
    \ фигуры:\n  0 = моноволна (одиночное движение цены)\n  1 = поливолна (группа\
    \ моноволн)\n  2 = мультиволна (группа поливолн)\n  3+ = макроволна и выше\n\n\
    Verbatim: \"Убедитесь, что Уровни Сложности смежных (последовательно\nрасположенных)\
    \ ценовых фигур ... отличаются не более чем на единицу.\n... по методу Нили это\
    \ было бы невозможно, если бы уровни сложности\nданных волн отличались более чем\
    \ на единицу.\"\n\nПравило является необходимым условием группировки, но не достаточным\
    \ —\nдругие правила также должны быть выполнены.\n\nПравило применяется ко ВСЕМ\
    \ парам смежных фигур в рассматриваемой\nпоследовательности, а не только к непосредственно\
    \ группируемым."

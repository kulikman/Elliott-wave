  page: 3-68
  chapter: 'Глава 3: Предварительный анализ'
  section: Особые условия
  figure_id: null
  verbatim_quote:
    text: Убедитесь, что Уровни Сложности смежных (последовательно расположенных)
      ценовых фигур ... отличаются не более чем на единицу. ... по методу Нили это
      было бы невозможно, если бы уровни сложности данных волн отличались более чем
      на единицу.
    language: ru
formalization:
  status: draft
  applies_when: grouping two adjacent waves/figures into a larger figure
  constraint: abs(complexity_level(fig_i) - complexity_level(fig_i+1)) <= 1
  formalization_notes: 'Уровни сложности: 0=моноволна, 1=поливолна, 2=мультиволна,
    3+=макроволна (Гл.7).'

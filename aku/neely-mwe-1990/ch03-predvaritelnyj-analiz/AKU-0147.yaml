statement_ru: 'В Структурных списках семантика скобок: обозначение без скобок — обычная
  вероятность; в круглых скобках ( ) — вероятность невысока; в квадратных скобках
  [ ] — крайне низкая вероятность реализации этого структурного обозначения.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-32
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики
  figure_id: null
  verbatim_quote:
    text: Квадратные скобки указывают на крайне низкую вероятность возможности реализации
      предположения о заключенном в них Структурном обозначении, а круглые скобки
      означают, что вероятность эта невысока – ниже вероятности того, что верными
      окажутся гипотезы для свободных от скобок Структурных обозначений.

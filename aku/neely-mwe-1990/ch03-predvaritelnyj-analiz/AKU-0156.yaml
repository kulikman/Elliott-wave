statement_ru: Если компактная ценовая фигура пересекает свой собственный начальный
  уровень до завершения, её базовая Структура коррективна (:3) — вне зависимости от
  рекомендаций Неформальных правил логики.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-68
  chapter: 'Глава 3: Предварительный анализ'
  section: Особые условия
  figure_id: null
  verbatim_quote:
    text: Если в процессе сведения ряда Структурных обозначений к одному символу обнаружена
      активность компактной ценовой фигуры, начальный уровень которой пересекается
      до ее завершения ... то базовая Структура такой компактной ценовой фигуры является
      коррективной по своему характеру («:3»), вне зависимости от рекомендаций Неформальных
      правил логики.
    language: ru

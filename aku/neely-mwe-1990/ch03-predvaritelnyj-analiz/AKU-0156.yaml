statement_ru: Если компактная ценовая фигура пересекает свой собственный начальный
  уровень до завершения, её базовая Структура коррективна (:3) — вне зависимости от
  рекомендаций Неформальных правил логики.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-68
  chapter: 'Глава 3: Предварительный анализ'
  section: Особые условия
  figure_id: null
  verbatim_quote:
    text: Если в процессе сведения ряда Структурных обозначений к одному символу обнаружена
      активность компактной ценовой фигуры, начальный уровень которой пересекается
      до ее завершения ... то базовая Структура такой компактной ценовой фигуры является
      коррективной по своему характеру («:3»), вне зависимости от рекомендаций Неформальных
      правил логики.
    language: ru
formalization:
  status: draft
  applies_when: '# Контекст: процесс компактификации (compaction) — сведение ряда

    # Структурных обозначений к одному символу.

    # Имеется компактная ценовая фигура (compact_figure) с определённым

    # начальным уровнем (start_level).

    #

    # Условие: цена пересекает начальный уровень фигуры ДО её завершения.


    is_compaction_process == true

    AND figure = current_compact_figure

    AND figure.is_complete == false

    AND price_crosses_level(figure.start_price, before=figure.end_point)


    # price_crosses_level означает, что в ходе развития фигуры

    # цена возвращается к уровню figure.start_price и пересекает его

    # (т.е. фигура "заходит" за свою начальную точку до завершения)

    '
  constraint: '# Базовая Структура такой компактной фигуры принудительно

    # устанавливается как коррективная (:3), вне зависимости от того,

    # что могли рекомендовать Неформальные правила логики.


    figure.base_structure = '':3''   # коррективная


    # Это правило ПЕРЕОПРЕДЕЛЯЕТ (override) любые рекомендации

    # Неформальных правил логики (Informal Logic Rules),

    # которые могли бы назначить иную структуру (например, :5).


    override_informal_logic_rules = true

    '
  formalization_notes: "1. \"Пересечение начального уровня\" — цена в процессе развития\
    \ фигуры\n   возвращается к price-level начальной точки фигуры и проходит через\
    \ него.\n   Направление пересечения (сверху вниз или снизу вверх) не уточняется\
    \ —\n   подразумевается любое пересечение.\n2. \"До завершения\" — пересечение\
    \ происходит в рамках ещё не завершённой\n   компактной фигуры (до момента, когда\
    \ она считается закрытой/компактифицированной).\n3. Правило является mandatory\
    \ и жёстко переопределяет Неформальные правила логики.\n4. Точное определение\
    \ \"компактной ценовой фигуры\" и процесса компактификации\n   зависит от контекста\
    \ главы 3 (сведение Структурных обозначений)."

id: AKU-0156
type: rule
strength: mandatory
status: verified
topic: structural-labels
subtopics:
- wave-identification
- compaction
statement_ru: Если компактная ценовая фигура пересекает свой собственный начальный
  уровень до завершения, её базовая Структура коррективна (:3) — вне зависимости от
  рекомендаций Неформальных правил логики.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-68
  chapter: 'Глава 3: Предварительный анализ'
  section: Особые условия
  figure_id: null
  verbatim_quote:
    text: Если в процессе сведения ряда Структурных обозначений к одному символу обнаружена
      активность компактной ценовой фигуры, начальный уровень которой пересекается
      до ее завершения ... то базовая Структура такой компактной ценовой фигуры является
      коррективной по своему характеру («:3»), вне зависимости от рекомендаций Неформальных
      правил логики.
    language: ru
formalization:
  status: draft
  applies_when: '# Контекст: процесс компактификации (compaction) — сведение ряда

    # Структурных обозначений к одному символу.

    # compact_figure — текущая компактная ценовая фигура, формируемая

    # в процессе компактификации.


    is_compaction_process == true

    AND compact_figure.is_complete == false

    AND price_has_crossed_start_level(compact_figure)


    # price_has_crossed_start_level определяется так:

    #

    # IF compact_figure.initial_direction == UP:

    #     any(bar.low < compact_figure.start_price for bar in compact_figure.bars)

    # ELIF compact_figure.initial_direction == DOWN:

    #     any(bar.high > compact_figure.start_price for bar in compact_figure.bars)

    #

    # Т.е. в ходе развития фигуры (до её завершения) цена пересекла

    # ценовой уровень начальной точки фигуры — ушла по другую сторону

    # от start_price относительно направления начального движения.

    '
  constraint: '# Базовая Структура компактной фигуры принудительно назначается

    # как коррективная (:3), вне зависимости от рекомендаций

    # Неформальных правил логики (Informal Logic Rules).


    compact_figure.base_structure = '':3''  # коррективная


    # Данное правило является mandatory и ПЕРЕОПРЕДЕЛЯЕТ любые

    # рекомендации Неформальных правил логики, которые могли бы

    # назначить иную структуру (например :5).

    #

    # IF informal_logic_rules_recommendation(compact_figure) != '':3'':

    #     ignore informal_logic_rules_recommendation

    #     compact_figure.base_structure = '':3''  # принудительно

    '
  formalization_notes: "1. \"Пересечение начального уровня\" — из verbatim_quote:\
    \ \"начальный уровень\n   которой пересекается до ее завершения\". Цена в процессе\
    \ развития фигуры\n   возвращается к price-level начальной точки и проходит через\
    \ него.\n   Направление пересечения определяется контекстом: если фигура начиналась\n\
    \   движением вверх, пересечение — уход цены ниже start_price, и наоборот.\n2.\
    \ \"До завершения\" — пересечение происходит пока фигура ещё не завершена\n  \
    \ (не закрыта / не компактифицирована в один символ).\n3. Правило mandatory —\
    \ жёстко переопределяет Неформальные правила логики.\n4. Точное определение \"\
    компактной ценовой фигуры\" и процесса компактификации\n   зависит от контекста\
    \ главы 3 (сведение Структурных обозначений).\n   Алгоритм определения compact_figure\
    \ и момента её завершения\n   должен быть определён отдельно в рамках реализации\
    \ compaction.\n5. Понятие \"Неформальные правила логики\" (Informal Logic Rules)\
    \ —\n   отдельный набор правил из главы 3, дающих рекомендации по назначению\n\
    \   структурных обозначений. Данное правило имеет приоритет над ними."

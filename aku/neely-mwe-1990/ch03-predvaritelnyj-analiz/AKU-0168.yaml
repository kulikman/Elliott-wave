statement_ru: 'Правило 5 (100% ≤ m2/m1 < 161.8%): структурный список m1 = {:F3, :c3,
  :5, :L5, (:L3)}. Вероятная метка :F3.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-51
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / структурные списки
  figure_id: null
  verbatim_quote:
    text: Правило 5 {:F3/:c3/:5/:L5/(:L3)}
    language: ru
formalization:
  status: draft
  applies_when: '# Правило 5 из неформальных правил логики / структурных списков

    # Применяется при определении структурной метки моноволны m1

    # когда отношение длины следующей моноволны m2 к m1 попадает в диапазон [100%,
    161.8%)

    ratio_m2_m1 = abs(m2.length) / abs(m1.length)

    ratio_m2_m1 >= 1.0 AND ratio_m2_m1 < 1.618

    '
  constraint: '# Структурный список для m1 при выполнении Правила 5:

    # m1 может иметь одну из следующих структурных меток:

    #   :F3   — Flat (тройка), наиболее вероятная

    #   :c3   — corrective тройка

    #   :5    — пятёрка (импульс или терминал)

    #   :L5   — пятёрка с удлинением

    #   (:L3) — тройка с удлинением (в скобках = пониженная вероятность)


    allowed_labels_m1 = ['':F3'', '':c3'', '':5'', '':L5'']

    conditional_labels_m1 = ['':L3'']  # скобки в оригинале — пониженная вероятность


    structure(m1) IN allowed_labels_m1 OR structure(m1) IN conditional_labels_m1


    # Наиболее вероятная (primary) метка:

    primary_label_m1 = '':F3''


    # Приоритет меток (порядок из verbatim_quote):

    # 1. :F3   (primary, наиболее вероятная)

    # 2. :c3

    # 3. :5

    # 4. :L5

    # 5. :L3   (наименее вероятная, условная — обозначена скобками в оригинале)

    '
  formalization_notes: 'Правило определяет допустимые структурные метки для моноволны
    m1

    на основании соотношения длин m2/m1 (Правило 5: от 100% включительно до 161.8%
    не включительно).

    Verbatim quote: "Правило 5 {:F3/:c3/:5/:L5/(:L3)}".

    Скобки вокруг :L3 в оригинале означают пониженную вероятность данной метки.

    Порядок приоритета меток (кроме явно указанной primary :F3 и условной (:L3))

    принят по порядку перечисления в verbatim_quote — это допущение,

    так как явного указания приоритета в источнике нет.

    Понятие "length" (длина) моноволны — ценовое расстояние (price distance).'

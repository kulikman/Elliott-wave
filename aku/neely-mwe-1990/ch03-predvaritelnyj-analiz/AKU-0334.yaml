statement_ru: 'Если объект измерения специально не оговорён в описании Правила, то
  по умолчанию измеряется ценовая длина волны (а не временная).

  '
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Конвенции измерений
  figure_id: null
  verbatim_quote:
    text: 'По умолчанию (если объект измерения не оговорён) измеряется ценовая длина
      волны.

      '
    language: ru
formalization:
  status: not_formalizable
  applies_when: '# Это мета-правило (конвенция интерпретации), а не правило о структуре
    волн.

    # Оно определяет, как читать другие правила, когда в них упоминается

    # "длина волны" без уточнения — имеется в виду ценовая длина (price distance),

    # а не временная (time duration).

    '
  constraint: '# Конвенция для парсера/интерпретатора правил:

    #

    # WHEN rule_text mentions "длина волны" or "wave length" or comparison of waves

    #   AND rule_text does NOT explicitly specify measurement_type

    # THEN

    #   measurement_type = PRICE  # (не TIME)

    #

    # То есть:

    #   wave_length(W) = abs(price(end(W)) - price(start(W)))  # по умолчанию

    #   # а НЕ time_length(W) = time(end(W)) - time(start(W))

    '
  formalization_notes: 'Это не ограничение на структуру волн, а мета-конвенция для
    интерпретации

    других правил. Она не может быть выражена как constraint на волновую разметку.

    Для реализации в коде это означает, что функция измерения волны по умолчанию

    должна возвращать ценовое расстояние (price distance), если явно не указано иное.

    В алгоритме это реализуется как дефолтный параметр функции measurement(),

    а не как проверяемое правило.'
aliases:
- умолчание ценовой длины

statement_ru: Если объект измерения при проверке гипотезы не оговорён особо, по умолчанию
  измеряется ценовая длина волны (а не временная).
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Конвенции измерений
  figure_id: null
  verbatim_quote:
    text: Если при проверке обоснованности той или иной гипотезы необходимо произвести
      какие-либо измерения, объект которых ... не оговаривается особо, по умолчанию
      измеряется ценовая длина волны.
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется всегда, когда в правиле или проверке гипотезы требуется

    # измерить "длину волны" и при этом явно НЕ указан тип измерения

    # (ценовой или временной).

    measurement_required == true AND dimension_not_specified == true

    '
  constraint: "# По умолчанию \"длина волны\" означает ценовую длину (price length),\n\
    # а не временную (time length).\n#\n# Определение:\n#   price_length(wave) = abs(price_end(wave)\
    \ - price_start(wave))\n#   time_length(wave)  = time_end(wave) - time_start(wave)\n\
    #\n# Конвенция по умолчанию:\ndef wave_length(wave, dimension=None):\n    if dimension\
    \ is not None:\n        if dimension == \"price\":\n            return price_length(wave)\n\
    \        elif dimension == \"time\":\n            return time_length(wave)\n \
    \   else:\n        # По умолчанию — ценовая длина\n        return price_length(wave)\n\
    \n# Эквивалентно:\n# length(wave) := price_length(wave)  когда dimension не указан\n"
  formalization_notes: 'original_status: formalized. Это не ограничение на структуру
    волн, а конвенция измерения (meta-rule),

    определяющая интерпретацию термина "длина волны" во всех остальных правилах.

    При реализации в коде это означает, что функция измерения длины волны

    по умолчанию должна возвращать abs(price_end - price_start),

    если явно не запрошено временное измерение.'

statement_ru: Если объект измерения при проверке гипотезы не оговорён особо, по умолчанию
  измеряется ценовая длина волны (а не временная).
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Конвенции измерений
  figure_id: null
  verbatim_quote:
    text: Если при проверке обоснованности той или иной гипотезы необходимо произвести
      какие-либо измерения, объект которых ... не оговаривается особо, по умолчанию
      измеряется ценовая длина волны.
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется всегда, когда какое-либо правило требует измерить "длину
    волны"

    # и при этом тип измерения (ценовой или временной) явно НЕ указан.

    measurement_type_not_explicitly_specified == true

    '
  constraint: "# Конвенция по умолчанию: \"длина волны\" означает ценовую длину (price\
    \ length).\n#\n# Определения:\n#   price_length(wave) = abs(price_end(wave) -\
    \ price_start(wave))\n#   time_length(wave)  = time_end(wave) - time_start(wave)\n\
    #\n# Функция длины волны:\ndef wave_length(wave, dimension=None):\n    if dimension\
    \ == \"price\":\n        return abs(price_end(wave) - price_start(wave))\n   \
    \ elif dimension == \"time\":\n        return time_end(wave) - time_start(wave)\n\
    \    else:\n        # По умолчанию — ценовая длина\n        return abs(price_end(wave)\
    \ - price_start(wave))\n#\n# Иными словами:\n# length(wave) := abs(price_end(wave)\
    \ - price_start(wave))  когда dimension не указан\n"
  formalization_notes: 'original_status: formalized. Это мета-правило (конвенция измерения),
    а не ограничение на структуру волн.

    Оно определяет интерпретацию термина "длина волны" во всех остальных правилах.

    При реализации в коде: любая функция, принимающая "длину волны" без явного

    указания dimension, должна использовать price_length.

    Verbatim: "по умолчанию измеряется ценовая длина волны".'

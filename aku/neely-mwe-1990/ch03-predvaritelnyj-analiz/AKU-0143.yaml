statement_ru: 'Категория Условия (i/ii/iii) применяется при Правиле 4 и определяется
  соотношением m3/m2: 100–161.8%→i; 161.8–261.8%→ii; >261.8%→iii.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-26
  chapter: 'Глава 3: Предварительный анализ'
  section: Правила соотношений длин волн / Категории Правила 4
  figure_id: null
  verbatim_quote:
    text: 'Категория i: если длина m3 не меньше 100%, но меньше 161,8% длины m2; Категория
      ii: если длина m3 лежит в пределах 161,8–261,8% длины m2 (включительно); Категория
      iii: если длина m3 больше 261,8% длины m2.'
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при определении категории условия для Правила 4

    # m2 и m3 — две последовательные моноволны, где m3 следует за m2

    rule == 4

    '
  constraint: "ratio_m3_m2 = length(m3) / length(m2)\n\nif ratio_m3_m2 >= 1.000 AND\
    \ ratio_m3_m2 < 1.618:\n    condition_category = \"i\"\nelif ratio_m3_m2 >= 1.618\
    \ AND ratio_m3_m2 <= 2.618:\n    condition_category = \"ii\"\nelif ratio_m3_m2\
    \ > 2.618:\n    condition_category = \"iii\"\nelse:\n    # ratio_m3_m2 < 1.000\
    \ — данное правило не определяет категорию для этого случая\n    condition_category\
    \ = UNDEFINED\n"
  formalization_notes: "- Граница 161.8%: в verbatim_quote категория i — \"меньше\
    \ 161,8%\", категория ii — \"в пределах 161,8–261,8% (включительно)\".\n  Значит\
    \ 1.618 принадлежит категории ii (включительно), а категория i строго < 1.618.\n\
    - Граница 261.8%: категория ii включает 261.8% (\"включительно\"), категория iii\
    \ — \"больше 261,8%\".\n  Значит 2.618 принадлежит категории ii, а категория iii\
    \ строго > 2.618.\n- Случай ratio < 1.000 (m3 короче m2) не описан в данном правиле\
    \ — категория не назначается.\n- length() — ценовая длина (абсолютная разница\
    \ по цене) моноволны."

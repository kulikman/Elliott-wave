statement_ru: 'Правило 7 (m2/m1 > 261.8%): возможна любая Структура m1. Если ни одно
  описание не подходит — через Индикаторы положения (стр. 3-61). Условия favor :5/:s5,
  :L5, :L3, :F3.'

formalization:
  status: draft
  applies_when: '# Правило 7 структурных списков: применяется при определении

    # структурной метки моноволны m1 на основе отношения m2/m1

    ratio_m2_m1 = length(m2) / length(m1)

    applies = ratio_m2_m1 > 2.618

    '
  constraint: "# При m2/m1 > 261.8% — m1 может иметь любую структурную метку.\n# Формально\
    \ ограничений по соотношению длин нет.\nallowed_structures(m1) = ALL_STRUCTURES\
    \  # {:5, :s5, :L5, :L3, :F3, :3, :c3, ...}\n\n# Предпочтительные (favored) структуры:\n\
    favored_structures(m1) = [:5, :s5, :L5, :L3, :F3]\n\n# Алгоритм выбора:\n# 1.\
    \ Если m1 удовлетворяет конкретному описанию из других правил —\n#    использовать\
    \ ту структуру (любая допустима).\n# 2. Если ни одно конкретное описание не подходит\
    \ —\n#    разрешить через последовательности Индикаторов положения (стр. 3-61).\n\
    if no_specific_description_matches(m1):\n    structure(m1) = resolve_via_position_indicator_sequences(m1)\n\
    # 3. При наличии нескольких кандидатов — предпочтение отдаётся favored_structures.\n\
    if multiple_candidates(m1):\n    prefer(candidates, favored_structures)\n"
  formalization_notes: "1. Правило 7 — случай очень большого отката (m2 > 261.8% от\
    \ m1).\n2. Любая структура формально допустима, но favored: :5, :s5, :L5, :L3,\
    \ :F3\n   (извлечено из statement_ru).\n3. Механизм \"Индикаторов положения\"\
    \ (Position Indicator Sequences, стр. 3-61) —\n   отдельная процедура, не описанная\
    \ в данном AKU. Требуется связь с AKU,\n   описывающими Position Indicator Sequences.\n\
    4. Условие \"ни одно описание не подходит\" (no_specific_description_matches)\
    \ —\n   качественное; формализация зависит от полного набора правил структурных\
    \ списков."

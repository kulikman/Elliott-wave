statement_ru: 'Правило 6 (161.8% ≤ m2/m1 ≤ 261.8%): возможна любая Структура m1. Если
  ни одно описание не подходит — определять метку через последовательности Индикаторов
  положения (стр. 3-61).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-55
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / структурные списки
  figure_id: null
  verbatim_quote:
    text: Правило 6 {возможна любая Структура; если ни одно из описаний не подходит,
      смотрите раздел о последовательностях Индикаторов положения на стр. 3-61}
    language: ru
formalization:
  status: draft
  applies_when: '# Правило 6 применяется при определении структурной метки моноволны
    m1,

    # когда отношение длины следующей моноволны m2 к m1 попадает в диапазон [161.8%,
    261.8%]

    ratio_m2_m1 = length(m2) / length(m1)

    applies = ratio_m2_m1 >= 1.618 AND ratio_m2_m1 <= 2.618

    '
  constraint: "# При выполнении условия Правила 6:\n# 1. Для m1 допускается любая\
    \ структурная метка (Structure Label) — нет ограничений\nallowed_structures(m1)\
    \ = ALL_STRUCTURES  # {:F3, :c3, :s5, :L5, :L3, ...}\n\n# 2. Если ни одно из описаний\
    \ (из других правил/контекстов) не подходит для m1,\n#    то структурную метку\
    \ m1 следует определять через последовательности\n#    Индикаторов положения (Position\
    \ Indicators, стр. 3-61)\nif no_description_matches(m1):\n    structure(m1) =\
    \ resolve_via_position_indicator_sequences(m1)\n"
  formalization_notes: 'Правило 6 — наименее ограничивающее из структурных правил:
    большой откат (161.8%–261.8%)

    делает структуру m1 полностью неоднозначной, допуская любую метку.

    Фактический механизм разрешения неоднозначности — через последовательности Индикаторов

    положения (Position Indicator sequences) — описан отдельно (стр. 3-61) и должен
    быть

    формализован в соответствующих AKU. Данное правило лишь указывает на fallback-механизм.

    Конкретный алгоритм resolve_via_position_indicator_sequences() здесь не детализирован,

    так как он не описан в verbatim_quote данного AKU.'

statement_ru: Каждая конфигурация Эллиота состоит из нечётного количества волн. Между
  двумя граничными точками фигуры (волнами :L5/:L3) число волн должно быть нечётным;
  при чётном — поиск границы продолжается справа налево.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-66
  chapter: 'Глава 3: Предварительный анализ'
  section: Процедуры выделения ценовых фигур
  figure_id: null
  verbatim_quote:
    text: Поскольку каждая конфигурация Эллиота должна состоять из нечетного количества
      волн, необходимо сосчитать число волн между двумя закрашенными кружками и, в
      случае его четности, продолжить поиск другой волны ... т. е. в обратном временном
      порядке.
    language: ru

statement_ru: :F3 (первая тройка, First 3) — первый сегмент группы, либо возникает
  после x:c3, либо между двумя :5. Если две :F3 идут подряд, вторая начинает новую
  (меньшую) ценовую фигуру.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-61
  chapter: 'Глава 3: Предварительный анализ'
  section: Определения Индикаторов положения / :F3
  figure_id: null
  verbatim_quote:
    text: Аббревиатура ":F3" расшифровывается как "первая тройка" ("First 3"). Волна
      с этим Структурным обозначением либо первый сегмент группы, возникающий либо
      "x:c3", либо встречается между двумя "пятерками" (":5"). Если две "первые тройки"
      (":F3") встречаются подряд, значит, второй из них начинается новая ценовая фигура.
    language: ru
formalization:
  status: draft
  applies_when: assigning :F3 within a group
  constraint: position(:F3) == first(group) OR prev == 'x:c3' OR between two :5 ;
    two :F3 in a row => second starts new figure

statement_ru: Правила соотношений длин нельзя применять к компактным ценовым фигурам,
  пересекающим свой собственный начальный уровень; работать следует только с базовой
  Структурой (:3/:5) таких фигур.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-33
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило преобразования обозначений
  figure_id: null
  verbatim_quote:
    text: не применяйте эти Правила к компактным ценовым фигурам, пересекающим свой
      собственный начальный уровень; работайте только с базовой Структурой таких ценовых
      фигур.
    language: ru
formalization:
  status: draft
  applies_when: "# Фигура является результатом процедуры компактирования (compaction)\n\
    figure.is_compact == true\n# И фигура пересекает свой собственный начальный уровень\n\
    AND figure_crosses_own_start_level(figure) == true\n\n# Определение пересечения\
    \ начального уровня:\ndef figure_crosses_own_start_level(fig):\n  start_level\
    \ = fig.start.price\n  # Собираем все точки внутри фигуры (кроме самого старта)\n\
    \  internal_points = [wave.end for wave in fig.waves]\n  if fig.direction == UP:\n\
    \    # Для бычьей фигуры: какая-либо точка опускается ниже уровня старта\n   \
    \ return any(p.price < start_level for p in internal_points)\n  elif fig.direction\
    \ == DOWN:\n    # Для медвежьей фигуры: какая-либо точка поднимается выше уровня\
    \ старта\n    return any(p.price > start_level for p in internal_points)\n"
  constraint: "# ЗАПРЕТ: правила соотношений длин (length ratio rules) НЕ применяются\n\
    # к подволнам данной компактной фигуры\nfor rule in length_ratio_rules:\n  rule.is_applicable_to(figure.subwaves)\
    \ = false\n\n# РАЗРЕШЕНО: работать только с базовой Структурой (:3 или :5)\n#\
    \ Т.е. классифицировать фигуру по количеству подволн\nfigure.base_structure =\
    \ count_subwaves(figure)  # результат: :3 или :5\n\n# Примеры правил, которые\
    \ НЕ проверяются для таких фигур:\n#   - wave3.length >= wave1.length\n#   - wave5.length\
    \ vs wave3.length\n#   - wave2.length vs wave1.length\n#   - любые другие пропорциональные\
    \ соотношения длин подволн\n\n# Классификация :3/:5 остаётся валидной и используется\n\
    # для дальнейшего анализа на более высоком уровне\n"
  formalization_notes: "1. \"Компактная ценовая фигура\" — фигура, полученная в результате\
    \ процедуры\n   компактирования (compaction), т.е. группа моноволн, объединённых\
    \ в одну\n   структурную единицу. Точное определение compaction — в других AKU.\n\
    2. \"Пересекает свой собственный начальный уровень\" — цена в ходе развития\n\
    \   фигуры возвращается за ценовой уровень начала этой фигуры. Правило\n   НЕ\
    \ распространяется на все компактные фигуры, а только на те, которые\n   пересекают\
    \ свой начальный уровень.\n3. \"Правила соотношений длин\" — правила, определяющие\
    \ допустимые пропорции\n   между длинами подволн. Конкретный перечень определяется\
    \ другими AKU.\n4. \"Базовая Структура (:3/:5)\" — классификация фигуры как трёхволновой\
    \ или\n   пятиволновой по количеству подволн, без проверки пропорций.\n5. Неясность:\
    \ достаточно ли пересечения начального уровня концом любой подволны,\n   или нужно\
    \ учитывать также внутриволновые экстремумы (high/low каждой подволны).\n   В\
    \ текущей формализации проверяются только конечные точки подволн."

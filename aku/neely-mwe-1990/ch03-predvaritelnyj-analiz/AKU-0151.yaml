  page: 3-33
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило преобразования обозначений
  figure_id: null
  verbatim_quote:
    text: не применяйте эти Правила к компактным ценовым фигурам, пересекающим свой
      собственный начальный уровень; работайте только с базовой Структурой таких ценовых
      фигур.

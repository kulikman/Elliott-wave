statement_ru: x:c3 (центральная тройка в позиции x-волны) никогда не первый/последний
  сегмент; возникает между Стандартными фигурами, объединяя простые коррекции в более
  крупные. Её уровень сложности не выше завершённой предшествующей фигуры; следующая
  фигура обычно на уровень ниже обеих окружающих. :c3 можно преобразовать в x:c3,
  но не наоборот.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-62
  chapter: 'Глава 3: Предварительный анализ'
  section: Определения Индикаторов положения / x:c3
  figure_id: null
  verbatim_quote:
    text: Волна с этим Структурным обозначением никогда не может быть первым либо
      последним сегментом последовательности ... Такая волна возникает между Стандартными
      ценовыми фигурами Эллиота, объединяя простые коррекции в более крупные конфигурации.
      ... уровень сложности волны с обозначением "x:c3" не может быть выше уровня
      сложности завершенной ценовой фигуры Эллиота, предшествующей "x:c3".
    language: ru
formalization:
  status: draft
  applies_when: '# Когда сегменту присваивается структурное обозначение x:c3

    # (центральная тройка в позиции x-волны, связывающая стандартные фигуры)

    candidate_label == "x:c3"

    '
  constraint: "# ПРАВИЛО 1: x:c3 никогда не может быть первым или последним сегментом\
    \ последовательности\n# Источник verbatim: \"Волна с этим Структурным обозначением\
    \ никогда не может быть\n# первым либо последним сегментом последовательности\"\
    \nsegment_index = index_of(current_segment, sequence)\ntotal_segments = length(sequence)\n\
    \nASSERT segment_index != 0                    # не первый сегмент\nASSERT segment_index\
    \ != (total_segments - 1) # не последний сегмент\n\n# ПРАВИЛО 2: x:c3 возникает\
    \ между Стандартными ценовыми фигурами Эллиотта\n# Источник verbatim: \"Такая\
    \ волна возникает между Стандартными ценовыми фигурами\n# Эллиота, объединяя простые\
    \ коррекции в более крупные конфигурации.\"\npreceding_figure = completed_pattern_before(current_segment)\n\
    following_figure = pattern_after(current_segment)\n\nASSERT is_standard_elliott_pattern(preceding_figure)\n\
    ASSERT is_standard_elliott_pattern(following_figure)\n\n# ПРАВИЛО 3: Уровень сложности\
    \ x:c3 не выше уровня сложности\n# завершённой предшествующей фигуры\n# Источник\
    \ verbatim: \"уровень сложности волны с обозначением \"x:c3\" не может быть\n\
    # выше уровня сложности завершенной ценовой фигуры Эллиота, предшествующей \"\
    x:c3\".\"\nASSERT complexity(current_segment) <= complexity(preceding_figure)\n\
    \n# ПРАВИЛО 4: Преобразование — :c3 можно преобразовать в x:c3, но не наоборот\n\
    # Источник statement_ru: \":c3 можно преобразовать в x:c3, но не наоборот\"\n\
    # Это правило процесса переназначения меток:\nIF previous_label(current_segment)\
    \ == \":c3\":\n    ALLOW relabel to \"x:c3\"\nIF current_label(current_segment)\
    \ == \"x:c3\":\n    DENY relabel to \":c3\"\n"
  formalization_notes: "1. Утверждение \"следующая фигура обычно на уровень ниже обеих\
    \ окружающих\"\n   присутствует в statement_ru, но НЕ подтверждено в verbatim_quote.\n\
    \   Слово \"обычно\" указывает на тенденцию, а не mandatory constraint.\n   Не\
    \ формализовано как ASSERT. При необходимости можно добавить как guideline:\n\
    \   # SOFT: complexity(following_figure) == min(complexity(preceding_figure),\
    \ complexity(x_c3_segment)) - 1\n2. Функция complexity() возвращает числовой уровень\
    \ сложности фигуры\n   (0 = простейшая моноволна, далее по возрастанию).\n3. is_standard_elliott_pattern()\
    \ — внешняя функция, проверяющая принадлежность\n   фигуры к набору стандартных\
    \ паттернов Эллиотта (импульс, зигзаг, плоская,\n   треугольник и т.д.). Требует\
    \ внешнего справочника.\n4. Правило преобразования (пункт 4) относится к процессу\
    \ переназначения меток"

statement_ru: 'Правило 1 (m2/m1 < 38.2%): структурный список возможных обозначений
  m1 = {:5, (:c3), (x:c3), [:sL3], [:s5]}. Наиболее вероятно :5 (Импульс).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-33
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило 1
  figure_id: null
  verbatim_quote:
    text: 'справа от заголовка ... Правило 1 располагается следующий Структурный список:
      {:5/(:c3)/(x:c3)/[:sL3]/[:s5]}'
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при предварительном анализе моноволны m1

    # когда откат следующей моноволны m2 составляет менее 38.2% от m1

    # (это определяет "Правило 1" неформальных правил логики)

    ratio_m2_m1 = length(m2) / length(m1)

    applies = ratio_m2_m1 < 0.382

    '
  constraint: "# Структурный список возможных обозначений для m1:\nallowed_structures_m1\
    \ = [':5', '(:c3)', '(x:c3)', '[:sL3]', '[:s5]']\nstructure(m1) IN allowed_structures_m1\n\
    \n# Приоритет (наиболее вероятное обозначение первым):\n# 1. ':5'      — наиболее\
    \ вероятно (Импульс)\n# 2. '(:c3)'   — менее вероятно\n# 3. '(x:c3)'  — менее\
    \ вероятно\n# 4. '[:sL3]'  — менее вероятно\n# 5. '[:s5]'   — менее вероятно\n\
    \nprobability_rank = {\n  ':5':     1,\n  '(:c3)':  2,\n  '(x:c3)': 3,\n  '[:sL3]':\
    \ 4,\n  '[:s5]':  5\n}\n"
  formalization_notes: "- Правило 1 активируется когда откат m2 составляет менее 38.2%\
    \ от длины m1.\n- Согласно verbatim_quote, структурный список: {:5/(:c3)/(x:c3)/[:sL3]/[:s5]}.\n\
    - Обозначение ':5' (Импульс) указано в statement_ru как наиболее вероятное.\n\
    - Нотация структурных меток по Нили:\n    :5     — импульсная пятёрка (без скобок\
    \ — базовый уровень)\n    (:c3)  — коррективная тройка в круглых скобках\n   \
    \ (x:c3) — x-волна, коррективная тройка в круглых скобках\n    [:sL3] — тройка\
    \ в квадратных скобках (sL-тип)\n    [:s5]  — пятёрка в квадратных скобках\n-\
    \ Правило является conditional — допускает отклонения в контексте\n  более крупной\
    \ структуры.\n- Порядок приоритетов кроме первого (':5') явно не указан в источнике;\n\
    \  ранжирование 2-5 предполагается по порядку перечисления в структурном списке."

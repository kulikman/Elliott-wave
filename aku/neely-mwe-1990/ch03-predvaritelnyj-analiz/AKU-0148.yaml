statement_ru: 'Правило 1 (m2/m1 < 38.2%): структурный список возможных обозначений
  m1 = {:5, (:c3), (x:c3), [:sL3], [:s5]}. Наиболее вероятно :5 (Импульс).'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-33
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Правило 1
  figure_id: null
  verbatim_quote:
    text: 'справа от заголовка ... Правило 1 располагается следующий Структурный список:
      {:5/(:c3)/(x:c3)/[:sL3]/[:s5]}'
    language: ru
formalization:
  status: draft
  applies_when: '# Контекст: предварительный анализ моноволны m1

    # Условие активации: откат следующей моноволны m2 < 38.2% от длины m1

    # Это соответствует "Правило 1" неформальных правил логики (Глава 3)


    ratio_m2_m1 = price_length(m2) / price_length(m1)

    applies = ratio_m2_m1 < 0.382

    '
  constraint: "# Структурный список возможных обозначений для m1\n# Источник (verbatim):\
    \ {:5/(:c3)/(x:c3)/[:sL3]/[:s5]}\n\nallowed_structures_m1 = [':5', '(:c3)', '(x:c3)',\
    \ '[:sL3]', '[:s5]']\nstructure(m1) IN allowed_structures_m1\n\n# Приоритет (наиболее\
    \ вероятное обозначение):\n# ':5' — наиболее вероятно (Импульс) — явно указано\
    \ в statement_ru\n# Остальные — по порядку перечисления в структурном списке verbatim_quote\n\
    \nprobability_rank = {\n  ':5':     1,   # наиболее вероятно (Импульс) — явно\
    \ из statement_ru\n  '(:c3)':  2,   # порядок из verbatim_quote\n  '(x:c3)': 3,\
    \   # порядок из verbatim_quote\n  '[:sL3]': 4,   # порядок из verbatim_quote\n\
    \  '[:s5]':  5    # порядок из verbatim_quote\n}\n"
  formalization_notes: "- Правило 1 активируется когда откат m2 составляет менее 38.2%\
    \ от длины m1.\n- Структурный список взят дословно из verbatim_quote: {:5/(:c3)/(x:c3)/[:sL3]/[:s5]}.\n\
    - Обозначение ':5' (Импульс) указано в statement_ru как наиболее вероятное.\n\
    - Нотация структурных меток по Нили:\n    :5     — импульсная пятёрка (без скобок\
    \ — базовый уровень)\n    (:c3)  — коррективная тройка в круглых скобках\n   \
    \ (x:c3) — x-волна, коррективная тройка в круглых скобках\n    [:sL3] — тройка\
    \ в квадратных скобках (sL-тип)\n    [:s5]  — пятёрка в квадратных скобках\n-\
    \ Ранжирование приоритетов 2-5 явно не указано в источнике;\n  порядок предполагается\
    \ по порядку перечисления в структурном списке verbatim_quote.\n- Правило является\
    \ conditional — допускает отклонения в контексте\n  более крупной структуры.\n\
    - price_length(m) означает ценовую длину (вертикальное расстояние) моноволны."

id: AKU-0335
type: rule
strength: conditional
status: verified
topic: informal-logic-rules
subtopics:
- structural-labels
- position-indicators
statement_ru: 'При Правиле 6 (161.8% ≤ m2/m1 ≤ 261.8%), если ни одно описание условий
  не подходит, то следует обратиться к последовательностям Индикаторов положения (стр.
  3-61) для определения структуры.

  '
source:
  book_id: neely-mwe-1990
  page: 3-44
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Структурные списки Правил 4-7
  figure_id: null
  verbatim_quote:
    text: 'Правило 6 (161.8% ≤ m2/m1 ≤ 261.8%): возможна ЛЮБАЯ Структура; если ни
      одно описание не подходит — см. последовательности Индикаторов положения (стр.
      3-61).

      '
    language: ru
formalization:
  status: not_formalizable
  applies_when: '# Правило 6 активно:

    rule_number == 6

    AND ratio_m2_m1 = abs(m2) / abs(m1)

    AND ratio_m2_m1 >= 1.618

    AND ratio_m2_m1 <= 2.618

    # И ни одно из описаний условий Правила 6 не подошло:

    AND no_rule6_condition_matched == true

    '
  constraint: '# Действие: перейти к процедуре определения структуры

    # через последовательности Индикаторов положения (Position Indicators, стр. 3-61)

    action = GOTO_POSITION_INDICATOR_SEQUENCES

    '
  formalization_notes: "Правило является процедурным указанием-переходом (fallback):\n\
    если ни одно из конкретных условий Правила 6 не совпало,\nто нужно использовать\
    \ другой метод — последовательности Индикаторов положения.\n\nФормализация невозможна\
    \ по двум причинам:\n1. Условие \"ни одно описание не подходит\" требует знания\
    \ ВСЕХ конкретных\n   условий Правила 6 и проверки их несовпадения — это мета-условие,\n\
    \   зависящее от полного набора других AKU для Правила 6.\n2. Само действие (\"\
    обратиться к последовательностям Индикаторов положения\")\n   является ссылкой\
    \ на отдельную процедуру (стр. 3-61), которая не описана\n   в данном AKU и не\
    \ может быть выражена как constraint.\n\nРезультат: возможна ЛЮБАЯ структура (\"\
    :F3\", \":s5\", \":c3\", \":L5\", \":L3\", etc.),\nконкретная определяется только\
    \ через Position Indicators."
aliases:
- Правило 6 — переход к индикаторам положения

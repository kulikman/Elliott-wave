id: AKU-0335
type: rule
strength: conditional
status: verified
topic: informal-logic-rules
subtopics:
- structural-labels
- position-indicators
statement_ru: 'При Правиле 6 (161.8% ≤ m2/m1 ≤ 261.8%), если ни одно описание условий
  не подходит, то следует обратиться к последовательностям Индикаторов положения (стр.
  3-61) для определения структуры.

  '
source:
  book_id: neely-mwe-1990
  page: 3-44
  chapter: 'Chapter 3: Preliminary Analysis'
  section: Неформальные Правила логики — Структурные списки Правил 4-7
  figure_id: null
  verbatim_quote:
    text: 'Правило 6 (161.8% ≤ m2/m1 ≤ 261.8%): возможна ЛЮБАЯ Структура; если ни
      одно описание не подходит — см. последовательности Индикаторов положения (стр.
      3-61).

      '
    language: ru
formalization:
  status: not_formalizable
  applies_when: '# Правило 6 активно:

    rule_number == 6

    AND ratio_m2_m1 = abs(m2) / abs(m1)

    AND ratio_m2_m1 >= 1.618

    AND ratio_m2_m1 <= 2.618

    # И ни одно из описаний условий Правила 6 не подошло:

    AND no_rule6_condition_matched == true

    '
  constraint: '# Действие: перейти к процедуре определения структуры

    # через последовательности Индикаторов положения (Position Indicators, стр. 3-61)

    action = GOTO_POSITION_INDICATOR_SEQUENCES

    '
  formalization_notes: "Правило является процедурным fallback-указанием: если ни одно\
    \ из конкретных\nусловий Правила 6 не совпало, алгоритм должен переключиться на\
    \ другую\nподсистему анализа — последовательности Индикаторов положения (Position\
    \ Indicators).\n\nФормализация невозможна в полной мере по следующим причинам:\n\
    1. Правило не содержит конкретного структурного ограничения — оно лишь\n   перенаправляет\
    \ к другой процедуре (стр. 3-61).\n2. Условие \"ни одно описание не подходит\"\
    \ требует знания ВСЕХ остальных\n   условий Правила 6, которые не описаны в данном\
    \ AKU.\n3. Сама процедура \"последовательностей Индикаторов положения\" — это\
    \ отдельная\n   подсистема, формализуемая в других AKU.\n\nДля реализации в коде\
    \ это должен быть fallback-переход:\nесли после проверки всех условий Правила\
    \ 6 ни одно не сработало,\nвызвать модуль Position Indicator Sequences."
aliases:
- Правило 6 — переход к индикаторам положения

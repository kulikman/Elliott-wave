statement_ru: ':L3 (последняя тройка, Last 3) — последняя из пяти последовательных
  троек, образующих Терминал или Треугольник. Различение: применить Основные Правила
  построения Импульса (Гл.5, стр.5-2) — если выполняются, это Терминальный Импульс;
  если нет — Треугольник.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-63
  chapter: 'Глава 3: Предварительный анализ'
  section: Определения Индикаторов положения / :L3
  figure_id: null
  verbatim_quote:
    text: Равно как и ":sL3", ":L3" должна быть последней из пяти последовательных
      "троек". Определить тип формирующейся волны (Терминал или Треугольник) вам помогут
      Правила графических построений основных импульсов ... если ... правила ... выполняются,
      образуется Терминальный Импульс, если нет – формируется Треугольник.
    language: ru

statement_ru: 'Для всех соотношений Фибоначчи (61.8%, 161.8% и т.д.) допускается отклонение
  ±4%: соотношение «61.8% длины другой волны» означает фактический диапазон 58–66%.
  Выражения «почти»/«близко к» означают в пределах 10%.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 3-34
  chapter: 'Глава 3: Предварительный анализ'
  section: Неформальные Правила логики / Конвенции измерений
  figure_id: null
  verbatim_quote:
    text: Для всех упомянутых в тексте процентных соотношений Фибоначчи (61,8% 161,8,%
      и т. д.) допускаются четырехпроцентные отклонения в обе стороны. Если говорится,
      что длина одной волны составляет 61,8% длины другой, имеется в виду, что фактически
      она должна находиться в диапазоне 58—66%. ... выражения «почти» и «близко к...»
      ... должны пониматься как «в пределах 10% от упомянутого значения».
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется всякий раз, когда фактическое соотношение длин двух
    волн

    # сравнивается с эталонным значением Фибоначчи (F),

    # например F = 0.618, 1.618, 2.618, 0.382, 1.0 и т.д.

    # Также применяется когда в правиле используются слова "почти" / "близко к"

    # при указании некоторого целевого значения target.

    comparing_ratio_to_fibonacci == true

    '
  constraint: "# --- Определения ---\n# ratio = length(wave_A) / length(wave_B)\n\
    #   где wave_A и wave_B — сравниваемые волны согласно конкретному правилу\n# F\
    \ — эталонное значение Фибоначчи (например 0.618, 1.618, 2.618, 0.382, 1.0 ...)\n\
    # qualifier — модификатор из текста правила: \"exact\" (по умолчанию) или \"almost\"\
    /\"close_to\"\n\n# --- Стандартное соответствие Фибоначчи (допуск ±4%) ---\n#\
    \ \"61.8% длины другой волны\" означает диапазон [58%, 66%], т.е. 61.8 ± 4 п.п.\n\
    # Обобщённо: для любого F допуск = 0.04 (4 процентных пункта)\n\ndef fib_match(ratio,\
    \ F):\n    tolerance = 0.04                       # 4 процентных пункта\n    lower\
    \ = F - tolerance                   # например 0.618 - 0.04 = 0.578\n    upper\
    \ = F + tolerance                   # например 0.618 + 0.04 = 0.658\n    return\
    \ (ratio >= lower) AND (ratio <= upper)\n\n# --- Соответствие \"почти\" / \"близко\
    \ к\" (допуск ±10%) ---\n# \"почти 61.8%\" означает диапазон [51.8%, 71.8%], т.е.\
    \ 61.8 ± 10 п.п.\n\ndef fib_match_almost(ratio, F):\n    tolerance = 0.10    \
    \                    # 10 процентных пунктов\n    lower = F - tolerance      \
    \             # например 0.618 - 0.10 = 0.518\n    upper = F + tolerance     \
    \              # например 0.618 + 0.10 = 0.718\n    return (ratio >= lower) AND\
    \ (ratio <= upper)\n\n# --- Выбор функции по квалификатору ---\nif qualifier ==\
    \ \"almost\" OR qualifier == \"close_to\":\n    result = fib_match_almost(ratio,\
    \ F)\nelse:\n    result = fib_match(ratio, F)\n"
  formalization_notes: "1. В verbatim_quote пример дан для 61.8%: диапазон 58–66%,\
    \ что соответствует\n   ±4 процентных пункта (абсолютных), а НЕ ±4% от значения\
    \ F.\n   Т.е. tolerance = 0.04 в абсолютном выражении (п.п.), не относительном.\n\
    \   Аналогично для \"почти\": ±10 процентных пунктов.\n2. Источник не уточняет,\
    \ применяется ли тот же абсолютный допуск ±4 п.п.\n   к бо́льшим значениям Фибоначчи\
    \ (161.8%, 261.8%). Из текста (\"и т.д.\")\n   следует что да — единый допуск\
    \ ±4 п.п. для всех значений.\n3. Это мета-правило (конвенция измерений), которое\
    \ модифицирует интерпрет"

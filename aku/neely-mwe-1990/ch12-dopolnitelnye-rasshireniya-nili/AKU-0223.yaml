statement_ru: 'Определение Подвижной Двойной Тройки во второй волне: ни одна часть
  волны-3 не должна пробивать настоящую линию тренда 0-2. Если после предполагаемой
  W2 следует коррективная фаза, пробивающая линию 0-2, и это повышение не было достаточно
  значительным для волны-3, то рынок находится в Подвижной Двойной Тройке. Признак:
  отсутствие Чередования между предполагаемыми W2 и W4.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-2
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Каналы / Определение Подвижной Двойной Тройки
  figure_id: null
  verbatim_quote:
    text: Согласно той же идее... ни одна часть волны-3 не должна пробивать настоящую
      линию тренда 0-2... Другая важная причина, почему эта фигура не может быть интерпретирована
      как волны 1, 2, 3, 4, за которыми должна последовать 5-я, – это недостаток Чередования
      между предполагаемыми 2-й и 4-й волнами.
    language: ru

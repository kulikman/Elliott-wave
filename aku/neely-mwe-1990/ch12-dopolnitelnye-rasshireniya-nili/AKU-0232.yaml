id: AKU-0232
type: rule
strength: mandatory
status: verified
topic: fibonacci-ratios
subtopics:
- retracement
- internal-ratio
- impulse
statement_ru: >
  Внутренние Фибоначчи для волн 2 и 4: если W2 крупнейшая в ценовом отношении →
  W4 с большой вероятностью = 61.8% W2 (реже 38.2%). Если W4 крупнейшая →
  W2 должна = 61.8% W4 (реже 38.2%).
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-25
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Коррекции / Волна-2 и волна-4
  figure_id: '12-29'
  verbatim_quote:
    text: >
      Если волна-2 — наибольшая в ценовом отношении Коррекция Импульсной фигуры,
      то 4-я волна с большой вероятностью составит 61.8% ценовой длины волны-2.
      Следующим по вероятности вариантом будет 38.2%. Если волна-4 крупнейшая в
      ценовом отношении Коррекция Импульсной фигуры, то волна-2 должна составить
      61.8% W4, реже — 38.2%.
    language: ru
formalization:
  status: draft
  applies_when: any impulse figure, comparing corrective waves 2 and 4
  constraint: >
    IF W2_price > W4_price THEN W4 ≈ 0.618*W2 (or 0.382*W2) ;
    IF W4_price > W2_price THEN W2 ≈ 0.618*W4 (or 0.382*W4)
  formalization_notes: 'Рис.12-29 диаграммы A и B.'

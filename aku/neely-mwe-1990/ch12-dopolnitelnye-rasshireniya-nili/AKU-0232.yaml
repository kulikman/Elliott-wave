statement_ru: 'Внутренние Фибоначчи для волн 2 и 4: если W2 крупнейшая в ценовом отношении
  → W4 с большой вероятностью = 61.8% W2 (реже 38.2%). Если W4 крупнейшая → W2 должна
  = 61.8% W4 (реже 38.2%).

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-25
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Коррекции / Волна-2 и
    волна-4
  figure_id: 12-29
  verbatim_quote:
    text: 'Если волна-2 — наибольшая в ценовом отношении Коррекция Импульсной фигуры,
      то 4-я волна с большой вероятностью составит 61.8% ценовой длины волны-2. Следующим
      по вероятности вариантом будет 38.2%. Если волна-4 крупнейшая в ценовом отношении
      Коррекция Импульсной фигуры, то волна-2 должна составить 61.8% W4, реже — 38.2%.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к любой импульсной фигуре (Impulse pattern)

    # после того как обе коррективные волны (W2 и W4) завершены

    pattern_type == ''impulse''

    AND wave_2.is_completed == true

    AND wave_4.is_completed == true

    '
  constraint: "# Ценовая длина (price length) — абсолютный размер волны в ценовых\
    \ единицах\nW2_price = abs(wave_2.end - wave_2.start)\nW4_price = abs(wave_4.end\
    \ - wave_4.start)\n\n# Допуск для Фибоначчи-соотношений\nTOLERANCE = определяется_контекстом\
    \  # например 0.01–0.05\n\n# Случай A: W2 — крупнейшая коррекция в ценовом отношении\n\
    IF W2_price > W4_price THEN\n  # W4 с большой вероятностью = 61.8% от W2 (первый\
    \ по вероятности)\n  # или W4 = 38.2% от W2 (второй по вероятности)\n  ratio =\
    \ W4_price / W2_price\n  EXPECT ratio ≈ 0.618 (within TOLERANCE)   # primary expectation\n\
    \  OR ratio ≈ 0.382 (within TOLERANCE)        # secondary expectation\n\n# Случай\
    \ B: W4 — крупнейшая коррекция в ценовом отношении\nELIF W4_price > W2_price THEN\n\
    \  # W2 должна = 61.8% от W4 (первый по вероятности)\n  # или W2 = 38.2% от W4\
    \ (второй по вероятности)\n  ratio = W2_price / W4_price\n  EXPECT ratio ≈ 0.618\
    \ (within TOLERANCE)   # primary expectation\n  OR ratio ≈ 0.382 (within TOLERANCE)\
    \        # secondary expectation\n\n# Примечание: если W2_price == W4_price, правило\
    \ не специфицирует ограничений\n"
  formalization_notes: "1. Правило описывает вероятностные соотношения, а не жёсткие\
    \ запреты.\n   Однако в verbatim_quote для случая B используется слово \"должна\"\
    \ (mandatory),\n   что указывает на обязательность. Для случая A — \"с большой\
    \ вероятностью\".\n2. \"Ценовая длина\" (price length) — абсолютная разница цен\
    \ start/end волны.\n3. Правило основано на рис. 12-29 (диаграммы A и B).\n4. Конкретный\
    \ допуск (TOLERANCE) для Фибоначчи-соотношений не указан\n   в исходном тексте\
    \ и должен определяться реализацией.\n5. Правило применяется только к коррективным\
    \ волнам 2 и 4 внутри\n   импульсной фигуры (не к другим паттернам)."

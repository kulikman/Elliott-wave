statement_ru: 'Внутренние Фибоначчи для волны-c Плоской: волна-c НЕ ДОЛЖНА превышать
  138.2% волны-a (иначе → Удлинённая Плоская). Наиболее распространённое: волна-a
  ≈ волна-c (100%). Следующее: 61.8%. Минимальное Внутреннее при Неудаче: 38.2%. Суровая
  Неудача: b-волна откатывается ≈81% от a; min откат b от a ≥ 61.8%.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-26
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Волна-c Плоской
  figure_id: 12-31,12-32,12-33,12-34
  verbatim_quote:
    text: 'С-волна Плоской не должна превышать 138.2% а-волны. Если с-волна больше
      138.2% волны-а, эта фигура попадает в категорию Удлиненной Плоской. Наиболее
      распространённое соотношение между волной-а и волной-с Плоской — это их примерное
      равенство. Следующее по распространённости соотношение — 61.8%.

      '
    language: ru
formalization:
  status: draft
  applies_when: 'pattern == ''flat'' AND current_wave == ''c''

    '
  constraint: "# Длины волн по цене (внутренние соотношения)\nWa_len = abs(wave_a.end\
    \ - wave_a.start)\nWb_len = abs(wave_b.end - wave_b.start)\nWc_len = abs(wave_c.end\
    \ - wave_c.start)\n\n# MANDATORY: волна-c НЕ ДОЛЖНА превышать 138.2% волны-a\n\
    # Иначе паттерн переклассифицируется в Удлинённую Плоскую\nIF Wc_len > 1.382 *\
    \ Wa_len THEN\n  reclassify_pattern('elongated_flat')\n  FAIL  # это уже не обычная\
    \ Flat\n\n# Наиболее распространённое соотношение: волна-c ≈ 100% волны-a\n# most_common_ratio:\
    \ Wc_len ≈ 1.0 * Wa_len\n\n# Следующее по распространённости: волна-c ≈ 61.8%\
    \ волны-a\n# next_common_ratio: Wc_len ≈ 0.618 * Wa_len\n\n# Минимальное внутреннее\
    \ при Неудаче (failure): 38.2%\n# min_failure_ratio: Wc_len ≈ 0.382 * Wa_len\n\
    \n# Суровая Неудача (severe failure): дополнительные условия на волну-b\nIF Wc_len\
    \ <= 0.382 * Wa_len THEN\n  # b-волна откатывается ≈81% от a\n  # severe_failure_typical:\
    \ Wb_len ≈ 0.81 * Wa_len\n  # минимальный откат b от a >= 61.8%\n  REQUIRE Wb_len\
    \ >= 0.618 * Wa_len\n"
  formalization_notes: 'Рис.12-31..12-34.

    Mandatory часть: Wc_len <= 1.382 * Wa_len (иначе → elongated_flat).

    Соотношения 100%, 61.8%, 38.2% — ранжирование по распространённости,

    не жёсткие ограничения, а ориентиры для оценки вероятности.

    Условие severe_failure (Wb >= 0.618 * Wa) присутствует в statement_ru,

    но отсутствует в verbatim_quote — помечено как требующее дополнительной

    верификации по источнику.'

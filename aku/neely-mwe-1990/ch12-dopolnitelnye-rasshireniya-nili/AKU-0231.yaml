statement_ru: 'Внутренние Фибоначчи при Растянутой 5-й: единственное Внутреннее между
  W1 и W3 — волна-3 = 161.8% волны-1. Если нет соотношения → W3 должна быть >100%
  но ≤261.8% W1. Волна-5 ДОЛЖНА быть не менее min(100% длины 0-3, 161.8% волны-3).
  Максимум Растянутой 5-й ≈ 261.8% длины (1+3).

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-24
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Растяжение пятой
  figure_id: 12-28
  verbatim_quote:
    text: 'Единственное возможное Внутреннее соотношение между волной-1 и волной-3
      при Растянутой 5-й — волна-3 составляет 161.8% волны-1. Если между ними нет
      никакого соотношения, волна-3 должна быть больше 100%, но не меньше 261.8% волны-1...
      Волна-5 должна быть не менее более короткого из двух расстояний — 100% длины
      (1+3) или 161.8% волны-3. Она может составить до 261.8% длины (1+3), но это
      примерно максимальный предел.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к импульсу с растянутой (extended) волной 5

    pattern == ''impulse'' AND extended_wave == 5

    '
  constraint: "# Длины волн (в ценовых единицах)\nW1_len = abs(wave_1.end - wave_1.start)\n\
    W3_len = abs(wave_3.end - wave_3.start)\nW5_len = abs(wave_5.end - wave_5.start)\n\
    \n# Длина от начала волны-1 до конца волны-3 (расстояние 0-3)\nlength_0_to_3 =\
    \ abs(wave_3.end - wave_1.start)\n\n# --- Внутреннее соотношение W1 и W3 ---\n\
    # Единственное допустимое Internal: W3 = 161.8% W1\n# Если Internal существует:\n\
    has_internal_ratio = is_approximately(W3_len, 1.618 * W1_len)\n\nIF has_internal_ratio:\n\
    \    # OK — единственное допустимое внутреннее соотношение\n    ASSERT W3_len\
    \ ≈ 1.618 * W1_len\nELSE:\n    # Если нет Internal соотношения, то W3 > 100% W1\
    \ и W3 <= 261.8% W1\n    ASSERT W3_len > 1.0 * W1_len\n    ASSERT W3_len <= 2.618\
    \ * W1_len\n\n# --- Ограничения на волну-5 (растянутую) ---\n# Минимум W5: не\
    \ менее более короткого из двух расстояний\nmin_w5 = min(1.0 * length_0_to_3,\
    \ 1.618 * W3_len)\nASSERT W5_len >= min_w5\n\n# Максимум W5: примерно 261.8% длины\
    \ (1+3)\nmax_w5 = 2.618 * length_0_to_3\nASSERT W5_len <= max_w5\n"
  formalization_notes: "- length_0_to_3 — расстояние от начала волны-1 (точка 0) до\
    \ конца волны-3, \n  т.е. суммарное ценовое покрытие волн 1+2+3 (не арифметическая\
    \ сумма W1+W3).\n- Рис. 12-28 из книги.\n- Формулировка \"не меньше 261.8%\" в\
    \ verbatim_quote интерпретируется как \n  \"не БОЛЕЕ 261.8%\" (W3 <= 2.618 * W1),\
    \ исходя из контекста: \n  \"больше 100%, но не [более] 261.8%\".\n- Максимум\
    \ W5 ≈ 261.8% length_0_to_3 описан как приблизительный предел,\n  поэтому допуск\
    \ при сравнении может быть уместен.\n- \"is_approximately\" — сравнение с допуском\
    \ (например ±2-5%), \n  конкретный допуск определяется реализацией."

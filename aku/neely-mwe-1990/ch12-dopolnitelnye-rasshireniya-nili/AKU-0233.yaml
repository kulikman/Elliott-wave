statement_ru: 'Внутренние Фибоначчи для волны-c Зигзага: Internal «лимит» волны-c
  ≈ 161.8% волны-a. Если превышает → Удлинённый Зигзаг, часть Треугольника. Волна-c
  может быть равна волне-a (очень часто). Волна-c НЕ ДОЛЖНА быть Внутренне меньше
  61.8% волны-a; если меньше → часть Треугольника.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-26
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Волна-c Зигзага
  figure_id: 12-30
  verbatim_quote:
    text: 'Внутренний «лимит» длины волны-c по сравнению с волной-a примерно равен
      161.8% волны-a. Если длина волны-c превышает максимальные Внутренний и Внешний
      пределы своего соотношения, то данный Зигзаг Удлиненный и должен считаться частью
      Треугольника... Волна-c Внутренне не должна быть меньше 61.8% волны-a.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Зигзаг (Zigzag), анализируем волну-c

    pattern == ''zigzag'' AND current_wave == ''c''

    '
  constraint: "# Длины волн по цене (internal / price length)\nWa_price = abs(wave_a.end\
    \ - wave_a.start)\nWc_price = abs(wave_c.end - wave_c.start)\n\n# --- Mandatory:\
    \ волна-c НЕ ДОЛЖНА быть Внутренне меньше 61.8% волны-a ---\n# Если меньше — это\
    \ не самостоятельный Зигзаг, а часть Треугольника\nIF Wc_price < 0.618 * Wa_price\
    \ THEN\n    zigzag_valid = false\n    mark_as_part_of_triangle = true\nEND IF\n\
    \n# --- Внутренний лимит: волна-c ≈ 161.8% волны-a ---\n# Если превышает 161.8%\
    \ — Удлинённый Зигзаг, должен быть частью Треугольника\nIF Wc_price > 1.618 *\
    \ Wa_price THEN\n    elongated_zigzag = true\n    mark_as_part_of_triangle = true\n\
    END IF\n\n# --- Нормальный диапазон волны-c ---\n# 0.618 * Wa_price <= Wc_price\
    \ <= 1.618 * Wa_price\n# Наиболее частое соотношение: Wc_price ≈ Wa_price (100%,\
    \ т.е. равенство)\nIF Wc_price >= 0.618 * Wa_price AND Wc_price <= 1.618 * Wa_price\
    \ THEN\n    zigzag_valid = true\n    # Wc_price ≈ 1.0 * Wa_price — очень частый\
    \ случай\nEND IF\n"
  formalization_notes: "1. \"Внутренние\" (Internal) соотношения — сравнение ценовых\
    \ длин волн\n   внутри одного паттерна (wave-c vs wave-a одного Зигзага).\n2.\
    \ Правило mandatory: Wc_price >= 0.618 * Wa_price (нарушение означает\n   что\
    \ Зигзаг не самостоятельный, а часть Треугольника).\n3. Верхний лимит 161.8% —\
    \ при превышении Зигзаг считается Удлинённым\n   и также должен быть частью Треугольника.\n\
    4. Равенство Wc ≈ Wa (100%) отмечено как \"очень часто\" — это ориентир,\n   не\
    \ жёсткое ограничение.\n5. Источник: рис. 12-30, диаграммы A/B."

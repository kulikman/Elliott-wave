statement_ru: 'Терминальная активность на каналах: внутри Терминальной фигуры W5 пробивает
  линию тренда 2-4 более крупной фигуры — это подтверждает Терминальную активность.
  W3 сегментирована (отмечается ''x''), W5 — Терминальная (''s''). После W4 рынок
  должен вернуться к минимуму W4 как первая цель.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-8
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Каналы / Терминальная активность
  figure_id: null
  verbatim_quote:
    text: 'В течение формирования Терминальной фигуры часть ее обычно будет пробивать
      линию тренда 2-4 более крупной фигуры... Важное замечание: Волновая Теория действительно
      позволяет спекулировать, когда определённая конфигурация (трендовая) сформирована...
      активность после волны-(5) должна вернуться к минимуму волны-(4); если этого
      не происходит, ваша интерпретация неправильная.'
    language: ru
formalization:
  status: draft
  applies_when: "# Контекст: внутри Ending Diagonal (Terminal Impulse)\n# и существует\
    \ более крупная фигура (larger_degree_pattern) с определённой линией тренда 2-4\n\
    pattern.type == 'ending_diagonal'\nAND current_wave == 5\nAND larger_degree_pattern\
    \ EXISTS\nAND trendline_2_4_larger = trendline(\n  larger_degree_pattern.wave(2).end,\n\
    \  larger_degree_pattern.wave(4).end\n)\n"
  constraint: "# ЧАСТЬ 1: Подтверждение Терминальной активности\n# W5 текущей Терминальной\
    \ фигуры должна пробить линию тренда 2-4 более крупной фигуры\n#\n# Для бычьего\
    \ рынка (uptrend):\nIF larger_degree_pattern.direction == 'up':\n  wave_5_low\
    \ = low(pattern.wave(5))\n  trendline_value_at_wave5 = trendline_2_4_larger.value_at(pattern.wave(5).time)\n\
    \  terminal_confirmed = (wave_5_low < trendline_value_at_wave5)\n\n# Для медвежьего\
    \ рынка (downtrend):\nIF larger_degree_pattern.direction == 'down':\n  wave_5_high\
    \ = high(pattern.wave(5))\n  trendline_value_at_wave5 = trendline_2_4_larger.value_at(pattern.wave(5).time)\n\
    \  terminal_confirmed = (wave_5_high > trendline_value_at_wave5)\n\n# ЧАСТЬ 2:\
    \ Обязательная структурная разметка\n# W3 сегментирована (отмечается 'x'), W5\
    \ — Терминальная ('s')\npattern.wave(3).structure_label == 'x'   # сегментированная\n\
    pattern.wave(5).structure_label == 's'   # терминальная\n\n# ЧАСТЬ 3: Обязательное\
    \ поведение после завершения W5 (mandatory)\n# После завершения W5 рынок ДОЛЖЕН\
    \ вернуться как минимум к экстремуму W4\n#\n# Для бычьего ending diagonal (рост\
    \ завершается):\nIF larger_degree_pattern.direction == 'up':\n  post_terminal_low\
    \ = min_price_after(pattern.wave(5).end)\n  post_terminal_low <= low(pattern.wave(4))\n\
    \n# Для медвежьего ending diagonal (падение завершается):\nIF larger_degree_pattern.direction\
    \ == 'down':\n  post_terminal_high = max_price_after(pattern.wave(5).end)\n  post_terminal_high\
    \ >= high(pattern.wave(4))\n\n# Если цена НЕ достигает уровня W4 после завершения\
    \ — интерпретация неверна\nIF NOT condition_met:\n  INVALIDATE pattern interpretation\n"
  formalization_notes: "1. Рис.12-10 Диаграммы A/B из книги.\n2. \"Минимум W4\" в\
    \ verbatim_quote означает экстремум W4 (low для бычьего, high для медвежьего).\n\
    3. Правило состоит из двух частей: (a) подтверждение терминала через пробой trendline\
    \ 2-4\n   более крупной фигуры, (b) обязательный возврат цены к уровню W4 после\
    \ завершения.\n4. Часть (b) является mandatory: \"если этого не происходит, ваша\
    \ интерпретация неправильная\".\n5. Временной горизонт для \"возврата к W4\" не\
    \ уточнён в источнике — \n   это первая цель (first target), но не"

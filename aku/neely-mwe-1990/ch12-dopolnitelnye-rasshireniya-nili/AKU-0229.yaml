statement_ru: 'Внутренние Фибоначчи при Растянутой 1-й: волна-3 НЕ ДОЛЖНА быть более
  61.8% волны-1. Если W3 = 61.8% W1 → W5 обычно = 38.2% W3. Если W3 = 38.2% W1 → W5
  обычно = 61.8% W3.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-23
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Растяжение первой
  figure_id: 12-26
  verbatim_quote:
    text: 'Когда волна-1 в фигуре самая длинная, волна-3 не должна быть более 61.8%
      волны-1. Когда волна-3 составляет 61.8% волны-1, волна-5 (в соответствии с правилом
      Чередования) обычно будет составлять 38.2% волны-3. Если волна-3 составляет
      38.2% волны-1, волна-5 обычно будет составлять 61.8% волны-3.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс с растянутой (самой длинной) волной 1

    pattern == ''impulse''

    AND wave1_is_extended == true

    # т.е. W1 — самая длинная волна среди W1, W3, W5

    AND price_length(W1) > price_length(W3)

    AND price_length(W1) > price_length(W5)

    '
  constraint: "# === MANDATORY RULE ===\n# Волна-3 НЕ ДОЛЖНА быть более 61.8% волны-1\n\
    price_length(W3) <= 0.618 * price_length(W1)\n\n# === CONDITIONAL GUIDELINES (обычно\
    \ / чередование) ===\n# Если W3 ≈ 61.8% W1, то W5 обычно ≈ 38.2% W3\nIF price_length(W3)\
    \ ≈ 0.618 * price_length(W1):\n    expected_W5 = 0.382 * price_length(W3)\n\n\
    # Если W3 ≈ 38.2% W1, то W5 обычно ≈ 61.8% W3\nIF price_length(W3) ≈ 0.382 * price_length(W1):\n\
    \    expected_W5 = 0.618 * price_length(W3)\n\n# Примечание: expected_W5 — ориентир,\
    \ не жёсткое ограничение\n# (в verbatim_quote используется слово \"обычно\")\n"
  formalization_notes: 'Рис.12-26. Все возможные Внутренние при Растянутой 1-й.

    Mandatory часть: только ограничение W3 <= 61.8% * W1.

    Conditional часть (expected_W5): описана как "обычно" и связана

    с правилом Чередования — это guideline, а не жёсткое правило.

    price_length — длина волны в ценовых единицах (абсолютное значение).

    Оператор ≈ подразумевает допуск (например ±2-3%).'

statement_ru: 'Внутренние Фибоначчи при Растянутой 3-й: волна-1 НЕ ДОЛЖНА быть связана
  с волной-3 Внутренним соотношением 61.8%. Волна-1 и волна-5 должны быть примерно
  равны (100%) или соотноситься коэффициентом 61.8% или 38.2%. Волна-5 ДОЛЖНА быть
  меньше 61.8% Растянутой волны-3.

  '
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-23
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Продвинутые соотношения Фибоначчи / Внутренние / Растяжение третьей
  figure_id: 12-27
  verbatim_quote:
    text: 'Когда в фигуре Растянута волна-3, волна-1 не должна быть связана с волной-3
      Внутренним соотношением 61.8%. Она может составлять 38.2% волны-3, но часто
      они вообще не связаны никаким Внутренним соотношением... Когда 3-я волна самая
      длинная, волна-1 и волна-5 должны быть в ценовом отношении примерно равны (соотношение
      100%) или соотноситься с коэффициентом 61.8% или 38.2%.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс с растянутой (самой длинной) волной 3

    pattern == ''impulse''

    AND price_length(W3) > price_length(W1)

    AND price_length(W3) > price_length(W5)

    AND W3_is_extended == true

    '
  constraint: "# --- Правило 1 (mandatory): W1 НЕ ДОЛЖНА быть связана с W3 внутренним\
    \ соотношением 61.8% ---\n# W1 не должна составлять 61.8% от W3\nNOT is_approximately_equal(price_length(W1),\
    \ 0.618 * price_length(W3), tolerance)\n\n# --- Правило 2 (mandatory): W1 и W5\
    \ должны быть примерно равны (100%) или соотноситься 61.8% / 38.2% ---\nratio_W1_W5\
    \ = price_length(W1) / price_length(W5)\nratio_W5_W1 = price_length(W5) / price_length(W1)\n\
    \n# Одно из следующих должно выполняться:\n(\n  is_approximately_equal(ratio_W1_W5,\
    \ 1.0, tolerance)       # W1 ≈ W5 (100%)\n  OR is_approximately_equal(ratio_W1_W5,\
    \ 0.618, tolerance)  # W1 ≈ 61.8% of W5\n  OR is_approximately_equal(ratio_W1_W5,\
    \ 0.382, tolerance)  # W1 ≈ 38.2% of W5\n  OR is_approximately_equal(ratio_W5_W1,\
    \ 0.618, tolerance)  # W5 ≈ 61.8% of W1\n  OR is_approximately_equal(ratio_W5_W1,\
    \ 0.382, tolerance)  # W5 ≈ 38.2% of W1\n)\n\n# --- Правило 3 (mandatory): W5\
    \ ДОЛЖНА быть меньше 61.8% растянутой W3 ---\nprice_length(W5) < 0.618 * price_length(W3)\n"
  formalization_notes: "- \"Внутреннее соотношение\" (Internal ratio) — соотношение\
    \ ценовых длин волн\n  внутри одного импульса (W1, W3, W5 между собой).\n- Verbatim\
    \ quote допускает, что W1 может составлять 38.2% от W3 или вообще\n  не быть связана\
    \ с W3 никаким внутренним соотношением — запрещено только 61.8%.\n- Правило 2\
    \ симметрично: \"соотноситься коэффициентом 61.8% или 38.2%\" может\n  означать\
    \ как W1/W5, так и W5/W1, поэтому проверяются оба направления.\n- Правило 3 (\"\
    W5 < 61.8% W3\") явно указано в statement_ru, но отсутствует\n  дословно в verbatim_quote;\
    \ тем не менее оно присутствует в statement_ru\n  как обязательное и подтверждается\
    \ рис. 12-27.\n- formalization_notes из исходного AKU (\"если W4 сложная → W5\
    \ ≤ W1; если W2\n  сложная → W5 ≤ W1\") не формализованы здесь, так как не подтверждены\n\
    \  verbatim_quote данного AKU.\n- tolerance — параметр допуска для Фибоначчи-соотношений\
    \ (типично 1-3%)."

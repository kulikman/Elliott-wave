id: AKU-0222
type: rule
strength: mandatory
status: verified
topic: channeling
subtopics:
- impulse
- analysis-workflow
- wave-identification
statement_ru: 'Волна-2: строить линию тренда 0-2 от точки ''0'' через нижнюю точку
  коррективного движения W2. Пока линия 0-2 не пробита → W2 ещё развивается и считается
  завершённой в точке касания линии тренда. Если линия пробита до завершения W3 (до
  уровня 61.8% W1) → W2 ещё продолжается.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 12-1
  chapter: 'Глава 12: Дополнительные Расширения Нили'
  section: Каналы / Волна-2
  figure_id: null
  verbatim_quote:
    text: После того, как рынок развернулся в противоположном направлении (относительно
      волны-1) и снова развернулся вверх..., проведите линию от точки "0" через нижнюю
      точку понижательного движения, которое вы предположительно считаете волной-2...
      Пока линия тренда "0-2" не пробита, вы можете считать волну-2 завершенной, причем
      завершенной именно в точке, где она касается линии тренда.
    language: ru
formalization:
  status: draft
  applies_when: '# Применяется при анализе импульса, когда предполагается завершение
    волны-2

    # и нужно подтвердить/опровергнуть это через канал 0-2

    pattern == ''impulse''

    AND wave_1 IS completed

    AND wave_2_candidate IS identified

    # Рынок развернулся от W1, прошёл коррекцию (W2) и снова развернулся в направлении
    W1

    '
  constraint: "# Шаг 1: Построить линию тренда 0-2\np0 = start_point(wave_1)     \
    \     # точка \"0\" — начало волны-1\np2 = end_point(wave_2_candidate)  # нижняя\
    \ точка коррективного движения W2\ntrendline_0_2 = line(p0, p2)\n\n# Шаг 2: Пока\
    \ линия тренда 0-2 НЕ пробита — W2 считается завершённой\n# \"Завершённой именно\
    \ в точке, где она касается линии тренда\"\nIF price_after_p2 does NOT break trendline_0_2:\n\
    \    wave_2.status = 'completed'\n    wave_2.end = p2   # точка касания линии\
    \ тренда\n\n# Шаг 3: Если линия 0-2 пробита ДО того, как W3 достигла 61.8% длины\
    \ W1,\n# значит W2 ещё продолжается (не завершена)\n#\n# Пробитие = цена пересекает\
    \ trendline_0_2 в направлении W2\n# (т.е. против направления импульса)\nwave_3_progress\
    \ = abs(price_current - p2)\nwave_3_threshold = 0.618 * abs(end_point(wave_1)\
    \ - start_point(wave_1))\n\nIF trendline_0_2 IS broken AND wave_3_progress < wave_3_threshold:\n\
    \    wave_2.status = 'ongoing'\n    # p2 НЕ является истинным концом W2, коррекция\
    \ продолжается\n    # Нужно ждать нового разворота и перестроить линию 0-2\n\n\
    # Примечание: \"пробитие\" линии тренда означает закрытие/движение цены\n# ниже\
    \ (для бычьего импульса) или выше (для медвежьего) линии 0-2\n# в направлении,\
    \ противоположном основному тренду импульса\n"
  formalization_notes: "1. Правило описывает итеративный процесс: если линия 0-2 пробита\
    \ и W3 < 61.8% W1,\n   то p2 пересматривается, строится новая линия 0-2 через\
    \ новую точку окончания W2.\n2. Порог 61.8% W1 для W3 упомянут в statement_ru,\
    \ но в verbatim_quote этот порог\n   явно не присутствует — он может быть из контекста\
    \ страницы. Формализован как есть\n   в statement_ru.\n3. Направление пробития\
    \ зависит от направления импульса:\n   - бычий импульс: пробитие = цена уходит\
    \ ниже линии 0-2\n   - медвежий импульс: пробитие = цена уходит выше линии 0-2\n\
    4. Источник: Рис.12-1 (диаграммы A/B/C) — визуальное подтверждение логики."

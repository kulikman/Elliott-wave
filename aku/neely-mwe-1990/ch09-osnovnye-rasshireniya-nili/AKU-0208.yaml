statement_ru: 'Правило одновременного присутствия: все характерные для ситуации признаки
  должны проявляться одновременно в комплексе. Алгоритм: последовательно проверить
  Предварительный анализ → Дальнейшие построения → Основные положения. Если хотя бы
  одно правило не выполняется → гипотеза отвергается, выдвигается альтернатива. Лучшая
  гипотеза = максимум условий.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-7
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Правило одновременного присутствия
  figure_id: null
  verbatim_quote:
    text: все характерные для той или иной ситуации признаки должны проявляться "одновременно"
      (т.е. надежная интерпретация должна удовлетворять условиям всех относящихся
      к делу правил).

  chapter: 'Глава 9: Основные Расширения Нили'
  section: Перечень исключений / Пункт 1
  figure_id: null
  verbatim_quote:
    text: 'Случается, что в важных точках "разворота" рынка или при "необычных" условиях
      одно из правил... может не применяться или не выполняться... Ситуациями с "необычными"
      условиями являются: А. Завершение мультиволны или более крупной фигуры. B. Волна-5
      или с-волна Терминальной фигуры... C. Волна, являющаяся или завершающаяся Сужающимся
      или Расширяющимся Треугольником.'

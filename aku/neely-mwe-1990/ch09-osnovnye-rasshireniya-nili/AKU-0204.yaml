statement_ru: 'Правило точек касания линии тренда: только ЧЕТЫРЕ из пяти сегментов
  5-волновой фигуры (из 6 возможных точек касания одного Порядка) могут одновременно
  касаться двух противоположных параллельных линий тренда. Если точек касания больше
  четырёх → фигура Коррективная (Двойной/Тройной Зигзаг или Комбинация), не Импульс.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-1
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Точки касания линии тренда
  figure_id: null
  verbatim_quote:
    text: только четыре из пяти сегментов фигуры (имеющей 6 возможных точек касания
      "одного и того же Порядка"...) могут одновременно касаться двух противоположных
      линий тренда... Если в процессе формирования... имеется больше четырёх точек
      касания..., значит, формируется не Импульс, а Коррекция.
    language: ru

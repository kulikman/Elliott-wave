statement_ru: 'Правило Независимости: все правила Теории Волн Эллиота и Расширения
  Нили применяются независимо друг от друга к каждой волне. Одновременное проявление
  двух признаков у одной волны не означает их взаимосвязи. Например, ''Растянутая''
  и ''сегментированная'' волна — синонимы только в 90% случаев, но не всегда.'

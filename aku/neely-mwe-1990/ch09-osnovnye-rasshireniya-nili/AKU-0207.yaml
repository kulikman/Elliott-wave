statement_ru: 'Правило Независимости: все правила Теории Волн Эллиота и Расширения
  Нили применяются независимо друг от друга к каждой волне. Одновременное проявление
  двух признаков у одной волны не означает их взаимосвязи. Например, ''Растянутая''
  и ''сегментированная'' волна — синонимы только в 90% случаев, но не всегда.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-7
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Правило Независимости
  figure_id: null
  verbatim_quote:
    text: Правило Независимости применяется ко всем остальным правилам Теории в данной
      книге... все правила и руководства Эллиота, а также Расширения Нили должны применяться
      независимо друг от друга к каждой анализируемой волне.
    language: ru
formalization:
  status: not_formalizable
  applies_when: '# Всегда, при применении любого набора правил к любой волне

    # Это мета-правило об архитектуре системы правил, а не правило о свойствах волн

    '
  constraint: "# Мета-правило: каждое правило применяется независимо\n# \n# Концептуально:\n\
    # FOR each wave IN all_waves:\n#   FOR each rule IN all_elliott_and_neely_rules:\n\
    #     result = evaluate(rule, wave)  # независимо от результатов других правил\n\
    #\n# Ключевое следствие:\n# IF rule_A(wave) == TRUE AND rule_B(wave) == TRUE:\n\
    #   # Это НЕ означает что rule_A и rule_B причинно связаны\n#   # Это НЕ означает\
    \ что rule_A подтверждает rule_B или наоборот\n#   # Каждый результат получен\
    \ и интерпретируется самостоятельно\n#\n# Пример из правила:\n# is_extended(wave)\
    \ == TRUE AND is_segmented(wave) == TRUE\n#   # совпадают в ~90% случаев, но это\
    \ корреляция, НЕ тождество\n#   # extended != segmented (они не синонимы в общем\
    \ случае)\n"
  formalization_notes: "Это мета-правило (правило о правилах), а не правило о структуре\
    \ или \nпропорциях волн. Оно определяет архитектурный принцип применения \nвсех\
    \ остальных правил системы.\n\nНе формализуемо как конкретное числовое или структурное\
    \ ограничение,\nпотому что оно не накладывает constraint на волну — оно накладывает\
    \ \nconstraint на алгоритм применения правил.\n\nДля разработчика Pine Script\
    \ это означает:\n1. Каждое правило должно вычисляться как отдельная независимая\
    \ функция\n2. Результат одного правила не должен быть входным параметром другого\n\
    \   (если это не указано явно в самом правиле)\n3. Совпадение двух свойств у волны\
    \ — корреляция, не причинность\n4. Нельзя объединять два правила в одно составное\
    \ условие без \n   явного на то указания в теории"

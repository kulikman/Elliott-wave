statement_ru: 'Гибкость Меток Движения: Метки Движения (1-2-3-4-5, A-B-C) — ПОСЛЕДНИЙ
  штрих волновой фигуры, а не первый. После завершения и сжатия волны информация о
  Метках теряет ценность — на новом графике значима только базовая структура (:3 или
  :5). До завершения минимум трёх (а лучше пяти) волн структурной серии нельзя говорить
  о завершении фигуры.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-10
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Гибкость Меток Движения
  figure_id: null
  verbatim_quote:
    text: Метки Движения – определение типа волны – достигнута, они ничем больше не
      могут помочь в деле прояснения более крупной картины... До тех пор, пока минимум
      три (а может быть, и пять) волн установленной структуры не образуют структурную
      серию, завершение фигуры Эллиота невозможно.
    language: ru

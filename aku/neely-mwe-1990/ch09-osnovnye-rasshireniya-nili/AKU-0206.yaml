statement_ru: 'Правило соотношения длительностей волн: временные длины трёх последовательно
  расположённых смежных волн одного Порядка НЕ МОГУТ быть равны между собой. Зависимости:
  A) если первые два одинаковы → третий значительно иной (часто = сумма двух); B)
  если второй значительно длиннее первого → третий = 100%, 61.8% или 161.8% первого;
  C) три попарно неравны → соотношения Фибоначчи.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-4
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Правило соотношения длительностей волн
  figure_id: null
  verbatim_quote:
    text: 'Правило соотношений длительностей в общем виде звучит следующим образом:
      временные длины (длительности) трех последовательно расположенных (смежных)
      волн (одного и того же Порядка) не могут быть равны между собой.'
    language: ru
formalization:
  status: draft
  applies_when: checking time durations of 3 consecutive same-order waves
  constraint: 'NOT(time(w1) == time(w2) == time(w3)) ; patterns: A: t1==t2 => t3 >>
    or << ; B: t2>>t1 => t3 IN {t1, 0.618*t1, 1.618*t1} ; C: t1!=t2!=t3 => fib_ratio(ti,tj)'
  formalization_notes: Рис.9-3,9-4,9-5. Если три волны одинаковы → третий из них лишь
    часть более крупной волны.

statement_ru: 'Перечень исключений, Пункт 2: причины нарушения одного правила порождают
  другое правило. 1) W3 Импульса никогда не пробивает линию тренда 2-4, но если W5
  пересекает 2-4 → формируется Терминальная фигура (диагональный треугольник). 2)
  Если ''выброс'' из Треугольника не завершается на уровне временной зоны его вершины
  → либо Терминальная фигура, либо Треугольник был Неограничивающим.'
statement_en: null
source:

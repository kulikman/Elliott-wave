statement_ru: Зигзаг с каналами идеальной формы (4 точки касания) НЕ должен завершать
  коррективную фазу. Если последняя точка касания завершает Зигзаг, этот Зигзаг —
  лишь часть более крупной конфигурации (Двойного/Тройного Зигзага или Комбинации),
  за ним ожидается x-волна.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-3
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Точки касания линии тренда / Рис.9-2
  figure_id: null
  verbatim_quote:
    text: 'Итак, Правило точек касания гласит: Зигзаг с каналами идеальной формы не
      должен завершать коррективную фазу.'
    language: ru

statement_ru: Зигзаг с каналами идеальной формы (4 точки касания) НЕ должен завершать
  коррективную фазу. Если последняя точка касания завершает Зигзаг, этот Зигзаг —
  лишь часть более крупной конфигурации (Двойного/Тройного Зигзага или Комбинации),
  за ним ожидается x-волна.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 9-3
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Точки касания линии тренда / Рис.9-2
  figure_id: null
  verbatim_quote:
    text: 'Итак, Правило точек касания гласит: Зигзаг с каналами идеальной формы не
      должен завершать коррективную фазу.'
    language: ru
formalization:
  status: draft
  applies_when: '# Завершён паттерн Zigzag (A-B-C) и построен канал по 4 точкам касания

    pattern == ''zigzag''

    AND zigzag_is_complete == true

    AND channel_touchpoints == 4

    # Канал "идеальной формы": все 4 ключевые точки (начало A, конец A/начало B,

    # конец B/начало C, конец C) касаются линий канала

    # Линия 1: через начало A и конец B (или начало C)

    # Линия 2: параллельная через конец A (или начало B) и конец C

    AND channel_is_perfect_form == true

    '
  constraint: '# Зигзаг с каналом идеальной формы (4 точки касания) НЕ может завершать

    # коррективную фазу. Он является лишь частью более крупной коррекции.


    # 1. Этот зигзаг НЕ является самостоятельной завершённой коррекцией

    zigzag_completes_corrective_phase = false


    # 2. Зигзаг — часть более крупной сложной коррекции

    zigzag.parent_pattern IN [''double_zigzag'', ''triple_zigzag'', ''combination'']


    # 3. После этого зигзага ожидается x-волна (соединительная волна)

    next_wave_after(zigzag).label = ''x''


    # Иными словами: если алгоритм обнаружил завершённый зигзаг

    # с 4 точками касания канала, он НЕ должен маркировать его

    # как финальную коррекцию, а должен ожидать продолжение —

    # x-волну и далее ещё один корректирующий паттерн

    '
  formalization_notes: "- \"Канал идеальной формы\" = ровно 4 точки касания двух параллельных\
    \ линий\n  тренда, построенных по ключевым точкам зигзага (начало/конец волн A,\
    \ B, C).\n- Конкретная геометрия построения канала (какие точки на какой линии)\n\
    \  зависит от реализации channeling и не детализирована в verbatim_quote;\n  предполагается\
    \ стандартное построение канала зигзага по Нили (Рис.9-2).\n- Правило не уточняет\
    \ допуск (tolerance) для определения \"касания\" —\n  это параметр реализации.\n\
    - После x-волны ожидается второй (или третий) корректирующий паттерн,\n  формирующий\
    \ Double/Triple Zigzag или Combination."

  verbatim_quote:
    text: 'Рейтинг Энергии... указывает, будет, должен, может, не должен или не будет
      ее начальный уровень достигнут волной последующей... Рейтинги: Тройной Зигзаг
      +3/-3, Тройная Комбинация +3/-3, Тройная Плоская +3/-3, Двойной Зигзаг +2/-2,
      Двойная Комбинация +2/-2, Двойная Плоская +2/-2... Подвижная Коррекция -3/+3.'

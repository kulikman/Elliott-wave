statement_ru: 'Рейтинг Энергии коррекции (от -3 до +3) указывает, будет ли достигнут
  начальный уровень следующей за ней волной. Чем выше абсолютное значение — тем ниже
  вероятность полного отката. Применяется только к компактным (сжатым) фигурам. Таблица
  (волна завершается в восходящем / нисходящем направлении): Тройной Зигзаг +3/-3;
  Тройная Комбинация +3/-3; Тройная Плоская +3/-3; Двойной Зигзаг +2/-2; Двойная Комбинация
  +2/-2; Двойная Плоская +2/-2; Удлинённый Зигзаг +1/-2; Удлинённая Плоская +1/-1;
  Зигзаг/Неудавшаяся-b/Обыкновенная 0/0; Неудавшаяся-с -1/+1; Неправильная -1/+1;
  Неправильная (сильная) -2/+2; Двойная Тройка -2/+2; Тройная Тройка -2/+2; Подвижная
  Коррекция -3/+3.'
statement_en: null

statement_ru: 'Постэффект Неудавшейся-с (-1 ↑): следующая волна того же Порядка ДОЛЖНА
  достичь начального уровня. Если Неудавшаяся-с завершает коррективную фазу, следующая
  Импульсная волна должна быть больше предыдущей однонаправленной Импульсной.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 10-5
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Неудавшаяся-с
  figure_id: null
  verbatim_quote:
    text: Следующая за Неудавшейся-с волна того же Порядка должна достигать ее начального
      уровня. Если Неудавшаяся-с завершает коррективную фазу, следующая за ней Импульсная
      волна должна быть больше предыдущей однонаправленной Импульсной волны.

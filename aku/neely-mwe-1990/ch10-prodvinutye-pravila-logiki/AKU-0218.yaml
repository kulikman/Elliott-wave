statement_ru: 'Постэффект Ограничивающего Сужающегося Треугольника: за ним всегда
  следует ''выброс'' (сильная резкая волна), который должен превысить уровень волны-b.
  Длина выброса зависит от типа: Горизонтальный ≈ ширина самой широкой волны (±25%);
  Неправильный — до 161.8% ширины; Подвижный — до 261.8%. Временная длина выброса
  ≈ времени от конца волны-e до пересечения линий тренда.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 10-7
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Сужающиеся Треугольники
  figure_id: null
  verbatim_quote:
    text: За Сужающимся Треугольником всегда следует "выброс" (сильная, резкая волна)...
      Этот "выброс" должен заходить "за" (превышать) максимальный или минимальный
      уровень котировок, достигнутый в процессе формирования Треугольника, если только
      его направленность не противоположна направлению волны-b.
    language: ru

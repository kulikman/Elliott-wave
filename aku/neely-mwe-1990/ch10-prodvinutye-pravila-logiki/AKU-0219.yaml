statement_ru: 'Постэффект Трендового Импульса: следующая волна того же Порядка не
  должна достичь начального уровня, если Импульс не является волной-5 или с-волной
  более крупной фигуры. С Растянутой 3-й: откат до ценовой зоны W4. С Растянутой 5-й:
  следующая ДОЛЖНА быть > 61.8% W5 — единственный случай, когда откат после Импульса
  обязателен более 61.8%.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 10-10
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Трендовые Импульсы / Импульс с Растянутой пятой
  figure_id: null
  verbatim_quote:
    text: Следующая за Трендовым Импульсом волна не должна достичь его начального
      уровня, если только он сам не является волной-5 или волной-с более крупной фигуры...
      Импульс с Растянутой пятой – единственная из растянутых волн, после которой
      следующая волна того же Порядка должна быть больше 61,8% ее длины.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после завершённого Трендового Импульса (Trending
    Impulse)

    # к следующей волне того же Порядка (Degree)

    pattern.type == ''impulse''

    AND pattern.subtype == ''trending''

    AND pattern.is_completed == true

    AND next_wave_same_degree EXISTS

    '
  constraint: "# --- Часть 1: Общее правило для всех Трендовых Импульсов ---\n# Следующая\
    \ волна того же Порядка НЕ должна достичь начального уровня Импульса,\n# ЕСЛИ\
    \ ТОЛЬКО Импульс не является волной-5 или с-волной более крупной фигуры.\n\nimpulse_start\
    \ = price_at(start(pattern))\nimpulse_end = price_at(end(pattern))\nis_wave5_of_larger\
    \ = (pattern.position_in_parent == 5)\nis_waveC_of_larger = (pattern.position_in_parent\
    \ == 'c')\n\nIF NOT is_wave5_of_larger AND NOT is_waveC_of_larger:\n    IF impulse_end\
    \ > impulse_start:  # бычий импульс\n        low(next_wave_same_degree) > impulse_start\n\
    \    ELSE:  # медвежий импульс\n        high(next_wave_same_degree) < impulse_start\n\
    \n# --- Часть 2: Импульс с Растянутой 3-й ---\n# Откат до ценовой зоны волны-4\n\
    \nIF pattern.extended_wave == 3:\n    w4_start = price_at(start(pattern.wave4))\n\
    \    w4_end = price_at(end(pattern.wave4))\n    w4_zone_min = min(w4_start, w4_end)\n\
    \    w4_zone_max = max(w4_start, w4_end)\n\n    # Следующая волна должна войти\
    \ в ценовую зону W4\n    IF impulse_end > impulse_start:  # бычий\n        low(next_wave_same_degree)\
    \ <= w4_zone_max\n        AND low(next_wave_same_degree) >= w4_zone_min\n    ELSE:\
    \  # медвежий\n        high(next_wave_same_degree) >= w4_zone_min\n        AND\
    \ high(next_wave_same_degree) <= w4_zone_max\n\n# --- Часть 3: Импульс с Растянутой\
    \ 5-й ---\n# Следующая волна ДОЛЖНА быть > 61.8% длины волны-5\n# Единственный\
    \ случай обязательного отката > 61.8% после Импульса\n\nIF pattern.extended_wave\
    \ == 5:\n    w5_length = abs(price_at(end(pattern.wave5)) - price_at(start(pattern.wave5)))\n\
    \    next_wave_length = abs(price_at(end(next_wave_same_degree)) - price_at(start(next_wave_same_degree)))\n\
    \n    next_wave_length > 0.618 * w5_length\n"
  formalization_notes: "1. Часть 2 (Растянутая 3-я): в statement сказано \"откат до\
    \ ценовой зоны W4\",\n   формализовано как вход в ценовой диапазон W4. Не уточнено,\
    \ должен ли откат\n   остаться строго внутри зоны W4 или может пройти сквозь неё\
    \ — принято \"войти в зону\".\n2. Часть 3 (Растянутая 5-я): verbatim_quote явно\
    \ подтверждает обязательность\n   отката > 61.8% длины W5 — это единственный такой\
    \ случай среди растянутых волн.\n3. Для Растянутой 1-"

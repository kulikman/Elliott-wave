id: AKU-0220
type: rule
strength: mandatory
status: verified
topic: post-pattern-logic
subtopics:
- energy-rating
- ending-diagonal
statement_ru: 'Постэффект Терминального Импульса: следующая волна ДОЛЖНА достичь начального
  уровня Терминала не более чем за 50% времени его формирования (обычно около 25%).
  Терминал всегда завершает более крупную фигуру. Создаваемая им точка минимума/максимума
  удерживается примерно в течение минимум двух периодов формирования.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 10-10
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Терминальные Импульсы
  figure_id: null
  verbatim_quote:
    text: Следующая за Терминальным Импульсом волна должна достичь его начального
      уровня не более чем за 50% времени его формирования; обычно это занимает примерно
      25% этого времени.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после завершения Терминального Импульса (Ending
    Diagonal)

    pattern_just_completed == ''terminal_impulse''

    # Терминал всегда завершает более крупную фигуру

    # (т.е. является финальным сегментом вышестоящего паттерна)

    '
  constraint: "# --- Определения ---\nterminal = completed_terminal_impulse\nterminal_start_price\
    \ = price_at(start(terminal))\nterminal_end_price = price_at(end(terminal))\n\
    terminal_duration = time(end(terminal)) - time(start(terminal))\n\nnext_wave =\
    \ wave_immediately_following(terminal)\n\n# --- Правило 1 (mandatory из verbatim_quote):\
    \ ---\n# Следующая за Терминальным Импульсом волна ДОЛЖНА достичь его начального\
    \ уровня\n# не более чем за 50% времени его формирования\n\n# Определяем момент,\
    \ когда цена возвращается к начальному уровню терминала\nif direction(terminal)\
    \ == 'up':\n  # Терминал шёл вверх — следующая волна идёт вниз\n  time_to_reach_start\
    \ = first_time_after(end(terminal), where: low <= terminal_start_price) - time(end(terminal))\n\
    elif direction(terminal) == 'down':\n  # Терминал шёл вниз — следующая волна идёт\
    \ вверх\n  time_to_reach_start = first_time_after(end(terminal), where: high >=\
    \ terminal_start_price) - time(end(terminal))\n\n# Обязательное ограничение: достижение\
    \ начального уровня за ≤ 50% времени формирования\nREQUIRE time_to_reach_start\
    \ <= 0.50 * terminal_duration\n\n# Типичное значение (не mandatory, информационное):\
    \ ~25% времени\n# TYPICAL: time_to_reach_start ≈ 0.25 * terminal_duration\n\n\
    # --- Правило 2 (из statement_ru, из контекста книги): ---\n# Создаваемая Терминалом\
    \ точка минимума/максимума удерживается\n# примерно в течение минимум двух периодов\
    \ его формирования\n\nextreme_price = terminal_end_price  # точка экстремума,\
    \ созданная терминалом\nhold_period_start = time(end(terminal))\nhold_period_end\
    \ = hold_period_start + 2 * terminal_duration\n\nif direction(terminal) == 'up':\n\
    \  # Максимум не должен быть превышен в течение ~2x длительности терминала\n \
    \ REQUIRE max(high, from: hold_period_start, to: hold_period_end) <= extreme_price\n\
    elif direction(terminal) == 'down':\n  # Минимум не должен быть пробит в течение\
    \ ~2x длительности терминала\n  REQUIRE min(low, from: hold_period_start, to:\
    \ hold_period_end) >= extreme_price\n"
  formalization_notes: "1. Правило 1 (50% времени) — mandatory, подтверждено verbatim_quote.\n\
    2. Правило 2 (удержание экстремума ~2 периода) — в тексте сказано \"примерно в\
    \ течение \n   как минимум двух периодов\", слово \"примерно\" вносит нечёткость;\
    \ формализовано \n   как строгое ≤/≥, но на практике допустимы незначительные\
    \ отклонения.\n3. Типичное значение 25% — не mandatory, указано как ориентир (\"\
    обычно\").\n4. Утверждение \"Терминал всегда завершает более крупную фиг"

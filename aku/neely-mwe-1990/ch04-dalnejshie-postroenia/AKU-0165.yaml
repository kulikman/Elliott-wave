statement_ru: Если последнее структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в тройку (:3) и
  рассматривать как часть одной из Нестандартных фигур.
statement_en: null
source:

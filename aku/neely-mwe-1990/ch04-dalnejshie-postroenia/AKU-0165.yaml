statement_ru: Если последнее структурное обозначение Стандартной Коррективной Серии
  не содержит Индикатор положения «L», эту Серию необходимо сжать в тройку (:3) и
  рассматривать как часть одной из Нестандартных фигур.
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-2
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Структурные Серии (Таблица 4-3)
  figure_id: null
  verbatim_quote:
    text: Если последнее Структурное обозначение Стандартной Коррективной Серии не
      содержит Индикатор положения «L», эту Серию необходимо сжать в «тройку» (:3)
      и рассматривать как часть одной из Нестандартных ценовых фигур.
    language: ru
formalization:
  status: draft
  applies_when: '# Имеем завершённую Стандартную Коррективную Серию из Таблицы 4-3
    Нили

    # (например: :F3/:c3/:L5, :F3/:c3/:L3, :F3/:c3/:sL3, :F3/:c3/:L3/:c3/:L3 и т.д.)

    series_type == ''standard_corrective_series''

    AND series_is_complete == true


    # Проверяем последнее структурное обозначение серии

    last_label = series.structural_labels[last]


    # Последнее обозначение НЕ содержит индикатор положения "L"

    AND NOT has_position_indicator(last_label, ''L'')

    # Т.е. last_label НЕ начинается с ":L" (не является :L3, :L5, :sL3 и т.п.)

    '
  constraint: '# 1. Сжать (compact) всю серию структурных обозначений в единственную
    "тройку" :3

    series.compact() -> '':3''

    # Все внутренние структурные обозначения серии заменяются одним обозначением :3


    # 2. Результирующая :3 классифицируется как компонент Нестандартной фигуры

    series.classification = ''nonstandard_pattern_component''

    # Эта :3 не может быть самостоятельной стандартной коррективной фигурой,

    # она обязательно является частью одной из Нестандартных ценовых фигур

    '
  formalization_notes: "- \"Стандартная Коррективная Серия\" — конкретный набор серий\
    \ из Таблицы 4-3 Нили.\n  Полный перечень серий необходим для точной реализации\
    \ проверки series_type.\n- \"Индикатор положения L\" — маркер \"L\" (Last) в структурном\
    \ обозначении,\n  указывающий что волна находится в позиции последней волны фигуры.\n\
    \  Примеры обозначений с \"L\": :L3, :L5, :sL3. Проверка — наличие \"L\" как\n\
    \  индикатора положения в обозначении.\n- Какие именно Нестандартные фигуры применимы\
    \ после сжатия — данное правило\n  не уточняет; это определяется другими правилами\
    \ классификации.\n- Правило является обязательным (mandatory): если условие выполнено,\n\
    \  сжатие и переклассификация должны быть произведены безусловно."

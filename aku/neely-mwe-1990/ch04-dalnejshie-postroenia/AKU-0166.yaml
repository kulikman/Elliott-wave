statement_ru: '«Зигзаг или Импульс?»: обнаружив :L5, завершающую предполагаемый Зигзаг,
  всегда сначала проверяй гипотезу Импульса — Зигзаг (:5-:F3-:L5) может быть тремя
  последними сегментами Импульса. Только если импульсная гипотеза нарушает Правила
  построения, принимается Зигзаг.'
statement_en: null
source:
  book_id: neely-mwe-1990
  page: 4-8
  chapter: 'Глава 4: Дальнейшие аналитические построения'
  section: Зигзаг или Импульс?
  figure_id: null
  verbatim_quote:
    text: Работая с Зигзагами, всегда обращайте внимание на два предшествующих им
      Структурных обозначения, чтобы убедиться, что случайно не пропустили Импульс.
      ... всегда проверяйте импульсную гипотезу ... прежде чем идентифицировать группу
      волн в качестве Зигзага. Если Импульсная ценовая фигура удовлетворяет всем Правилам
      построения, остановитесь на этом варианте.
    language: ru
formalization:
  status: draft
  applies_when: "# Когда три последних сегмента имеют структурные метки,\n# образующие\
    \ кандидата на Зигзаг (:5, :F3, :L5),\n# И перед ними существуют как минимум два\
    \ предшествующих сегмента\ncandidate_zigzag = (segments[-3].structure_label ==\
    \ ':5' AND\n                    segments[-2].structure_label == ':F3' AND\n  \
    \                  segments[-1].structure_label == ':L5')\nhas_preceding_segments\
    \ = (len(segments) >= 5)\ncandidate_zigzag AND has_preceding_segments\n"
  constraint: "# Шаг 1: Взять два структурных обозначения, непосредственно предшествующих\n\
    #         трём сегментам кандидата-Зигзага.\n#         Попытаться сформировать\
    \ 5-волновой Импульс:\n#         preceding[0] = волна 1, preceding[1] = волна\
    \ 2,\n#         segments[-3] = волна 3, segments[-2] = волна 4, segments[-1] =\
    \ волна 5\npreceding_two = [segments[-5], segments[-4]]\nimpulse_candidate_waves\
    \ = preceding_two + [segments[-3], segments[-2], segments[-1]]\n\nimpulse_hypothesis_valid\
    \ = check_all_impulse_construction_rules(impulse_candidate_waves)\n\n# Шаг 2:\
    \ Приоритет интерпретаций\nif impulse_hypothesis_valid:\n    # Импульсная гипотеза\
    \ удовлетворяет ВСЕМ Правилам построения —\n    # принять Импульс, отклонить Зигзаг\n\
    \    accept_interpretation = 'impulse'\n    reject_interpretation = 'zigzag'\n\
    else:\n    # Импульсная гипотеза нарушает хотя бы одно Правило построения —\n\
    \    # только тогда допустимо принять Зигзаг\n    accept_interpretation = 'zigzag'\n\
    \n# ИНВАРИАНТ: Зигзаг НЕ может быть принят без предварительной\n# проверки и отклонения\
    \ импульсной гипотезы\n# zigzag_allowed = NOT impulse_hypothesis_valid\n"
  formalization_notes: "1. Правило требует наличия как минимум двух сегментов перед\
    \ кандидатом-Зигзагом\n   для проверки импульсной гипотезы. Если предшествующих\
    \ сегментов менее двух,\n   правило неприменимо (нечего проверять как волны 1-2\
    \ Импульса), и Зигзаг\n   может быть принят без этой проверки.\n2. \"Правила построения\"\
    \ (construction rules) для Импульса — это отдельный набор\n   AKU (правила соотношений\
    \ волн, непересечения и т.д.), которые должны быть\n   реализованы в функции check_all_impulse_construction_rules().\n\
    3. Verbatim quote: \"два предшествующих им Структурных обозначения\" —\n   это\
    \ именно два сегмента (с их метками), непосредственно предшествующих\n   трём\
    \ сегментам Зигзага.\n4. Это правило приоритета интерпретаций (impulse over zigzag),\
    \ а не правило\n   валидации отдельного паттерна. Оно обязательно (mandatory)\
    \ — алгоритм\n   не имеет права принять Зигзаг, не проверив сначала импульсную\
    \ гипотезу.\n5. Какие именно структурные метки должны иметь preceding_two для\
    \ валидной\n   импульсной гипотезы — определяется прав"

statement_ru: 'Необходимо вовремя идентифицировать и классифицировать (по признаку
  «Импульс — Коррекция», т.е. «:5» или «:3») все составляющие каждого сегмента каждой
  волны графика. Необходимо придерживаться предыдущей, проверенной ценовой структуры,
  даже если намерения рынка не вполне ясны.

  '
source:
  book_id: neely-mwe-1990
  page: 9-6
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Необходимость сохранения структурной целостности
  figure_id: null
  verbatim_quote:
    text: 'Если вовремя не идентифицировать и не классифицировать (по признаку "Импульс
      - Коррекция", т. е. ":5" или ":3") все составляющие каждого сегмента каждой
      волны графика, то с увеличением исследуемой фигуры ее анализ усложняется. Даже
      если "намерения" рынка не вполне ясны, необходимо придерживаться предыдущей,
      проверенной (в том числе временем) ценовой "структуры"

      '
    language: ru
formalization:
  status: not_formalizable

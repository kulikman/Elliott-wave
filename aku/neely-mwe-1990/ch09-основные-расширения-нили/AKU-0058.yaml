id: AKU-0058
type: rule
strength: mandatory
status: verified
topic: analysis-workflow
subtopics:
- structural-labels
- structural-series
statement_ru: 'Необходимо вовремя идентифицировать и классифицировать (по признаку
  «Импульс — Коррекция», т.е. «:5» или «:3») все составляющие каждого сегмента каждой
  волны графика. Необходимо придерживаться предыдущей, проверенной ценовой структуры,
  даже если намерения рынка не вполне ясны.

  '
source:
  book_id: neely-mwe-1990
  page: 9-6
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Необходимость сохранения структурной целостности
  figure_id: null
  verbatim_quote:
    text: 'Если вовремя не идентифицировать и не классифицировать (по признаку "Импульс
      - Коррекция", т. е. ":5" или ":3") все составляющие каждого сегмента каждой
      волны графика, то с увеличением исследуемой фигуры ее анализ усложняется. Даже
      если "намерения" рынка не вполне ясны, необходимо придерживаться предыдущей,
      проверенной (в том числе временем) ценовой "структуры"

      '
    language: ru
formalization:
  status: draft
  applies_when: "# Применяется на каждом этапе анализа, для каждого сегмента каждой\
    \ волны\n# Перед группировкой моноволн в паттерны более высокого порядка\nfor\
    \ each wave in all_waves:\n  for each segment in wave.segments:\n    BEFORE proceeding_to_higher_degree_grouping(segment)\n"
  constraint: "# Правило 1: Каждый сегмент каждой волны должен быть классифицирован\n\
    # как импульс (:5) или коррекция (:3) до перехода к анализу следующего уровня\n\
    for each wave in all_waves:\n  for each segment in wave.segments:\n    REQUIRE\
    \ segment.structure_label IN [\":5\", \":3\"]\n    REQUIRE segment.structure_label\
    \ IS NOT NULL\n\n# Правило 2: При неясности намерений рынка (неоднозначности текущего\
    \ движения)\n# сохранять ранее установленную и проверенную структурную разметку\n\
    if current_market_direction_is_ambiguous():\n  for each segment in previously_classified_segments:\n\
    \    segment.structure_label = segment.previous_verified_structure_label\n   \
    \ # НЕ менять ранее проверенную классификацию из-за текущей неопределённости\n\
    \    REQUIRE segment.structure_label == segment.previous_verified_structure_label\n\
    \n# Нарушение: переход к группировке без классификации всех составляющих\nASSERT\
    \ no_unclassified_segments_exist() BEFORE higher_degree_analysis()\n"
  formalization_notes: "Правило содержит два аспекта:\n1. Процедурный (формализуемый):\
    \ каждый сегмент должен получить метку :5 или :3\n   до перехода к анализу более\
    \ высокого уровня. Это проверяемо алгоритмически.\n2. Принцип консервативности\
    \ (частично формализуемый): при неясности рынка\n   сохранять предыдущую проверенную\
    \ структуру. Формализуемо как запрет\n   на изменение verified-разметки при отсутствии\
    \ явных оснований,\n   но критерий \"намерения рынка не вполне ясны\" требует\
    \ эвристики\n   для определения степени неоднозначности.\nVerbatim quote подтверждает:\
    \ без своевременной классификации \"анализ усложняется\",\nчто делает это методологическим\
    \ требованием к порядку работы алгоритма."

  section: Перечень исключений, Пункт 1
  figure_id: null
  verbatim_quote:
    text: 'Случается, что в важных точках "разворота" рынка или при "необычных" условиях
      одно из правил, обычно критически важное для правильного формирования волновой
      фигуры, может не применяться или не выполняться.

      '

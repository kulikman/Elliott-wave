statement_ru: 'В важных точках разворота рынка или при необычных условиях одно из
  критически важных правил формирования волновой фигуры может не выполняться. Исключительными
  ситуациями являются: A) завершение мультиволны или более крупной фигуры; B) волна-5
  или с-волна Терминальной фигуры; C) волна, являющаяся или завершающаяся Сужающимся
  или Расширяющимся Треугольником.

  '
source:
  book_id: neely-mwe-1990

statement_ru: 'Только четыре из пяти сегментов фигуры (имеющей 6 возможных точек касания
  одного и того же Порядка) могут одновременно касаться двух противоположных линий
  тренда. Это правило применяется к Импульсным фигурам (Трендовым и Терминальным)
  и Треугольникам. Если больше четырёх точек касания одного и того же Порядка с параллельными
  линиями тренда — формируется не Импульс, а Коррекция.

  '
source:
  book_id: neely-mwe-1990
  page: 9-1
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Точки касания линии тренда
  figure_id: null
  verbatim_quote:
    text: 'только четыре из пяти сегментов фигуры (имеющей 6 возможных точек касания
      "одного и того же Порядка" (т. e. крайних точек волн одной и той же степени))
      могут одновременно касаться двух противоположных линий тренда

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к пятиволновым фигурам с каналированием

    pattern IN (''impulse'', ''terminal_impulse'', ''triangle'')

    AND num_segments == 5

    # Фигура имеет 6 крайних точек одного Порядка (степени):

    # start, end_w1, end_w2, end_w3, end_w4, end_w5

    '
  constraint: "# Определяем 6 точек касания одного Порядка (крайние точки волн одной\
    \ степени)\ntouch_points = [\n  point_0,  # начало волны 1\n  point_1,  # конец\
    \ волны 1 / начало волны 2\n  point_2,  # конец волны 2 / начало волны 3\n  point_3,\
    \  # конец волны 3 / начало волны 4\n  point_4,  # конец волны 4 / начало волны\
    \ 5\n  point_5   # конец волны 5\n]\n\n# Строим две противоположные линии тренда\
    \ (канал) через оптимальные точки\n# Линия A: соединяет точки на одной стороне\
    \ канала (например, экстремумы действующих волн)\n# Линия B: противоположная параллельная\
    \ линия (экстремумы коррекционных волн)\nupper_trendline = best_fit_line(subset\
    \ of touch_points on upper side)\nlower_trendline = best_fit_line(subset of touch_points\
    \ on lower side)\n\n# Считаем количество точек, которые касаются (лежат на) одной\
    \ из двух линий тренда\nTOLERANCE = acceptable_channel_tolerance  # малое отклонение\
    \ от линии\n\ntouches_count = 0\nFOR each p IN touch_points:\n  IF abs(distance(p,\
    \ upper_trendline)) <= TOLERANCE:\n    touches_count += 1\n  ELIF abs(distance(p,\
    \ lower_trendline)) <= TOLERANCE:\n    touches_count += 1\n\n# Правило: максимум\
    \ 4 точки из 6 могут одновременно касаться двух линий\n# (т.е. максимум 4 сегмента\
    \ из 5 касаются линий тренда своими крайними точками)\ntouches_count <= 4\n\n\
    # Если touches_count > 4 (т.е. 5 или 6 точек касаются параллельных линий),\n#\
    \ фигура НЕ является Импульсом — это Коррекция\nIF touches_count > 4:\n  pattern\
    \ NOT IN ('impulse', 'terminal_impulse')\n  # Переклассифицировать как коррекционную\
    \ фигуру\n  reclassify_as('correction')\n"
  formalization_notes: "1. \"Точка касания\" означает, что крайняя точка волны лежит\
    \ на линии тренда канала\n   (с допустимой погрешностью). Конкретный допуск не\
    \ определён в правиле.\n2. \"Одного и того же Порядка\" — точки должны быть крайними\
    \ точками волн одной степени\n   (т.е. все 6 точек пятиволновой структуры, а не\
    \ подволны).\n3. Правило подразумевает, что из 5 сегментов (6 точек) при построении\
    \ канала\n   из двух параллельных линий — не более 4 точек могут лежать на этих\
    \ линиях.\n   Если все 5 сегментов (5-6 точек) укладываются в параллельный канал\
    \ — \n   это признак коррекции, а не импульса.\n4. Способ построения \"оптимального\"\
    \ канала (какие точ"

id: AKU-0052
type: rule
strength: mandatory
status: verified
topic: channeling
subtopics:
- impulse
- triangle
statement_ru: 'Только четыре из пяти сегментов фигуры (имеющей 6 возможных точек касания
  одного и того же Порядка) могут одновременно касаться двух противоположных линий
  тренда. Это правило применяется к Импульсным фигурам (Трендовым и Терминальным)
  и Треугольникам. Если больше четырёх точек касания одного и того же Порядка с параллельными
  линиями тренда — формируется не Импульс, а Коррекция.

  '
source:
  book_id: neely-mwe-1990
  page: 9-1
  chapter: 'Глава 9: Основные Расширения Нили'
  section: Точки касания линии тренда
  figure_id: null
  verbatim_quote:
    text: 'только четыре из пяти сегментов фигуры (имеющей 6 возможных точек касания
      "одного и того же Порядка" (т. e. крайних точек волн одной и той же степени))
      могут одновременно касаться двух противоположных линий тренда

      '
    language: ru
formalization:
  status: draft
  applies_when: pattern IN ('impulse', 'terminal_impulse', 'triangle')
  constraint: count(segments simultaneously touching both opposite_trendlines) <=
    4
  formalization_notes: Из 5 сегментов (6 возможных точек касания одного Порядка) одновременно
    касаться двух линий могут только 4.
aliases:

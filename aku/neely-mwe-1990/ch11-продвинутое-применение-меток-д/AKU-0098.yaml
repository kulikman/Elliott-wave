statement_ru: 'В Горизонтальном Сужающемся Ограничивающем Треугольнике волна-d должна
  быть короче волны-с, и волна-е должна быть короче волны-d. Волна-b не должна быть
  менее 38.2% или более 261.8% волны-а.

  '
source:
  book_id: neely-mwe-1990
  page: 11-22
  chapter: Глава 11
  section: Продвинутое применение Меток движения — Горизонтальные Треугольники
  figure_id: null
  verbatim_quote:
    text: 'Волна-d должна быть короче волны-с и волна-е должна быть короче волны-d...
      волна-Ь не должна быть менее 38.2% или более 261.8% волны - а.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Горизонтальный Сужающийся Ограничивающий Треугольник

    pattern == ''horizontal_contracting_limiting_triangle''

    '
  constraint: '# Правило 1: волна-d короче волны-c

    length(wave_d) < length(wave_c)


    # Правило 2: волна-e короче волны-d

    length(wave_e) < length(wave_d)


    # Правило 3: волна-b не менее 38.2% и не более 261.8% волны-a

    length(wave_b) >= 0.382 * length(wave_a)

    AND

    length(wave_b) <= 2.618 * length(wave_a)

    '
  formalization_notes: 'length() — ценовая длина (расстояние от начала до конца волны
    по цене).

    Все три условия являются обязательными (mandatory) и должны выполняться одновременно.'

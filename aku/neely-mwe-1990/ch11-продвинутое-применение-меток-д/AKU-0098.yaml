statement_ru: 'В Горизонтальном Сужающемся Ограничивающем Треугольнике волна-d должна
  быть короче волны-с, и волна-е должна быть короче волны-d. Волна-b не должна быть
  менее 38.2% или более 261.8% волны-а.

  '
source:
  book_id: neely-mwe-1990
  page: 11-22
  chapter: Глава 11
  section: Продвинутое применение Меток движения — Горизонтальные Треугольники
  figure_id: null
  verbatim_quote:
    text: 'Волна-d должна быть короче волны-с и волна-е должна быть короче волны-d...
      волна-Ь не должна быть менее 38.2% или более 261.8% волны - а.

      '
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'horizontal_contracting_limiting_triangle'
  constraint: length(wave_d) < length(wave_c) AND length(wave_e) < length(wave_d)
    AND 0.382 * length(wave_a) <= length(wave_b) <= 2.618 * length(wave_a)
  formalization_notes: null

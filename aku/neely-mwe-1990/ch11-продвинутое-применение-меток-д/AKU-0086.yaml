statement_ru: 'Никакая Коррективная фигура не может появиться в любом положении Метки
  движения Трендового Импульса (т.е. на месте волн 1, 3, 5, волны-а Зигзага или волны-с
  Зигзага или Плоской всех вариаций).

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Коррекции
  figure_id: null
  verbatim_quote:
    text: никакая Коррективная фигура не может появиться в любом положении Метки движения
      Трендового Импульса (т. e., на месте волн 1, 3, 5, волны-а Зигзага или волны-с
      Зигзага или Плоской [всех вариаций]).
    language: ru
formalization:
  status: draft
  applies_when: "# Правило применяется когда волна находится в позиции \"Метки движения\"\
    \n# Трендового Импульса — т.е. в позициях, которые должны быть импульсными (моноволнами\
    \ :5)\n#\n# Перечень позиций из правила:\n#   - wave_1, wave_3, wave_5 любого\
    \ Трендового Импульса\n#   - wave_a Зигзага (все вариации)\n#   - wave_c Зигзага\
    \ (все вариации)\n#   - wave_c Плоской (все вариации)\n\nposition IN [\n  'trending_impulse.wave_1',\n\
    \  'trending_impulse.wave_3',\n  'trending_impulse.wave_5',\n  'zigzag.wave_a',\
    \          # все вариации зигзагов\n  'zigzag.wave_c',          # все вариации\
    \ зигзагов\n  'flat.wave_c'             # все вариации плоских\n]\n"
  constraint: "# В указанных позициях волна НЕ может быть Коррективной фигурой.\n\
    # Коррективные фигуры: Плоские, Зигзаги, Треугольники, \n# Двойные/Тройные комбинации\
    \ и т.д.\n# Т.е. волна в этих позициях обязана быть импульсной (структура :5)\n\
    \ncorrective_patterns = ['flat', 'zigzag', 'triangle', \n                    \
    \   'double_combination', 'triple_combination',\n                       'double_zigzag',\
    \ 'triple_zigzag',\n                       'double_flat', 'triple_flat']\n\nis_corrective\
    \ = pattern_type(current_wave) IN corrective_patterns\n\n# Ограничение: коррективная\
    \ фигура запрещена\nASSERT is_corrective == FALSE\n\n# Эквивалентно: структура\
    \ волны должна быть импульсной (:5)\n# ASSERT structure(current_wave) == ':5'\n"
  formalization_notes: "Правило устанавливает фундаментальный запрет: в позициях,\
    \ где ожидается \nимпульсное (трендовое) движение, не может находиться коррективная\
    \ фигура.\n\n\"Метка движения Трендового Импульса\" — это позиции внутри паттернов,\
    \ \nкоторые несут основное направленное движение и должны иметь \nпятиволновую\
    \ (:5) структуру.\n\nСписок позиций явно перечислен в verbatim_quote. Волна-5\
    \ Импульса \nможет быть Треугольной (упомянуто в контексте выше), но Треугольник\
    \ \nв позиции wave_5 — это отдельный случай, регулируемый другими AKU.\nДанное\
    \ правило в verbatim_quote не делает исключения для Треугольника \nв wave_5, поэтому\
    \ формализация следует буквальному тексту цитаты."

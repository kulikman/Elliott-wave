statement_ru: 'В Зигзаге волна-а должна быть Импульсной, и волна-b не должна откатиться
  от неё более чем на 61.8%. Волна-b однозначно должна быть коррективной и не должна
  откатываться от волны-а более чем на 61.8%.

  '
source:
  book_id: neely-mwe-1990
  page: 11-20
  chapter: Глава 11
  section: Продвинутое применение Меток движения — Зигзаги
  figure_id: null
  verbatim_quote:
    text: 'Волна-а должна быть Импульсной и волна-Ь не должна откатиться от нее более
      чем на 61.8%... Волна-b однозначно должна быть коррективной (3) и не должна
      откатываться от волны-а более чем на 61,8%

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется при идентификации паттерна Зигзаг

    pattern == ''zigzag''

    '
  constraint: '# 1. Волна-a должна быть Импульсной (пятиволновая структура)

    structure(wave_a) == '':5''


    # 2. Волна-b должна быть коррективной (трёхволновая структура)

    structure(wave_b) == '':3''


    # 3. Волна-b не должна откатываться от волны-a более чем на 61.8%

    retracement_ratio = abs(end(wave_b) - end(wave_a)) / abs(end(wave_a) - start(wave_a))

    retracement_ratio <= 0.618

    '
  formalization_notes: 'В statement_ru требование об откате волны-b повторяется дважды
    (для волны-a — импульсность

    и ограничение отката, для волны-b — коррективность и ограничение отката), но по
    сути

    это одно и то же ограничение: волна-b не откатывает более 61.8% от волны-a.

    Retracement считается как отношение ценового движения волны-b к ценовому движению
    волны-a.'
aliases:

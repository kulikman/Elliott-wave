id: AKU-0097
type: rule
strength: mandatory
status: verified
topic: zigzag
subtopics:
- motion-labels
- flat
statement_ru: 'Волна-b Зигзага не должна быть Подвижной Коррекцией, за исключением
  случая, когда Зигзаг входит в состав Треугольника.

  '
source:
  book_id: neely-mwe-1990
  page: 11-20
  chapter: Глава 11
  section: Продвинутое применение Меток движения — Зигзаги, Волна-b
  figure_id: null
  verbatim_quote:
    text: 'Она не должна быть Подвижной Коррекцией, не считая случая, когда Зигзаг,
      частью которого может быть данная b-волна, входит в состав Треугольника.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Текущий паттерн — Зигзаг

    pattern == ''zigzag''

    AND current_wave == ''b''

    # Исключение: зигзаг входит в состав Треугольника

    AND parent_pattern != ''triangle''

    '
  constraint: '# Волна-b зигзага не должна быть Подвижной Коррекцией

    is_moving_correction(wave_b) == false

    '
  formalization_notes: '"Подвижная Коррекция" (running/moving correction) — коррективный
    паттерн,

    в котором волна-b превышает начало волны-a, а волна-c не достигает конца волны-a

    (т.е. коррекция "сдвигается" в направлении основного тренда).

    Исключение действует только когда весь Зигзаг является частью Треугольника

    (любого уровня вложенности в качестве ноги треугольника).

    Проверка parent_pattern должна учитывать непосредственного родителя зигзага.'
aliases:
- запрет подвижной коррекции в волне-b зигзага

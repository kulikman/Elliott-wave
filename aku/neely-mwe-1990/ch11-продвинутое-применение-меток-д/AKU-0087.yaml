statement_ru: 'В Терминальном Импульсе с Растянутой первой волной: волна-2 не должна
  откатываться более чем на 61.8% волны-1. Волна-3 не должна быть намного больше 61.8%,
  но и не менее 38.2% волны-1. Волна-5 не может быть более 99% волны-3.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Терминальные Импульсы - Растянутая первая
  figure_id: null
  verbatim_quote:
    text: волна-2 не должна откатываться более чем на 61.8% волны-1. Волна-3 не должна
      быть намного больше 61.8%, но и не менее 38.2% волны-1. Волна-5 не может быть
      более 99% волны-3
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'terminal_impulse' AND extended_wave == 1
  constraint: retrace(wave_2) <= 0.618 * length(wave_1) AND 0.382 * length(wave_1)
    <= length(wave_3) <= 0.618 * length(wave_1) AND length(wave_5) <= 0.99 * length(wave_3)
  formalization_notes: null

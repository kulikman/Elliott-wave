statement_ru: 'В Трендовом Импульсе с Растянутой первой волной: движение после Растянутой
  волны-1 (волна-2) не может откатываться от волны-1 намного более 38.2%.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Трендовые Импульсы - Растянутая первая
  figure_id: null
  verbatim_quote:
    text: Движение, следующее за Растянутой волной-1 (волна-2), не может откатываться
      от волны-1 намного более 38.2%.
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Трендовый Импульс с растянутой волной 1

    pattern == ''trend_impulse'' AND extended_wave == 1

    '
  constraint: '# Волна-2 не может откатываться от волны-1 намного более 38.2%

    # retrace(wave_2, wave_1) — процент отката волны-2 относительно длины волны-1

    #

    # "Намного более 38.2%" означает мягкую верхнюю границу:

    # строгое превышение ~38.2% недопустимо, но незначительное превышение

    # может быть допустимо (fuzzy boundary).

    #

    # Для алгоритмической реализации используем порог с допуском:

    STRICT_LIMIT = 0.382

    TOLERANCE = 0.02  # ~2% допуск на "намного более" (настраиваемый параметр)

    MAX_RETRACE = STRICT_LIMIT + TOLERANCE  # 0.402


    retrace_ratio = abs(end(wave_2) - end(wave_1)) / abs(end(wave_1) - start(wave_1))


    retrace_ratio <= MAX_RETRACE

    '
  formalization_notes: "Формулировка «не может откатываться намного более 38.2%» содержит\n\
    нечёткий квантификатор «намного более». Это не жёсткий порог 38.2%,\nа мягкая\
    \ граница: незначительное превышение 38.2% допустимо,\nно существенное — нет.\
    \ Точное значение допуска (TOLERANCE) \nне определено в источнике и подлежит калибровке.\
    \ \nПредложенное значение 0.02 (итого ~40.2%) — разумная оценка,\nно может потребовать\
    \ корректировки на практике."
aliases:

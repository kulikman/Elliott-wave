formalization:
  status: draft
  applies_when: '# Правило применяется к волне-2 внутри импульсной структуры,

    # когда волна-1 имеет уровень сложности поливолны или выше

    pattern == ''impulse''

    AND current_wave == 2

    AND degree(wave_1) >= POLYWAVE

    '
  constraint: '# Волна-2 должна сегментировать на поливолновую или более высокого
    порядка фигуру

    # То есть волна-2 не может быть моноволной — она должна состоять

    # из нескольких подволн, образующих как минимум поливолновую коррекцию

    degree(wave_2) >= POLYWAVE

    # Эквивалентно: wave_2 должна содержать >= 3 моноволновых сегмента,

    # формирующих распознаваемую коррекционную фигуру

    segment_count(wave_2) >= 3

    '
  formalization_notes: 'Степень (degree) волны определяется количеством и структурой
    её подволн:

    - моноволна (monowave): неделимый ценовой сегмент без внутренней структуры

    - поливолна (polywave): фигура, состоящая из нескольких моноволн

    - мультиволна (multiwave) и выше: более сложные структуры


    "Сегментировать на поливолновую фигуру" означает, что волна-2 должна

    иметь внутреннюю структуру из нескольких моноволн (минимум 3),

    образующих коррекционный паттерн (зигзаг, плоская, треугольник и т.д.).


    Правило проверяемо только при наличии информации о внутренней структуре

    (сегментации) волн. В Pine Script это требует рекурсивного анализа

    подволн или предварительной разметки степеней.'

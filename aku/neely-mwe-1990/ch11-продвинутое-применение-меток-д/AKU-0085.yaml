statement_ru: 'Если волна-1 имеет уровень поливолны или выше, то волна-2 должна сегментировать
  на поливолновую или более высокого порядка фигуру.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Трендовые Импульсы - Волна-2
  figure_id: null
  verbatim_quote:
    text: Если волна-1 имеет уровень поливолны или выше, то волна-2 должна сегментировать
      на поливолновую или более высокого порядка фигуру.

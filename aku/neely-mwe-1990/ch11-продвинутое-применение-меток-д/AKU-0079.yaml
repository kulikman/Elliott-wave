id: AKU-0079
type: rule
strength: mandatory
status: verified
topic: motion-labels
subtopics:
- impulse
- position-indicators
statement_ru: 'Волны 2, 4, b, d, e или x никогда не могут быть Импульсной фигурой.
  Импульс может быть обнаружен с Метками движения только в конкретных положениях,
  исключающих эти позиции.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Импульсные фигуры
  figure_id: null
  verbatim_quote:
    text: Волны 2, 4, b, d, e или x никогда не могут быть Импульсной фигурой.
    language: ru
formalization:
  status: draft
  applies_when: '# Когда волна находится в одной из следующих позиций (меток движения):

    position IN [''wave_2'', ''wave_4'', ''wave_b'', ''wave_d'', ''wave_e'', ''wave_x'']

    '
  constraint: '# Структура волны в данной позиции НЕ может быть Импульсом

    # Импульс — это любая пятиволновая импульсная фигура (трендовый импульс или терминальный
    импульс)


    structure(current_wave) != ''impulse''


    # Эквивалентная проверка:

    # is_impulse_pattern(current_wave) == false

    #

    # Где is_impulse_pattern включает:

    #   - трендовый импульс (trending impulse)

    #   - терминальный импульс (terminal impulse)

    #   с любым вариантом растяжения (1-й, 3-й, 5-й)

    '
  formalization_notes: 'Правило является абсолютным запретом (mandatory, "никогда").

    Позиции 2, 4 — внутренние коррективные волны импульсов.

    Позиции b, d, e — внутренние волны коррективных фигур.

    Позиция x — промежуточная волна между коррективными фигурами.

    Все эти позиции являются коррективными по своей природе,

    поэтому не могут содержать импульсную структуру.'
aliases:
- запрет импульса в коррективных позициях

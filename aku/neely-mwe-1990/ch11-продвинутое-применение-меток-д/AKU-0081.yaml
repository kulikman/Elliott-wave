statement_ru: 'В Трендовом Импульсе с Растянутой первой волной: волна-2 не может быть
  Подвижной коррекцией.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Трендовые Импульсы - Растянутая первая
  figure_id: null
  verbatim_quote:
    text: Волна-2 не может быть Подвижной коррекцией.
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Трендовый Импульс с Растянутой первой волной

    pattern == ''trend_impulse'' AND extended_wave == 1

    '
  constraint: '# Волна-2 не может быть Подвижной коррекцией

    correction_type(wave_2) != ''running_correction''

    '
  formalization_notes: '"Подвижная коррекция" (running correction) — коррекция, конец
    которой

    выходит за пределы начала предшествующей импульсной волны (т.е. волна-2

    завершается за пределами конца волны-1 в направлении тренда).

    Правило прямо и однозначно запрещает такой тип коррекции для волны-2

    в данной конфигурации.'
aliases:
- запрет подвижной коррекции в волне-2 при растянутой первой

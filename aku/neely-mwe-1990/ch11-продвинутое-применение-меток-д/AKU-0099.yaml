id: AKU-0099
type: rule
strength: mandatory
status: verified
topic: triangle
subtopics:
- motion-labels
- post-pattern-logic
statement_ru: 'Любой Неограничивающий Треугольник (за исключением случая, когда он
  х-волна) должен завершать фазу более крупной Коррекции. Если Неограничивающий Треугольник
  обнаружен в какой-либо позиции (кроме позиции x-волны), то всё более крупное движение
  можно сжать (уплотнить) до простой тройки.

  '
source:
  book_id: neely-mwe-1990
  page: 11-27
  chapter: Глава 11
  section: Продвинутое применение Меток движения
  figure_id: null
  verbatim_quote:
    text: 'любой Неограничивающий Треугольник (за исключением случая, когда он х-волна)
      должен завершать фазу более крупной Коррекции. Если вы обнаружили один из них
      в какой-либо позиции (кроме позиции x-волны), то вы можете сжать (уплотнить)
      все более крупное движение до простой тройки.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Обнаружен Неограничивающий Треугольник (Non-Limiting Triangle)

    # и он НЕ находится в позиции x-волны

    pattern.type == ''nonlimiting_triangle''

    AND pattern.role != ''x_wave''

    '
  constraint: '# Правило 1: Неограничивающий Треугольник должен завершать фазу более
    крупной Коррекции

    # Т.е. он должен быть последним сегментом (финальной фазой) коррективного паттерна

    # более высокого порядка

    larger_pattern = pattern.parent

    larger_pattern.classification == ''correction''

    AND pattern == last_phase(larger_pattern)


    # Правило 2 (следствие): всё более крупное движение можно сжать до простой тройки

    # Это означает, что parent-паттерн, содержащий этот треугольник,

    # должен быть компактифицируем (compactable) до структуры из 3 сегментов (a-b-c)

    is_compactable_to_simple_correction(larger_pattern) == true

    # simple correction = паттерн из 3 моноволн (тройка: a-b-c)

    '
  formalization_notes: "1. \"Завершать фазу более крупной Коррекции\" означает, что\
    \ треугольник\n   должен быть финальным элементом коррективной структуры на уровень\
    \ выше.\n   Например: волна C в зигзаге, волна Y в двойной тройке и т.п.\n2. \"\
    Сжать до простой тройки\" — это свойство-следствие: если треугольник\n   корректно\
    \ расположен, то весь parent-паттерн представим как 3-сегментная\n   коррекция\
    \ (a-b-c). Это может использоваться как валидационная проверка.\n3. Исключение\
    \ для x-волны явно указано в правиле — когда треугольник\n   является x-волной,\
    \ данное правило не применяется."
aliases:
- правило завершения коррекции неограничивающим треугольником

statement_ru: 'Волны а, b, c или d Треугольника никогда не могут сами быть Треугольниками.
  Волна-е — единственный сегмент в Треугольнике, который может быть меньшим Треугольником.

  '
source:
  book_id: neely-mwe-1990
  page: 11-25
  chapter: Глава 11
  section: Продвинутое применение Меток движения — Неправильные Треугольники
  figure_id: null
  verbatim_quote:
    text: 'волны а, b, c или d Треугольника никогда не могут сами быть Треугольниками.
      Волна-е - единственный сегмент в Треугольнике, который может быть меньшим Треугольником.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к любому Треугольнику (сужающийся, расширяющийся,
    неправильный и т.д.)

    pattern.type == ''triangle''

    '
  constraint: "# Волны a, b, c, d Треугольника не могут быть Треугольниками\nfor seg\
    \ in [wave_a, wave_b, wave_c, wave_d]:\n    seg.pattern_type != 'triangle'\n\n\
    # Волна-e — единственный сегмент, который МОЖЕТ быть меньшим Треугольником\n#\
    \ (не обязана быть, но разрешено)\n# wave_e.pattern_type может быть 'triangle'\
    \ или любой другой коррективной фигурой\n"
  formalization_notes: 'Правило содержит два утверждения:

    1. Жёсткий запрет (mandatory): волны a, b, c, d НЕ могут быть Треугольниками.

    2. Разрешение: волна-e МОЖЕТ быть меньшим Треугольником (но не обязана).

    Второе утверждение не является ограничением — оно лишь снимает запрет для волны-e.

    Правило применяется ко всем типам Треугольников (контекст — раздел о Неправильных
    Треугольниках,

    но формулировка универсальна: "волны а, b, c или d Треугольника").'

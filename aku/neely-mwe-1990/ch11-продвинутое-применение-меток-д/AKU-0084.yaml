id: AKU-0084
type: rule
strength: mandatory
status: verified
topic: motion-labels
subtopics:
- impulse
- retracement
statement_ru: 'Если волна-1 является (или считается) самой длинной волной данной последовательности,
  то вторая волна не может откатиться более чем на 38.2% первой волны.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch11
  chapter: 'Глава 11: Продвинутое применение Меток движения'
  section: Трендовые Импульсы - Волна-2
  figure_id: null
  verbatim_quote:
    text: Если волна-1 оказывается (или вы ее считаете) самой длинной волной данной
      последовательности, то вторая волна не может откатиться более чем на 38.2% первой
      волны.
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к волне-2 внутри трендового импульса,

    # когда волна-1 является самой длинной волной среди действующих волн (1, 3, 5)

    pattern == ''impulse''

    AND current_wave == 2

    AND length(wave_1) >= length(wave_3)

    AND length(wave_1) >= length(wave_5)

    '
  constraint: '# Волна-2 не может откатиться более чем на 38.2% длины волны-1

    # retrace(wave_2) — ценовое расстояние отката волны-2

    # length(wave_1) — ценовое расстояние волны-1

    retrace(wave_2) <= 0.382 * length(wave_1)

    '
  formalization_notes: 'Формулировка "является (или считается) самой длинной" подразумевает,

    что правило применяется как при уже завершённой структуре (все 5 волн известны),

    так и при предварительной разметке, когда аналитик предполагает,

    что волна-1 окажется самой длинной. В алгоритмическом контексте

    это означает: если на момент формирования волны-2 волна-1 уже длиннее

    имеющихся (или прогнозируемых) волн-3 и волн-5, ограничение действует.

    При ретроспективной валидации завершённого импульса проверка тривиальна.

    Сравнение использует >= (не строго >), поскольку в тексте сказано

    "самой длинной", что включает случай равенства по принципу осторожности.'
aliases:
- ограничение отката волны-2 при самой длинной волне-1

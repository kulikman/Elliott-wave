statement_ru: 'Следующая за Импульсом с Растянутой первой волной волна должна достичь
  конца волны-4 этого Импульса.

  '
source:
  book_id: neely-mwe-1990
  page: 6-1
  chapter: 'Глава 6: Формальные правила логики'
  section: Импульсы - Первая Растянутая волна
  figure_id: null
  verbatim_quote:
    text: 'Следующая за этой разновидностью Импульса волна должна достичь конца волны-4.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс с растянутой (extended) первой волной завершён

    # Анализируем волну, следующую за этим импульсом

    pattern == ''impulse''

    AND extended_wave == 1

    AND impulse_is_completed == true

    AND next_wave_after_impulse exists

    '
  constraint: "# Следующая за импульсом волна должна достичь ценового уровня конца\
    \ волны-4 этого импульса\n# \"Достичь\" означает, что экстремум следующей волны\
    \ доходит до уровня end(wave_4)\n#\n# Волна-4 в импульсе с растянутой первой —\
    \ это коррекция после wave_3,\n# направленная против основного тренда импульса.\n\
    # Следующая за импульсом волна — коррекционная, идёт против направления импульса.\n\
    #\n# Для бычьего импульса (wave_1 направлена вверх):\n#   wave_4 корректирует\
    \ вниз, end(wave_4) — это low wave_4\n#   следующая волна идёт вниз, её low должен\
    \ достичь (<=) уровня end(wave_4)\n#\n# Для медвежьего импульса (wave_1 направлена\
    \ вниз):\n#   wave_4 корректирует вверх, end(wave_4) — это high wave_4\n#   следующая\
    \ волна идёт вверх, её high должен достичь (>=) уровня end(wave_4)\n\nif direction(impulse)\
    \ == 'up':\n    # end(wave_4) — минимум (конец нисходящей коррекции wave_4)\n\
    \    low(next_wave_after_impulse) <= price(end(wave_4))\nelif direction(impulse)\
    \ == 'down':\n    # end(wave_4) — максимум (конец восходящей коррекции wave_4)\n\
    \    high(next_wave_after_impulse) >= price(end(wave_4))\n"
  formalization_notes: 'Правило описывает поведение волны, следующей ПОСЛЕ завершённого
    импульса

    с растянутой первой волной. Это пост-паттерновое правило (post-pattern logic).

    "Достичь конца волны-4" интерпретируется как достижение ценового уровня

    точки завершения wave_4 данного импульса. Направление движения следующей

    волны — против направления импульса (коррекция).'

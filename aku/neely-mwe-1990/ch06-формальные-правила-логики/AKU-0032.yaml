statement_ru: 'Следующая за Импульсом с Растянутой первой волной волна должна достичь
  конца волны-4 этого Импульса.

  '
source:
  book_id: neely-mwe-1990
  page: 6-1
  chapter: 'Глава 6: Формальные правила логики'
  section: Импульсы - Первая Растянутая волна
  figure_id: null
  verbatim_quote:
    text: 'Следующая за этой разновидностью Импульса волна должна достичь конца волны-4.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс с растянутой (extended) первой волной завершён

    # Анализируем волну, следующую за этим импульсом

    pattern == ''impulse''

    AND extended_wave == 1

    AND impulse_is_completed == true

    AND next_wave_after_impulse exists

    '
  constraint: "# Следующая за импульсом волна должна достичь ценового уровня конца\
    \ волны-4 этого импульса\n# \"Достичь\" означает, что экстремум следующей волны\
    \ доходит до уровня end(wave_4)\n#\n# Конец волны-4 — это коррекция после волны-3,\
    \ направленная против тренда импульса\n#\n# Для бычьего импульса (impulse direction\
    \ == up):\n#   wave_4 заканчивается ниже wave_3, следующая волна идёт вниз (коррекция),\n\
    #   и должна достичь уровня end(wave_4) — т.е. опуститься до price(end(wave_4))\n\
    #   low(next_wave) <= price(end(wave_4))\n#\n# Для медвежьего импульса (impulse\
    \ direction == down):\n#   wave_4 заканчивается выше wave_3, следующая волна идёт\
    \ вверх (коррекция),\n#   и должна достичь уровня end(wave_4) — т.е. подняться\
    \ до price(end(wave_4))\n#   high(next_wave) >= price(end(wave_4))\n\nif direction(impulse)\
    \ == 'up':\n    low(next_wave) <= price(end(wave_4))\nelif direction(impulse)\
    \ == 'down':\n    high(next_wave) >= price(end(wave_4))\n"
  formalization_notes: 'Правило описывает поведение волны, следующей за завершённым
    импульсом (post-pattern logic).

    "Достичь конца волны-4" интерпретируется как: экстремум следующей волны

    (в направлении коррекции) должен дойти как минимум до ценового уровня,

    на котором закончилась волна-4 внутри импульса.

    Это минимальное требование к глубине коррекции после импульса с растянутой первой
    волной.'

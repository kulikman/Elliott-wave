id: AKU-0039
type: rule
strength: mandatory
status: verified
topic: formal-logic-rules
subtopics:
- triangle
- post-pattern-logic
statement_ru: 'Для Сужающихся Треугольников: на втором этапе подтверждения «выброс»
  после волны-е должен образовать новую точку максимума или минимума, превосходящую
  максимальный/минимальный ценовой уровень всего Треугольника. Длительность этого
  «выброса» должна быть меньше половины временной длины всего Треугольника, прибавленной
  к концу волны-е (Неограничивающие Треугольники не связаны этим 50%-м временным правилом).

  '
source:
  book_id: neely-mwe-1990
  page: 6-3
  chapter: 'Глава 6: Формальные правила логики'
  section: Коррекции - Треугольники - Этап 2
  figure_id: null
  verbatim_quote:
    text: '"Выброс" после волны-е Треугольника должен образовать новую точку максимума
      или минимума, превосходящую максимальный/минимальный ценовой уровень, достигнутый
      в течение всего периода формирования Треугольника. Длительность этого "выброса"
      должна быть меньше половины временной длины всего Треугольника, прибавленной
      к концу волны-е (Неограничивающие Треугольники не связаны этим 50% -м временным
      правилом).

      '
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'contracting_triangle' AND position == 'post_pattern_stage2'
  constraint: new_extreme(thrust) beyond extreme(triangle) AND duration(thrust) <
    0.5 * duration(triangle)
  formalization_notes: 50%-е временное правило не применяется к Неограничивающим Треугольникам.

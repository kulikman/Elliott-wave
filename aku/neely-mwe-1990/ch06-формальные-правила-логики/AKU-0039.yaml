statement_ru: 'Для Сужающихся Треугольников: на втором этапе подтверждения «выброс»
  после волны-е должен образовать новую точку максимума или минимума, превосходящую
  максимальный/минимальный ценовой уровень всего Треугольника. Длительность этого
  «выброса» должна быть меньше половины временной длины всего Треугольника, прибавленной
  к концу волны-е (Неограничивающие Треугольники не связаны этим 50%-м временным правилом).

  '
source:
  book_id: neely-mwe-1990
  page: 6-3
  chapter: 'Глава 6: Формальные правила логики'
  section: Коррекции - Треугольники - Этап 2
  figure_id: null
  verbatim_quote:
    text: '"Выброс" после волны-е Треугольника должен образовать новую точку максимума
      или минимума, превосходящую максимальный/минимальный ценовой уровень, достигнутый
      в течение всего периода формирования Треугольника. Длительность этого "выброса"
      должна быть меньше половины временной длины всего Треугольника, прибавленной
      к концу волны-е (Неограничивающие Треугольники не связаны этим 50% -м временным
      правилом).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется на втором этапе подтверждения Сужающегося Треугольника

    # после завершения волны-е

    pattern == ''contracting_triangle''

    AND triangle_is_complete == true

    AND position == ''post_pattern_stage2''

    '
  constraint: "# Определяем направление треугольника\ntriangle_extreme_high = max(high(wave_a),\
    \ high(wave_b), high(wave_c), high(wave_d), high(wave_e))\ntriangle_extreme_low\
    \ = min(low(wave_a), low(wave_b), low(wave_c), low(wave_d), low(wave_e))\n\n#\
    \ \"Выброс\" (thrust) — первая волна после завершения треугольника (после волны-е)\n\
    thrust = first_wave_after(wave_e)\n\n# Условие 1: Выброс должен образовать новый\
    \ экстремум,\n# превосходящий максимальный/минимальный уровень всего Треугольника\n\
    IF triangle_direction == 'bullish':\n    high(thrust) > triangle_extreme_high\n\
    ELIF triangle_direction == 'bearish':\n    low(thrust) < triangle_extreme_low\n\
    \n# Условие 2: Временное ограничение на длительность выброса\n# Длительность выброса\
    \ должна быть меньше половины временной длины\n# всего Треугольника, прибавленной\
    \ к концу волны-е\n#\n# Интерпретация: выброс должен достичь нового экстремума\
    \ за время,\n# не превышающее 50% от duration всего треугольника\ntriangle_duration\
    \ = end_time(wave_e) - start_time(wave_a)\ntime_limit = end_time(wave_e) + 0.5\
    \ * triangle_duration\n\ntime_of_new_extreme(thrust) < time_limit\n\n# Исключение:\
    \ Неограничивающие Треугольники НЕ связаны 50%-м временным правилом\nIF triangle_type\
    \ == 'non_limiting':\n    # Условие 2 (временное ограничение) НЕ применяется\n\
    \    # Применяется только Условие 1 (новый экстремум)\n    SKIP time_limit_check\n"
  formalization_notes: "1. «Длительность всего Треугольника» интерпретируется как\
    \ время от начала волны-a\n   до конца волны-e.\n2. Формулировка «меньше половины\
    \ временной длины всего Треугольника, прибавленной\n   к концу волны-е» означает:\
    \ дедлайн = end(wave_e) + 0.5 * duration(triangle),\n   и выброс должен достичь\
    \ нового экстремума до этого дедлайна.\n3. Неограничивающие Треугольники (non-limiting\
    \ triangles) освобождены от 50%-го\n   временного правила, но условие нового экстремума\
    \ для них по-прежнему действует\n   (это явно следует из текста).\n4. Правило\
    \ сформулировано для Сужающихся Треугольников (contracting). Применимость\n  \
    \ к Расширяющимся Треугольникам не указана в данном фрагменте.\n5. Направление\
    \ выброса (bullish/bearish) определяется контекстом — какой тренд\n   продолжается\
    \ после треугольника."

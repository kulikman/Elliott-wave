statement_ru: 'Для Плоских и Зигзагов, где волна-b короче волны-a: следующая за Коррекцией
  волна должна пробить линию тренда 0-B за период времени, не превышающий длительности
  волны-с. Если этот процесс занимает больше времени, то либо волна-с формирует Терминал,
  либо четвёртая волна (волны-с) ещё не завершилась, либо интерпретация коррекции
  ошибочная.

  '
source:
  book_id: neely-mwe-1990
  page: 6-2
  chapter: 'Глава 6: Формальные правила логики'
  section: Коррекции - Плоские волны и Зигзаги - Волна-b короче волны-a
  figure_id: 6-2
  verbatim_quote:
    text: 'следующая за данной Коррекцией волна должна пробить линию тренда 0-В за
      период времени, не превышающий длительности волны-с. Если этот процесс занимает
      больше времени, то либо волна-с формирует Терминал, либо четвертая волна (волны-с)
      еще не завершилась, либо интерпретация коррекции ошибочная.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — Плоская коррекция или Зигзаг

    pattern IN (''flat'', ''zigzag'')

    # Волна-b короче волны-a по ценовой длине

    AND price_length(wave_b) < price_length(wave_a)

    # Правило применяется после завершения коррекции (к следующей волне — post_x)

    AND correction_is_complete == true

    '
  constraint: '# Определяем линию тренда 0-B:

    # Точка 0 = начало всей коррекции (start of wave_a)

    # Точка B = конец волны-b

    trendline_0B = trendline(point_0=start(wave_a), point_B=end(wave_b))


    # post_x = первая волна, следующая за завершённой коррекцией

    # Она должна пробить (пересечь) линию тренда 0-B

    # за время, не превышающее длительности волны-c


    time_to_break = duration_until_price_crosses(trendline_0B, from=end(wave_c))


    # Основное ограничение:

    time_to_break <= duration(wave_c)


    # Если нарушено (time_to_break > duration(wave_c)):

    #   Вариант 1: wave_c является Терминальным импульсом (Terminal)

    #   Вариант 2: четвёртая подволна wave_c ещё не завершилась

    #              (т.е. wave_c на самом деле не закончена)

    #   Вариант 3: вся интерпретация коррекции ошибочна

    #

    # IF time_to_break > duration(wave_c):

    #   flag_diagnostic:

    #     - wave_c_may_be_terminal = true

    #     - wave_c_subwave_4_may_be_incomplete = true

    #     - pattern_interpretation_may_be_wrong = true

    '
  formalization_notes: "1. \"Линия тренда 0-B\" — прямая линия от точки 0 (начало\
    \ коррекции = start(wave_a))\n   до конца волны-b. Это ценовая линия на графике,\
    \ а не горизонтальный уровень.\n2. \"Пробить линию тренда\" — цена post-коррекционной\
    \ волны должна пересечь\n   эту линию тренда (cross above или cross below в зависимости\
    \ от направления).\n3. Правило порождает три альтернативных диагностики при нарушении,\n\
    \   но не указывает как выбрать между ними — это остаётся на усмотрение\n   дальнейшего\
    \ анализа контекста.\n4. \"Длительность волны-c\" = duration(wave_c) = time(end(wave_c))\
    \ - time(start(wave_c)).\n5. price_length() — расстояние по цене (абсолютное значение\
    \ разницы\n   между началом и концом волны)."

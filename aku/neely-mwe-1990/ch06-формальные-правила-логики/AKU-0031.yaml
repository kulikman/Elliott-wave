id: AKU-0031
type: rule
strength: mandatory
status: verified
topic: formal-logic-rules
subtopics:
- impulse
- channeling
statement_ru: 'Первое подтверждение импульсного характера завершившейся волны требует,
  чтобы период времени, прошедшего до пересечения последующей волной линии тренда
  2-4, не превышал длительности волны 5. В противном случае либо волна 5 развивается
  в Терминальную, либо волна 4 ещё не завершена, либо гипотеза об импульсном характере
  конфигурации неверна.

  '
source:
  book_id: neely-mwe-1990
  page: 6-1
  chapter: 'Глава 6: Формальные правила логики'
  section: Импульсы - Двухэтапный процесс подтверждения фигуры - Этап 1
  figure_id: 6-1
  verbatim_quote:
    text: 'Первое подтверждение импульсного характера завершившейся волны получено,
      если период времени, прошедшего до пересечения последующей волной линии тренда
      2-4, не превышает длительности волны 5. B противном случае, либо волна 5 развивается
      в Терминальную, либо волна 4 еще не завершена, либо гипотеза, что рассматриваемая
      конфигурация импульсная, неверна.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после предполагаемого завершения импульсной
    фигуры (волны 1-5)

    # Нужно подтвердить импульсный характер паттерна по поведению последующей волны

    pattern == ''impulse''

    AND wave_5.is_completed == true

    AND post_pattern_action.exists == true

    '
  constraint: "# Построить линию тренда 2-4 (через конец волны 2 и конец волны 4)\n\
    trendline_2_4 = build_trendline(end(wave_2), end(wave_4))\n\n# Определить момент,\
    \ когда последующее движение (волна после завершения паттерна)\n# пересекает эту\
    \ линию тренда\nbreak_time = time_of_first_crossing(post_pattern_price_action,\
    \ trendline_2_4)\n\n# Вычислить период от конца волны 5 до момента пересечения\n\
    time_to_break = break_time - end_time(wave_5)\n\n# Вычислить длительность волны\
    \ 5\nduration_wave_5 = end_time(wave_5) - start_time(wave_5)\n\n# ПОДТВЕРЖДЕНИЕ\
    \ ИМПУЛЬСА (Этап 1):\n# Время до пересечения линии тренда 2-4 НЕ должно превышать\
    \ длительность волны 5\nIF time_to_break <= duration_wave_5 THEN\n    impulse_confirmation_stage1\
    \ = true\nELSE\n    # Если условие не выполнено — три альтернативных вывода:\n\
    \    # 1) Волна 5 развивается в Терминальную (Terminal Impulse)\n    # 2) Волна\
    \ 4 ещё не завершена (пересмотреть разметку)\n    # 3) Гипотеза об импульсном\
    \ характере конфигурации неверна\n    impulse_confirmation_stage1 = false\n  \
    \  possible_alternatives = [\n        'wave_5_is_terminal',\n        'wave_4_not_complete',\n\
    \        'pattern_is_not_impulse'\n    ]\n"
  formalization_notes: "1. Линия тренда 2-4 строится через точки end(wave_2) и end(wave_4).\n\
    2. \"Последующая волна\" — это ценовое движение, начинающееся сразу после\n  \
    \ завершения волны 5 (т.е. после завершения всего импульсного паттерна).\n3. Правило\
    \ описывает ПЕРВЫЙ этап двухэтапного процесса подтверждения\n   импульса (Этап\
    \ 1 из Главы 6).\n4. При нарушении условия правило не отвергает импульс окончательно,\n\
    \   а предлагает три альтернативных интерпретации — выбор между ними\n   требует\
    \ дополнительного анализа контекста.\n5. Для алгоритмической реализации необходимо\
    \ дождаться либо пересечения\n   линии тренда 2-4, либо истечения времени равного\
    \ duration(wave_5)\n   без пересечения."

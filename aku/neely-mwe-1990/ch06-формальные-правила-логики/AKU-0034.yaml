id: AKU-0034
type: rule
strength: mandatory
status: verified
topic: formal-logic-rules
subtopics:
- impulse
- impulse-extension
- post-pattern-logic
statement_ru: 'Длина следующей за Импульсом с Растянутой пятой коррективной волны
  должна составлять как минимум 61,8% длины пятой волны и должна быть меньше длины
  пятой волны, если тренд всё ещё силён.

  '
source:
  book_id: neely-mwe-1990
  page: 6-1
  chapter: 'Глава 6: Формальные правила логики'
  section: Импульсы - Пятая Растянутая волна
  figure_id: null
  verbatim_quote:
    text: 'Длина следующей за этой разновидностью Импульса коррективной волны должна
      составлять как минимум 61,8% длины пятой волны и должна быть меньше ее, если
      тренд все еще силен.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после завершения Импульса с Растянутой пятой
    волной

    pattern == ''impulse''

    AND extended_wave == 5

    AND position == ''post_pattern''

    # Анализируем следующую за импульсом коррективную волну

    next_corrective = first_corrective_wave_after(impulse)

    '
  constraint: "# Обязательное условие: коррекция после импульса с растянутой 5-й\n\
    # должна составлять как минимум 61.8% длины пятой волны\nlength(next_corrective)\
    \ >= 0.618 * length(wave_5)\n\n# Дополнительное условие (при сильном тренде):\n\
    # коррекция должна быть меньше длины пятой волны\nIF trend_is_still_strong THEN\n\
    \  length(next_corrective) < length(wave_5)\nEND IF\n"
  formalization_notes: "Правило содержит два ограничения:\n1. Безусловное: length(next_corrective)\
    \ >= 0.618 * length(wave_5) — всегда обязательно.\n2. Условное: length(next_corrective)\
    \ < length(wave_5) — применяется только\n   \"если тренд всё ещё силён\".\nКритерий\
    \ \"тренд всё ещё силён\" (trend_is_still_strong) не определён\nв исходном тексте\
    \ правила и требует внешнего определения или эвристики.\nБез формализации этого\
    \ критерия второе условие не может быть\nавтоматически проверено алгоритмом."

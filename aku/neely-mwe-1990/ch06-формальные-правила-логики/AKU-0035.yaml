statement_ru: 'Длина волны, следующей за Импульсом с Неудавшейся пятой, должна достигать
  длины всего этого Импульса; до достижения начального уровня данного Импульса рынок
  не должен образовывать новых точек экстремума (максимума в повышательном Импульсе
  или минимума в понижательном Импульсе).

  '
source:
  book_id: neely-mwe-1990
  page: 6-1
  chapter: 'Глава 6: Формальные правила логики'
  section: Импульсы - Пятая Неудавшаяся волна
  figure_id: null
  verbatim_quote:
    text: 'Длина волны, следующей за Импульсом с Неудавшейся пятой, должна достигать
      длины всего этого Импульса; до достижения начального уровня данного Импульса
      рынок не должен образовывать новых точек экстремума (максимума в повышательном
      Импульсе или минимума в понижательном Импульсе).

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульс с Неудавшейся пятой волной завершён,

    # и мы анализируем волну, следующую за этим импульсом

    pattern == ''impulse''

    AND subtype == ''failure_5th''  # wave_5 короче wave_4 по длине

    AND impulse_is_complete == true

    AND next_wave_after_impulse exists

    '
  constraint: "# Определяем направление импульса\nif direction(impulse) == 'up':\n\
    \    impulse_start = low(wave_1_start)\n    impulse_end = high(wave_5_end)\nelif\
    \ direction(impulse) == 'down':\n    impulse_start = high(wave_1_start)\n    impulse_end\
    \ = low(wave_5_end)\n\n# Длина всего импульса\nimpulse_length = abs(impulse_end\
    \ - impulse_start)\n\n# Волна, следующая за импульсом (первая волна коррекции)\n\
    next_wave = next_wave_after_impulse\n\n# УСЛОВИЕ 1: Длина следующей волны должна\
    \ достигать длины всего импульса\nlength(next_wave) >= impulse_length\n\n# УСЛОВИЕ\
    \ 2: До достижения начального уровня импульса рынок не должен\n# образовывать\
    \ новых точек экстремума в направлении завершённого импульса\n#\n# Т.е. после\
    \ окончания импульса и до момента, когда цена достигнет\n# impulse_start, не должно\
    \ быть новых экстремумов:\n#   - для повышательного импульса: нет новых максимумов\
    \ выше impulse_end\n#   - для понижательного импульса: нет новых минимумов ниже\
    \ impulse_end\n\nif direction(impulse) == 'up':\n    # Между impulse_end и моментом\
    \ достижения ценой уровня impulse_start:\n    # не должно быть точек с high >\
    \ impulse_end\n    for each point P in price_action from impulse_end until price\
    \ reaches impulse_start:\n        high(P) <= impulse_end\nelif direction(impulse)\
    \ == 'down':\n    # Между impulse_end и моментом достижения ценой уровня impulse_start:\n\
    \    # не должно быть точек с low < impulse_end\n    for each point P in price_action\
    \ from impulse_end until price reaches impulse_start:\n        low(P) >= impulse_end\n"
  formalization_notes: 'Правило является пост-паттерновой валидацией: если следующая
    за импульсом

    волна не соответствует этим требованиям, то текущая интерпретация

    (разметка импульса с неудавшейся пятой) считается ошибочной и требует

    пересмотра.


    "Длина волны следующей за импульсом" — из контекста понимается как

    первая моноволна или поливолна, непосредственно следующая за завершением

    импульса (первое движение коррекции).


    "До достижения начального уровня" — имеется в виду ценовой уровень

    начала импульса (wave_1_start), а не временной момент.'

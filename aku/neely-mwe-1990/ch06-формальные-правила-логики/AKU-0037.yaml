statement_ru: 'Для Плоских и Зигзагов, где волна-b короче волны-a: на втором этапе
  подтверждения следующая за Коррекцией волна должна достичь начала волны-с за время,
  не превышающее длительности последней.

  '
source:
  book_id: neely-mwe-1990
  page: 6-2
  chapter: 'Глава 6: Формальные правила логики'
  section: Коррекции - Плоские волны и Зигзаги - Волна-b короче волны-a
  figure_id: 6-2
  verbatim_quote:
    text: 'на втором этапе, на котором от следующей за Коррекцией волны требуется
      достичь начала волны-с за время, не превышающее длительности последней.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к завершённым Плоским (Flat) и Зигзагам (Zigzag),

    # где волна-b короче волны-a, на втором этапе подтверждения паттерна

    pattern_type IN (''flat'', ''zigzag'')

    AND price_length(wave_b) < price_length(wave_a)

    AND confirmation_step == 2

    '
  constraint: "# Следующая за завершённой Коррекцией волна (post_pattern_wave)\n#\
    \ должна достичь начала волны-с (start of wave_c)\n# за время, не превышающее\
    \ длительности волны-с (duration of wave_c)\n\npost_pattern_wave = first_wave_after(pattern)\n\
    target_price = price_at(start(wave_c))\ntime_limit = duration(wave_c)\n\n# Проверяем:\
    \ в течение time_limit баров после окончания паттерна\n# цена post_pattern_wave\
    \ должна достичь уровня начала wave_c\ntime_elapsed = 0\nreached = false\n\nFOR\
    \ each bar IN post_pattern_wave:\n  time_elapsed += 1\n  IF price_reaches(bar,\
    \ target_price):\n    reached = true\n    BREAK\n  IF time_elapsed > time_limit:\n\
    \    BREAK\n\n# Условие подтверждения на втором этапе:\nIF reached AND time_elapsed\
    \ <= time_limit:\n  confirmation_step_2 = PASSED\nELSE:\n  confirmation_step_2\
    \ = FAILED\n  # Паттерн не подтверждён на втором этапе\n"
  formalization_notes: "1. \"price_length(wave_b) < price_length(wave_a)\" — сравнение\
    \ по ценовой длине (абсолютное расстояние start-end).\n2. \"Следующая за Коррекцией\
    \ волна\" — первая волна, начинающаяся после окончания паттерна (post-pattern\
    \ wave).\n3. \"Достичь начала волны-с\" — цена должна вернуться к уровню start(wave_c),\
    \ т.е. к точке соединения wave_b и wave_c.\n4. \"За время, не превышающее длительности\
    \ последней\" — \"последней\" относится к волне-с; \n   duration(wave_c) измеряется\
    \ в барах (или единицах времени).\n5. Это правило описывает второй этап подтверждения\
    \ (post-pattern confirmation);\n   первый этап в данном AKU не описан.\n6. Цитата\
    \ помечена как не найденная дословно — возможна неточность в формулировке.\n \
    \  Формализация основана на statement_ru и verbatim_quote как есть."

statement_ru: 'Первая после окончания Подвижной Коррекции волна должна быть взрывной
  (повышательной или понижательной) и довольно длинной — не меньше 161,8% волны (или
  группы волн), предшествовавшей этой Подвижной Коррекции.

  '
source:
  book_id: neely-mwe-1990
  page: 6-3
  chapter: 'Глава 6: Формальные правила логики'
  section: Коррекции
  figure_id: null
  verbatim_quote:
    text: 'первая после окончания Подвижной Коррекции волна должна быть взрывной (повышательной
      или понижательной) и довольно длинной - не меньше 161,8% волны (или группы волн),
      предшествовавшей этой Подвижной Коррекции.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после завершения Подвижной Коррекции (Running/Moving
    Correction)

    # Подвижная Коррекция — это Flat, у которого волна-b превышает начало волны-a,

    # а волна-c не достигает конца волны-a (т.е. коррекция "сдвинута" в направлении
    тренда)

    completed_pattern.type == ''flat''

    AND completed_pattern.subtype == ''running'' # подвижная коррекция

    AND next_wave_after_pattern is defined

    '
  constraint: '# preceding_wave_or_group — волна или группа волн, непосредственно
    предшествовавшая

    # данной Подвижной Коррекции (например, импульсная волна перед ней)

    preceding_wave_or_group = wave_immediately_before(completed_pattern)


    # next_wave — первая волна, следующая сразу после окончания Подвижной Коррекции

    next_wave = next_wave_after_pattern


    # Длина первой волны после Подвижной Коррекции должна быть >= 161.8%

    # длины предшествующей волны (или группы волн)

    length(next_wave) >= 1.618 * length(preceding_wave_or_group)


    # Где length() — ценовое расстояние (абсолютное значение разницы цен

    # между началом и концом волны/группы волн)

    # length(wave) = abs(price_end(wave) - price_start(wave))

    '
  formalization_notes: "1. \"Взрывная\" (повышательная или понижательной) — качественная\
    \ характеристика,\n   которая формализуется через количественный критерий >= 161.8%.\n\
    \   Направление (вверх/вниз) не ограничивается — волна может быть в любом направлении.\n\
    2. \"Волна (или группа волн), предшествовавшая этой Подвижной Коррекции\" —\n\
    \   неоднозначность: это может быть одна импульсная волна или целая группа волн\n\
    \   (например, волны 1-2-3 перед коррекцией в волне 4). Точная идентификация\n\
    \   preceding_wave_or_group зависит от контекста волновой разметки.\n   В простейшем\
    \ случае это одна волна непосредственно перед Подвижной Коррекцией.\n3. Это правило\
    \ пост-паттерного подтверждения: если первая волна после паттерна\n   не удовлетворяет\
    \ условию, то разметка Подвижной Коррекции ставится под сомнение."

  section: Подвижная Коррекция Двойная Тройка
  figure_id: null
  verbatim_quote:
    text: 'Следующая за Подвижной Двойной Тройкой волна должна быть Импульсом, а длина
      ее должна превышать 161,8%, а часто - и 261,8% длины предыдущей импульсной волны.
      Подвижная Коррекция Двойная Тройка может быть только волной-2

      '

id: AKU-0067
type: rule
strength: mandatory
status: verified
topic: post-pattern-logic
subtopics:
- impulse-extension
statement_ru: 'Следующая за Подвижной Двойной Тройкой волна должна быть Импульсом,
  а длина её должна превышать 161,8% длины предыдущей импульсной волны. Подвижная
  Коррекция Двойная Тройка может быть только волной-2.

  '
source:
  book_id: neely-mwe-1990
  page: 10-8
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Подвижная Коррекция Двойная Тройка
  figure_id: null
  verbatim_quote:
    text: 'Следующая за Подвижной Двойной Тройкой волна должна быть Импульсом, а длина
      ее должна превышать 161,8%, а часто - и 261,8% длины предыдущей импульсной волны.
      Подвижная Коррекция Двойная Тройка может быть только волной-2

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Завершена Подвижная Двойная Тройка (Moving Double Three)

    pattern.type == ''double_three''

    AND pattern.is_moving == true

    # Анализируем пост-паттерн логику и позиционное ограничение

    '
  constraint: '# 1. Подвижная Двойная Тройка может быть только волной-2

    pattern.position == wave_2


    # 2. Следующая за ней волна (wave_3) должна быть Импульсом

    type(next_wave) == ''impulse''


    # 3. Длина следующей волны должна превышать 161.8% длины предыдущей импульсной
    волны (wave_1)

    # previous_impulse — это волна-1, предшествующая данной коррекции (волне-2)

    previous_impulse = wave_1

    length(next_wave) > 1.618 * length(previous_impulse)


    # Где:

    # previous_impulse = wave_1 (импульсная волна перед подвижной двойной тройкой)

    # next_wave = wave_3 (волна, следующая за подвижной двойной тройкой)

    # length() = ценовое расстояние волны (от начала до конца по вертикали)

    '
  formalization_notes: 'В verbatim_quote упоминается "а часто - и 261.8%", но это
    статистическое наблюдение,

    а не mandatory правило, поэтому не включено в constraint.

    Mandatory часть: next_wave — импульс, length > 161.8% previous_impulse, позиция
    — только wave_2.

    previous_impulse однозначно определяется как wave_1, поскольку подвижная двойная
    тройка

    может быть только волной-2.'

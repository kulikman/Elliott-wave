formalization:
  status: draft
  applies_when: pattern == 'terminal_impulse' AND position == 'post_pattern'
  constraint: reaches(next_wave, start_level(terminal)) AND duration(until_reach)
    <= 0.5 * duration(terminal)
  formalization_notes: Обычно достигается за ~25% времени формирования.

id: AKU-0063
type: rule
strength: mandatory
status: verified
topic: combination
subtopics:
- triangle
- ending-diagonal
statement_ru: 'Тройная Комбинация может возникнуть только в Треугольнике или в Терминальном
  Импульсе.

  '
source:
  book_id: neely-mwe-1990
  page: 10-3
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Тройная Комбинация
  figure_id: null
  verbatim_quote:
    text: 'Тройная Комбинация может возникнуть только в Треугольнике или в Терминальном
      Импульсе.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Когда идентифицированный паттерн является Тройной Комбинацией

    pattern.type == ''triple_combination''

    '
  constraint: '# Тройная Комбинация допустима только как волна (leg) внутри

    # Треугольника или Терминального Импульса (Ending Diagonal)

    parent_pattern = get_parent_pattern(current_pattern)


    parent_pattern.type IN [''triangle'', ''terminal_impulse'']


    # Иными словами, если parent_pattern.type не является ни треугольником,

    # ни терминальным импульсом — тройная комбинация невалидна

    '
  formalization_notes: "Правило ограничивает контекст появления тройной комбинации.\n\
    \"Терминальный Импульс\" (terminal_impulse) — это ending diagonal \nв терминологии\
    \ Нили. Правило проверяет тип родительского паттерна,\nв котором тройная комбинация\
    \ выступает одной из волн (leg)."
aliases:
- правило позиции тройной комбинации

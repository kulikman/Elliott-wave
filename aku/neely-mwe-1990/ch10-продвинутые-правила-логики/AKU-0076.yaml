id: AKU-0076
type: rule
strength: mandatory
status: verified
topic: post-pattern-logic
subtopics:
- impulse
- impulse-extension
- retracement
statement_ru: 'Импульс с Растянутой пятой — единственная из растянутых волн, после
  которой следующая волна такого же Порядка должна быть больше 61,8% её длины, вне
  зависимости от того, какой частью большей волны этот Импульс является.

  '
source:
  book_id: neely-mwe-1990
  page: doc-ch10
  chapter: Глава 10
  section: Продвинутые Правила логики
  figure_id: null
  verbatim_quote:
    text: 'Импульс с Растянутой пятой - единственная из растянутых волн, после которой
      следующая волна такого же Порядка должна быть больше 61,8% ее длины, вне зависимости
      от того, какой частью большей волны этот Импульс является.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Завершён импульс с растянутой волной 5

    pattern.type == ''impulse''

    AND pattern.extended_wave == 5

    # Правило применяется к следующей волне того же Порядка (Degree),

    # которая идёт сразу после завершения данного импульса.

    # Условие действует вне зависимости от того, какой частью большей волны

    # является этот импульс (волна 1, 3, 5, A, C и т.д.)

    AND next_wave_same_degree EXISTS

    '
  constraint: '# Следующая волна того же Порядка должна быть строго больше 61.8% длины

    # всего импульса с растянутой пятой

    length(next_wave_same_degree) > 0.618 * length(pattern)

    '
  formalization_notes: "- \"длины\" в statement_ru относится к длине всего импульса\
    \ (\"её длины\" = длины\n  растянутой волны-импульса), а не только волны 5 внутри\
    \ него. Импульс с\n  растянутой пятой — это сам паттерн целиком, и \"её\" ссылается\
    \ на него.\n- Используется строгое неравенство (>), т.к. в тексте сказано \"больше\
    \ 61,8%\".\n- Ключевое отличие: правило действует \"вне зависимости от того, какой\
    \ частью\n  большей волны этот Импульс является\", т.е. нет ограничения по позиции\n\
    \  импульса в старшей структуре (в отличие от возможных аналогичных правил\n \
    \ для других растяжений).\n- next_wave_same_degree — первая волна того же Порядка\
    \ (Degree), следующая\n  непосредственно после завершения данного импульса."

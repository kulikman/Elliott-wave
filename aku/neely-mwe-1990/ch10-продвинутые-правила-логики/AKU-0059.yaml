statement_ru: 'Начальный уровень любой волны, завершающейся в восходящем направлении
  и обладающей положительным рейтингом Энергии (от +1 до +3), не может быть достигнут
  следующей за ней волной такой же степени.

  '
source:
  book_id: neely-mwe-1990
  page: 10-1
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Откат в зависимости от рейтинга Энергии
  figure_id: null
  verbatim_quote:
    text: 'Начальный уровень любой волны, завершающейся в восходящем направлении и
      обладающей положительным рейтингом (от +1 до +3), не может быть достигнут следующей
      за ней волной такой же степени.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Волна завершается в восходящем направлении

    direction(wave) == up

    # Волна обладает положительным рейтингом Энергии (от +1 до +3)

    AND energy_rating(wave) IN [+1, +2, +3]

    '
  constraint: '# Следующая волна той же степени не может достичь начального уровня
    данной волны

    # wave — текущая восходящая волна с положительным рейтингом

    # next_wave — следующая за ней волна той же степени (degree)

    next_wave = next_wave_same_degree(wave)


    # Начальный уровень восходящей волны — это её low (стартовая точка)

    start_level = start_price(wave)  # = low(wave), т.к. волна восходящая


    # Следующая волна (коррекция вниз после восходящей) не должна достичь этого уровня

    low(next_wave) > start_level

    '
  formalization_notes: "- Рейтинг Энергии (Energy Rating) определяется по методике\
    \ Главы 10 Neely.\n  Его вычисление — отдельная процедура, здесь предполагается\
    \ что energy_rating(wave)\n  уже рассчитан и доступен.\n- \"Начальный уровень\"\
    \ восходящей волны — это цена в начальной точке волны (start_price),\n  что для\
    \ восходящей волны совпадает с её минимумом.\n- \"Не может быть достигнут\" означает\
    \ строгое неравенство: следующая волна\n  не касается и не пробивает начальный\
    \ уровень.\n- Правило применяется к следующей волне той же степени (same degree),\n\
    \  а не к подволнам или волнам другой степени."

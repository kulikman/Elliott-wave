statement_ru: 'Если Тройной Зигзаг является частью Плоской или Сужающегося Треугольника,
  следующая за ним волна одного с ним Порядка никогда не может откатиться до его начального
  уровня.

  '
source:
  book_id: neely-mwe-1990
  page: 10-3
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Тройной Зигзаг
  figure_id: null
  verbatim_quote:
    text: 'Если же Тройной Зигзаг - часть Плоской или Сужающегося Треугольника, следующая
      за ним волна одного с ним Порядка никогда не может откатиться до его начального
      Порядка.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Текущий паттерн — Тройной Зигзаг

    pattern == ''triple_zigzag''

    # Родительский паттерн — Плоская или Сужающийся Треугольник

    AND parent_pattern IN (''flat'', ''contracting_triangle'')

    '
  constraint: "# Определяем следующую волну того же порядка (degree) что и тройной\
    \ зигзаг\nnext_wave = next_wave_same_degree(triple_zigzag)\n\n# Начальный уровень\
    \ тройного зигзага\ntz_start = start_price(triple_zigzag)\n\n# Следующая волна\
    \ никогда не может откатиться до начального уровня тройного зигзага\nif direction(triple_zigzag)\
    \ == 'down':\n    # Тройной зигзаг шёл вниз, следующая волна идёт вверх —\n  \
    \  # она не должна достичь уровня начала тройного зигзага\n    high(next_wave)\
    \ < tz_start\nelif direction(triple_zigzag) == 'up':\n    # Тройной зигзаг шёл\
    \ вверх, следующая волна идёт вниз —\n    # она не должна достичь уровня начала\
    \ тройного зигзага\n    low(next_wave) > tz_start\n"
  formalization_notes: 'В verbatim_quote написано "начального Порядка" — вероятно,
    опечатка/ошибка перевода,

    по контексту и statement_ru имеется в виду "начального уровня" (start price level).

    Правило применяется к волне, следующей за тройным зигзагом внутри того же

    родительского паттерна и имеющей тот же порядок (degree), что и сам тройной зигзаг.'

      начального уровня.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн является флэтом с Неудавшейся-с (failure_c)

    # Рассматриваем волну, следующую за завершённым паттерном

    pattern.type == ''flat''

    AND pattern.subtype == ''failure_c''

    AND next_wave_same_degree EXISTS

    # next_wave_same_degree — первая волна того же Порядка (degree),

    # следующая сразу после завершения данного флэта

    '
  constraint: "# Следующая волна того же Порядка должна достигать начального уровня\n\
    # паттерна (Неудавшейся-с), т.е. начала волны-a флэта\npattern_start = price_at(pattern.start)\
    \  # начальный уровень флэта (начало волны-a)\n\nif pattern.direction == 'up':\n\
    \  # Флэт был бычий (волна-a шла вверх), значит Неудавшаяся-с не дошла вниз\n\
    \  # Следующая волна должна опуститься до начального уровня или ниже\n  low(next_wave_same_degree)\
    \ <= pattern_start\nelif pattern.direction == 'down':\n  # Флэт был медвежий (волна-a\
    \ шла вниз), значит Неудавшаяся-с не дошла вверх\n  # Следующая волна должна подняться\
    \ до начального уровня или выше\n  high(next_wave_same_degree) >= pattern_start\n"
  formalization_notes: "- \"Начальный уровень\" интерпретируется как ценовой уровень\
    \ начала паттерна\n  (начало волны-a флэта), поскольку правило говорит \"её начальный\
    \ уровень\",\n  где \"её\" относится к Неудавшейся-с (т.е. к паттерну флэта с\
    \ failure_c).\n- \"Волна такого же Порядка\" — волна того же degree, следующая\
    \ непосредственно\n  после завершения флэта. Определение конкретной волны зависит\
    \ от контекста\n  (какой именно волной в структуре старшего порядка является данный\
    \ флэт).\n- Направление проверки (low/high) зависит от направления флэта:\n  если\
    \ флэт корректировал рост, следующая волна должна вернуться вниз к началу,\n \
    \ и наоборот."

id: AKU-0066
type: rule
strength: mandatory
status: verified
topic: post-pattern-logic
subtopics:
- impulse-extension
statement_ru: 'По завершении Подвижной Коррекции должна начаться следующая импульсная
  волна, длина которой должна составлять больше 161,8% длины предыдущего Импульса;
  в Двойную или Тройную Тройку она развиться не должна.

  '
source:
  book_id: neely-mwe-1990
  page: 10-7
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Подвижная Коррекция
  figure_id: null
  verbatim_quote:
    text: 'По завершении Подвижной Коррекции должна начаться следующая импульсная
      волна, длина которой должна составлять больше 161,8% длины предыдущего Импульса
      (зачастую 261,8% и более); в двойную или Тройную Тройку она развиться не должна.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Завершена Подвижная Коррекция (любого типа: flat, zigzag, triangle,
    double/triple three в подвижном варианте)

    pattern_just_completed == ''moving_correction''

    # Существует предыдущий импульс (волна, предшествовавшая этой подвижной коррекции)

    previous_impulse = wave_before(current_moving_correction)

    previous_impulse.type == ''impulse''

    # Следующая волна после подвижной коррекции

    next_wave = wave_after(current_moving_correction)

    '
  constraint: '# 1. Следующая волна должна быть импульсной (не двойная и не тройная
    тройка)

    next_wave.type NOT IN [''double_three'', ''triple_three'']

    next_wave.type == ''impulse''


    # 2. Длина следующего импульса должна быть больше 161.8% длины предыдущего импульса

    # (предыдущий импульс — тот, что предшествовал подвижной коррекции)

    length(next_wave) > 1.618 * length(previous_impulse)


    # 3. Следующий импульс должен быть растянутым (extended) —

    #    либо это растянутая волна Импульса, либо растянутая c-волна Плоской/Зигзага

    #    (это следует из первого предложения verbatim: "должна следовать Растянутая
    волна Импульса

    #     или Растянутая с-волна Плоской или зигзага")

    next_wave.is_extended == true

    # ИЛИ next_wave является c-волной плоской/зигзага и эта c-волна растянута:

    # (next_wave.role == ''c_wave'' AND next_wave.parent.type IN [''flat'', ''zigzag'']
    AND next_wave.is_extended == true)

    '
  formalization_notes: "Правило содержит два связанных утверждения из verbatim_quote:\n\
    (a) \"За Подвижной Коррекцией должна следовать Растянутая волна Импульса \n  \
    \   или Растянутая с-волна Плоской или зигзага\" — определяет тип следующей волны.\n\
    (b) \"длина которой должна составлять больше 161,8% длины предыдущего Импульса\"\
    \ — \n     количественное ограничение на длину.\n(c) \"в двойную или Тройную Тройку\
    \ она развиться не должна\" — запрет на тип.\n\nУпоминание \"зачастую 261,8% и\
    \ более\" — статистическое наблюдение, не mandatory constraint,\nпоэтому не формализовано\
    \ как ограничение.\n\n\"Предыдущий Импульс\" интерпретируется как импульсная волна,\
    \ непосредственно \nпредшествовавшая данной подвижной коррекции (т.е. если коррекция\
    \ — волна 2, \nто предыдущий импульс — волна 1; если коррекция — волна 4, то предыдущий\
    \ импульс — волна 3).\n\nТребование \"растянутости\" (extended) следующей волны\
    \ присутствует в verbatim_quote\nв первом предложении и включено в формализацию."

statement_ru: 'По завершении Подвижной Коррекции должна начаться следующая импульсная
  волна, длина которой должна составлять больше 161,8% длины предыдущего Импульса;
  в Двойную или Тройную Тройку она развиться не должна.

  '
source:
  book_id: neely-mwe-1990
  page: 10-7
  chapter: 'Глава 10: Продвинутые Правила логики'
  section: Подвижная Коррекция
  figure_id: null
  verbatim_quote:
    text: 'По завершении Подвижной Коррекции должна начаться следующая импульсная
      волна, длина которой должна составлять больше 161,8% длины предыдущего Импульса
      (зачастую 261,8% и более); в двойную или Тройную Тройку она развиться не должна.

      '
    language: ru
formalization:

statement_ru: 'Чтобы подтвердилась Неудача 5-й волны, откат на величину всей Импульсной
  фигуры должен произойти быстрее времени её формирования. Чтобы превысить конец Неудавшейся
  5-й волны, рынку должно потребоваться по меньшей мере в два раза больше времени,
  чем заняло формирование всей Импульсной фигуры (1-5).

  '
source:
  book_id: neely-mwe-1990
  page: 12-5
  chapter: 'Глава 12: Дополнительные расширения Нили'
  section: Каналы - Волна-4
  figure_id: null
  verbatim_quote:
    text: 'Чтобы подтвердилась Неудача 5-й волны, откат на величину всей данной Импульсной
      фигуры должен произойти быстрее времени его (Импульса) формирования. Чтобы превысить
      конец Неудавшейся 5-й волны, рынку должно потребоваться по меньшей мере в два
      раза больше времени, чем заняло формирование всей Импульсной фигуры (1-5)

      '
    language: ru

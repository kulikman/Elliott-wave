statement_ru: 'Чтобы подтвердилась Неудача 5-й волны, откат на величину всей Импульсной
  фигуры должен произойти быстрее времени её формирования. Чтобы превысить конец Неудавшейся
  5-й волны, рынку должно потребоваться по меньшей мере в два раза больше времени,
  чем заняло формирование всей Импульсной фигуры (1-5).

  '
source:
  book_id: neely-mwe-1990
  page: 12-5
  chapter: 'Глава 12: Дополнительные расширения Нили'
  section: Каналы - Волна-4
  figure_id: null
  verbatim_quote:
    text: 'Чтобы подтвердилась Неудача 5-й волны, откат на величину всей данной Импульсной
      фигуры должен произойти быстрее времени его (Импульса) формирования. Чтобы превысить
      конец Неудавшейся 5-й волны, рынку должно потребоваться по меньшей мере в два
      раза больше времени, чем заняло формирование всей Импульсной фигуры (1-5)

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Импульсная фигура (волны 1-5) завершена

    # Волна 5 является "неудавшейся" (Failure) — не превысила конец волны 3

    pattern == ''impulse''

    AND wave_5.subtype == ''failure''

    AND is_completed(pattern)

    # Правило применяется к пост-паттерновому поведению рынка после завершения импульса

    '
  constraint: "# Определяем длительность всей импульсной фигуры (от начала волны 1\
    \ до конца волны 5)\nimpulse_duration = duration(wave_1.start, wave_5.end)\n\n\
    # Определяем величину всей импульсной фигуры (ценовой диапазон от начала волны\
    \ 1 до конца волны 3,\n# т.к. волна 5 неудавшаяся, но \"откат на величину всей\
    \ Импульсной фигуры\" = \n# полный ценовой диапазон от начала волны 1 до конца\
    \ волны 5, т.е. весь импульс)\nimpulse_price_range = abs(price(wave_5.end) - price(wave_1.start))\n\
    \n# УСЛОВИЕ 1: Подтверждение неудачи 5-й волны\n# Откат на величину всей импульсной\
    \ фигуры должен произойти быстрее времени её формирования\n# \"Откат на величину\
    \ всей Импульсной фигуры\" = пост-паттерновое движение от конца волны 5\n# возвращается\
    \ к уровню начала волны 1 (полностью откатывает импульс)\nretrace_target = price(wave_1.start)\n\
    time_to_retrace = duration(wave_5.end, time_when_price_reaches(retrace_target))\n\
    \ntime_to_retrace < impulse_duration\n\n# УСЛОВИЕ 2: Превышение конца неудавшейся\
    \ 5-й волны\n# Чтобы рынок превысил конец неудавшейся 5-й волны (в направлении\
    \ импульса),\n# должно потребоваться как минимум вдвое больше времени, чем формирование\
    \ импульса\ntime_to_exceed_wave5_end = duration(wave_5.end, time_when_price_exceeds(wave_5.end))\n\
    \ntime_to_exceed_wave5_end >= 2 * impulse_duration\n"
  formalization_notes: "1. \"Откат на величину всей Импульсной фигуры\" интерпретируется\
    \ как полный откат \n   ценового диапазона импульса (возврат к уровню начала волны\
    \ 1).\n2. \"Превысить конец Неудавшейся 5-й волны\" — движение цены за пределы\
    \ конца волны 5 \n   в направлении основного тренда импульса (выше для бычьего,\
    \ ниже для медвежьего).\n3. Оба условия описывают пост-паттерновое поведение и\
    \ служат подтверждением/валидацией \n   того, что волна 5 действительно является\
    \ неудачей. Первое условие подтверждает неудачу,\n   второе описывает ожидаемое\
    \ поведение при попытке рынка вернуться.\n4. Правило содержит два связанных, но\
    \ независимых утверждения: одно про подтверждение \n   неудачи (быстрый откат),\
    \ другое про сложность превышения конца волны 5 (медленное \n   восстановление).\
    \ Оба должны выполняться."

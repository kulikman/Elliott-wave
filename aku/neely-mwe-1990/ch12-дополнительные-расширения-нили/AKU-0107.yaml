id: AKU-0107
type: rule
strength: mandatory
status: verified
topic: channeling
subtopics:
- impulse
- wave-identification
statement_ru: 'Ни одна часть волны-3 не должна пробивать настоящую линию тренда 0-2
  в Импульсной фигуре. Если повышение после предполагаемой волны-2 не имеет силы остаться
  выше линии тренда 0-2, то оно по своему характеру не Импульсное и не может быть
  частью Импульсной волны-3.

  '
source:
  book_id: neely-mwe-1990
  page: 12-2
  chapter: 'Глава 12: Дополнительные расширения Нили'
  section: Каналы - Волна-2
  figure_id: null
  verbatim_quote:
    text: 'ни одна часть волны-3 не должна пробивать настоящую линию тренда 0-2. Если
      повышение, удаляющееся от волны-2, не имеет силы остаться выше "первоначальной"
      линии тренда 0-2, то оно по своему характеру не Импульсное и не может быть частью
      Импульсной волны-3.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к волне-3 внутри Импульсной фигуры (Impulse)

    pattern == ''impulse''

    AND wave_3 is identified

    AND wave_0 is defined  # начало волны-1 (точка 0)

    AND wave_2 is defined  # конец волны-2 (точка 2)

    '
  constraint: "# Построить \"настоящую\" (первоначальную) линию тренда от точки 0\
    \ к точке 2\n# Точка 0 = start(wave_1), Точка 2 = end(wave_2)\ntl_0_2 = trendline(start(wave_1),\
    \ end(wave_2))\n\n# Для бычьего импульса (направление вверх):\n#   Ни одна точка\
    \ волны-3 не должна опускаться ниже линии тренда 0-2\nif direction == 'up':\n\
    \  for each price_point P in wave_3:\n    P.low >= tl_0_2.value_at(P.time)\n\n\
    # Для медвежьего импульса (направление вниз):\n#   Ни одна точка волны-3 не должна\
    \ подниматься выше линии тренда 0-2\nif direction == 'down':\n  for each price_point\
    \ P in wave_3:\n    P.high <= tl_0_2.value_at(P.time)\n\n# Если условие нарушено\
    \ (волна-3 пробивает линию тренда 0-2),\n# то движение после волны-2 не является\
    \ Импульсным\n# и не может быть частью Импульсной волны-3.\n# => Текущая разметка\
    \ impulse невалидна.\n"
  formalization_notes: "1. \"Настоящая линия тренда 0-2\" — прямая линия от начала\
    \ волны-1 (точка 0)\n   до конца волны-2 (точка 2), проведённая на ценовом графике.\n\
    2. Проверяется вся волна-3 целиком (\"ни одна часть волны-3\"),\n   т.е. каждый\
    \ бар/точка внутри волны-3.\n3. \"Пробитие\" означает закрытие или экстремум по\
    \ ту сторону линии тренда,\n   которая является поддержкой (для бычьего) или сопротивлением\
    \ (для медвежьего).\n4. Правило является фильтром валидности: если нарушено —\
    \ разметка\n   данного движения как импульсной волны-3 отвергается.\n5. В исходном\
    \ тексте упоминается \"повышение\" (удаление от волны-2),\n   что подразумевает\
    \ бычий контекст, но по симметрии правило\n   применяется и к медвежьему импульсу\
    \ (зеркально)."
aliases:
- правило линии тренда 0-2
- правило непробития тренда волной-3

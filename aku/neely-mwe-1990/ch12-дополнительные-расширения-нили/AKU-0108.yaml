id: AKU-0108
type: rule
strength: mandatory
status: verified
topic: channeling
subtopics:
- impulse
- wave-identification
statement_ru: 'Ни одна часть волны-3 или волны-5 не должна пробивать линию тренда
  2-4, если только 5-я волна не является Терминальной фигурой.

  '
source:
  book_id: neely-mwe-1990
  page: 12-4
  chapter: 'Глава 12: Дополнительные расширения Нили'
  section: Каналы - Волна-4
  figure_id: null
  verbatim_quote:
    text: 'ни одна часть волны-З или волны-5 не должна пробивать линию тренда 2-4,
      если только 5-я волна не является Терминальной фигурой.

      '
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется к завершённому импульсу, когда волны 2 и 4
    уже определены

    pattern == ''impulse''

    AND wave_2.complete == true

    AND wave_4.complete == true

    '
  constraint: "# Построить линию тренда через конец волны-2 и конец волны-4\ntl_2_4\
    \ = trendline(end(wave_2), end(wave_4))\n\n# Ни одна часть волны-3 не должна пробивать\
    \ линию тренда 2-4\n# (волна-3 находится между точками 2 и 4, т.е. линия тренда\
    \ проходит\n# через начало и конец волны-3 по сути, но проверяется именно пробитие\n\
    # ценой любой части волны-3 за эту линию)\nno_part_breaks_trendline(wave_3, tl_2_4)\
    \ == true\n\n# Ни одна часть волны-5 не должна пробивать линию тренда 2-4,\n#\
    \ ЕСЛИ ТОЛЬКО волна-5 не является Терминальной фигурой (Terminal pattern)\nIF\
    \ wave_5.subtype != 'terminal':\n    no_part_breaks_trendline(wave_5, tl_2_4)\
    \ == true\n# Если wave_5.subtype == 'terminal', пробитие линии тренда 2-4 волной-5\
    \ допустимо\n\n# Определение \"пробития\": для бычьего импульса — ни одна точка\
    \ волны\n# не опускается ниже значения tl_2_4 в соответствующий момент времени;\n\
    # для медвежьего импульса — ни одна точка волны не поднимается выше tl_2_4.\n\
    #\n# no_part_breaks_trendline(wave, tl):\n#   FOR each bar in wave:\n#     tl_value_at_bar\
    \ = interpolate(tl, bar.time)\n#     IF direction == 'bullish':\n#       assert\
    \ bar.low >= tl_value_at_bar\n#     ELSE:  # bearish\n#       assert bar.high\
    \ <= tl_value_at_bar\n"
  formalization_notes: "1. Линия тренда 2-4 строится через конечные точки (end) волны-2\
    \ и волны-4.\n   Волна-3 хронологически расположена между этими точками, поэтому\
    \ проверка\n   пробития волной-3 — это проверка того, что волна-3 не выходит за\n\
    \   интерполированную линию между своим началом и концом.\n2. Правило говорит\
    \ \"ни одна часть\" — значит проверяется каждый бар/точка\n   волны, а не только\
    \ экстремумы.\n3. Исключение для Terminal (Терминальной фигуры) применяется только\
    \ к волне-5,\n   но НЕ к волне-3 — волна-3 не может пробивать линию тренда 2-4\
    \ ни при каких условиях.\n4. Правило применяется ретроспективно после завершения\
    \ волны-4 (и волны-5),\n   поскольку линия тренда 2-4 может быть построена только\
    \ после определения\n   конца волны-4."

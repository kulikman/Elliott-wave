statement_ru: 'Волна-с Зигзага Внутренне не должна быть меньше 61.8% волны-а. Если
  она меньше, это вероятно связано с Треугольной b-волной, и данный Зигзаг вероятно
  является стороной Треугольника или частью сложной коррекции, являющейся стороной
  Треугольника.

  '
source:
  book_id: neely-mwe-1990
  page: 12-30
  chapter: Глава 12
  section: Дополнительные расширения Нили
  figure_id: 12-30-B
  verbatim_quote:
    text: Волна-с Внутренне не должна быть меньше 61.8% волны-а.
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'zigzag'
  constraint: length(wave_c) >= 0.618 * length(wave_a)
  formalization_notes: Если меньше — вероятно Треугольная b-волна / сторона Треугольника.

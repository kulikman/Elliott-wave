statement_ru: 'При Растянутой 3-й волне волна-1 не должна быть связана с волной-3
  Внутренним соотношением 61.8%.

  '
source:
  book_id: neely-mwe-1990
  page: 12-27
  chapter: Глава 12
  section: Дополнительные расширения Нили
  figure_id: 12-27
  verbatim_quote:
    text: Когда в фигуре Растянута волна-3, волна-1 не должна быть связана с волной-3
      Внутренним соотношением 61.8%.
    language: ru
formalization:
  status: draft
  applies_when: pattern == 'impulse' AND extended_wave == 3
  constraint: length(wave_1) != 0.618 * length(wave_3)
  formalization_notes: Внутреннее соотношение 61.8% между волнами 1 и 3 запрещено.

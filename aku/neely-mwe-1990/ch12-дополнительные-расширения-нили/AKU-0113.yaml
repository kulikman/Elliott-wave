statement_ru: 'Для подтверждения Терминальной фигуры активность после волны-(5) должна
  вернуться к минимуму волны-(4); если этого не происходит, интерпретация неправильная.
  В 99% случаев рынок будет возвращаться к началу волны-(1) или ниже.

  '

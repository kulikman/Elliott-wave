statement_ru: 'Когда одни и те же ряды данных могут быть интерпретированы более чем
  одной абсолютно допустимой волновой фигурой, рынок должен быть близок к центру более
  крупной конфигурации Эллиотта (находиться в волне-b более крупной волны-b, в волне-3
  более крупной волны-3 или в волне-х Нестандартной Сложной Коррекции).

  '

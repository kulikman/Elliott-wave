  page: 40
  chapter: 'Урок 10: Техника Торговли'
  section: Ложное движение на новости
  figure_id: null
  verbatim_quote:
    text: 'Бывает так что во время выхода новости цена делает ложное движение...Например,
      как здесь...




      В этом случае надо ставить стоп дальше чем обычно... на 8-10 п. от видимой вами
      волновой фигуры...'
    language: ru
formalization:
  status: not_formalizable
  applies_when: null
  constraint: null
  formalization_notes: "Правило не поддаётся формализации по следующим причинам:\n\
    \n1. \"Ложное движение на новости\" — понятие не определено формально. \n   Нет\
    \ критериев, по которым алгоритм может отличить ложное движение \n   от истинного\
    \ в момент его возникновения. Это ретроспективная оценка.\n\n2. \"Видимая вами\
    \ волновая фигура\" — субъективное визуальное понятие, \n   не имеющее однозначного\
    \ алгоритмического определения. Не указано, \n   от какой именно точки фигуры\
    \ (вершина, основание, граница какой волны) \n   отсчитывать 8-10 пунктов.\n\n\
    3. \"Выход новости\" — внешнее фундаментальное событие, не относящееся \n   к\
    \ волновой структуре и не формализуемое в рамках ценового анализа.\n\n4. Правило\
    \ является торговой рекомендацией по управлению рисками (stop-loss), \n   а не\
    \ структурным правилом волнового анализа Эллиотта. Оно не накладывает \n   ограничений\
    \ на соотношения волн, их длины или структуру.\n\n5. Значение \"8-10 пунктов\"\
    \ является абсолютной величиной, зависящей от \n   инструмента и таймфрейма, и\
    \ не может быть универсально формализовано."

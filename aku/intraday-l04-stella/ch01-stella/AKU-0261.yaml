  formalization_notes: "Правило утверждает, что если Стэлла распознана как коррекция\
    \ по ходу тренда,\nто можно определить её окончание и размер последующего отката.\
    \ Однако:\n1. В verbatim_quote и statement_ru не указаны конкретные числовые уровни\n\
    \   или алгоритмические критерии для определения окончания Стэллы.\n2. Не указаны\
    \ конкретные значения размера последующего отката в данном контексте\n   (числовые\
    \ уровни 61%, 81%, >81% упомянуты в review_notes как требующие\n   human review\
    \ и не внесённые как AKU).\n3. Фраза \"легко определить если вы увидели её как\
    \ коррекцию по ходу тренда\"\n   является качественным утверждением о возможности\
    \ анализа, а не формальным\n   правилом с проверяемым ограничением.\n4. Без конкретных\
    \ числовых параметров или алгоритмических шагов из источника\n   невозможно записать\
    \ проверяемое constraint."

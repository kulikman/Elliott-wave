id: AKU-0002
type: rule
strength: mandatory
status: verified
topic: impulse
subtopics: [rule-of-extension, impulse-extension]

statement_ru: >
  Волна 3 не может быть самой короткой из волн 1, 3 и 5.
  Если волна 3 короче обеих — импульсный счёт неверен.

statement_en: >
  Wave 3 may never be the shortest wave among waves 1, 3, and 5.

source:
  book_id: neely-mwe-1990
  page: "3-15"
  chapter: "Chapter 3: Preliminary Analysis"
  section: "Rules for Impulse Waves"
  figure_id: null
  verbatim_quote:
    text: >
      Волна 3 не может быть самой короткой волной в импульсной
      последовательности из волн 1, 3 и 5.
    language: ru

formalization:
  status: verified
  applies_when: "pattern == 'impulse'"
  constraint: "length(wave_3) > min(length(wave_1), length(wave_5))"
  formalization_notes: null

aliases:
  - "wave 3 not shortest rule"
  - "правило третьей волны"


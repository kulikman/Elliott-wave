id: AKU-0003
type: rule
strength: mandatory
status: verified
topic: rule-of-similarity
subtopics: [grouping-procedure, wave-degree]

statement_ru: >
  Правило подобия и баланса: две смежные волны считаются подобными
  (и могут быть одного Порядка) только если длина меньшей составляет
  не менее одной трети длины большей — по цене ИЛИ по времени.
  Если ни одно условие не выполнено — волны принадлежат разным Порядкам
  и не могут быть объединены напрямую.

statement_en: >
  Rule of Similarity and Balance: two adjacent waves are of the same
  degree only if the smaller is at least 1/3 the size of the larger —
  in price OR in time.

source:
  book_id: neely-mwe-1990
  page: "4-6"
  chapter: "Chapter 4: Further Analytical Procedure"
  section: "Rule of Similarity and Balance"
  figure_id: null
  verbatim_quote:
    text: >
      Две смежные волны считаются подобными во временном отношении,
      если длительность меньшей составляет как минимум треть
      протяжённости большей. Достаточно выполнения хотя бы одного
      условия — цена ИЛИ время.
    language: ru

formalization:
  status: verified
  applies_when: "checking if wave_a and wave_b are same degree"
  constraint: |
    (min(price(w_a), price(w_b)) >= max(price(w_a), price(w_b)) / 3)
    OR
    (min(time(w_a), time(w_b)) >= max(time(w_a), time(w_b)) / 3)
  formalization_notes: >
    Соответствие правилу НЕОБХОДИМО но недостаточно для одного Порядка.
    Говорит лишь что волны МОГУТ быть одного Порядка — не доказывает.

aliases:
  - "rule of similarity"
  - "1/3 threshold rule"
  - "правило одной трети"
  - "правило подобия"


    language: ru
formalization:
  status: not_formalizable
  applies_when: null
  constraint: null
  formalization_notes: "Правило не поддаётся формализации по следующим причинам:\n\
    \n1. \"S-ка\" (S-curve) — это специфический графический паттерн (фигура),\n  \
    \ формальные критерии идентификации которого не определены в данном AKU.\n   Без\
    \ чёткого алгоритмического определения что такое S-ка (какие волны,\n   пропорции,\
    \ структура), невозможно написать условие applies_when.\n\n2. \"Уровень Поддержки\
    \ (Сопротивления)\" и \"Линия Прорыва\" — это внешние\n   по отношению к волновой\
    \ структуре концепции. Они зависят от контекста\n   графика (исторические экстремумы,\
    \ трендовые линии и т.д.) и не имеют\n   однозначного алгоритмического определения\
    \ в рамках волнового анализа\n   Эллиотта. Правило требует знания о том, что S-ка\
    \ \"достигла\" некоторого\n   уровня, но критерий \"достижения\" (касание, пробой,\
    \ закрытие за уровнем)\n   не специфицирован.\n\n3. Утверждение \"откатывается\
    \ на 100% и более\" предполагает, что цена\n   возвращается к началу S-ки и далее,\
    \ но точка отсчёта отката\n   (начало S-ки, её конкретная волна) не определена\
    \ формально.\n\nВсе три ключевых компонента правила (паттерн S-ка, уровни поддержки/\n\
    сопротивления/прорыва, и точка отсчёта отката) требуют внешних\nопределений, отсутствующих\
    \ в данном AKU и его verbatim_quote."

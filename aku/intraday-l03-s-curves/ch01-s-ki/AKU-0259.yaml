id: AKU-0259
type: rule
strength: conditional
status: verified
topic: retracement
subtopics:
- trading-application
statement_ru: Если S-ка расположена в конце тренда, её откат составляет более 100%.
statement_en: null
source:
  book_id: intraday-l03-s-curves
  page: 13
  chapter: 'Урок 3: S-ки'
  section: S-ка в конце тренда и Черный Лебедь
  figure_id: null
  verbatim_quote:
    text: S-ка может располагаться в конце тренда. В этом случае её откат составляет
      более 100% !
    language: ru
formalization:
  status: draft
  applies_when: '# S-образная фигура (S-curve) расположена в конце тренда

    pattern == ''s_curve''

    AND s_curve_position == ''end_of_trend''

    '
  constraint: '# Откат S-ки составляет более 100% от её собственного размера

    # retracement_ratio = расстояние отката / высота S-ки

    retracement_ratio(s_curve) > 1.0

    '
  formalization_notes: 'Правило conditional — описывает ожидаемое поведение, а не
    жёсткое ограничение.

    Основная сложность: алгоритмическое определение того, что S-ка расположена

    именно "в конце тренда" — это требует внешнего контекста (например, завершение

    импульсной структуры старшего таймфрейма, достижение уровня поддержки/сопротивления

    и т.п.), что в verbatim_quote не детализировано.

    Из контекста книги видно, что автор связывает >100% откат с коррекцией против

    основного тренда и достижением уровней поддержки/сопротивления, но точные

    критерии определения "конца тренда" не формализованы.

    Брэдли Коуэн называл такую S-ку "Чёрным Лебедем" (alias).'

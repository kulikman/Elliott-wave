  formalization_notes: "Правило не поддаётся надёжной формализации по следующим причинам:\n\
    \n1. Понятие \"S-ка\" (S-curve) не определено формально в данном AKU — \n   это\
    \ паттерн из специфического курса (Intraday L03), и без чёткого \n   алгоритмического\
    \ определения S-кривой невозможно задать applies_when.\n\n2. Условие \"по ходу\
    \ тренда\" (mid-trend) не имеет формального критерия — \n   невозможно алгоритмически\
    \ отличить S-ку \"по ходу тренда\" от S-ки \n   \"в конце тренда\" (AKU-0248 говорит\
    \ об откате >100% для конца тренда) \n   без знания будущего движения цены.\n\n\
    3. Формулировка \"может быть 50% и менее\" с модальным словом \"может\" \n   указывает\
    \ на вероятностную тенденцию, а не на жёсткое ограничение.\n   Это скорее heuristic/guideline\
    \ для трейдинга, чем верифицируемое \n   constraint для алгоритма разметки волн.\n\
    \n4. Subtopic \"trading-application\" подтверждает, что правило относится \n \
    \  к торговому применению, а не к структурной идентификации паттерна."

statement_ru: После подвижной коррекции последующее движение должно быть гораздо больше
  волны B и не меньше 161.8% движения, непосредственно предшествующего волне A.
statement_en: null
source:
  book_id: intraday-l07-moving-correction
  page: 22
  chapter: 'Урок 7: Подвижная Коррекция'
  section: Ползущая коррекция
  figure_id: page-022
  verbatim_quote:
    text: Здесь рынок настолько силен, насколько сильной может быть b-волна в Стандартной
      Коррекции. Движение, которое последует за этой фигурой, должно быть гораздо
      больше, чем волна-b, и не меньше 161.8% движения, непосредственно предшествующего
      волне-а
    language: ru
formalization:
  status: draft
  applies_when: '# Правило применяется после завершения подвижной коррекции (running
    correction / ползущая коррекция)

    # Подвижная коррекция — это flat, где волна B превышает начало волны A

    pattern_type == ''running_correction'' AND pattern_completed == true

    '
  constraint: '# post_move — движение, следующее за завершённой подвижной коррекцией

    # wave_B — волна B подвижной коррекции

    # pre_A_move — движение, непосредственно предшествующее волне A коррекции


    # Условие 1: последующее движение должно быть гораздо больше волны B

    price_move(post_move) > price_move(wave_B)


    # Условие 2: последующее движение не меньше 161.8% движения, предшествующего волне
    A

    price_move(post_move) >= 1.618 * price_move(pre_A_move)

    '
  formalization_notes: "1. \"Гораздо больше волны B\" — качественное выражение без\
    \ точного числового порога.\n   Формализовано как строгое неравенство (>), но\
    \ в оригинале подразумевается\n   существенное превышение. Точный коэффициент\
    \ не указан.\n2. pre_A_move — \"движение, непосредственно предшествующее волне\
    \ A\" — это импульсная\n   волна (или сегмент), завершившаяся в точке начала волны\
    \ A коррекции.\n3. price_move() — длина движения в ценовых единицах (абсолютное\
    \ значение разницы\n   между началом и концом волны/сегмента).\n4. Это conditional\
    \ правило (post-pattern expectation), а не жёсткое структурное\n   ограничение\
    \ внутри паттерна."

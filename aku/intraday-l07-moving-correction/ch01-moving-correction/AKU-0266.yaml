statement_ru: В подвижной коррекции волна C должна достигнуть не менее 61.8% волны
  A.
statement_en: null
source:
  book_id: intraday-l07-moving-correction
  page: 22
  chapter: 'Урок 7: Подвижная Коррекция'
  section: Ползущая коррекция
  figure_id: page-022
  verbatim_quote:
    text: Волна-с продолжает поддерживать гипотезу о действительно сильном тренде.
      Важно, чтобы волна-с достигла не менее 61.8% волны-а
    language: ru
formalization:
  status: draft
  applies_when: '# Паттерн — подвижная (ползущая) коррекция (moving/running correction),

    # которая является подтипом flat

    pattern == ''moving_correction'' AND wave_C.is_completed

    '
  constraint: '# Волна C должна достигнуть не менее 61.8% длины волны A

    # (по ценовому расстоянию)

    abs(wave_C.price_move) >= 0.618 * abs(wave_A.price_move)

    '
  formalization_notes: 'Правило conditional — применяется к подвижной (ползущей) коррекции.

    "Достигнуть 61.8% волны A" интерпретируется как ценовое движение

    волны C >= 61.8% ценового движения волны A.

    В подвижной коррекции волна C не обязана пробивать конец волны A,

    но должна покрыть минимум 61.8% её размера.

    Связано с AKU-0251 (общие правила подвижной коррекции).'

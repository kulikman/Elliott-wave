# ============================================================
# ATOMIC KNOWLEDGE UNIT — SCHEMA v1.0
# Elliott Wave Brain
# ============================================================
#
# Каждый AKU — минимальная неделимая единица знания.
# Одно правило / одно определение / один паттерн / одно исключение.
# Если можно разбить на два смысла — разбивай.
#
# ОБЯЗАТЕЛЬНЫЕ поля помечены: [REQUIRED]
# ОПЦИОНАЛЬНЫЕ помечены: [OPTIONAL]
# ============================================================

# ----------------------------------------------------------
# ИДЕНТИФИКАЦИЯ
# ----------------------------------------------------------

id:                      # [REQUIRED] Формат: AKU-XXXX (4 цифры, сквозной счётчик)
                         # Пример: AKU-0001
                         # Генерируй через: python tools/aku_id_next.py

type:                    # [REQUIRED] Тип единицы знания. Только из списка:
                         #   rule        — явное правило ("волна 2 не откатывается более 100%")
                         #   definition  — определение термина ("моноволна — это...")
                         #   pattern     — описание волновой фигуры (импульс, зигзаг...)
                         #   heuristic   — практическая рекомендация без жёсткого запрета
                         #   exception   — исключение из другого правила
                         #   relation    — отношение между двумя AKU (A влечёт B, A исключает B)
                         #   example     — конкретный пример применения правила

strength:                # [REQUIRED] Сила правила. Только из списка:
                         #   mandatory      — нарушение невозможно (invalidates the wave count)
                         #   conditional    — выполняется при определённом контексте
                         #   heuristic      — обычно верно, но исключения допустимы
                         #   controversial  — авторы расходятся

status:                  # [REQUIRED] Статус верификации. Только из списка:
                         #   draft     — создан Claude, не верифицирован
                         #   verified  — верифицирован человеком (Anton)
                         #   disputed  — под сомнением, требует решения
                         #   deprecated — устарел или заменён другим AKU

# ----------------------------------------------------------
# ТЕМАТИЧЕСКАЯ КЛАССИФИКАЦИЯ
# ----------------------------------------------------------

topic:                   # [REQUIRED] Основной топик из taxonomy.yaml (один)
                         # Пример: impulse

subtopics: []            # [OPTIONAL] Дополнительные топики из taxonomy.yaml
                         # Пример: [fibonacci-ratios, rule-of-extension]

# ----------------------------------------------------------
# СОДЕРЖАНИЕ
# ----------------------------------------------------------

statement_ru:            # [REQUIRED] Формулировка по-русски.
                         # Чёткая, одно предложение если возможно.
                         # Не пересказывай — формулируй.

statement_en: null       # [OPTIONAL] Оригинальная формулировка по-английски
                         # Заполняй если есть дословный английский текст в источнике.

# ----------------------------------------------------------
# ПРИВЯЗКА К ИСТОЧНИКУ — КРИТИЧНО
# ----------------------------------------------------------
# Без source.verbatim_quote AKU не может иметь status=verified.
# Цитата должна дословно встречаться в extracted/{book_id}/

source:
  book_id:               # [REQUIRED] ID из books.yaml
                         # Пример: neely-mwe-1990

  page:                  # [REQUIRED] Страница в книге.
                         # Формат Нили: "5-12" (глава-страница) или просто число: 142

  chapter: null          # [OPTIONAL] Название или номер главы
                         # Пример: "Chapter 5: Impulsive Activity"

  section: null          # [OPTIONAL] Раздел внутри главы
                         # Пример: "Rules for Wave 2"

  figure_id: null        # [OPTIONAL] ID диаграммы если правило иллюстрируется фигурой
                         # Пример: "neely-mwe-fig-5-3"

  verbatim_quote:        # [REQUIRED для verified] Дословная цитата из книги.
                         # Только реальный текст, ничего от себя.
                         # Язык цитаты = язык источника (обычно ru для переводов).
    text: null
    language: ru         # ru | en

# ----------------------------------------------------------
# ФОРМАЛИЗАЦИЯ
# ----------------------------------------------------------
# Заполняется ОТДЕЛЬНЫМ проходом после верификации содержания.
# НЕ заполнять при первичном извлечении — высок риск галлюцинаций.

formalization:
  status: not_attempted  # not_attempted | not_formalizable | draft | verified

  applies_when: null     # Контекст применения. Псевдокод.
                         # Пример: "current_pattern == 'impulse' AND labeling_wave == 2"

  constraint: null       # Само ограничение. Псевдокод.
                         # Пример: "retracement(w2) / length(w1) < 1.0"

  formalization_notes: null  # Почему не формализуемо / что осталось неясным

# ----------------------------------------------------------
# СВЯЗИ С ДРУГИМИ AKU
# ----------------------------------------------------------

aliases: []              # [OPTIONAL] Другие названия этой же концепции
                         # Пример: ["Rule of Wave 2", "100% retracement rule", "правило отката"]

related_aku: []          # [OPTIONAL] Связанные AKU (уточняют, дополняют)
                         # Пример: [AKU-0017, AKU-0089]

contradicts_aku: []      # [OPTIONAL] AKU с которыми это явно конфликтует
                         # При заполнении — обязательно создай запись в conflicts.yaml

extends_aku: null        # [OPTIONAL] Если это уточнение/частный случай другого AKU
                         # Пример: AKU-0017

supersedes_aku: null     # [OPTIONAL] AKU который этот заменяет (старый → deprecated)

# ----------------------------------------------------------
# МЕТАДАННЫЕ СОЗДАНИЯ
# ----------------------------------------------------------

created_by:              # [REQUIRED] claude | manual | converted
created_at:              # [REQUIRED] ISO 8601: 2026-06-02T10:00:00Z

review_notes: null       # [OPTIONAL] Заметки при ревью. Что проверить, что неясно.

requires_review: false   # [REQUIRED] true — если Claude не уверен в трактовке.
                         # Ставь true при любом сомнении — это честнее чем молчать.
